<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2a44"/>
      <stop offset="1" stop-color="#0f1724"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cd1c5"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cd1c5"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#bg)"/>
  <!-- Step pattern: 3 ascending bars -->
  <g transform="translate(76, 96)">
    <rect x="0"   y="220" width="100" height="100" rx="14" fill="#7cd1c5" opacity=".55"/>
    <rect x="120" y="140" width="100" height="180" rx="14" fill="#a5b4fc" opacity=".75"/>
    <rect x="240" y="60"  width="100" height="260" rx="14" fill="url(#step)"/>
  </g>
  <!-- Glow dot (matches the brand dot in the app header) -->
  <circle cx="86" cy="86" r="36" fill="url(#dot)"/>
  <circle cx="86" cy="86" r="36" fill="none" stroke="rgba(124,209,197,.35)" stroke-width="20"/>
</svg>
