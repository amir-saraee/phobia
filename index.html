  const lampLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.025, 0.025), lampMatLeft);
  lampLeft.position.set(-0.05, -0.50, -0.37);
  scene.add(lampLeft);
  const lampBrake = new THREE.Mesh(new THREE.PlaneGeometry(0.025, 0.025), lampMatBrake);
  lampBrake.position.set(0, -0.50, -0.37);
  scene.add(lampBrake);
  const lampRight = new THREE.Mesh(new THREE.PlaneGeometry(0.025, 0.025), lampMatRight);
  lampRight.position.set(0.05, -0.50, -0.37);
  scene.add(lampRight);
  // Track when the indicator was last triggered so we can blink it
  let indicatorEndsAt = 0;
  let indicatorSide = 0;       // -1 left, +1 right, 0 off
  // Throttle for dial canvas repaints — 10 Hz instead of 60 Hz for perf
  let dashT = 0;
  // Steering wheel — wrapped in a group so we can rotate it as one unit when
  // the user drags it. The whole wheel tilts at Pi/2.4 to match a real driving
  // posture; the inner Group rotation about its z-axis is the "steering".
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x18181a, metalness: 0.4, roughness: 0.4 });
  const wheelTilt = new THREE.Group();
  wheelTilt.position.set(0, -0.35, -0.55);
  wheelTilt.rotation.x = Math.PI / 2.4;
  scene.add(wheelTilt);
  // The actual rotating bit
  const wheelGroup = new THREE.Group();
  wheelTilt.add(wheelGroup);
  const wheel = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.025, 10, 28), wheelMat);
  wheelGroup.add(wheel);
  for (let a = 0; a < 3; a++) {
    const angle = a * Math.PI * 2 / 3;
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.018, 0.02), wheelMat);
    spoke.rotation.z = angle;
    wheelGroup.add(spoke);
  }
  // Centre boss (hub) — a small dark disk in the middle so the wheel reads
  // as a real steering wheel instead of an empty torus.
  const boss = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 0.018, 18),
    new THREE.MeshStandardMaterial({ color: 0x0d0d0f, roughness: 0.5, metalness: 0.6 })
  );
  boss.rotation.x = Math.PI / 2;
  wheelGroup.add(boss);
  // Roof + A-pillars (block out top of view)
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(2.6, 0.12, 1.5),
    new THREE.MeshStandardMaterial({ color: 0x0d0f12, roughness: 0.9 })
  );
  roof.position.set(0, 0.55, -0.4);
  scene.add(roof);

  // Other cars — generated as boxes with red tail lights
  const otherCars = [];
  if (traffic > 0.05) {
    const carCount = 3 + Math.floor(traffic * 14);
    for (let i = 0; i < carCount; i++) {
      const car = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.7, 1.3, 4.2),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(Math.random(), 0.4, 0.4),
          roughness: 0.6, metalness: 0.3,
        })
      );
      body.position.y = 0.4;
      body.castShadow = true;
      car.add(body);
      // Tail lights
      for (const sx of [-0.7, 0.7]) {
        const tail = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xff5544 }));
        tail.position.set(sx, 0.5, 2.0);
        car.add(tail);
      }
      const lane = (i % 3) - 1;        // -1, 0, 1
      car.position.set(lane * 3.2, -0.4, -8 - Math.random() * 200);
      car.userData.relSpeed = 1 + Math.random() * 4;
      car.userData.lane = lane;
      scene.add(car);
      otherCars.push(car);
    }
  }

  // Rain particles (only at the rainiest rung)
  let rain = null;
  if (isRain) {
    const N = 600;
    const positions = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      positions[i*3]   = (Math.random() - 0.5) * 30;
      positions[i*3+1] = Math.random() * 18;
      positions[i*3+2] = -Math.random() * 60 + 5;
    }
    const rg = new THREE.BufferGeometry();
    rg.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    rain = new THREE.Points(rg, new THREE.PointsMaterial({
      color: 0xb0c0d0, size: 0.06, transparent: true, opacity: 0.65,
    }));
    scene.add(rain);
  }

  // Side mirror that reflects "behind" — implemented as a small mirror box with
  // a fake darker render, just for psychological completeness
  const mirror = new THREE.Mesh(
    new THREE.BoxGeometry(0.18, 0.10, 0.04),
    new THREE.MeshStandardMaterial({ color: 0x4a5060, metalness: 0.9, roughness: 0.15 })
  );
  mirror.position.set(0.85, 0.1, -0.3);
  scene.add(mirror);

  // ----- Visible foot pedals -----
  // Two pedals on the floor between the user's legs: brake (left) + accel
  // (right). Press-and-hold each to actually drive the car. Pedals are
  // grouped so we can rotate them as if they're being depressed.
  const pedalMat = new THREE.MeshStandardMaterial({ color: 0x141416, roughness: 0.4, metalness: 0.5 });
  const pedalPlateMat = new THREE.MeshStandardMaterial({ color: 0xc4c8d0, metalness: 0.5, roughness: 0.4 });
  const brakePedal = new THREE.Group();
  brakePedal.position.set(-0.18, -0.85, -0.55);
  scene.add(brakePedal);
  const brakeArm = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.20, 0.04), pedalMat);
  brakeArm.position.set(0, 0.10, 0);
  brakePedal.add(brakeArm);
  const brakePlate = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.025, 0.13), pedalPlateMat);
  brakePlate.position.set(0, 0.20, 0.04);
  brakePedal.add(brakePlate);
  // "B" letter on the brake plate (etched in dark)
  const brakeLetter = new THREE.Mesh(
    new THREE.PlaneGeometry(0.04, 0.06),
    new THREE.MeshBasicMaterial({ color: 0x141414, transparent: true, opacity: 0.7 })
  );
  brakeLetter.rotation.x = -Math.PI / 2;
  brakeLetter.position.set(0, 0.215, 0.04);
  brakePedal.add(brakeLetter);
  const accelPedal = new THREE.Group();
  accelPedal.position.set(0.05, -0.85, -0.50);
  scene.add(accelPedal);
  const accelArm = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.18, 0.04), pedalMat);
  accelArm.position.set(0, 0.09, 0);
  accelPedal.add(accelArm);
  const accelPlate = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.018, 0.16), pedalPlateMat);
  accelPlate.position.set(0, 0.18, 0.06);
  accelPedal.add(accelPlate);

  // Pedal press state — driven by the brake button OR by clicking the pedal
  // directly. Each goes 0..1, smoothed in update.
  let brakePressed = 0;        // smoothed visual
  let brakePressTarget = 0;
  let accelPressed = 0;
  let accelPressTarget = 0;

  camera.fov = 60;
  camera.updateProjectionMatrix();

  let drivingControls = null;
  let brakeFactor = 1.0;       // multiplier for car relative-speed (1 = normal, 0.5 = braking)
  function wireDrivingCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="driving"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const c = drivingControls; if (!c) return;
        switch (btn.dataset.cmd) {
          case "mirror": {
            // Quick yaw to the right (rear-view mirror direction) and back
            const fromY = c.yaw;
            let k = 0;
            const id = setInterval(() => {
              k += 0.1;
              if (k >= 1) { c.yaw = fromY; clearInterval(id); return; }
              c.yaw = fromY + Math.sin(k * Math.PI) * 0.5;
            }, 16);
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Mirror clear. The cars behind are predictable.");
            break;
          }
          case "indicator":
            if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
              for (let i = 0; i < 4; i++) setTimeout(() => window.PhobiaAudio.indicatorClick(), i * 600);
            }
            // Blink the right-turn indicator lamp on the cluster for ~3 s
            indicatorSide = 1;
            indicatorEndsAt = performance.now() / 1000 + 3.0;
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Indicator on. You are signalling. Good.");
            break;
          case "brake":
            // Visible foot pressing the brake pedal for a held beat
            brakePressTarget = 1.0;
            brakeFactor = 0.4;
            setTimeout(() => { brakeFactor = 1.0; brakePressTarget = 0; }, 2500);
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Light pressure. The car responds.");
            break;
        }
      };
    });
  }
  setTimeout(wireDrivingCmds, 0);

  // ----- Click the pedals directly (real foot-on-pedal action) -----
  // Hold the brake or accelerator pedal with the mouse to depress it. The
  // pedal visibly tilts under your foot, and brakeFactor / speed respond.
  const pedalRaycaster = new THREE.Raycaster();
  const pedalMouse = new THREE.Vector2();
  let pedalCanvas = null;
  let activePedal = null;     // "brake" or "accel" while held
  function bindPedalClicks() {
    pedalCanvas = document.querySelector("#stage canvas");
    if (!pedalCanvas) return;
    pedalCanvas.addEventListener("pointerdown", (e) => {
      const rect = pedalCanvas.getBoundingClientRect();
      pedalMouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      pedalMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      pedalRaycaster.setFromCamera(pedalMouse, camera);
      const bHits = pedalRaycaster.intersectObject(brakePedal, true);
      if (bHits.length > 0) {
        activePedal = "brake";
        brakePressTarget = 1.0;
        if (drivingControls) drivingControls.dragging = false;
        return;
      }
      const aHits = pedalRaycaster.intersectObject(accelPedal, true);
      if (aHits.length > 0) {
        activePedal = "accel";
        accelPressTarget = 1.0;
        if (drivingControls) drivingControls.dragging = false;
      }
    });
    function release() {
      if (activePedal === "brake") brakePressTarget = 0;
      if (activePedal === "accel") accelPressTarget = 0;
      activePedal = null;
    }
    pedalCanvas.addEventListener("pointerup", release);
    pedalCanvas.addEventListener("pointercancel", release);
    pedalCanvas.addEventListener("pointerleave", release);
  }
  setTimeout(bindPedalClicks, 60);

  // ----- Steering wheel: drag-to-steer (real human action) -----
  // The user can mouse-drag the wheel left/right to actually rotate it,
  // which subtly drifts the lane and tilts the camera — the *felt sense* of
  // steering. Spring back to centre when released. Keyboard A/D as a fallback
  // for users without a mouse (also matches the existing FPControls keys).
  let steerAngle = 0;        // current displayed wheel rotation (radians)
  let steerInput = 0;        // -1 (full left) .. +1 (full right) intent
  let steerSpring = true;    // when true, the wheel relaxes back to centre
  let dragging = false;
  let lastClientX = 0;
  let canvasDom = null;
  function bindWheelDrag() {
    canvasDom = document.querySelector("#stage canvas");
    if (!canvasDom) return;
    const raycaster = new THREE.Raycaster();
    const mouseV = new THREE.Vector2();
    canvasDom.addEventListener("pointerdown", (e) => {
      const rect = canvasDom.getBoundingClientRect();
      mouseV.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      mouseV.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseV, camera);
      const hits = raycaster.intersectObject(wheelGroup, true);
      if (hits.length === 0) return;
      // Hit the wheel — start dragging instead of look-around. Cancel any
      // FPControls drag that just started so the camera doesn't rotate too.
      if (drivingControls) drivingControls.dragging = false;
      dragging = true;
      steerSpring = false;
      lastClientX = e.clientX;
      try { canvasDom.setPointerCapture(e.pointerId); } catch {}
    });
    canvasDom.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      // Belt-and-braces: while we're steering, keep FPControls suppressed.
      if (drivingControls) drivingControls.dragging = false;
      const dx = e.clientX - lastClientX;
      lastClientX = e.clientX;
      // Map ~200 px of horizontal drag to a full lock-to-lock turn (±π/2)
      steerAngle = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, steerAngle - dx * 0.012));
      steerInput = steerAngle / (Math.PI / 2);
    });
    function release() {
      if (!dragging) return;
      dragging = false;
      steerSpring = true;
    }
    canvasDom.addEventListener("pointerup", release);
    canvasDom.addEventListener("pointercancel", release);
    canvasDom.addEventListener("pointerleave", release);
  }
  setTimeout(bindWheelDrag, 60);

  return {
    controls: {
      mode: "lookOnly",
      initialPos: [0, 0, 0],
      initialYaw: 0,
      initialPitch: 0,
      pitchMin: -0.4, pitchMax: 0.3,
      yawMin: -1.0, yawMax: 1.0,
      lookSpeed: 0.0035,
      cameraModeLocked: "fp",          // driver's seat — FP only
    },
    hands: { sleeveColor: 0x2c2a2a },
    bloom: { strength: 0.25, threshold: 0.92 },
    interact(controls) {
      // Hint that the wheel is grabbable when looking at it
      if (controls && controls.pitch < -0.2) {
        return { gesture: "grab", hint: "drag the wheel to steer · brake / mirror buttons available" };
      }
      return { gesture: "rest" };
    },
    update(t, controls, dt) {
      if (controls) drivingControls = controls;
      const d = dt || 0.016;
      // Spring the steering wheel back to centre when not dragged. The driver
      // is "holding" it loosely — like a real wheel returning after a turn.
      if (steerSpring) {
        steerAngle += (0 - steerAngle) * Math.min(1, d * 6);
        steerInput = steerAngle / (Math.PI / 2);
      }
      wheelGroup.rotation.z = steerAngle
                            + Math.sin(t * (1.5 + speed * 2)) * 0.025 * speed;
      // ---- Pedals: smooth toward target, drive brakeFactor + lane speed ----
      // Brake pedal tilts forward (negative x rotation) up to ~22° when fully
      // depressed. Held brake clamps brakeFactor down to 0.35.
      brakePressed += (brakePressTarget - brakePressed) * Math.min(1, d * 8);
      accelPressed += (accelPressTarget - accelPressed) * Math.min(1, d * 8);
      brakePedal.rotation.x = -brakePressed * 0.38;
      accelPedal.rotation.x = -accelPressed * 0.38;
      // While the brake pedal is actively held, override brakeFactor — but
      // never higher than the timed-button brakeFactor (so a quick "brake"
      // button press still works).
      if (activePedal === "brake" || brakePressed > 0.35) {
        brakeFactor = Math.min(brakeFactor, 0.35);
      }
      // While the accelerator is actively held, push speed slightly above its
      // baseline. We modulate by `accelBoost` below.
      const accelBoost = 1 + accelPressed * 0.5;
      // Steering shifts the lane subtly. Visible as the road / cars sliding
      // sideways relative to the cabin (we move the cars rather than the
      // camera so the cabin geometry stays put).
      const lateralDrift = steerInput * 0.6;
      // Move other cars toward us based on relative speed (slowed when braking)
      for (const car of otherCars) {
        car.position.z += (3 + car.userData.relSpeed) * d * (0.5 + speed * accelBoost) * brakeFactor;
        // Slight lateral shift to simulate steering (lane delta scaled by speed)
        car.position.x += lateralDrift * d * 1.4 * (0.4 + speed);
        if (car.position.z > 8) {
          car.position.z = -120 - Math.random() * 100;
          car.position.x = car.userData.lane * 3.2;
          car.userData.signal = 0;
        }
        if (car.userData.signal == null) car.userData.signal = 0;
        if (car.userData.signal === 0 && Math.random() < 0.0008) {
          car.userData.signal = 1.5;
        }
        if (car.userData.signal > 0) {
          car.userData.signal -= d;
          const blink = Math.sin(t * 8) > 0 ? 0xffb030 : 0x331100;
          if (car.children[1] && car.children[1].material) car.children[1].material.color.setHex(blink);
        } else if (car.children[1] && car.children[1].material) {
          car.children[1].material.color.setHex(0xff5544);
        }
      }
      // Rain falls
      if (rain) {
        const pos = rain.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          pos.array[i*3+1] -= 28 * d;
          pos.array[i*3+2] += 6 * d;
          if (pos.array[i*3+1] < -1.5 || pos.array[i*3+2] > 6) {
            pos.array[i*3]   = (Math.random() - 0.5) * 30;
            pos.array[i*3+1] = 14 + Math.random() * 6;
            pos.array[i*3+2] = -50 - Math.random() * 30;
          }
        }
        pos.needsUpdate = true;
      }
      // Tiny camera roll when steering — mimics the inertial feel of leaning
      // into a turn without actually moving the camera much
      if (controls) {
        camera.rotation.z += (-steerInput * 0.04 - camera.rotation.z) * 0.1;
      }
      // ---- Live dashboard updates ----
      // The dial canvases are repainted every few frames so the needle
      // tracks the actual driving state in real time without burning the
      // GPU. Speed = base speed × accelBoost (1..1.5 from accelerator pedal),
      // tach roughly proportional to speed but with engine resonance.
      const repaintEvery = 0.10;        // 10 Hz canvas repaint
      dashT += d;
      if (dashT > repaintEvery) {
        dashT = 0;
        const speedKmh = (40 + speed * 90) * accelBoost * brakeFactor;
        const tachVal  = (1.5 + speed * 4) * accelBoost * (brakeFactor < 0.5 ? 0.5 : 1.0);
        paintDial(speedoCanvas, {
          value: Math.min(1, speedKmh / 200),
          maxValue: 200, maxTicks: 10, majorEvery: 1, label: "km/h",
        });
        paintDial(tachCanvas, {
          value: Math.min(1, tachVal / 8),
          maxValue: 8, maxTicks: 8, majorEvery: 1, label: "RPM × 1k",
          needleColor: "#ff5544",
        });
        speedoTex.needsUpdate = true;
        tachTex.needsUpdate = true;
      }
      // Indicator lamp blink — ~2 Hz amber while active
      if (indicatorEndsAt > t) {
        const on = Math.sin(t * Math.PI * 4) > 0;
        const target = on ? 0xff8a30 : 0x000000;
        if (indicatorSide === 1)  lampMatRight.emissive.setHex(target);
        if (indicatorSide === -1) lampMatLeft.emissive.setHex(target);
        const intensity = on ? 1 : 0;
        if (indicatorSide === 1)  lampMatRight.emissiveIntensity = intensity;
        if (indicatorSide === -1) lampMatLeft.emissiveIntensity = intensity;
      } else {
        lampMatLeft.emissive.setHex(0x000000);
        lampMatRight.emissive.setHex(0x000000);
      }
      // Brake lamp — solid red while either brake is held
      const brakeOn = brakePressed > 0.30 || brakeFactor < 0.5;
      lampMatBrake.emissive.setHex(brakeOn ? 0xff3030 : 0x000000);
      lampMatBrake.emissiveIntensity = brakeOn ? 1 : 0;
    },
  };
}

// ---------- Storms (porch / window looking out) ----------
function setupStorms(scene, camera, level) {
  const intensity = level.intensity != null ? level.intensity : 0.5;

  // Cool, slightly blue-tinted night sky. Important: keep it on the dark side
  // so the lightning flash reads as a flash, not as an explosion.
  const skyBase = new THREE.Color(0x0e1220);
  scene.background = skyBase.clone();
  scene.fog = new THREE.Fog(0x0e1220, 14, 90);

  scene.add(new THREE.AmbientLight(0x3a4050, 0.30));
  // Distant ambient flash — pulses softly during a strike. Kept moderate so
  // it doesn't wash the whole scene to white. The visible bolt geometry
  // (added below) carries most of the sense of "lightning".
  const lightning = new THREE.DirectionalLight(0xc8d4f0, 0);
  lightning.position.set(8, 20, -15);
  scene.add(lightning);

  // ---- Branching bolt geometry ----
  // A real zigzag line drawn from the clouds to a ground point. We rebuild
  // its points each strike with a fresh random branch pattern, then fade it
  // out over ~180ms. This is what carries "lightning" visually.
  const boltMat = new THREE.LineBasicMaterial({
    color: 0xeef2ff, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const boltGeo = new THREE.BufferGeometry();
  // Pre-allocate a generous buffer (will be re-filled per strike)
  const BOLT_MAX = 256;
  const boltPos = new Float32Array(BOLT_MAX * 3);
  boltGeo.setAttribute("position", new THREE.BufferAttribute(boltPos, 3));
  boltGeo.setDrawRange(0, 0);
  const bolt = new THREE.LineSegments(boltGeo, boltMat);
  bolt.frustumCulled = false;
  scene.add(bolt);
  // A subtle point light at the bolt's endpoint for ground glow
  const boltPoint = new THREE.PointLight(0xb4c8ff, 0, 25, 1.6);
  boltPoint.position.set(0, 5, -30);
  scene.add(boltPoint);

  function generateBolt() {
    // Pick a random distant strike location on the horizon
    const tx = (Math.random() - 0.5) * 60;
    const tz = -25 - Math.random() * 25;
    // Top of the bolt: high up, slightly offset from the strike
    const sx = tx + (Math.random() - 0.5) * 6;
    const sy = 18 + Math.random() * 4;
    const sz = tz + (Math.random() - 0.5) * 6;
    // Build a jagged main path from top → ground (12 segments)
    const pts = [];
    const main = [];
    const segs = 12;
    for (let i = 0; i <= segs; i++) {
      const u = i / segs;
      // Lerp top → ground with random sideways jitter
      const x = sx + (tx - sx) * u + (Math.random() - 0.5) * 1.4;
      const y = sy + (-1 - sy) * u;
      const z = sz + (tz - sz) * u + (Math.random() - 0.5) * 1.4;
      main.push([x, y, z]);
    }
    // Convert main path to line-segments (pairs of points)
    for (let i = 0; i < main.length - 1; i++) {
      pts.push(main[i], main[i + 1]);
    }
    // Two short branches splitting off the main bolt
    for (let b = 0; b < 2; b++) {
      const startIdx = 2 + Math.floor(Math.random() * (main.length - 5));
      const start = main[startIdx];
      let cx = start[0], cy = start[1], cz = start[2];
      const branchLen = 3 + Math.floor(Math.random() * 3);
      const bxDir = (Math.random() - 0.5) * 1.2;
      const bzDir = (Math.random() - 0.5) * 1.2;
      for (let k = 0; k < branchLen; k++) {
        const nx = cx + bxDir + (Math.random() - 0.5) * 0.8;
        const ny = cy - 1 - Math.random() * 0.8;
        const nz = cz + bzDir + (Math.random() - 0.5) * 0.8;
        pts.push([cx, cy, cz], [nx, ny, nz]);
        cx = nx; cy = ny; cz = nz;
      }
    }
    // Write to buffer
    const count = Math.min(pts.length, BOLT_MAX);
    for (let i = 0; i < count; i++) {
      boltPos[i * 3]     = pts[i][0];
      boltPos[i * 3 + 1] = pts[i][1];
      boltPos[i * 3 + 2] = pts[i][2];
    }
    boltGeo.setDrawRange(0, count);
    boltGeo.attributes.position.needsUpdate = true;
    // Position the ground-glow point light at the bolt's endpoint
    const last = main[main.length - 1];
    boltPoint.position.set(last[0], 0, last[2]);
  }

  // Wet pavement — low roughness + high envMapIntensity so the ground catches
  // reflections of the sky / lightning bolts. Combined with the puddle
  // Reflector this gives the floor a real "rain-soaked" sheen.
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(120, 120),
    new THREE.MeshStandardMaterial({
      color: 0x1a1d24,
      roughness: 0.30,
      metalness: 0.55,
      envMapIntensity: 1.6,
    })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1;
  scene.add(ground);

  // A puddle in front of the user — a real Reflector that mirrors the scene
  // (so the user sees themselves looking down). Disabled on low-power devices.
  let puddle = null;
  if (!IS_LOW_POWER) {
    puddle = new Reflector(
      new THREE.CircleGeometry(2.5, 64),
      {
        textureWidth:  512,
        textureHeight: 512,
        color: 0x445060,
      }
    );
    puddle.rotation.x = -Math.PI / 2;
    puddle.position.set(0, -0.99, -2.0);     // just in front, sitting on the ground
    scene.add(puddle);
  }

  // Trees (silhouettes) — bark normal map when the realism module is
  // available, plus low-poly tree builder for ones close to the porch.
  for (let i = 0; i < 16; i++) {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 6),
      (window.PhobiaRealism && window.PhobiaRealism.barkMaterial)
        ? window.PhobiaRealism.barkMaterial("#141a18")
        : new THREE.MeshStandardMaterial({ color: 0x141a18 }));
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.9, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a2418, flatShading: true }));
    trunk.position.set((Math.random() - 0.5) * 80, 0, -8 - Math.random() * 50);
    leaves.position.set(trunk.position.x, 1.6, trunk.position.z);
    scene.add(trunk); scene.add(leaves);
  }
  // A drifting fog plane in front of the porch — catches the lightning
  // flash in a dramatic way (the flash silhouettes the rain through fog,
  // mimicking how a real storm reads from inside a porch).
  let _stormFog = null;
  if (window.PhobiaAtmosphere && window.PhobiaAtmosphere.createFogPlane) {
    _stormFog = window.PhobiaAtmosphere.createFogPlane({
      width: 24, height: 6, color: 0x495466, opacity: 0.13,
      origin: [0, 1.5, -8],
    });
    if (_stormFog) scene.add(_stormFog);
  }

  // Porch roof (we're under shelter)
  const porch = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.2, 4),
    new THREE.MeshStandardMaterial({ color: 0x2a2a30, roughness: 0.85 })
  );
  porch.position.set(0, 1.4, 1);
  scene.add(porch);
  // Posts
  for (const sx of [-3.5, 3.5]) {
    const post = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 2.6, 0.18),
      new THREE.MeshStandardMaterial({ color: 0x32343a })
    );
    post.position.set(sx, 0.1, -1);
    scene.add(post);
  }
  // House behind us
  const house = new THREE.Mesh(
    new THREE.BoxGeometry(40, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0x222730 })
  );
  house.position.set(0, 3, 5);
  scene.add(house);

  // Rain particles
  const N = 700;
  const rainPos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    rainPos[i*3]   = (Math.random() - 0.5) * 40;
    rainPos[i*3+1] = Math.random() * 20;
    rainPos[i*3+2] = -Math.random() * 40;
  }
  const rainGeo = new THREE.BufferGeometry();
  rainGeo.setAttribute("position", new THREE.BufferAttribute(rainPos, 3));
  const rain = new THREE.Points(rainGeo, new THREE.PointsMaterial({
    color: 0x7a8aa0, size: 0.05, transparent: true, opacity: 0.55,
  }));
  scene.add(rain);

  // Strike-flash state. `flash` drives the broad sky glow; `boltLife` drives
  // the visible bolt geometry's opacity (separate envelope so the bolt fades
  // faster than the sky glow, which matches what real lightning looks like).
  let nextStrike = 2 + (1 - intensity) * 6;
  let flash = 0;
  let boltLife = 0;
  let restrikePending = false;
  let camFlashTint = 0;
  let lastFlashT = -10;

  // ----- Side table with an unlit candle + a matchbook -----
  // Both visible from the start. Real human action: click the matchbook,
  // a flame appears, click the candle within ~5 s and it lights.
  const tableGroup = new THREE.Group();
  tableGroup.position.set(2.0, -0.50, -0.4);
  scene.add(tableGroup);
  const tableTop = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 0.04, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x6b4a2a, roughness: 0.7 })
  );
  tableGroup.add(tableTop);
  for (const [tx, tz] of [[-0.30, -0.20], [0.30, -0.20], [-0.30, 0.20], [0.30, 0.20]]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 0.50, 8),
      new THREE.MeshStandardMaterial({ color: 0x4a3018, roughness: 0.85 })
    );
    leg.position.set(tx, -0.27, tz);
    tableGroup.add(leg);
  }

  // Unlit candle (visible on the table from the start)
  const candle = new THREE.Group();
  const candleStick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.05, 0.20, 14),
    new THREE.MeshStandardMaterial({ color: 0xe8dfc6, roughness: 0.85 })
  );
  candleStick.position.y = 0.10;
  candle.add(candleStick);
  // Wick (small dark cylinder on top)
  const wick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.004, 0.003, 0.022, 6),
    new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 0.95 })
  );
  wick.position.y = 0.215;
  candle.add(wick);
  // Flame (hidden until lit)
  const candleFlame = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 14, 10),
    new THREE.MeshBasicMaterial({
      color: 0xffe0a0, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  candleFlame.scale.set(1, 1.6, 1);
  candleFlame.position.y = 0.245;
  candle.add(candleFlame);
  candle.position.set(-0.15, 0.025, 0);
  tableGroup.add(candle);
  // Warm point light (intensity 0 until lit)
  const candleLight = new THREE.PointLight(0xffb060, 0, 4);
  candleLight.position.set(2.0 - 0.15, -0.50 + 0.27, -0.4);
  scene.add(candleLight);

  // Matchbook on the table — a small box with a striker stripe
  const matchbook = new THREE.Group();
  const mbBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.10, 0.04, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x7c3a2a, roughness: 0.85 })
  );
  matchbook.add(mbBody);
  // Striker stripe (slightly darker / coarser)
  const mbStripe = new THREE.Mesh(
    new THREE.BoxGeometry(0.10, 0.005, 0.018),
    new THREE.MeshStandardMaterial({ color: 0x2a1a14, roughness: 1.0 })
  );
  mbStripe.position.set(0, 0.022, 0.018);
  matchbook.add(mbStripe);
  matchbook.position.set(0.15, 0.045, 0.05);
  tableGroup.add(matchbook);

  // Match-state: when the user clicks the matchbook a small flame appears
  // in their hand for ~5 seconds. Clicking the candle while the match is
  // lit transfers the flame.
  let candleLit = false;
  let matchLit = 0;     // 0..1, decays after lighting

  // Visible "match in hand" mesh attached to camera
  const handMatch = new THREE.Group();
  const handMatchStick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.005, 0.0045, 0.10, 8),
    new THREE.MeshStandardMaterial({ color: 0xb8987a, roughness: 0.95 })
  );
  handMatchStick.rotation.z = -0.4;
  handMatch.add(handMatchStick);
  const handMatchFlameMat = new THREE.MeshBasicMaterial({
    color: 0xffe0a0, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const handMatchFlame = new THREE.Mesh(new THREE.SphereGeometry(0.014, 12, 10), handMatchFlameMat);
  handMatchFlame.scale.set(0.8, 1.6, 0.8);
  handMatchFlame.position.set(0.045, 0.055, 0);
  handMatch.add(handMatchFlame);
  handMatch.position.set(0.18, -0.16, -0.30);
  handMatch.visible = false;
  camera.add(handMatch);
  if (!scene.children.includes(camera)) scene.add(camera);

  function strikeMatch() {
    if (matchLit > 0) return;
    matchLit = 1.0;
    handMatch.visible = true;
    handMatchFlameMat.opacity = 1;
    if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
      try { window.PhobiaAudio.indicatorClick(); } catch {}
    }
    if (window.PhobiaVoice) window.PhobiaVoice.speak("A small flame. Bring it to the candle.");
  }
  function lightCandleNow() {
    if (candleLit || matchLit <= 0.05) return;
    candleLit = true;
    matchLit = 0;
    handMatchFlameMat.opacity = 0;
    handMatch.visible = false;
    candleFlame.material.opacity = 1;
    candleLight.intensity = 1.4;
    if (window.PhobiaVoice) window.PhobiaVoice.speak("A small light. Notice how warm it is. Storms are loud, but this is your room.");
  }

  // ----- Click-on-prop raycaster (matchbook + candle) -----
  const stRaycaster = new THREE.Raycaster();
  const stMouse = new THREE.Vector2();
  let stCanvas = null;
  let stDownX = 0, stDownY = 0, stDownT = 0, stPid = -1;
  function bindStormsClicks() {
    stCanvas = document.querySelector("#stage canvas");
    if (!stCanvas) return;
    stCanvas.addEventListener("pointerdown", (e) => {
      stDownX = e.clientX; stDownY = e.clientY;
      stDownT = performance.now(); stPid = e.pointerId;
    });
    stCanvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== stPid) return;
      const dx = e.clientX - stDownX, dy = e.clientY - stDownY;
      if (Math.hypot(dx, dy) > 6 || performance.now() - stDownT > 350) return;
      const rect = stCanvas.getBoundingClientRect();
      stMouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      stMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      stRaycaster.setFromCamera(stMouse, camera);
      // Try matchbook first
      const mbHits = stRaycaster.intersectObject(matchbook, true);
      if (mbHits.length > 0) { strikeMatch(); return; }
      // Then candle
      const cHits = stRaycaster.intersectObject(candle, true);
      if (cHits.length > 0) {
        if (matchLit > 0.05) lightCandleNow();
        else if (window.PhobiaVoice) window.PhobiaVoice.speak("Click the matchbook first to strike a match.");
      }
    });
  }
  setTimeout(bindStormsClicks, 60);

  camera.fov = 65;
  camera.updateProjectionMatrix();

  let stormsControls = null;
  function wireStormsCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="storms"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        if (btn.dataset.cmd === "count") {
          // Tell the user how far the most recent strike was
          // (using the time since last flash)
          if (window.PhobiaVoice) {
            const now = performance.now() / 1000;
            const elapsed = now - lastFlashT;
            const km = (elapsed / 3).toFixed(1);
            if (lastFlashT > 0) window.PhobiaVoice.speak(`Last flash about ${km} kilometres away. The storm has a measure.`);
            else window.PhobiaVoice.speak("Watch for the next flash. Then count seconds. Each three is a kilometre.");
          }
        } else if (btn.dataset.cmd === "step-in") {
          const c = stormsControls; if (c) {
            const fromZ = c.position.z;
            let k = 0;
            const id = setInterval(() => {
              k += 0.05;
              if (k >= 1) { c.position.z = 0.6; clearInterval(id); return; }
              c.position.z = fromZ + (0.6 - fromZ) * k;
            }, 16);
          }
          if (window.PhobiaVoice) window.PhobiaVoice.speak("Stepped under the porch. The roof is solid.");
        } else if (btn.dataset.cmd === "candle") {
          // The button now does the chained gesture for users who can't
          // raycast (touch + screen-reader): strike → light in one click.
          if (!candleLit) {
            strikeMatch();
            setTimeout(lightCandleNow, 600);
          }
        }
      };
    });
  }
  setTimeout(wireStormsCmds, 0);

  return {
    controls: {
      mode: "lookOnly",
      initialPos: [0, 0, 0],
      initialYaw: 0,
      initialPitch: -0.05,
      lookSpeed: 0.0035,
      cameraModeLocked: "fp",          // looking out from inside the porch
    },
    hands: { sleeveColor: 0x36404a },
    // Mild bloom — enough to give the bolt a slight halo without smearing
    // the whole sky into a white-out on each strike.
    bloom: { strength: 0.35, threshold: 0.78 },
    ssao: false,    // sky/rain dominate; AO would noise up the rain particles
    update(t, controls, dt) {
      if (controls) stormsControls = controls;
      const d = dt || 0.016;
      if (_stormFog && _stormFog.userData && _stormFog.userData.update) {
        _stormFog.userData.update(d, t);
      }
      // Animate rain
      const pos = rain.geometry.attributes.position;
      for (let i = 0; i < N; i++) {
        pos.array[i*3+1] -= 22 * d;
        if (pos.array[i*3+1] < -1) {
          pos.array[i*3+1] = 18;
          pos.array[i*3]   = (Math.random() - 0.5) * 40;
        }
      }
      pos.needsUpdate = true;

      // Candle flicker (intensity + flame scale) — only once it's been lit
      if (candleLit) {
        const flicker = 1 + Math.sin(t * 14) * 0.15 + (Math.random() - 0.5) * 0.1;
        candleLight.intensity = 1.4 * flicker;
        candleFlame.scale.set(1, 1.6 * flicker, 1);
      }
      // Match-in-hand decay (5 second life). The flame opacity tracks matchLit.
      if (matchLit > 0) {
        matchLit = Math.max(0, matchLit - d * 0.20);
        const mFlicker = 1 + Math.sin(t * 22) * 0.15 + (Math.random() - 0.5) * 0.1;
        handMatchFlameMat.opacity = matchLit;
        handMatchFlame.scale.set(0.8 * mFlicker, 1.6 * mFlicker, 0.8 * mFlicker);
        if (matchLit <= 0) {
          handMatch.visible = false;
        }
      }
      // Lightning: strike every (3 + (1-intensity)*8) sec on average. Each
      // strike is a real branching bolt + a soft sky glow + a delayed thunder.
      if (t > nextStrike) {
        generateBolt();
        flash = 0.7;            // softer broad glow
        boltLife = 1.0;         // bolt geometry is bright at strike, fades fast
        lastFlashT = t;
        nextStrike = t + 3 + (1 - intensity) * 8 + Math.random() * 2;
        // Capture where this bolt actually struck so the thunder rolls in
        // from that direction. boltPoint already moved to the endpoint inside
        // generateBolt().
        const strikePos = {
          x: boltPoint.position.x,
          y: boltPoint.position.y + 4,
          z: boltPoint.position.z,
        };
        // Real lightning often re-strikes within 60-120 ms — schedule a small
        // secondary flicker on the same bolt path for that classic look.
        if (Math.random() < 0.6) {
          restrikePending = true;
          setTimeout(() => {
            if (!restrikePending) return;
            restrikePending = false;
            boltLife = Math.max(boltLife, 0.7);
            flash = Math.max(flash, 0.55);
          }, 70 + Math.random() * 60);
        }
        // Thunder follows after a delay (sound is slower than light) and is
        // panned from the bolt's actual position — so a strike to the left
        // rumbles from your left.
        const thunderDelay = (1 - intensity) * 4000 + 500;
        setTimeout(() => {
          if (window.PhobiaAudio && window.PhobiaAudio.thunder) {
            window.PhobiaAudio.thunder(0.4 + intensity * 0.6, true, strikePos);
          }
        }, thunderDelay);
      }
      // Bolt opacity decays much faster than the sky glow — ~120 ms half-life.
      boltLife = Math.max(0, boltLife - d * 8.0);
      bolt.material.opacity = boltLife;
      boltPoint.intensity = boltLife * 1.5;
      // Sky glow decay — slower, like the air itself is briefly lit
      flash = Math.max(0, flash - d * 4.5);
      // Soft ambient flash. Capped well below pure white so it never washes
      // the scene out into "atomic explosion" territory.
      lightning.intensity = flash * (1.4 + intensity * 0.9);
      // Camera tint is subtle and biased blue; capped at ~0.18.
      camFlashTint += (flash * 0.20 - camFlashTint) * 0.25;
      const r = 0.055 + camFlashTint * 0.6;
      const g = 0.071 + camFlashTint * 0.7;
      const b = 0.125 + camFlashTint * 1.0;
      scene.background.setRGB(r, g, b);
    },
  };
}

// ---------- The dark (dim room with adjustable light) ----------
function setupDark(scene, camera, level) {
  const dim = level.dimness != null ? level.dimness : 0.5;

  scene.background = new THREE.Color(0x05060a);
  scene.fog = new THREE.Fog(0x05060a, 4, 14);

  // Single dim point light (the room's only source — gets weaker with rung)
  const lamp = new THREE.PointLight(0xffd6a0, 1.6 * (1 - dim), 8);
  lamp.position.set(0, 1.4, -1.5);
  lamp.castShadow = !IS_LOW_POWER;
  scene.add(lamp);
  scene.add(new THREE.AmbientLight(0x101018, 0.18 * (1 - dim * 0.6)));

  // Camera-attached flashlight — gets weaker with rung but never quite off
  const flashlight = new THREE.SpotLight(0xfff6d0, 0.7 * (1 - dim * 0.6), 10, Math.PI / 4, 0.4);
  flashlight.position.set(0, 0, 0);
  flashlight.target.position.set(0, 0, -1);
  camera.add(flashlight);
  camera.add(flashlight.target);
  if (!scene.children.includes(camera)) scene.add(camera);

  // Room (smaller than the enclosed claustrophobia room — feels lived-in)
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1c20, roughness: 0.95 });
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x141518, roughness: 0.85 });
  const W = 6, D = 7, H = 2.6;
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, D), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);
  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(W, D), wallMat);
  ceiling.rotation.x = Math.PI / 2;
  ceiling.position.y = H - 1;
  scene.add(ceiling);
  for (const cfg of [
    { rot: 0,             x: 0,        z: -D/2 },
    { rot: Math.PI,       x: 0,        z:  D/2 },
    { rot: Math.PI / 2,   x: -W/2,     z: 0    },
    { rot: -Math.PI / 2,  x:  W/2,     z: 0    },
  ]) {
    const w = (cfg.rot === 0 || cfg.rot === Math.PI) ? W : D;
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, H), wallMat);
    wall.rotation.y = cfg.rot;
    wall.position.set(cfg.x, H/2 - 1, cfg.z);
    wall.receiveShadow = true;
    scene.add(wall);
  }
  // Furniture silhouettes (a chair + bookshelf — recognisable shapes in low light)
  const chair = new THREE.Group();
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x2a2c33 }));
  seat.position.y = 0.4; chair.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.06),
    new THREE.MeshStandardMaterial({ color: 0x2a2c33 }));
  back.position.set(0, 0.75, -0.22); chair.add(back);
  for (const [sx, sz] of [[-0.22, -0.22], [0.22, -0.22], [-0.22, 0.22], [0.22, 0.22]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4),
      new THREE.MeshStandardMaterial({ color: 0x2a2c33 }));
    leg.position.set(sx, 0.2, sz);
    chair.add(leg);
  }
  chair.position.set(-1.6, -1, -2);
  scene.add(chair);

  const shelf = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, 1.8, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x202428 })
  );
  shelf.position.set(2, -0.1, -3);
  scene.add(shelf);

  // Floating dust motes — when the flashlight or candle catches them they
  // shimmer, which gives the dark room real depth instead of feeling like
  // a flat black box. Quietly absent at the lowest dim levels (where the
  // user is asked just to sit with the dark) — gentle gating via opacity.
  let _darkDust = null;
  if (window.PhobiaAtmosphere && window.PhobiaAtmosphere.createDustMotes) {
    _darkDust = window.PhobiaAtmosphere.createDustMotes({
      count: 90, bounds: { x: 5, y: 2.4, z: 6 },
      origin: [0, 0.5, -2], color: 0xffe7b5, size: 0.04,
      opacity: 0.30 * (1 - dim * 0.5),
    });
    if (_darkDust) scene.add(_darkDust);
  }

  camera.fov = 70;
  camera.updateProjectionMatrix();

  let flashlightHeld = false;
  let matchT = 0;       // 0..1, decays after the user lights a match
  let matchLight = null;

  // ----- Visible match (held in front of camera when struck) -----
  // The match is a small wooden stick with a visible flame at the tip. It
  // swipes in from the right when struck (the "strike" gesture), holds for
  // ~5 seconds while burning, then fades out as the flame dies.
  const matchGroup = new THREE.Group();
  const matchStick = new THREE.Mesh(
    new THREE.CylinderGeometry(0.005, 0.0045, 0.10, 8),
    new THREE.MeshStandardMaterial({ color: 0xb8987a, roughness: 0.95 })
  );
  matchStick.rotation.z = -0.4;
  matchGroup.add(matchStick);
  // Burnt black tip near the head
  const matchHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.008, 10, 8),
    new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.85 })
  );
  matchHead.position.set(-0.04, 0.0, 0).applyAxisAngle(new THREE.Vector3(0,0,1), -0.4);
  matchHead.position.set(0.045, 0.05, 0);
  matchGroup.add(matchHead);
  // Flame — additive sprite-style mesh that scales with matchT
  const flameMat = new THREE.MeshBasicMaterial({
    color: 0xffe0a0, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const matchFlame = new THREE.Mesh(new THREE.SphereGeometry(0.018, 12, 10), flameMat);
  matchFlame.scale.set(0.7, 1.6, 0.7);
  matchFlame.position.set(0.05, 0.07, 0);
  matchGroup.add(matchFlame);
  // Inner bright core
  const matchCore = new THREE.Mesh(
    new THREE.SphereGeometry(0.010, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xfff8c4, transparent: true, opacity: 0 })
  );
  matchCore.position.copy(matchFlame.position);
  matchGroup.add(matchCore);
  // Pin to the camera so it follows look direction
  matchGroup.position.set(0.18, -0.18, -0.32);   // bottom-right of view
  matchGroup.visible = false;
  camera.add(matchGroup);
  if (!scene.children.includes(camera)) scene.add(camera);

  let strikeAnim = 0;          // 0..1 strike sweep animation phase
  function lightMatch() {
    matchT = 1.0;
    strikeAnim = 1.0;
    matchGroup.visible = true;
    if (!matchLight) {
      matchLight = new THREE.PointLight(0xffb060, 0, 4);
      matchLight.position.set(0.20, -0.13, -0.27);
      camera.add(matchLight);
    }
    if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
      try { window.PhobiaAudio.indicatorClick(); } catch {}
    }
    if (window.PhobiaVoice) window.PhobiaVoice.speak("A small flame. Look at the corners. Same shapes as before.");
  }

  function wireDarkCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="dark"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    const flashBtn = bar.querySelector('[data-cmd="flashlight"]');
    if (flashBtn) {
      const press = (e) => { e.stopPropagation(); flashlightHeld = true; flashBtn.classList.add("pressed"); };
      const release = () => { flashlightHeld = false; flashBtn.classList.remove("pressed"); };
      flashBtn.addEventListener("pointerdown", press);
      flashBtn.addEventListener("pointerup", release);
      flashBtn.addEventListener("pointerleave", release);
      flashBtn.addEventListener("pointercancel", release);
    }
    const nameBtn = bar.querySelector('[data-cmd="name"]');
    if (nameBtn) nameBtn.onclick = (e) => {
      e.stopPropagation();
      if (window.PhobiaVoice) window.PhobiaVoice.speak("Name what you see. A chair. A shelf. A wall. The same things as in daylight.");
    };
    const matchBtn = bar.querySelector('[data-cmd="match"]');
    if (matchBtn) matchBtn.onclick = (e) => {
      e.stopPropagation();
      lightMatch();
    };
  }
  setTimeout(wireDarkCmds, 0);

  // Strike-the-match by quick horizontal swipe gesture (real human action).
  // A pointer drag of >80 px horizontally within 250 ms triggers the strike.
  function bindMatchSwipe() {
    const canvasDom = document.querySelector("#stage canvas");
    if (!canvasDom) return;
    let downX = 0, downY = 0, downT = 0;
    canvasDom.addEventListener("pointerdown", (e) => {
      downX = e.clientX; downY = e.clientY; downT = performance.now();
    });
    canvasDom.addEventListener("pointerup", (e) => {
      const dx = e.clientX - downX, dy = e.clientY - downY;
      const elapsed = performance.now() - downT;
      // Fast horizontal swipe — at least 80 px right or left, < 350 ms,
      // and mostly horizontal (|dx| > 2|dy|)
      if (elapsed > 350) return;
      if (Math.abs(dx) < 80 || Math.abs(dx) < Math.abs(dy) * 2) return;
      // Don't accidentally trigger if the user dragged on the cmd bar
      if (e.target && e.target.closest && e.target.closest(".scene-cmd-bar")) return;
      lightMatch();
    });
  }
  setTimeout(bindMatchSwipe, 60);

  return {
    controls: {
      mode: "walkable",
      initialPos: [0, 0, 1],
      initialYaw: 0,
      initialPitch: 0,
      bounds: { minX: -W/2 + 0.5, maxX: W/2 - 0.5, minZ: -D/2 + 0.5, maxZ: D/2 - 0.5 },
      speed: 1.2,
      lookSpeed: 0.0035,
      // Dark scene: FP locked. The whole point is the visceral "alone in
      // the dark" sensation, which third-person dilutes (you'd see your
      // character silhouetted, robbing the immersion).
      cameraModeLocked: "fp",
    },
    hands: { skinColor: 0xd4a07a, sleeveColor: 0x1a1c22 },
    bloom: { strength: 0.5, threshold: 0.85 },
    surface: "soft",   // carpeted dim room
    update(t, controls, dt) {
      const d = dt || 0.016;
      if (_darkDust && _darkDust.userData && _darkDust.userData.update) {
        _darkDust.userData.update(d, t);
      }
      // Flashlight on while held — brighter, narrower
      const target = flashlightHeld ? (1.6 * (1 - dim * 0.4)) : (0.7 * (1 - dim * 0.6));
      flashlight.intensity += (target - flashlight.intensity) * 0.12;
      // Match — bright warm flicker that decays over ~5s
      if (matchT > 0 && matchLight) {
        matchT = Math.max(0, matchT - d * 0.2);
        const flicker = matchT * (1 + Math.sin(t * 18) * 0.15 + (Math.random() - 0.5) * 0.1);
        matchLight.intensity = flicker * 2.2;
        // Visible match flame — opacity tied to matchT, gentle scale flicker
        flameMat.opacity = Math.min(1, matchT * 1.2);
        matchCore.material.opacity = Math.min(1, matchT * 1.4);
        const fScale = 0.8 + Math.sin(t * 22) * 0.10 + (Math.random() - 0.5) * 0.06;
        matchFlame.scale.set(0.7 * fScale, 1.6 * fScale, 0.7 * fScale);
        // Strike sweep animation: the match enters from the right, settling
        strikeAnim = Math.max(0, strikeAnim - d * 4.0);
        const strikeOffset = strikeAnim * 0.25;
        matchGroup.position.x = 0.18 + strikeOffset;
        matchGroup.rotation.z = -strikeAnim * 0.4;
      } else if (matchLight) {
        matchLight.intensity = 0;
        if (matchGroup.visible) {
          flameMat.opacity = 0;
          matchCore.material.opacity = 0;
          matchGroup.visible = false;
        }
      }
      // Subtle lamp flicker at the darkest rungs (the imagination filling in)
      if (dim > 0.7 && Math.random() < 0.005) {
        lamp.intensity = (1.6 * (1 - dim)) * (0.4 + Math.random() * 0.5);
        setTimeout(() => { lamp.intensity = 1.6 * (1 - dim); }, 80);
      }
    },
  };
}

// ---------- 3D avatar preview ----------
// Used by the character creator. Builds a small rotating procedural figure
// from the same colour palette the scene scenes use.
// Build a fully articulated, anatomically-grounded character. The figure has:
//   - Egg-shaped head (cranium + jaw + chin) with proper face features
//   - Eyes (whites + iris + pupil + catchlight) and brows that match hair colour
//   - A nose, lips, ears
//   - Sculpted hair styles
//   - Tapered torso (shoulders > chest > waist)
//   - Two-segment arms (upper arm + forearm + hand)
//   - Two-segment legs (thigh + shin + foot)
//   - Subtle idle animation hooks exposed via group.userData.animate
function buildAvatarFigure(c) {
  // Tiered builder selection:
  //   1. Skinned humanoid (true SkinnedMesh + Bones with joint deformation)
  //      — opt-in via c.useSkinned === true. Used by the character creator
  //      preview by default. The walking animation is bone-driven so knees
  //      and elbows actually deform across joints.
  //   2. Parametric v2 figure with PBR materials + body/age/eye/jaw/nose
  //      shape knobs.
  //   3. Legacy buildAvatarFigure (this function) — geometry-primitive
  //      figure that's been the default since the first commit.
  if (c && c.useSkinned !== false
      && window.PhobiaSkinned && window.PhobiaSkinned.buildFigure) {
    try {
      const fig = window.PhobiaSkinned.buildFigure(c);
      if (fig) return fig;
    } catch (e) { /* fall through to v2 / legacy */ }
  }
  if (window.PhobiaAvatar3D && window.PhobiaAvatar3D.buildFigure
      && c && (c.bodyType || c.ageGroup || c.eyeShape || c.jawShape || c.noseShape)) {
    const fig = window.PhobiaAvatar3D.buildFigure(c);
    if (fig) return fig;
  }
  const group = new THREE.Group();
  const skin   = (c && c.skinHex)  ? c.skinHex  : "#e8b794";
  const hair   = (c && c.hairHex)  ? c.hairHex  : "#4a2c18";
  const shirt  = (c && c.shirtHex) ? c.shirtHex : "#2c9d96";
  const eye    = (c && c.eyeHex)   ? c.eyeHex   : "#3a2410";
  // Derived colours
  const skinShadow = new THREE.Color(skin).multiplyScalar(0.78).getHex();
  const skinHighlight = new THREE.Color(skin).multiplyScalar(1.10).getHex();
  const lipsCol = new THREE.Color(skin).lerp(new THREE.Color(0xb8525a), 0.45).getHex();
  const hairShadow = new THREE.Color(hair).multiplyScalar(0.78).getHex();
  const shirtFold = new THREE.Color(shirt).multiplyScalar(0.78).getHex();

  // PBR materials — skin pores, fabric weave, hair streak normals — when
  // the realism module is loaded. Falls back to flat MeshStandard if not.
  const PR = window.PhobiaRealism;
  const skinM   = (PR && PR.skinMaterial)   ? PR.skinMaterial(skin)
    : new THREE.MeshStandardMaterial({ color: new THREE.Color(skin), roughness: 0.78, metalness: 0.0 });
  const skinShM = new THREE.MeshStandardMaterial({ color: skinShadow, roughness: 0.85 });
  const hairM   = (PR && PR.hairMaterial)   ? PR.hairMaterial(hair)
    : new THREE.MeshStandardMaterial({ color: new THREE.Color(hair), roughness: 1.0 });
  const hairShM = new THREE.MeshStandardMaterial({ color: hairShadow, roughness: 1.0 });
  const browM   = new THREE.MeshStandardMaterial({ color: hairShadow, roughness: 1.0 });
  const shirtM  = (PR && PR.fabricMaterial) ? PR.fabricMaterial(shirt, "cotton")
    : new THREE.MeshStandardMaterial({ color: new THREE.Color(shirt), roughness: 0.85 });
  const shirtFoldM = new THREE.MeshStandardMaterial({ color: shirtFold, roughness: 0.85 });
  const irisM   = new THREE.MeshStandardMaterial({ color: new THREE.Color(eye),    roughness: 0.25, metalness: 0.18 });
  const eyeWhiteM = new THREE.MeshStandardMaterial({ color: 0xfff4ea, roughness: 0.30 });
  const lipsM   = new THREE.MeshStandardMaterial({ color: lipsCol, roughness: 0.55 });
  const pantsM  = new THREE.MeshStandardMaterial({ color: 0x2c3a52, roughness: 0.95 });
  const shoeM   = new THREE.MeshStandardMaterial({ color: 0x18181c, roughness: 0.6 });
  const beltM   = new THREE.MeshStandardMaterial({ color: 0x2a1f18, roughness: 0.55, metalness: 0.2 });

  // ===== HEAD =====
  // The head sits on a separate Group so we can rotate it independently
  // (idle look-around). All facial features hang off this group.
  const head = new THREE.Group();
  head.position.y = 1.55;
  group.add(head);

  // Cranium — slightly egg-shaped (taller than wide, slightly flatter back)
  const cranium = new THREE.Mesh(new THREE.SphereGeometry(0.20, 32, 24), skinM);
  cranium.scale.set(1.0, 1.05, 0.95);
  cranium.position.y = 0.05;
  cranium.castShadow = true;
  head.add(cranium);

  // Jaw (narrower, lower) gives the face a real shape from any angle
  const jaw = new THREE.Mesh(new THREE.SphereGeometry(0.18, 24, 18), skinM);
  jaw.scale.set(0.85, 0.55, 0.85);
  jaw.position.set(0, -0.10, 0.005);
  head.add(jaw);

  // Chin (small forward bulge)
  const chin = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 10), skinM);
  chin.scale.set(0.75, 0.55, 0.7);
  chin.position.set(0, -0.16, 0.07);
  head.add(chin);

  // Ears
  for (const sx of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 10), skinM);
    ear.scale.set(0.45, 1.2, 0.7);
    ear.position.set(sx * 0.20, 0.0, -0.005);
    head.add(ear);
  }

  // Nose — bridge + tip + nostrils
  const noseBridge = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 8), skinM);
  noseBridge.scale.set(1.0, 1.6, 1.6);
  noseBridge.position.set(0, 0.005, 0.18);
  head.add(noseBridge);
  const noseTip = new THREE.Mesh(new THREE.SphereGeometry(0.032, 12, 10), skinM);
  noseTip.scale.set(1.0, 0.85, 1.4);
  noseTip.position.set(0, -0.045, 0.21);
  head.add(noseTip);
  for (const sx of [-1, 1]) {
    const nostril = new THREE.Mesh(
      new THREE.SphereGeometry(0.011, 8, 6),
      new THREE.MeshStandardMaterial({ color: skinShadow, roughness: 0.9 })
    );
    nostril.position.set(sx * 0.018, -0.062, 0.235);
    head.add(nostril);
  }

  // Eyes — whites + iris + pupil + catchlight + upper eyelid (closes when blinking)
  const eyeRefs = [];
  for (const sx of [-1, 1]) {
    const eyeGroup = new THREE.Group();
    eyeGroup.position.set(sx * 0.075, 0.025, 0.16);
    head.add(eyeGroup);

    const white = new THREE.Mesh(new THREE.SphereGeometry(0.040, 16, 14), eyeWhiteM);
    white.scale.set(1.0, 1.0, 0.55);
    white.position.set(0, 0, 0.005);
    eyeGroup.add(white);

    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.026, 14, 12), irisM);
    iris.position.set(0, 0, 0.022);
    iris.scale.set(1, 1, 0.4);
    eyeGroup.add(iris);

    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(0.012, 10, 8),
      new THREE.MeshBasicMaterial({ color: 0x080404 })
    );
    pupil.position.set(0, 0, 0.034);
    eyeGroup.add(pupil);

    const hl = new THREE.Mesh(
      new THREE.SphereGeometry(0.0075, 6, 5),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    hl.position.set(sx * 0.008, 0.01, 0.040);
    eyeGroup.add(hl);

    // Upper eyelid (a thin half-sphere we scale to "close" for blinks)
    const lid = new THREE.Mesh(
      new THREE.SphereGeometry(0.042, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2),
      skinM
    );
    lid.scale.set(1.0, 0.05, 0.55);
    lid.position.set(0, 0.005, 0.005);
    eyeGroup.add(lid);

    eyeRefs.push({ group: eyeGroup, lid });
  }

  // Eyebrows — match hair shadow colour, tilted slightly inward for friendly look
  for (const sx of [-1, 1]) {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.075, 0.012, 0.022), browM);
    brow.position.set(sx * 0.075, 0.075, 0.18);
    brow.rotation.z = -sx * 0.08;
    head.add(brow);
  }

  // Mouth — soft closed lips with a small smile curve
  // Upper lip (slim torus arc)
  const upperLip = new THREE.Mesh(
    new THREE.TorusGeometry(0.038, 0.008, 8, 14, Math.PI),
    lipsM
  );
  upperLip.rotation.z = -Math.PI / 2;
  upperLip.rotation.x = -0.2;
  upperLip.position.set(0, -0.075, 0.205);
  head.add(upperLip);
  // Lower lip (slightly thicker)
  const lowerLip = new THREE.Mesh(
    new THREE.TorusGeometry(0.038, 0.011, 8, 14, Math.PI),
    lipsM
  );
  lowerLip.rotation.z = Math.PI / 2;
  lowerLip.rotation.x = 0.2;
  lowerLip.position.set(0, -0.105, 0.205);
  head.add(lowerLip);
  // Mouth shadow (a touch of dark between the lips for depth)
  const mouthShadow = new THREE.Mesh(
    new THREE.PlaneGeometry(0.06, 0.005),
    new THREE.MeshBasicMaterial({ color: 0x4a1a1a, transparent: true, opacity: 0.45 })
  );
  mouthShadow.position.set(0, -0.090, 0.215);
  head.add(mouthShadow);

  // Cheek warmth (subtle red dots)
  for (const sx of [-1, 1]) {
    const cheek = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 10, 8),
      new THREE.MeshStandardMaterial({
        color: new THREE.Color(skin).lerp(new THREE.Color(0xe07a72), 0.25).getHex(),
        roughness: 0.9, transparent: true, opacity: 0.55,
      })
    );
    cheek.scale.set(1.0, 0.6, 0.3);
    cheek.position.set(sx * 0.13, -0.05, 0.165);
    head.add(cheek);
  }

  // ===== HAIR =====
  // Sculpted styles. Each is built on top of the cranium so it sits naturally.
  const hairStyle = c?.hairStyle || "short";
  if (hairStyle === "short") {
    // Capped sphere with a slight forward fringe
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.205, 28, 20, 0, Math.PI * 2, 0, Math.PI * 0.55),
      hairM
    );
    cap.scale.copy(cranium.scale);
    cap.position.copy(cranium.position);
    head.add(cap);
    // Fringe (small forward sweep over the brow)
    const fringe = new THREE.Mesh(new THREE.SphereGeometry(0.10, 14, 10), hairM);
    fringe.scale.set(1.4, 0.4, 0.5);
    fringe.position.set(0, 0.10, 0.16);
    head.add(fringe);
  } else if (hairStyle === "buzz") {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.202, 24, 18, 0, Math.PI * 2, 0, Math.PI * 0.45),
      new THREE.MeshStandardMaterial({ color: hair, roughness: 1.0, transparent: true, opacity: 0.85 })
    );
    cap.scale.copy(cranium.scale);
    cap.position.copy(cranium.position);
    head.add(cap);
  } else if (hairStyle === "long") {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.21, 28, 20, 0, Math.PI * 2, 0, Math.PI * 0.55),
      hairM
    );
    cap.scale.copy(cranium.scale);
    cap.position.copy(cranium.position);
    head.add(cap);
    // Two long falls (left + right) — each a curved cylinder hanging down
    for (const sx of [-1, 1]) {
      const fall = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, 0.55, 12), hairM);
      fall.position.set(sx * 0.16, -0.18, -0.05);
      fall.rotation.z = sx * 0.05;
      head.add(fall);
    }
    // Back hair (longer)
    const back = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.10, 0.45, 16), hairM);
    back.position.set(0, -0.10, -0.13);
    back.rotation.x = -0.2;
    head.add(back);
  } else if (hairStyle === "pony") {
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.205, 28, 20, 0, Math.PI * 2, 0, Math.PI * 0.55),
      hairM
    );
    cap.scale.copy(cranium.scale);
    cap.position.copy(cranium.position);
    head.add(cap);
    // Ponytail behind the head
    const tieGroup = new THREE.Group();
    tieGroup.position.set(0, 0.02, -0.18);
    head.add(tieGroup);
    // Hair tie
    const tie = new THREE.Mesh(
      new THREE.TorusGeometry(0.045, 0.012, 8, 14),
      new THREE.MeshStandardMaterial({ color: 0xc92e2e, roughness: 0.8 })
    );
    tie.rotation.x = Math.PI / 2;
    tieGroup.add(tie);
    // The tail itself
    const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.025, 0.40, 14), hairM);
    tail.position.set(0, -0.18, -0.04);
    tail.rotation.x = -0.18;
    tieGroup.add(tail);
  } else if (hairStyle === "curly") {
    // Several overlapping spheres around the cranium for a curl-pile look
    const r = 0.075;
    const positions = [
      [-0.13,  0.10,  0.10],
      [ 0.13,  0.10,  0.10],
      [-0.18,  0.05,  0.0 ],
      [ 0.18,  0.05,  0.0 ],
      [ 0.0,   0.16,  0.05],
      [-0.10,  0.18, -0.05],
      [ 0.10,  0.18, -0.05],
      [-0.16,  0.05, -0.10],
      [ 0.16,  0.05, -0.10],
      [ 0.0,   0.10, -0.13],
    ];
    for (const [x, y, z] of positions) {
      const curl = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), hairM);
      curl.position.set(x, y, z);
      curl.scale.setScalar(0.85 + Math.random() * 0.3);
      head.add(curl);
    }
  }
  // "bald" → no hair (chrome dome shows skin only)

  // ===== GLASSES =====
  if (c?.glasses && c.glasses !== "none") {
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1414, metalness: 0.5, roughness: 0.35 });
    if (c.glasses === "round") {
      for (const sx of [-1, 1]) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.052, 0.008, 8, 18), frameMat);
        ring.position.set(sx * 0.075, 0.025, 0.20);
        ring.rotation.y = Math.PI / 2;
        head.add(ring);
      }
    } else {
      // Square frames
      for (const sx of [-1, 1]) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(0.055, 0.007, 4, 12),
          frameMat
        );
        ring.position.set(sx * 0.075, 0.025, 0.20);
        ring.rotation.y = Math.PI / 2;
        ring.rotation.z = Math.PI / 4;
        ring.scale.set(1.0, 1.0, 0.9);
        head.add(ring);
      }
    }
    // Bridge between the lenses
    const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.008, 0.008), frameMat);
    bridge.position.set(0, 0.025, 0.20);
    head.add(bridge);
    // Temple arms going back over the ears
    for (const sx of [-1, 1]) {
      const temple = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.006, 0.006), frameMat);
      temple.position.set(sx * 0.16, 0.025, 0.10);
      temple.rotation.y = sx * 0.55;
      head.add(temple);
    }
  }

  // ===== FACIAL HAIR =====
  if (c?.facialHair && c.facialHair !== "none") {
    const fhM = new THREE.MeshStandardMaterial({ color: hairShadow, roughness: 1.0 });
    if (c.facialHair === "moustache") {
      const m = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.018, 0.025), fhM);
      m.position.set(0, -0.057, 0.215);
      // A subtle curve so it doesn't read as a flat sticker
      m.rotation.x = -0.15;
      head.add(m);
    } else if (c.facialHair === "stubble") {
      // Stubble is rendered as a transparent darkening band over the lower face
      const cover = new THREE.Mesh(
        new THREE.SphereGeometry(0.205, 24, 18, 0, Math.PI * 2, Math.PI * 0.5, Math.PI * 0.32),
        new THREE.MeshStandardMaterial({ color: hairShadow, roughness: 1.0, transparent: true, opacity: 0.45 })
      );
      cover.scale.copy(cranium.scale);
      cover.position.copy(cranium.position);
      head.add(cover);
    } else if (c.facialHair === "beard") {
      // Full beard — a denser cap on the lower face that wraps the chin
      const beardCap = new THREE.Mesh(
        new THREE.SphereGeometry(0.207, 24, 18, 0, Math.PI * 2, Math.PI * 0.50, Math.PI * 0.45),
        fhM
      );
      beardCap.scale.set(cranium.scale.x * 1.0, cranium.scale.y * 1.05, cranium.scale.z * 1.05);
      beardCap.position.copy(cranium.position);
      head.add(beardCap);
      // Moustache strip
      const ms = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.014, 0.022), fhM);
      ms.position.set(0, -0.057, 0.215);
      ms.rotation.x = -0.12;
      head.add(ms);
    }
  }

  // ===== NECK =====
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.072, 0.095, 0.18, 18), skinM);
  neck.position.y = 1.32;
  group.add(neck);

  // ===== TORSO (tapered: shoulders > chest > waist) =====
  // Chest — broader sphere, slim in z so it reads as a torso, not a ball
  const chest = new THREE.Mesh(new THREE.SphereGeometry(0.20, 28, 20), shirtM);
  chest.scale.set(1.30, 1.05, 0.70);
  chest.position.y = 1.10;
  chest.castShadow = true;
  group.add(chest);
  // Shirt fold/seam down the centre (purely visual depth cue)
  const seam = new THREE.Mesh(
    new THREE.BoxGeometry(0.018, 0.45, 0.005),
    shirtFoldM
  );
  seam.position.set(0, 0.95, 0.142);
  group.add(seam);
  // Waist — narrower than chest
  const waist = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.20, 0.30, 18), shirtM);
  waist.scale.set(1.18, 1, 0.78);
  waist.position.y = 0.78;
  waist.castShadow = true;
  group.add(waist);
  // Belt
  const belt = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.20, 0.05, 20), beltM);
  belt.scale.set(1.18, 1, 0.78);
  belt.position.y = 0.62;
  group.add(belt);
  const buckle = new THREE.Mesh(
    new THREE.BoxGeometry(0.07, 0.045, 0.012),
    new THREE.MeshStandardMaterial({ color: 0xc4a64a, metalness: 0.85, roughness: 0.25 })
  );
  buckle.position.set(0, 0.62, 0.165);
  group.add(buckle);

  // ===== SHOULDERS =====
  const shoulders = [];
  for (const sx of [-1, 1]) {
    const sh = new THREE.Mesh(new THREE.SphereGeometry(0.10, 16, 12), shirtM);
    sh.position.set(sx * 0.22, 1.22, 0);
    sh.castShadow = true;
    group.add(sh);
    shoulders.push(sh);
  }

  // ===== ARMS — articulated (shoulder root → upper arm → elbow → forearm → hand) =====
  const armRefs = [];
  const upperArmLen = 0.30;
  const forearmLen = 0.28;
  for (const sx of [-1, 1]) {
    const armRoot = new THREE.Group();
    armRoot.position.set(sx * 0.22, 1.18, 0);
    armRoot.rotation.z = sx * 0.06;     // arms hang slightly out
    armRoot.rotation.x = 0.04;          // and a touch forward
    group.add(armRoot);

    // Upper arm (shirt-coloured)
    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.075, upperArmLen, 8, 14), shirtM);
    upper.position.set(0, -upperArmLen / 2, 0);
    upper.castShadow = true;
    armRoot.add(upper);

    // Sleeve cuff (slightly darker band where shirt ends)
    const cuff = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.025, 14), shirtFoldM);
    cuff.position.set(0, -upperArmLen - 0.005, 0);
    armRoot.add(cuff);

    // Elbow group (rotates the forearm)
    const elbow = new THREE.Group();
    elbow.position.set(0, -upperArmLen - 0.02, 0);
    armRoot.add(elbow);

    // Forearm (skin)
    const fore = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, forearmLen, 8, 14), skinM);
    fore.position.set(0, -forearmLen / 2, 0);
    fore.castShadow = true;
    elbow.add(fore);

    // Hand — palm + thumb stub
    const hand = new THREE.Group();
    hand.position.set(0, -forearmLen - 0.04, 0);
    elbow.add(hand);
    const palm = new THREE.Mesh(new THREE.SphereGeometry(0.065, 14, 12), skinM);
    palm.scale.set(0.8, 1.1, 0.5);
    hand.add(palm);
    const thumb = new THREE.Mesh(new THREE.CapsuleGeometry(0.018, 0.04, 6, 8), skinM);
    thumb.position.set(sx * 0.04, 0.02, 0.015);
    thumb.rotation.z = -sx * 0.4;
    hand.add(thumb);
    // Finger plate (4 fingers as a single shaped block)
    const fingers = new THREE.Mesh(new THREE.BoxGeometry(0.085, 0.07, 0.025), skinM);
    fingers.position.set(0, -0.06, 0);
    hand.add(fingers);

    armRefs.push({ root: armRoot, elbow, hand, side: sx });
  }

  // ===== LEGS — articulated (hip → thigh → knee → shin → foot) =====
  // Hip height chosen so the soles of the shoes sit at y=0 (the floor).
  // foot bottom = hipY - thighLen - 0.02 - shinLen - 0.05 - foot/2 - sole/2
  //             = 0.79 - 0.36 - 0.02 - 0.32 - 0.05 - 0.035 - 0.009 ≈ 0
  const legRefs = [];
  const thighLen = 0.36;
  const shinLen  = 0.32;
  const hipY = 0.79;
  for (const sx of [-1, 1]) {
    const legRoot = new THREE.Group();
    legRoot.position.set(sx * 0.10, hipY, 0);
    group.add(legRoot);

    // Thigh
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.095, thighLen, 8, 14), pantsM);
    thigh.position.set(0, -thighLen / 2, 0);
    thigh.castShadow = true;
    legRoot.add(thigh);

    // Knee
    const knee = new THREE.Group();
    knee.position.set(0, -thighLen - 0.02, 0);
    legRoot.add(knee);

    // Shin
    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.075, shinLen, 8, 14), pantsM);
    shin.position.set(0, -shinLen / 2, 0);
    shin.castShadow = true;
    knee.add(shin);

    // Foot (shoe)
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.07, 0.22), shoeM);
    foot.position.set(0, -shinLen - 0.05, 0.04);
    foot.castShadow = true;
    knee.add(foot);
    // Sole
    const sole = new THREE.Mesh(
      new THREE.BoxGeometry(0.105, 0.018, 0.225),
      new THREE.MeshStandardMaterial({ color: 0x0c0c10, roughness: 0.85 })
    );
    sole.position.set(0, -shinLen - 0.085, 0.04);
    knee.add(sole);

    legRefs.push({ root: legRoot, knee, side: sx });
  }

  // ===== Floor shadow =====
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.45, 28),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.30 })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = -0.001;
  group.add(shadow);

  // Idle animation hooks. Consumers (e.g. AvatarPreview) call animate(t)
  // each frame to drive breathing + blinking + subtle head sway.
  group.userData.animate = function (t) {
    // Subtle breathing
    chest.scale.y = 1.05 + Math.sin(t * 1.6) * 0.012;
    waist.scale.y = 1.0 + Math.sin(t * 1.6 + 0.4) * 0.006;
    // Head sway
    head.rotation.y = Math.sin(t * 0.6) * 0.06;
    head.rotation.z = Math.sin(t * 0.45) * 0.015;
    // Blink — quick close every ~3-5s. The lid scale.y goes 0.05 → 1.0 → 0.05
    // briefly, simulating eyelid drop.
    const blinkPeriod = 3.5;
    const blinkPhase = (t % blinkPeriod) / blinkPeriod;
    let lidY = 0.05;
    if (blinkPhase < 0.04) {
      // 0.0 → 0.04 → close+open
      const k = blinkPhase / 0.04;     // 0..1
      lidY = 0.05 + Math.sin(k * Math.PI) * 0.95;
    }
    eyeRefs.forEach(e => { e.lid.scale.y = lidY; });
    // Arms gently sway with breathing
    armRefs.forEach(a => {
      a.root.rotation.x = 0.04 + Math.sin(t * 1.6 + a.side * 0.3) * 0.01;
      a.elbow.rotation.x = 0.06 + Math.sin(t * 1.6 + a.side) * 0.012;
    });
  };
  return group;
}

// ---------- Mountable avatar preview (used by character creator) ----------
const AvatarPreview = (() => {
  let active = null;
  function mount(container, character) {
    unmount();
    const w = container.clientWidth || 220;
    const h = container.clientHeight || 240;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    // Match the in-scene look so the avatar in the creator looks the same
    // way it'll look during exposure. ACES + soft exposure + shared env map.
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.useLegacyLights = false;
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(32, w / h, 0.05, 50);
    // Frame the full figure: feet at y=0, head crown at y≈1.75. Centre at y≈0.95.
    // Camera pulled back so the legs are visible at the bottom of frame and the
    // head + face read clearly at the top.
    camera.position.set(0, 1.05, 3.4);
    camera.lookAt(0, 0.95, 0);
    // Three-point lighting — key (warm), fill (cool), rim (back-light for hair).
    const key = new THREE.DirectionalLight(0xfff0d8, 1.5);
    key.position.set(2.5, 3.5, 3); key.castShadow = false;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xc8d4ff, 0.55);
    fill.position.set(-2.5, 1.5, 2); scene.add(fill);
    const rim = new THREE.DirectionalLight(0xfff5e0, 0.45);
    rim.position.set(0, 2.5, -3); scene.add(rim);
    scene.add(new THREE.AmbientLight(0x303a55, 0.55));
    // Apply the shared room env map so skin / glasses / belt buckle pick up
    // proper reflections instead of looking matte.
    const previewEnv = getRoomEnvMap(renderer);
    if (previewEnv) scene.environment = previewEnv;
    // Soft floor disc so the figure has somewhere to stand
    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(1.0, 32),
      new THREE.MeshStandardMaterial({ color: 0x222637, roughness: 1.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.005;
    scene.add(floor);
    let figure = buildAvatarFigure(character);
    scene.add(figure);
    let raf = 0;
    let last = performance.now();
    let elapsed = 0;
    function tick() {
      if (!container.isConnected) { try { renderer.dispose(); } catch {} return; }
      const now = performance.now();
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      elapsed += dt;
      // Slow turntable rotation
      figure.rotation.y += dt * 0.55;
      // Run idle animation (breathing, blinking, head sway, arm sway)
      if (figure.userData && typeof figure.userData.animate === "function") {
        try { figure.userData.animate(elapsed); } catch {}
      }
      renderer.render(scene, camera);
      raf = requestAnimationFrame(tick);
    }
    tick();
    active = {
      renderer, scene, camera, raf,
      cleanup() {
        cancelAnimationFrame(raf);
        scene.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            const ms = Array.isArray(o.material) ? o.material : [o.material];
            ms.forEach(m => m.dispose());
          }
        });
        try { renderer.dispose(); } catch {}
        if (renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
      },
      update(newChar) {
        scene.remove(figure);
        figure.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            const ms = Array.isArray(o.material) ? o.material : [o.material];
            ms.forEach(m => m.dispose());
          }
        });
        figure = buildAvatarFigure(newChar);
        scene.add(figure);
      },
    };
  }
  function update(character) { if (active) active.update(character); }
  function unmount() {
    if (active) { try { active.cleanup(); } catch {} active = null; }
  }
  return { mount, update, unmount, ready: true };
})();
window.AvatarPreview = AvatarPreview;

// ---------- Asset prefetch ----------
// Warms the GLTFLoader cache for heavyweight models (Fox.glb is ~1 MB) so the
// dogs scene mounts instantly the first time the user opens it.
function prefetch() {
  loadGLTF("https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Fox/glTF-Binary/Fox.glb")
    .catch(() => { /* silent — not critical */ });
}

// ---------- Expose to the classic script ----------
window.Scene3D = { ready: true, mount, unmount, prefetch };
window.dispatchEvent(new Event("scene3d-ready"));
</script>
