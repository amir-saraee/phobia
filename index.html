<style>
  :root {
    /* ---- Color palette ---- */
    --bg: #0f1724;
    --bg-2: #131c2f;
    --panel: #1a2238;
    --panel-2: #18213a;
    --panel-3: #15192c;
    --border: #25324f;
    --border-2: #243049;
    --text: #e8eef7;
    --muted: #94a3b8;
    --accent: #7cd1c5;
    --accent-2: #a5b4fc;
    --warn: #f59e0b;
    --danger: #ef4444;
    --ok: #34d399;
    /* ---- Standardized spacing scale (8px base) ---- */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    --space-16: 64px;
    /* ---- Type scale ---- */
    --text-xs:  12px;
    --text-sm:  13px;
    --text-base: 15px;
    --text-md:  16px;
    --text-lg:  18px;
    --text-xl:  22px;
    --text-2xl: 28px;
    --text-3xl: 36px;
    --text-4xl: 44px;
    /* ---- Radii ---- */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius:    16px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --radius-pill: 999px;
    /* ---- Shadows ---- */
    --shadow-sm: 0 2px 8px rgba(0,0,0,.18);
    --shadow:    0 10px 40px rgba(0,0,0,.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.45);
    /* ---- Touch targets ---- */
    --touch-min: 44px;
  }
  body.light-mode {
    --bg: #f5f8fc;
    --bg-2: #ebf1f8;
    --panel: #ffffff;
    --panel-2: #f4f7fc;
    --panel-3: #eaf0f7;
    --border: #dbe2ec;
    --border-2: #cbd3e0;
    --text: #1a2238;
    --muted: #5a6478;
    --accent: #1f928a;
    --accent-2: #5969d6;
    --shadow-sm: 0 2px 8px rgba(120, 130, 160, .12);
    --shadow:    0 8px 30px rgba(120, 130, 160, .18);
    --shadow-lg: 0 18px 50px rgba(120, 130, 160, .22);
  }
  body.light-mode { background: radial-gradient(1200px 800px at 70% -10%, #fafdff 0%, var(--bg) 60%); }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    background: radial-gradient(1200px 800px at 70% -10%, #1f2a44 0%, var(--bg) 60%);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;       /* never let a stray child push horizontal scroll */
  }
  /* Buttons + interactive controls always meet the 44px touch-target rule */
  button, .btn-primary, .btn-ghost, .btn-warn, .home-btn,
  .audio-btn, .swatch, .preset-btn, .pick-card, .cmd-btn {
    min-height: var(--touch-min);
  }
  /* Smoother focus state for keyboard users */
  button:focus-visible, a:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Inputs feel native + spacious on mobile */
  input[type="text"], input[type="email"], textarea {
    font-size: var(--text-md);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    width: 100%;
    min-height: var(--touch-min);
  }
  /* View fade-in: every time the SPA renders a new view, the #view container
     gets the .view-enter class which animates a soft fade-up. Auto-stripped
     after the animation so re-renders trigger it again next time. */
  #view.view-enter {
    animation: viewIn .35s ease-out both;
  }
  @keyframes viewIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  /* Honour reduced-motion preferences — skip the entrance animation. */
  @media (prefers-reduced-motion: reduce) {
    #view.view-enter { animation: none; }
    .preview-randomise:hover { transform: none; }
  }
  .app {
    /* Mobile-first padding: 16 px on phones, 24 px on tablets+, with a max
       width that keeps line-length comfortable on big monitors. */
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-4) var(--space-4) var(--space-16);
  }
  @media (min-width: 600px) {
    .app { padding: var(--space-6) var(--space-6) var(--space-16); }
  }
  header.brand {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .brand h1 {
    font-size: 18px; margin: 0; letter-spacing: .3px;
    display: flex; align-items: center; gap: 8px;
  }
  .brand h1 .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 14px var(--accent);
  }
  .brand .home-btn {
    background: transparent; color: var(--muted);
    border: 1px solid #2b3753; padding: 6px 12px;
    border-radius: 999px; cursor: pointer; font-size: 13px;
  }
  .brand .home-btn:hover { color: var(--text); border-color: #3a4870; }

  .panel {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: clamp(20px, 3vw, var(--space-8));
    box-shadow: var(--shadow);
  }
  h2 {
    margin: 0 0 var(--space-2);
    font-size: clamp(20px, 3vw, var(--text-2xl));
    line-height: 1.25;
    letter-spacing: -.3px;
  }
  h3 { margin: 0 0 var(--space-2); font-size: var(--text-lg); line-height: 1.3; }
  p { color: var(--muted); margin: 0 0 var(--space-3); font-size: var(--text-base); }
  .small { font-size: var(--text-xs); color: var(--muted); }

  .disclaimer {
    background: rgba(245,158,11,.08);
    border: 1px solid rgba(245,158,11,.35);
    color: #fde68a;
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-4);
    font-size: var(--text-sm);
  }
  .disclaimer strong { color: #fff; }

  button {
    font: inherit; cursor: pointer;
    border: none; border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-5);
    font-weight: 600;
    font-size: var(--text-base);
    transition: transform .08s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: translateY(1px); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020;
  }
  .btn-primary:hover { box-shadow: 0 8px 24px rgba(124,209,197,.30); }
  .btn-ghost {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-warn {
    background: rgba(245,158,11,.15); color: #fde68a;
    border: 1px solid rgba(245,158,11,.4);
  }
  .actions { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--space-4); }

  /* Phobia selection grid */
  .grid {
    display: grid; gap: var(--space-4);
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    margin-top: var(--space-5);
  }
  .card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-5);
    cursor: pointer;
    transition: transform .15s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
    position: relative; overflow: hidden;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    background: linear-gradient(180deg, #1c2745, var(--panel-2));
    box-shadow: 0 8px 28px rgba(124,209,197,.12);
  }
  .card .icon {
    width: 56px; height: 56px;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,209,197,.08);
    margin-bottom: var(--space-3);
  }
  .card h3 { margin-bottom: var(--space-1); }
  .card .progress-pill {
    position: absolute; top: 14px; right: 14px;
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    background: rgba(52,211,153,.12); color: var(--ok);
    border: 1px solid rgba(52,211,153,.3);
  }

  /* Level ladder */
  .ladder { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .rung {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; border-radius: 12px;
    background: var(--panel-2); border: 1px solid var(--border);
  }
  .rung.done { border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.06); }
  .rung.current { border-color: var(--accent); }
  .rung .num {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--border-2); font-weight: 700; font-size: 14px;
  }
  .rung.done .num { background: var(--ok); color: #0b1020; }
  .rung.current .num { background: var(--accent); color: #0b1020; }
  .rung .meta { flex: 1; }
  .rung .meta strong { display: block; font-size: 14px; }
  .rung .meta span { font-size: 12px; color: var(--muted); }
  .intensity { display: flex; gap: 3px; }
  .intensity i {
    width: 6px; height: 18px; border-radius: 2px;
    background: #2b3753; display: inline-block;
  }
  .intensity i.on { background: linear-gradient(180deg, var(--accent), var(--accent-2)); }

  /* Exposure page — panel with no padding so the stage can extend edge-to-edge.
     The header + step-controls handle their own padding. */
  .exposure-panel { padding: 0; overflow: hidden; }
  .exposure-header {
    padding: var(--space-5) var(--space-6) var(--space-3);
  }
  .exposure-header .badge {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(124,209,197,.10);
    border: 1px solid rgba(124,209,197,.30);
    color: var(--accent);
    border-radius: var(--radius-pill);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: .4px;
    margin-bottom: var(--space-3);
  }
  .exposure-header h2 {
    margin: 0 0 var(--space-2);
    font-size: var(--text-xl);
    line-height: 1.25;
  }
  .exposure-header p {
    margin: 0;
    color: var(--muted);
    font-size: var(--text-sm);
  }
  @media (max-width: 600px) {
    .exposure-header { padding: var(--space-4) var(--space-4) var(--space-2); }
    .exposure-header h2 { font-size: var(--text-lg); }
  }

  /* Stage (the simulation canvas) — taller by default for a more immersive
     framing. Scales with the viewport so on big monitors the canvas is
     properly large, on small viewports the controls stay reachable. */
  .stage-wrap { margin: 0 -28px; }
  .stage {
    /* clamp(min, ideal, max): minimum 320 px, ideal 60vh, capped at 720 px
       so the canvas never grows past a comfortable visual ceiling on huge
       displays. */
    height: clamp(320px, 60vh, 720px);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden; position: relative;
    background: #0a0f1c;
    transition: height .25s ease;
  }
  /* Theater mode — taller stage that fills more of the viewport without
     going full-fullscreen. Toggled via the 🎬 button in the quick bar. */
  .stage.theater {
    height: calc(100vh - 80px);
  }
  /* True browser fullscreen — the stage takes the whole screen. */
  .stage:fullscreen {
    height: 100vh; width: 100vw;
    border: none;
  }
  .stage:-webkit-full-screen {
    height: 100vh; width: 100vw;
    border: none;
  }
  .stage-caption {
    padding: 14px 28px 4px; font-size: 14px;
    color: var(--muted); display: flex; justify-content: space-between;
    border-top: 1px solid var(--border);
  }
  .stage-caption .lvl { color: var(--accent); font-weight: 600; }

  /* SUDS slider */
  .suds {
    margin-top: 18px; padding: 18px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
  }
  .suds label { font-weight: 600; display: block; margin-bottom: 12px; }
  .suds .scale-row { display: flex; align-items: center; gap: 14px; }
  .suds input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 999px;
    background: linear-gradient(90deg, #34d399, #fbbf24, #ef4444);
    outline: none;
  }
  .suds input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 3px solid #0b1020;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .suds .value {
    font-size: 28px; font-weight: 700; min-width: 56px; text-align: center;
  }
  .suds .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* Breathing screen */
  .breath-wrap {
    display: flex; flex-direction: column; align-items: center; padding: 30px 0;
  }
  .breath-circle {
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,209,197,.4), rgba(124,209,197,0));
    border: 2px solid rgba(124,209,197,.5);
    display: flex; align-items: center; justify-content: center;
    color: var(--text); font-size: 18px; font-weight: 600;
    transition: transform 4s ease-in-out;
  }
  .breath-circle.inhale { transform: scale(1.4); }
  .breath-circle.exhale { transform: scale(0.9); }

  /* Completion */
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: rgba(124,209,197,.1);
    border: 1px solid rgba(124,209,197,.3);
    border-radius: 999px; color: var(--accent); font-size: 13px;
  }

  .progress-bar {
    height: 6px; border-radius: 999px; background: var(--border); overflow: hidden;
    margin: 8px 0 0;
  }
  .progress-bar > div {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .3s ease;
  }

  /* Stage scene styles */
  .scene { width: 100%; height: 100%; position: relative; }
  .scene svg { width: 100%; height: 100%; display: block; }
  .stage canvas { display: block; width: 100% !important; height: 100% !important; }
  .stage .mode-badge {
    position: absolute; top: 10px; right: 12px; z-index: 5;
    background: rgba(10, 14, 28, .55); color: var(--accent);
    border: 1px solid rgba(124,209,197,.35);
    padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .4px;
    backdrop-filter: blur(6px); pointer-events: none;
  }
  .stage .camera-toggle {
    position: absolute; top: 14px; left: 14px; z-index: 7;
    background: linear-gradient(135deg, rgba(124,209,197,.85), rgba(165,180,252,.85));
    color: #0b1020;
    border: 1px solid rgba(255,255,255,.30);
    padding: 8px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 700; letter-spacing: .2px;
    cursor: pointer; backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(124,209,197,.35);
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    max-width: calc(100% - 28px);
    transition: background .15s ease, transform .08s ease, box-shadow .2s ease;
  }
  .stage .camera-toggle::before {
    content: ""; width: 14px; height: 14px;
    background: currentColor;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 4h6l1.5 2H20a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h3.5L9 4zm3 4a5 5 0 100 10 5 5 0 000-10z"/></svg>') center/contain no-repeat;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 4h6l1.5 2H20a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h3.5L9 4zm3 4a5 5 0 100 10 5 5 0 000-10z"/></svg>') center/contain no-repeat;
  }
  .stage .camera-toggle:hover {
    box-shadow: 0 6px 30px rgba(124,209,197,.55);
    transform: translateY(-1px);
  }
  .stage .camera-toggle:active { transform: translateY(1px); }
  .stage .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 4;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%);
  }
  /* Smooth scene fade-in: when the canvas first mounts, fade up from black
     over ~600ms so users don't see a hard pop into a fully-rendered scene.
     The opacity is set on .stage canvas via JS shortly after creation. */
  .stage canvas {
    opacity: 0;
    transition: opacity .55s ease-out;
  }
  .stage canvas.scene-ready {
    opacity: 1;
  }
  .stage .loading {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px;
    background: #0a0f1c; z-index: 3;
  }

  /* Heart-rate vignette — red pulse around the edges; faster at harder stages.
     Kept gentle on purpose: the vignette is a hint, not an alarm. */
  .stage .heart {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    box-shadow: inset 0 0 0 0 rgba(220, 30, 30, 0);
    animation: heartbeat var(--bpm-dur, 1s) cubic-bezier(.4,.0,.6,1) infinite;
    opacity: var(--heart-opacity, 0);
    transition: opacity 1.5s ease;
  }
  @keyframes heartbeat {
    0%, 70%, 100% { box-shadow: inset 0 0 60px 10px rgba(220, 30, 30, 0); }
    8%  { box-shadow: inset 0 0 90px 30px rgba(220, 30, 30, .32); }
    18% { box-shadow: inset 0 0 60px 10px rgba(220, 30, 30, 0); }
    28% { box-shadow: inset 0 0 70px 22px rgba(220, 30, 30, .18); }
    40% { box-shadow: inset 0 0 60px 10px rgba(220, 30, 30, 0); }
  }

  /* Pre-stage countdown overlay */
  .stage .countdown {
    position: absolute; inset: 0; z-index: 9;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,0,0,.35) 0%, rgba(0,0,0,.85) 100%);
    color: #fff; backdrop-filter: blur(6px);
    transition: opacity .5s ease;
  }
  .stage .countdown .label {
    font-size: 14px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stage .countdown .num {
    font-size: 96px; font-weight: 700;
    color: #fff; text-shadow: 0 0 30px rgba(124,209,197,.6);
    animation: countpop .8s ease-out;
  }
  .stage .countdown .hint {
    margin-top: 14px; color: var(--muted); font-size: 13px;
  }
  @keyframes countpop {
    0% { transform: scale(.4); opacity: 0; }
    40% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Continue button states */
  .btn-primary.holding {
    background: linear-gradient(135deg, #2b3753, #3a4870);
    color: var(--muted);
    cursor: pointer;
  }
  .btn-primary.ready-pulse {
    animation: readypulse 1.6s ease-in-out infinite;
  }
  @keyframes readypulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124,209,197,.6); }
    50%      { box-shadow: 0 0 0 12px rgba(124,209,197,0); }
  }

  /* Sound toggle in header */
  .brand .audio-btn {
    background: transparent; color: var(--muted);
    border: 1px solid #2b3753; padding: 6px 10px;
    border-radius: 999px; cursor: pointer; font-size: 13px;
    margin-right: 6px;
  }
  .brand .audio-btn:hover { color: var(--text); border-color: #3a4870; }
  .brand .nav-actions { display: flex; gap: 6px; align-items: center; }

  /* Step controls — hold progress */
  .step-controls .hold-bar {
    height: 6px; flex: 1; max-width: 220px;
    background: #2b3753; border-radius: 999px; overflow: hidden;
    margin-left: 10px;
    position: relative;
    transition: box-shadow .3s ease;
  }
  .step-controls .hold-bar > div {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%; transition: width .25s linear, box-shadow .3s ease;
  }
  /* When the user is FACING the fear, the hold-bar glows + the fill
     pulses to show they're earning credit right now. */
  .step-controls .hold-bar.in-zone {
    box-shadow: 0 0 14px rgba(124,209,197,.45);
  }
  .step-controls .hold-bar.in-zone > div {
    box-shadow: 0 0 12px rgba(124,209,197,.7);
    animation: holdPulse 1.4s ease-in-out infinite;
  }
  /* When the user is in the scene but NOT facing the fear (back at safety),
     the bar dims to communicate "you're not earning credit right now". */
  .step-controls .hold-bar.idle {
    opacity: 0.5;
  }
  /* Completion celebration: a single green flash + brighten as the rung
     completes. The user feels rewarded for staying with it. */
  .step-controls .hold-bar.complete {
    box-shadow: 0 0 24px rgba(52, 211, 153, .85);
    animation: holdComplete 1.6s ease-out;
  }
  .step-controls .hold-bar.complete > div {
    background: linear-gradient(90deg, var(--ok), var(--accent));
    box-shadow: 0 0 18px rgba(52, 211, 153, 1);
    animation: none;
  }
  @keyframes holdComplete {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes holdPulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.35); }
  }
  .step-controls .hold-label {
    font-size: 12px; color: var(--muted); margin-left: 8px;
    font-variant-numeric: tabular-nums;
  }

  /* Subtle screen-level shake at the very last rung only. Half-amplitude and
     slower than before so it reads as a held-breath jitter rather than a
     panic-tremor. */
  .stage.shake { animation: stageshake .7s ease-in-out infinite; }
  @keyframes stageshake {
    0%, 100% { transform: translate(0, 0); }
    25%  { transform: translate(-.5px, .25px); }
    50%  { transform: translate(.5px, -.25px); }
    75%  { transform: translate(-.25px, .5px); }
  }

  /* Controls hint overlay */
  .stage .controls-hint {
    position: absolute; left: 12px; bottom: 12px; z-index: 6;
    background: rgba(10, 14, 28, .55); color: var(--accent);
    border: 1px solid rgba(124,209,197,.35);
    padding: 5px 11px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .35px;
    backdrop-filter: blur(6px);
    transition: opacity 1s ease;
    pointer-events: none;
  }

  /* Breath HUD for the flying scene — bottom-centre of the stage. A soft
     ring expands on inhale and contracts on exhale, paced 4 s in / 6 s out.
     Used as a visual breath-pacer the user can sync to. */
  .stage .breath-hud {
    position: absolute; left: 50%; bottom: 14px; z-index: 7;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    pointer-events: none;
    user-select: none;
  }
  .stage .breath-hud .breath-ring {
    width: 70px; height: 70px;
    border: 1.5px solid rgba(124,209,197,.45);
    border-radius: 999px;
    background: rgba(10, 14, 28, .35);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .stage .breath-hud .breath-fill {
    width: 56px; height: 56px;
    background: radial-gradient(circle, rgba(124,209,197,.55) 0%, rgba(124,209,197,0) 70%);
    border-radius: 999px;
    transform: scale(0.4);
    opacity: 0.45;
    transition: opacity .3s ease;
  }
  .stage .breath-hud .breath-label {
    font-size: 11px; font-weight: 600;
    color: var(--text);
    background: rgba(10, 14, 28, .55);
    border: 1px solid rgba(124,209,197,.30);
    padding: 4px 10px; border-radius: 999px;
    backdrop-filter: blur(6px);
    letter-spacing: .15px;
    white-space: nowrap;
  }

  /* Trust HUD for the dog scene — top-left of the stage. Shows the dog's
     name and a trust progress bar that fills as the user pets, throws
     balls, and shares treats. Subtle on purpose so it doesn't compete
     with the scene itself. */
  .stage .trust-hud {
    position: absolute; top: 10px; left: 10px; z-index: 7;
    min-width: 160px; max-width: 240px;
    /* Reserve space for the quick-bar on the right so the two HUDs never
       collide on narrow screens (the quick-bar is ~190 px wide). */
    max-width: calc(100% - 220px);
    padding: 9px 12px;
    background: rgba(10, 14, 28, .55);
    border: 1px solid rgba(124,209,197,.35);
    border-radius: 12px;
    color: var(--text);
    backdrop-filter: blur(6px);
    font-size: 12px; font-weight: 600;
    pointer-events: none;
  }
  /* On very narrow screens we further compress the trust HUD so it never
     overlaps the quick-bar. Truncates long dog names with ellipsis. */
  @media (max-width: 480px) {
    .stage .trust-hud {
      min-width: 120px;
      max-width: calc(100% - 200px);
      padding: 7px 10px;
      font-size: 11px;
    }
    .stage .trust-hud .trust-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 80px;
    }
  }
  .stage .trust-hud .trust-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 5px;
  }
  .stage .trust-hud .trust-name {
    font-size: 13px; letter-spacing: .2px;
  }
  .stage .trust-hud .trust-pct {
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .stage .trust-hud .trust-bar {
    width: 100%; height: 6px;
    background: rgba(255,255,255,.10);
    border-radius: 999px; overflow: hidden;
  }
  .stage .trust-hud .trust-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #e3a06b, #ff6b86);
    transition: width .35s ease;
  }
  .stage .trust-hud .trust-hint {
    margin-top: 5px;
    font-size: 10px; font-weight: 500;
    opacity: .7;
    letter-spacing: .15px;
  }

  /* Quick mute buttons floating in the top-right of the stage. Always
     visible during exposure so the user can silence voice / sound any
     time without diving into Settings. */
  .stage .stage-quick-bar {
    position: absolute; top: 14px; right: 14px; z-index: 8;
    display: flex; gap: 8px;
  }
  .stage .stage-quick-btn {
    width: 38px; height: 38px; flex: 0 0 38px;
    border-radius: 999px;
    background: rgba(10, 14, 28, .65);
    border: 1px solid rgba(124,209,197,.40);
    color: var(--text);
    font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background .15s ease, color .15s ease, transform .12s ease;
  }
  .stage .stage-quick-btn:hover { transform: scale(1.06); }
  @media (max-width: 480px) {
    .stage .stage-quick-bar { top: 10px; right: 10px; gap: 6px; }
    .stage .stage-quick-btn { width: 34px; height: 34px; flex: 0 0 34px; font-size: 14px; }
  }
  .stage .stage-quick-btn:hover { background: rgba(124,209,197,.18); }
  .stage .stage-quick-btn.muted { color: #ff8a8a; border-color: rgba(255,138,138,.45); }
  .stage .stage-quick-btn.active {
    background: rgba(124,209,197,.30);
    border-color: rgba(124,209,197,.85);
    color: #d4f8f0;
  }
  /* Interaction prompt that appears when something is reachable */
  .stage .reach-hint {
    position: absolute; left: 50%; bottom: 24px; z-index: 6;
    transform: translateX(-50%);
    background: rgba(124,209,197,.18); color: #fff;
    border: 1px solid rgba(124,209,197,.55);
    padding: 7px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px rgba(124,209,197,.25);
    opacity: 0;
    transition: opacity .25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Header layout left/right */
  .brand-left { display: flex; align-items: center; gap: 8px; }

  /* Side menu drawer (slide-out from the left) */
  .menu-drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: min(320px, 86vw);
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-right: 1px solid var(--border-2);
    box-shadow: 10px 0 40px rgba(0,0,0,.4);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .28s ease;
    padding: 20px 18px;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .menu-drawer.open { transform: translateX(0); }
  .menu-drawer .close-btn {
    background: transparent; color: var(--muted);
    border: none; font-size: 20px; cursor: pointer; padding: 4px 8px;
    align-self: flex-end;
    margin-bottom: 8px;
  }
  .menu-character {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .menu-avatar {
    width: 56px; height: 64px;
    background: linear-gradient(180deg, #1a2547 0%, #15192c 100%);
    border-radius: 10px; padding: 4px;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  body.light-mode .menu-avatar { background: linear-gradient(180deg, #e8eef7 0%, #cdd9eb 100%); }
  .menu-character-text strong { display: block; font-size: 15px; }
  .menu-character-text .small { font-size: 12px; color: var(--muted); }
  .menu-list { list-style: none; padding: 0; margin: 0 0 4px; }
  .menu-list li { padding: 0; }
  .menu-list button {
    width: 100%; text-align: left;
    background: transparent; color: var(--text);
    border: 1px solid transparent; border-radius: 10px;
    padding: 10px 12px; font: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
  }
  .menu-list button:hover { background: var(--panel-2); border-color: var(--border); }
  .menu-divider { height: 1px; background: var(--border); margin: 14px 0; }
  .menu-footer {
    margin: 0; padding: 0 4px;
    font-size: 11px; color: var(--muted); letter-spacing: .3px;
  }
  .menu-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 99; opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .menu-backdrop.show { opacity: 1; pointer-events: auto; }

  /* Settings drawer */
  .settings-drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(360px, 92vw);
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-left: 1px solid var(--border-2);
    box-shadow: -10px 0 40px rgba(0,0,0,.4);
    z-index: 100;
    transform: translateX(100%);
    transition: transform .3s ease;
    padding: 20px 22px;
    overflow-y: auto;
  }
  .settings-drawer.open { transform: translateX(0); }
  .settings-drawer h3 { margin-top: 0; }
  .settings-drawer .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    gap: 14px;
  }
  .settings-section {
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent);
    margin: 18px 0 6px;
    font-weight: 700;
  }
  .settings-drawer .row label { font-weight: 500; }
  .settings-drawer .row .small { font-size: 12px; color: var(--muted); }
  .settings-drawer .close-btn {
    background: transparent; color: var(--muted);
    border: none; font-size: 20px; cursor: pointer; padding: 4px 8px;
    float: right;
  }
  .settings-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 99; opacity: 0; pointer-events: none;
    transition: opacity .25s ease;
  }
  .settings-backdrop.show { opacity: 1; pointer-events: auto; }
  .toggle {
    position: relative; width: 40px; height: 22px;
    background: #2b3753; border-radius: 999px;
    cursor: pointer; transition: background .2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; background: #fff;
    border-radius: 50%; transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(18px); }
  .settings-drawer input[type=range] {
    flex: 1; max-width: 140px;
  }

  /* Home page hero redesign */
  .hero {
    position: relative;
    padding: clamp(28px, 5vw, 56px) clamp(20px, 4vw, 44px) clamp(24px, 4vw, 40px);
    background: linear-gradient(135deg, #1a2547 0%, #0f1724 100%);
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: var(--space-5);
    box-shadow: var(--shadow);
  }
  .hero::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(800px 400px at 110% -20%, rgba(124,209,197,.18), transparent 50%),
                radial-gradient(600px 300px at -10% 120%, rgba(165,180,252,.12), transparent 50%);
    pointer-events: none;
  }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: var(--space-2);
    padding: 4px 12px; border-radius: var(--radius-pill);
    background: rgba(124,209,197,.12);
    border: 1px solid rgba(124,209,197,.30);
    color: var(--accent); font-size: var(--text-xs); font-weight: 600;
    letter-spacing: .8px; text-transform: uppercase;
    margin-bottom: var(--space-4);
  }
  /* Hero stays dark in both themes */
  .hero { color: #e8eef7; }
  .hero h1.huge {
    font-size: clamp(28px, 5vw, var(--text-4xl));
    line-height: 1.10;
    margin: 0 0 var(--space-3);
    letter-spacing: -.5px; max-width: 18ch;
    color: #fff;
    font-weight: 700;
  }
  .hero p.lead {
    font-size: clamp(15px, 2vw, var(--text-md));
    max-width: 56ch; margin: 0 0 var(--space-5);
    color: #cbd5e1;
  }
  .hero .floaters {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    pointer-events: none; opacity: .55;
  }
  .hero .floater {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--border-2), #1a2547);
    border: 1px solid #2f3e62;
    display: flex; align-items: center; justify-content: center;
    animation: floaty 6s ease-in-out infinite;
  }
  .hero .floater:nth-child(1) { top: 20px; right: 20px; animation-delay: 0s; }
  .hero .floater:nth-child(2) { top: 100px; right: 130px; animation-delay: -1.5s; }
  .hero .floater:nth-child(3) { top: 180px; right: 40px; animation-delay: -3s; }
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-12px) rotate(2deg); }
  }

  .pillars {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
    margin: var(--space-5) 0 var(--space-2);
  }
  .pillar {
    padding: var(--space-5);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: var(--radius-md);
  }
  .pillar h4 {
    margin: 0 0 var(--space-2);
    font-size: var(--text-sm);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .pillar p { margin: 0; font-size: var(--text-sm); color: var(--muted); }

  /* "Coming soon" callout for the future wellness expansion */
  .coming-soon { padding: var(--space-5) var(--space-6); }
  .coming-soon .cs-row {
    display: flex; align-items: center; gap: var(--space-5);
  }
  .coming-soon .cs-text { flex: 1; min-width: 0; }
  .coming-soon .cs-eyebrow {
    display: inline-block;
    padding: 2px 10px; border-radius: var(--radius-pill);
    background: rgba(165,180,252,.14);
    color: var(--accent-2);
    font-size: var(--text-xs); font-weight: 700;
    letter-spacing: .8px; text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  .coming-soon h3 {
    font-size: var(--text-lg); margin: 0 0 var(--space-2);
  }
  .coming-soon p {
    font-size: var(--text-sm); margin: 0; color: var(--muted);
  }
  .coming-soon .cs-icons {
    display: flex; gap: var(--space-2);
    font-size: 28px; opacity: .55; flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .pillars { grid-template-columns: 1fr; gap: var(--space-3); }
    .hero { padding: var(--space-6) var(--space-5) var(--space-5); }
    .hero .floaters { display: none; }
    .coming-soon .cs-row { flex-direction: column; align-items: flex-start; gap: var(--space-3); }
    .coming-soon .cs-icons { font-size: 24px; }
  }

  /* Bigger phobia selection cards */
  .grid.big {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    margin-top: 22px;
  }
  .grid.big .card {
    padding: 22px; min-height: 180px;
    background: linear-gradient(150deg, var(--panel-2) 0%, var(--panel-3) 100%);
  }
  .grid.big .card .icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(124,209,197,.14), rgba(165,180,252,.06));
    border: 1px solid rgba(124,209,197,.18);
  }
  .grid.big .card h3 { font-size: 19px; margin-bottom: 6px; }
  .grid.big .card .meta {
    display: flex; gap: 10px; align-items: center;
    margin-top: 14px; font-size: 12px; color: var(--muted);
  }
  .grid.big .card .meta .dotsep { opacity: .4; }
  .grid.big .card:hover { transform: translateY(-3px); border-color: var(--accent); background: linear-gradient(150deg, #1c2745 0%, #181d33 100%); }

  /* Climbing-ladder visual on the ladder page */
  .climb-ladder {
    margin: 22px 0;
    background: linear-gradient(180deg, #16203a, #0e1525);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }
  .climb-rung {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: var(--space-4); align-items: center;
    padding: var(--space-4);
    border-radius: var(--radius);
    margin: var(--space-2) 0;
    border: 1px solid transparent;
    background: var(--panel-3);
    transition: background .2s ease, border-color .2s ease, transform .15s ease, box-shadow .2s ease;
  }
  .climb-rung:hover { background: rgba(124,209,197,.06); border-color: rgba(124,209,197,.25); }
  .climb-rung.done {
    background: rgba(52,211,153,.06);
    border-color: rgba(52,211,153,.25);
  }
  .climb-rung.current {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(124,209,197,.08) 0%, rgba(165,180,252,.05) 100%);
    box-shadow: 0 4px 18px rgba(124,209,197,.10);
  }
  .climb-rung.locked { opacity: .45; }
  .climb-rung .marker {
    position: relative; height: 56px; width: 56px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--border-2); color: var(--text);
    font-weight: 700; font-size: var(--text-lg);
    transition: background .2s ease, box-shadow .2s ease;
  }
  .climb-rung.done .marker {
    background: linear-gradient(135deg, var(--ok), #6dcfa6);
    color: #0b1020;
    box-shadow: 0 4px 12px rgba(52,211,153,.30);
  }
  .climb-rung.current .marker {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020;
    box-shadow: 0 0 0 6px rgba(124,209,197,.18), 0 4px 18px rgba(124,209,197,.30);
    animation: currentPulse 2.4s ease-in-out infinite;
  }
  @keyframes currentPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(124,209,197,.18), 0 4px 18px rgba(124,209,197,.30); }
    50%      { box-shadow: 0 0 0 10px rgba(124,209,197,.10), 0 6px 22px rgba(124,209,197,.40); }
  }
  .climb-rung .info strong {
    display: block;
    font-size: var(--text-base);
    font-weight: 600;
  }
  .climb-rung .info .desc {
    color: var(--muted);
    font-size: var(--text-sm);
    margin-top: var(--space-1);
    line-height: 1.45;
  }
  .climb-rung .info .stats {
    font-size: var(--text-xs);
    color: var(--muted);
    margin-top: var(--space-2);
    letter-spacing: .2px;
  }
  .climb-rung.done .info .stats::after {
    content: " · ✓ completed";
    color: var(--ok);
    font-weight: 600;
  }
  .climb-rung .intensity-bars {
    display: flex; gap: 3px;
    margin-top: var(--space-1);
  }
  .climb-rung .intensity-bars i {
    width: 6px; height: 14px; border-radius: 2px;
    background: #2b3753; display: inline-block;
  }
  .climb-rung .intensity-bars i.on { background: linear-gradient(180deg, var(--accent), var(--accent-2)); }
  .climb-line {
    width: 2px; height: 18px; background: var(--border);
    margin: -2px 0 -2px 35px;
  }
  .climb-rung.done + .climb-line {
    background: linear-gradient(180deg, var(--ok), var(--border));
  }
  @media (max-width: 600px) {
    .climb-rung {
      grid-template-columns: 44px 1fr;
      grid-template-rows: auto auto;
      gap: var(--space-3);
      padding: var(--space-3);
    }
    .climb-rung .marker { width: 44px; height: 44px; font-size: var(--text-base); }
    .climb-rung > div:last-child {
      grid-column: 1 / -1;
    }
    .climb-rung > div:last-child button { width: 100%; }
  }

  /* Character badge in header */
  .char-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(124,209,197,.08);
    color: var(--text);
    border: 1px solid rgba(124,209,197,.25);
    padding: 4px 10px 4px 4px; border-radius: 999px;
    cursor: pointer; font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  .char-badge:hover { border-color: var(--accent); background: rgba(124,209,197,.16); }
  .char-badge-avatar { display: inline-flex; }
  .char-badge-avatar svg { display: block; border-radius: 50%; background: #1a2238; }
  .char-badge-name { font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .char-badge-count {
    font-size: 11px; font-weight: 700; color: #0b1020;
    background: var(--accent); padding: 1px 7px; border-radius: 999px;
  }
  .char-badge-streak {
    font-size: 11px; font-weight: 700; color: #fde68a;
    background: rgba(245,158,11,.15); padding: 2px 7px; border-radius: 999px;
    border: 1px solid rgba(245,158,11,.4);
  }
  /* Courage points badge — gamification XP marker */
  .courage-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: var(--space-1) var(--space-3);
    background: linear-gradient(135deg, rgba(165,180,252,.18), rgba(124,209,197,.18));
    border: 1px solid rgba(165,180,252,.45);
    border-radius: var(--radius-pill);
    color: #f5e89a;
    font-size: var(--text-xs); font-weight: 700;
    letter-spacing: .3px;
    cursor: default;
    user-select: none;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .courage-badge.pop {
    animation: couragePop .6s cubic-bezier(.22, 1.4, .4, 1);
  }
  @keyframes couragePop {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.20); box-shadow: 0 0 18px rgba(245,232,154,.55); }
    100% { transform: scale(1); }
  }
  @media (max-width: 600px) {
    .courage-badge { font-size: 11px; padding: 3px 9px; }
  }

  /* Profile picker */
  .profiles-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    margin: 18px 0;
  }
  .profile-card {
    display: grid; grid-template-columns: auto 1fr auto; gap: 12px;
    align-items: center;
    padding: 14px 16px;
    background: linear-gradient(160deg, var(--panel-2) 0%, var(--panel-3) 100%);
    border: 1.5px solid var(--border); border-radius: 12px;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
  }
  .profile-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .profile-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,209,197,.18); }
  .profile-avatar {
    width: 70px; height: 80px;
    background: linear-gradient(180deg, #1a2547 0%, var(--panel-3) 100%);
    border-radius: 10px; padding: 4px;
    display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
  }
  .profile-text { display: flex; flex-direction: column; gap: 2px; }
  .profile-text strong { font-size: 16px; }
  .profile-badge {
    display: inline-block;
    font-size: 10px; letter-spacing: .5px; text-transform: uppercase; font-weight: 700;
    background: var(--accent); color: #0b1020;
    padding: 1px 7px; border-radius: 999px;
    width: fit-content; margin-top: 2px;
  }
  .profile-actions { display: flex; flex-direction: column; gap: 4px; }
  .profile-actions button { padding: 5px 10px; font-size: 11px; }

  /* Session journal on complete page */
  .journal-row {
    margin: 16px 0 8px;
    padding: 14px 16px;
    background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .journal-row label { font-size: 13px; font-weight: 600; }
  .journal-row textarea {
    width: 100%; padding: 10px 12px;
    background: #0e1525; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font: inherit; font-size: 13px; resize: vertical;
    line-height: 1.55;
  }
  .journal-row textarea:focus { outline: 2px solid var(--accent); }
  .journal-row .actions-inline { display: flex; align-items: center; gap: 8px; }

  /* ============================================================
     Character creator — the heart of the app. Hero preview frame on
     the left (sticky on desktop), organised numbered sections on the
     right. Standardised spacing, big touch targets, mobile-first.
     ============================================================ */
  .creator { padding: 0; }
  .creator-intro {
    margin-bottom: var(--space-6);
    text-align: center;
    max-width: 56ch;
    margin-left: auto; margin-right: auto;
  }
  .creator-intro h2 {
    font-size: clamp(24px, 4vw, var(--text-3xl));
    margin: 0 0 var(--space-2);
    letter-spacing: -.4px;
    font-weight: 700;
  }
  .creator-intro .lead-sm {
    color: var(--muted);
    font-size: var(--text-base);
    margin: 0;
    line-height: 1.6;
  }
  .creator-grid {
    display: grid;
    grid-template-columns: minmax(240px, 280px) 1fr;
    gap: var(--space-8);
    margin-bottom: var(--space-8);
    align-items: start;
  }
  .creator-preview {
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    position: sticky; top: var(--space-4);
  }
  .avatar-stage {
    position: relative;
    width: 100%;
    max-width: 280px;
    aspect-ratio: 1 / 1.05;
    background:
      radial-gradient(60% 50% at 50% 35%, rgba(124,209,197,.18) 0%, transparent 70%),
      linear-gradient(180deg, #1d2a4a 0%, #14182a 100%);
    border-radius: var(--radius-xl);
    padding: var(--space-4);
    border: 1px solid var(--border-2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .avatar-stage::before {
    /* Soft floor glow */
    content: ""; position: absolute;
    left: 10%; right: 10%; bottom: 6%;
    height: 8px;
    background: radial-gradient(50% 50% at 50% 50%, rgba(124,209,197,.4), transparent);
    filter: blur(6px);
  }
  .avatar-large {
    width: 100%; height: 100%;
    display: flex; align-items: flex-end; justify-content: center;
    position: relative; z-index: 1;
  }
  .avatar-large svg, .avatar-large canvas {
    display: block;
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: var(--radius-md);
  }
  /* The dice button on the preview — quick "shuffle appearance" */
  .preview-randomise {
    position: absolute; top: var(--space-3); right: var(--space-3);
    width: 36px; height: 36px;
    background: rgba(10, 14, 28, .55);
    border: 1px solid rgba(124,209,197,.30);
    border-radius: var(--radius-pill);
    color: var(--accent);
    font-size: 16px; line-height: 1; padding: 0;
    cursor: pointer; backdrop-filter: blur(8px);
    transition: transform .15s ease, background .15s ease;
    display: flex; align-items: center; justify-content: center;
    min-height: 36px;       /* override the 44px global for compact UI */
  }
  .preview-randomise:hover {
    background: rgba(124,209,197,.18);
    transform: rotate(20deg) scale(1.05);
  }
  .char-name-input {
    width: 100%;
    margin-top: var(--space-4);
    padding: var(--space-3) var(--space-4);
    font: inherit; font-size: var(--text-md);
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-md);
    text-align: center;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .char-name-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,209,197,.18);
  }
  .creator-section-label {
    margin-top: var(--space-5);
    margin-bottom: var(--space-2);
    font-size: var(--text-xs);
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .char-preset-row {
    display: flex; gap: var(--space-2);
    width: 100%;
    flex-wrap: wrap; justify-content: center;
  }
  .preset-btn {
    flex: 1 0 auto;
    background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--border);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-pill);
    font: inherit; font-size: var(--text-xs); font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
    min-height: 36px;
  }
  .preset-btn:hover { color: var(--text); border-color: var(--accent); }
  .preset-btn.selected {
    background: rgba(124,209,197,.14);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Form sections */
  .creator-form { display: flex; flex-direction: column; gap: var(--space-5); }
  .creator-section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-5) var(--space-5) var(--space-3);
    transition: border-color .2s ease;
  }
  .creator-section:focus-within { border-color: var(--accent); }
  .creator-section-head {
    display: flex; align-items: center; gap: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .creator-section-num {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: var(--radius-pill);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020;
    font-size: var(--text-sm); font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .creator-section-head h3 {
    margin: 0;
    font-size: var(--text-md);
    font-weight: 600;
    color: var(--text);
  }
  .creator-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: var(--space-3);
    align-items: center;
    padding: var(--space-2) 0;
    border-top: 1px solid var(--border);
  }
  .creator-row:first-of-type { border-top: none; padding-top: 0; }
  .creator-row label {
    color: var(--muted);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .swatches { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .swatch {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease;
    padding: 0;
    background: var(--panel-3);
    box-shadow: inset 0 1px 2px rgba(0,0,0,.25);
    min-height: 36px;
  }
  .swatch:hover { transform: scale(1.10); }
  .swatch.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,209,197,.30), inset 0 1px 2px rgba(0,0,0,.25);
  }
  .swatches.text .swatch {
    width: auto; padding: var(--space-2) var(--space-3); height: auto;
    border-radius: var(--radius-pill);
    background: var(--panel-3); border: 1px solid var(--border); color: var(--text);
    font-size: var(--text-xs); font-weight: 600;
    box-shadow: none;
  }
  .swatches.text .swatch.selected {
    background: rgba(124,209,197,.14);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .swatches.text .swatch span { font-weight: 600; }

  .creator-phobias {
    margin-top: var(--space-6);
    padding: var(--space-6);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .creator-phobias .creator-section-head { margin-bottom: var(--space-2); }
  .creator-phobias .lead-sm {
    color: var(--muted);
    font-size: var(--text-sm);
    margin: 0 0 var(--space-3);
  }
  .phobia-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--space-3);
    margin-top: var(--space-3);
  }
  .phobia-pick { cursor: pointer; }
  .phobia-pick input { position: absolute; opacity: 0; pointer-events: none; }
  .pick-card {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    background: var(--panel-3);
    border: 1.5px solid var(--border);
    transition: border-color .15s ease, background .15s ease, transform .12s ease;
    min-height: 56px;
  }
  .phobia-pick:hover .pick-card {
    border-color: rgba(124,209,197,.55);
    transform: translateY(-1px);
  }
  .phobia-pick input:checked + .pick-card {
    border-color: var(--accent);
    background: rgba(124,209,197,.10);
    box-shadow: 0 0 0 2px rgba(124,209,197,.22);
  }
  .pick-icon {
    width: 36px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .pick-icon svg { width: 28px; height: 28px; }
  .pick-text strong {
    display: block; font-size: var(--text-base); font-weight: 600;
  }
  .pick-text em {
    font-size: var(--text-xs);
    color: var(--accent);
    font-style: normal;
    letter-spacing: .4px; text-transform: uppercase;
  }

  .creator-actions {
    margin-top: var(--space-6);
    display: flex; gap: var(--space-3);
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .creator-actions .btn-primary,
  .creator-actions .btn-ghost {
    flex: 0 1 auto;
    padding: var(--space-3) var(--space-6);
    font-size: var(--text-base);
  }

  @media (max-width: 760px) {
    .creator-grid { grid-template-columns: 1fr; gap: var(--space-5); }
    .creator-preview {
      position: static;
      max-width: 320px;
      margin-left: auto; margin-right: auto;
    }
    .creator-row { grid-template-columns: 1fr; gap: var(--space-2); align-items: flex-start; }
    .creator-row label { font-size: var(--text-xs); }
    .creator-section { padding: var(--space-4) var(--space-4) var(--space-2); }
    .creator-actions { justify-content: stretch; }
    .creator-actions button { flex: 1 1 0; }
  }
  @media (max-width: 420px) {
    .creator-section-num { width: 24px; height: 24px; font-size: var(--text-xs); }
    .creator-section-head h3 { font-size: var(--text-base); }
    .swatch { width: 32px; height: 32px; min-height: 32px; }
  }
  .pick-primary {
    display: inline-block; margin-top: 4px;
    font-size: 10px; letter-spacing: .6px; font-weight: 700;
    padding: 1px 8px; border-radius: 999px;
    background: var(--accent); color: #0b1020;
  }
  .pick-card { position: relative; }
  .pick-check {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 5px;
    background: #0b1020; border: 1.5px solid #2b3753;
  }
  .phobia-pick input:checked + .pick-card .pick-check {
    background: var(--accent); border-color: var(--accent);
  }
  .phobia-pick input:checked + .pick-card .pick-check::after {
    content: "✓"; color: #0b1020; font-weight: 800;
    position: absolute; left: 3px; top: -2px; font-size: 14px;
  }

  /* Custom phobia ladder editor */
  .custom-form { margin-top: 14px; }
  .custom-form > label {
    display: block; margin-bottom: 12px; font-weight: 600; font-size: 13px;
    color: var(--muted); letter-spacing: .3px;
  }
  .custom-form > label .small { font-weight: 400; text-transform: none; }
  .custom-form input[type="text"] {
    display: block; width: 100%; margin-top: 4px;
    padding: 9px 12px; font: inherit; font-size: 14px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
  }
  .custom-form input[type="text"]:focus { outline: 2px solid var(--accent); }
  .rung-editors { margin: 14px 0; display: flex; flex-direction: column; gap: 8px; }
  .rung-editor {
    display: grid; grid-template-columns: 32px 1fr 2fr; gap: 8px; align-items: center;
    padding: 8px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px;
  }
  .rung-num {
    width: 28px; height: 28px;
    background: var(--accent); color: var(--bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  .rung-editor input { margin-top: 0 !important; }
  .custom-list {
    list-style: none; padding: 0; margin: 14px 0 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .custom-list li {
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px;
    align-items: center;
    padding: 10px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px;
  }
  @media (max-width: 600px) {
    .rung-editor { grid-template-columns: 28px 1fr; gap: 6px; }
    .rung-editor input[data-field="desc"] { grid-column: 2 / 3; }
  }

  /* Focus rings — applied to all interactive elements for keyboard a11y */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible,
  .swatch:focus-visible, .card:focus-visible, .show-card:focus-visible,
  .climb-rung:focus-visible, .profile-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Skip link (visible only on focus) */
  .skip-link {
    position: absolute; left: -9999px;
    background: var(--accent); color: var(--bg);
    padding: 8px 14px; border-radius: 6px;
    font-weight: 600; z-index: 1000;
  }
  .skip-link:focus { left: 16px; top: 16px; }

  /* Insights page */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin: 14px 0 18px;
  }
  .stat {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-top: 4px; }
  .insights-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  }
  .insight-card {
    background: linear-gradient(180deg, #16203a, #0e1525);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .insight-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .insight-icon {
    width: 44px; height: 44px;
    background: rgba(124,209,197,.10);
    border: 1px solid rgba(124,209,197,.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .insight-icon svg { width: 26px; height: 26px; }
  .insight-card h3 { margin: 0; font-size: 16px; }
  .insight-card .small { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .insight-chart {
    width: 100%; height: 90px; display: block;
    background: #0c1322;
    border-radius: 8px;
    margin: 6px 0 4px;
  }
  .insight-legend {
    display: flex; gap: 12px; font-size: 11px; color: var(--muted);
    align-items: center;
    margin-top: 4px;
  }
  .dotmark {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }

  /* "Speak" button pressed state */
  .cmd-btn.pressed {
    background: rgba(124,209,197,.18);
    border-color: var(--accent);
    transform: translateY(1px);
  }

  /* Phobia information panel */
  .phobia-info {
    margin: 14px 0 6px; padding: 0;
    background: linear-gradient(180deg, #161e34, #131a2c);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    overflow: hidden;
  }
  .phobia-info > summary {
    list-style: none; cursor: pointer;
    padding: 14px 18px;
    color: var(--accent); font-weight: 600; font-size: 13.5px;
    display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .phobia-info > summary::-webkit-details-marker { display: none; }
  .phobia-info > summary::before {
    content: "▸"; transition: transform .2s; font-size: 11px;
  }
  .phobia-info[open] > summary::before { transform: rotate(90deg); }
  .info-body { padding: 0 18px 18px; }
  .info-summary {
    color: #cbd5e1; font-size: 14.5px; line-height: 1.55;
    margin: 0 0 14px;
  }
  .info-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    margin-bottom: 14px;
  }
  .info-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .info-card h4 {
    margin: 0 0 8px; font-size: 13px; letter-spacing: .4px;
    text-transform: uppercase; color: var(--accent);
  }
  .info-card p { margin: 0 0 8px; font-size: 13px; color: #cbd5e1; }
  .info-card ul { margin: 0 0 6px 18px; padding: 0; }
  .info-card ul li { font-size: 13px; color: #cbd5e1; line-height: 1.55; margin-bottom: 3px; }
  .info-sub {
    font-size: 11px !important; letter-spacing: .4px;
    text-transform: uppercase; color: var(--muted) !important;
    margin: 8px 0 4px !important;
  }
  .info-prevalence {
    font-size: 12px !important; color: var(--muted) !important;
    font-style: italic; margin-top: 8px !important;
  }
  .info-warning {
    background: rgba(245,158,11,.08);
    border: 1px solid rgba(245,158,11,.35);
    color: #fde68a;
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.55;
  }
  .info-warning strong { color: #fff; }

  /* Phobia tabs (when user has multiple) */
  .phobia-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .phobia-tab {
    background: var(--panel-2); color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
  }
  .phobia-tab:hover { color: var(--text); border-color: #3a4870; }
  .phobia-tab.active {
    background: rgba(124,209,197,.12); color: var(--accent);
    border-color: var(--accent);
  }

  /* Character creation callout on the home page */
  .character-callout {
    background: linear-gradient(135deg, #1a2547 0%, var(--panel-3) 100%);
    border-color: rgba(124,209,197,.30);
  }
  .character-callout-row {
    display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: center;
  }
  .character-callout-text h3 { margin: 0 0 6px; color: var(--accent); font-size: 16px; }
  .character-callout-text p { margin: 0 0 6px; color: #cbd5e1; }
  .character-callout-samples {
    display: flex; gap: 8px;
  }
  .sample-avatar {
    background: linear-gradient(180deg, #1a2547 0%, var(--panel-3) 100%);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 6px;
    display: flex; align-items: flex-end; justify-content: center;
    width: 64px; height: 70px;
    overflow: hidden;
    transition: transform .18s ease, border-color .18s;
  }
  .sample-avatar:hover { transform: translateY(-3px); border-color: var(--accent); }
  @media (max-width: 700px) {
    .character-callout-row { grid-template-columns: 1fr; }
    .character-callout-samples { justify-content: flex-start; flex-wrap: wrap; }
  }

  /* Phobia showcase grid (home page) */
  .show-grid {
    display: grid; gap: var(--space-4);
    margin-top: var(--space-4);
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .show-card {
    background: linear-gradient(160deg, var(--panel-2) 0%, var(--panel-3) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0; cursor: pointer; overflow: hidden;
    transition: transform .15s, border-color .15s, background .15s, box-shadow .2s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .show-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 12px 28px rgba(124,209,197,.15);
  }
  .show-thumb {
    width: 100%;
    aspect-ratio: 5 / 3;
    background: var(--panel-3);
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .show-thumb svg {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  /* Subtle gradient overlay at the bottom of the thumb so the title plate
     (which sits below) reads cleanly even on bright illustrations. */
  .show-thumb::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0;
    height: 30%;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,.45));
    pointer-events: none;
  }
  .show-card > .show-icon, .show-card > .show-label, .show-card > .show-clinical,
  .show-card > .show-blurb, .show-card > .show-prevalence {
    margin-left: var(--space-4); margin-right: var(--space-4);
  }
  .show-card > .show-icon {
    margin-top: -26px;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, rgba(124,209,197,.22), rgba(165,180,252,.10));
    border: 1px solid rgba(124,209,197,.35);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 12px rgba(0,0,0,.30);
  }
  .show-card > .show-label { margin-top: var(--space-3); }
  .show-card > .show-blurb { margin-bottom: var(--space-4); flex: 1; }
  .show-label {
    font-size: var(--text-lg);
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }
  .show-clinical {
    font-size: var(--text-xs);
    letter-spacing: .6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: var(--space-1);
    font-weight: 600;
  }
  .show-blurb {
    margin: var(--space-1) 0 0;
    font-size: var(--text-sm);
    color: #cbd5e1;
    line-height: 1.55;
  }
  .show-prevalence {
    margin-top: var(--space-2);
    font-size: var(--text-xs);
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: var(--space-2);
    padding-bottom: var(--space-3);
    font-style: italic;
  }
  @media (max-width: 600px) {
    .show-grid { grid-template-columns: 1fr; gap: var(--space-3); }
  }

  /* Step-by-step journey diagram */
  .journey {
    display: grid; gap: 10px; margin: 14px 0 6px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  }
  .journey-step {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .journey-num {
    width: 32px; height: 32px; flex-shrink: 0;
    background: var(--accent); color: #0b1020;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px;
  }
  .journey-text { display: flex; flex-direction: column; gap: 4px; }
  .journey-text strong { font-size: 14px; }
  .journey-text span { font-size: 12.5px; color: var(--muted); line-height: 1.55; }

  /* Prediction-vs-actual block on the complete page */
  .prediction-card {
    margin: 14px 0; padding: 16px 18px;
    background: linear-gradient(180deg, #16203a, #0e1525);
    border: 1px solid var(--border-2);
    border-radius: 12px;
  }
  .prediction-good { border-color: rgba(52,211,153,.35); background: linear-gradient(180deg, #15293a, #0e1525); }
  .prediction-warn { border-color: rgba(245,158,11,.35); }
  .prediction-meters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .meter-row { display: grid; grid-template-columns: 80px 1fr 56px; gap: 12px; align-items: center; }
  .meter-label { font-size: 12px; color: var(--muted); }
  .meter-track {
    height: 8px; border-radius: 999px;
    background: var(--border); overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width .6s cubic-bezier(.2,.9,.2,1);
  }
  .meter-value { font-size: 13px; color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
  .prediction-lesson { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.55; }
  .prediction-good .prediction-lesson strong { color: var(--ok); }

  /* Pill-shaped select element used in settings */
  .select-pill {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 999px;
    font: inherit; font-size: 13px;
    cursor: pointer;
  }
  .select-pill:focus { outline: 2px solid var(--accent); }
  .settings-note {
    grid-column: 1 / -1;
    margin-top: 6px;
    font-size: 11px; color: var(--accent);
    background: rgba(124,209,197,.1);
    border-left: 2px solid var(--accent);
    padding: 4px 8px; border-radius: 4px;
    animation: fade-out 2.2s ease-out forwards;
  }
  @keyframes fade-out {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* First-run tutorial tour with arrows */
  .tour-overlay {
    position: fixed; inset: 0; z-index: 1000;
    pointer-events: auto;
    background: rgba(0, 0, 0, .5);
    transition: opacity .35s;
  }
  .tour-overlay.dismiss { opacity: 0; pointer-events: none; }
  .tour-spot {
    position: absolute;
    border: 2px solid var(--accent);
    border-radius: 14px;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, .45), 0 0 24px rgba(124, 209, 197, .55);
    pointer-events: none;
    animation: tourPulse 1.6s ease-in-out infinite;
  }
  @keyframes tourPulse {
    0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, .45), 0 0 24px rgba(124, 209, 197, .55); }
    50%      { box-shadow: 0 0 0 9999px rgba(0, 0, 0, .45), 0 0 36px rgba(124, 209, 197, .9); }
  }
  .tour-card {
    position: absolute;
    width: 280px;
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 14px 16px 10px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, .4), 0 0 30px rgba(124, 209, 197, .2);
    color: var(--text);
  }
  .tour-step { font-size: 11px; color: var(--accent); letter-spacing: .8px; text-transform: uppercase; font-weight: 700; }
  .tour-card h3 { margin: 4px 0 6px; font-size: 15px; }
  .tour-card p { margin: 0 0 10px; font-size: 13px; color: #cbd5e1; line-height: 1.55; }
  body.light-mode .tour-card p { color: var(--muted); }
  .tour-card::before {
    content: ""; position: absolute;
    width: 14px; height: 14px;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-bottom: none; border-right: none;
    transform: rotate(45deg);
    left: 50%; margin-left: -7px;
  }
  .tour-arrow-down::before { top: -8px; }
  .tour-arrow-up::before {
    top: auto; bottom: -8px;
    border: 1px solid var(--accent);
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .tour-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .tour-actions button { font-size: 12px; padding: 6px 14px; }

  /* Goal block on the ladder page */
  .goal-block {
    margin: 12px 0 14px;
    padding: 14px 16px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .goal-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .goal-meter { flex: 1; min-width: 140px; }
  .goal-meter-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--muted);
    margin-bottom: 4px;
  }
  .goal-meter-label strong { color: var(--text); font-weight: 600; }
  .goal-meter-track {
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .goal-meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width .4s cubic-bezier(.2,.9,.2,1);
  }

  /* Goal editor modal */
  .goal-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .goal-modal {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 22px 24px;
    max-width: 420px; width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .goal-modal h3 { margin: 0 0 6px; }
  .goal-modal p { margin: 0 0 14px; }
  .goal-modal label {
    display: block; margin-bottom: 12px;
    font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .3px; text-transform: uppercase;
  }
  .goal-modal select {
    display: block; width: 100%; margin-top: 6px;
    padding: 9px 12px; font: inherit; font-size: 14px;
    background: var(--panel-3); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .goal-modal .actions { margin-top: 18px; justify-content: flex-end; }

  /* Milestones grid */
  .milestones-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    margin-top: 12px;
  }
  .milestone {
    display: grid; grid-template-columns: 44px 1fr; gap: 10px; align-items: center;
    padding: 12px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: opacity .2s;
  }
  .milestone.locked { opacity: .35; }
  .milestone.earned {
    border-color: rgba(124,209,197,.4);
    background: linear-gradient(180deg, var(--panel-2), rgba(124,209,197,.05));
  }
  .milestone-icon {
    width: 40px; height: 40px;
    background: rgba(124,209,197,.10);
    border: 1px solid rgba(124,209,197,.18);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; line-height: 1;
  }
  .milestone.earned .milestone-icon { background: rgba(124,209,197,.20); }
  .milestone-text strong { display: block; font-size: 14px; }
  .milestone-text .small { font-size: 11.5px; color: var(--muted); line-height: 1.4; }

  /* Per-phobia progress page */
  .back-link {
    color: var(--accent); text-decoration: none;
    font-size: 13px; font-weight: 500;
    display: inline-block; margin-bottom: 10px;
  }
  .back-link:hover { text-decoration: underline; }
  .ladder-progress-link {
    display: inline-block;
    margin: 0 0 12px;
    padding: 6px 12px;
    color: var(--accent); text-decoration: none;
    background: rgba(124, 209, 197, .08);
    border: 1px solid rgba(124, 209, 197, .25);
    border-radius: 999px;
    font-size: 12px; font-weight: 600;
  }
  .ladder-progress-link:hover { background: rgba(124, 209, 197, .15); }

  .rung-stats {
    display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
  }
  .rung-stat {
    display: grid; grid-template-columns: 36px 1fr; gap: 12px; align-items: center;
    padding: 10px 14px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
  }
  .rung-stat.untouched { opacity: .5; }
  .rung-stat-num {
    width: 32px; height: 32px;
    background: var(--accent); color: var(--bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .rung-stat.untouched .rung-stat-num { background: var(--border); color: var(--muted); }
  .rung-stat-text strong { display: block; font-size: 14px; }
  .rung-stat-text .small { font-size: 12px; color: var(--muted); }

  .journal-list {
    display: flex; flex-direction: column; gap: 8px; margin-top: 10px;
  }
  .journal-entry {
    padding: 12px 14px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
  }
  .journal-meta {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  .journal-rung {
    font-size: 11px; font-weight: 700; letter-spacing: .4px;
    color: var(--accent); background: rgba(124,209,197,.12);
    padding: 2px 8px; border-radius: 999px;
  }
  .journal-entry p { margin: 0; font-size: 13.5px; line-height: 1.55; color: #cbd5e1; }
  body.light-mode .journal-entry p { color: var(--muted); }

  /* First-time tutorial overlay (only the first exposure session) */
  .stage .tutorial-overlay {
    position: absolute; inset: 0; z-index: 12;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    transition: opacity .35s;
  }
  .stage .tutorial-overlay.dismiss { opacity: 0; pointer-events: none; }
  .stage .tutorial-card {
    background: linear-gradient(180deg, #1a2547, var(--panel-3));
    border: 1px solid rgba(124,209,197,.4);
    border-radius: 14px;
    padding: 22px 26px;
    max-width: min(440px, 86%);
    color: var(--text);
  }
  .stage .tutorial-card h3 {
    margin: 0 0 10px; color: var(--accent); font-size: 16px;
  }
  .stage .tutorial-card ul {
    margin: 0 0 14px; padding-left: 18px;
  }
  .stage .tutorial-card li {
    font-size: 13px; line-height: 1.65; color: #cbd5e1;
    margin-bottom: 4px;
  }
  .stage .tutorial-card .actions { justify-content: flex-end; margin-top: 0; }

  /* Achievement toast — compact pill that slides up from bottom-right
     instead of taking over the page. Was a 420 px panel at the bottom-
     center which felt heavy after every small win; now it's a discreet
     ~280 px chip that gets out of the way fast. */
  .achievement-toast {
    position: fixed; right: var(--space-4); bottom: var(--space-4);
    z-index: 200;
    transform: translateX(120%);
    opacity: 0;
    background: linear-gradient(135deg, rgba(26, 37, 71, .96), rgba(20, 28, 48, .96));
    border: 1px solid rgba(124,209,197,.40);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-4);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: var(--space-3);
    transition: transform .35s cubic-bezier(.22,1.4,.4,1), opacity .25s ease;
    color: var(--text);
    max-width: min(320px, calc(100vw - var(--space-8)));
    pointer-events: none;
  }
  .achievement-toast.show {
    transform: translateX(0); opacity: 1;
  }
  .ach-icon {
    font-size: 20px; line-height: 1;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,209,197,.14);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ach-text { display: flex; flex-direction: column; min-width: 0; }
  .ach-text strong {
    font-size: var(--text-xs);
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .ach-text span {
    font-size: var(--text-sm);
    color: #cbd5e1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 240px;
  }
  @media (max-width: 480px) {
    .achievement-toast {
      right: var(--space-3); bottom: var(--space-3);
      padding: 6px var(--space-3);
      gap: var(--space-2);
    }
    .ach-icon { width: 28px; height: 28px; font-size: 16px; }
    .ach-text span { font-size: var(--text-xs); max-width: 180px; }
  }

  /* Smooth scene fade-in when canvas mounts */
  .stage canvas { animation: stage-fade .6s ease-out; }
  @keyframes stage-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Glow ring when an interactive object is reachable */
  .stage .reach-hint {
    box-shadow: 0 0 20px rgba(124,209,197,.25), 0 0 0 0 rgba(124,209,197,.5);
    animation: reach-pulse 1.8s ease-in-out infinite;
  }
  .stage .reach-hint[style*="opacity: 0"] { animation: none; }
  @keyframes reach-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(124,209,197,.25), 0 0 0 0 rgba(124,209,197,.45); }
    50%      { box-shadow: 0 0 28px rgba(124,209,197,.35), 0 0 0 6px rgba(124,209,197,0); }
  }

  /* Per-phobia command bar (game feel — buttons under the stage) */
  .scene-cmd-bar, .dog-cmd-bar {
    /* Wrap onto multiple rows when there are many buttons, and allow a
       horizontal scroll on extremely narrow screens so nothing is clipped
       silently. justify-content keeps the row centred when there's leftover
       space, so a single-row bar doesn't look stranded. */
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center;
    padding: 12px 16px;
    background: linear-gradient(180deg, #161e34, #131a2c);
    border-top: 1px solid var(--border);
    overflow-x: auto;
    transition: max-height .25s ease, opacity .2s ease, padding .25s ease;
  }
  /* Character-driven scenes start with the command bar collapsed — events
     fire from where the player walks / what they look at / what they click
     on, not from a button row. The bar is still there as an accessibility
     fallback (touch users, screen readers, anyone who prefers explicit
     controls) but the player gets a clean view by default. */
  .scene-cmd-bar.collapsed {
    max-height: 0; padding-top: 0; padding-bottom: 0;
    opacity: 0; pointer-events: none; overflow: hidden;
    border-top: none;
  }
  /* Floating "show controls" / "hide controls" toggle that lives in the
