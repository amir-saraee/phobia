// ---------- First-run tutorial tour ----------
// Steps the new user through: 1) the scene controls, 2) the command bar,
// 3) the hold timer, 4) the continue button. Each step shows a card with an
// arrow pointing at the relevant UI element.
function runTutorialTour(stage) {
  const isTouch = "ontouchstart" in window;
  const steps = [
    {
      target: () => stage.querySelector("canvas") || stage,
      title: "This is the scene",
      text: isTouch
        ? "Drag to look around. Use the joystick (bottom-left) to walk."
        : "Drag with your mouse to look around. WASD or arrows to walk.",
      arrow: "down",
    },
    {
      target: () => document.querySelector(".scene-cmd-bar"),
      title: "Scene actions",
      text: "These buttons let you interact with the scene — grip the rail, sit the dog, splash the water.",
      arrow: "down",
    },
    {
      target: () => document.querySelector(".hold-bar") || document.getElementById("continueBtn"),
      title: "Stay with it",
      text: "The hold timer asks you to remain in the scene long enough for the anxiety to fall. You can continue any time.",
      arrow: "down",
    },
    {
      target: () => document.querySelector('.btn-warn[data-action="do-breathe"]'),
      title: "Pause any time",
      text: "Nothing locks. If anything is too much, take a guided breath instead.",
      arrow: "down",
    },
  ];
  let i = 0;
  const overlay = document.createElement("div");
  overlay.className = "tour-overlay";
  document.body.appendChild(overlay);
  function show(stepIdx) {
    overlay.innerHTML = "";
    const step = steps[stepIdx];
    const target = step.target();
    if (!target) {
      // Skip steps whose target isn't on screen yet
      if (stepIdx + 1 < steps.length) return show(stepIdx + 1);
      return done();
    }
    const r = target.getBoundingClientRect();
    // Spotlight ring around target
    const spot = document.createElement("div");
    spot.className = "tour-spot";
    Object.assign(spot.style, {
      left: (r.left - 6) + "px",
      top:  (r.top - 6)  + "px",
      width:  (r.width + 12) + "px",
      height: (r.height + 12) + "px",
    });
    overlay.appendChild(spot);
    // Card with arrow
    const card = document.createElement("div");
    card.className = "tour-card tour-arrow-" + step.arrow;
    const remaining = steps.length - stepIdx - 1;
    card.innerHTML = `
      <div class="tour-step">${stepIdx + 1} of ${steps.length}</div>
      <h3>${step.title}</h3>
      <p>${step.text}</p>
      <div class="tour-actions">
        <button class="btn-ghost" id="tourSkip">Skip</button>
        <button class="btn-primary" id="tourNext">${stepIdx === steps.length - 1 ? "Got it" : "Next"}</button>
      </div>
    `;
    // Position the card just below or above the target
    const cardW = 280;
    const margin = 20;
    let left = Math.max(margin, Math.min(window.innerWidth - cardW - margin, r.left + r.width / 2 - cardW / 2));
    let top = r.bottom + 16;
    if (top + 240 > window.innerHeight) {
      top = Math.max(margin, r.top - 240 - 16);
      card.classList.remove("tour-arrow-down");
      card.classList.add("tour-arrow-up");
    }
    Object.assign(card.style, { left: left + "px", top: top + "px" });
    overlay.appendChild(card);
    document.getElementById("tourSkip").onclick = done;
    document.getElementById("tourNext").onclick = () => {
      if (stepIdx + 1 < steps.length) show(stepIdx + 1); else done();
    };
  }
  function done() {
    try { localStorage.setItem("fobia.tutorialSeen", "1"); } catch {}
    overlay.classList.add("dismiss");
    setTimeout(() => overlay.remove(), 350);
  }
  // Wait for the layout to settle (countdown overlay sits on top until ~2.4s)
  setTimeout(() => show(i), 3000);
}

// Daily streak: count distinct day-strings in the active character's log,
// counting backwards from today, stopping at the first gap.
function computeStreak() {
  if (!state.log || !state.log.length) return 0;
  const dayKey = (ts) => {
    const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime();
  };
  const days = new Set(state.log.map(l => dayKey(l.ts)));
  const today = dayKey(Date.now());
  let n = 0;
  for (let d = today; ; d -= 86400000) {
    if (days.has(d)) n++;
    else break;
  }
  return n;
}

// Apply the character's saved voice preset to PhobiaVoice on every render
// so the spoken cues match the user's chosen tone (calm / encouraging / brief).
function applyVoicePreset() {
  const c = window.Character && window.Character.loadCharacter();
  if (!c || !window.PhobiaVoice || !window.PhobiaVoice.setRate) return;
  const rate = c.voicePreset === "calm" ? 0.78
             : c.voicePreset === "brief" ? 1.04
             : c.voicePreset === "encouraging" ? 0.90
             : 0.85;
  window.PhobiaVoice.setRate(rate);
}

// ---------- Boot ----------
// Wait for the deferred src/character.js + src/phobia-info.js to load before
// the first render — that way the welcome page can use the avatar SVG and
// phobia info from the start.
function boot() {
  // Scope state to the active character (must run after character.js loads)
  activateCharacterState();
  // Merge any user-defined custom phobias into PHOBIAS
  mergeCustomPhobias();
  applyTheme();
  applyVoicePreset();
  scheduleReminders();
  // Warm caches for heavy assets (dog model) in the background
  if (window.Scene3D && window.Scene3D.prefetch) {
    setTimeout(() => window.Scene3D.prefetch(), 1500);
  }
  // Honor the URL on first load so refreshes / shared links land correctly
  const route = location.hash ? parseRoute(location.hash) : { view: "welcome", params: {} };
  render(route.view, route.params);
  // Make sure the URL bar matches what we rendered
  const expected = "#" + serializeRoute(route.view, route.params);
  if (location.hash !== expected) {
    _suppressHashSync = true;
    history.replaceState({ view: route.view, params: route.params }, "", expected);
    _suppressHashSync = false;
  }
  // Initial load also starts at the top — covers the case where the browser
  // restored a scroll position from a previous visit and our SPA route is
  // about to land them on a different view.
  if (typeof scrollToTop === "function") scrollToTop();
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
</script>

<script type="module">
// ---------- Three.js 3D scenes ----------
// Each phobia gets its own immersive scene. Mounts a WebGL canvas into a
// container, runs an animation loop, and cleans up on unmount.
import * as THREE from "three";

import { SSAOPass } from "three/addons/postprocessing/SSAOPass.js";
import { SMAAPass } from "three/addons/postprocessing/SMAAPass.js";

import { Reflector } from "three/addons/objects/Reflector.js";

// XRControllerModelFactory provides the visible controller mesh that
// matches the user's actual hardware (Quest Touch, Vision Pro, Index, etc.).
import { XRControllerModelFactory } from "three/addons/webxr/XRControllerModelFactory.js";

// Expose THREE on window so the deferred realism / creatures / atmosphere
// scripts (which can't use ESM imports because they're regular <script src>
// tags) can read it. Their factory functions defer geometry/material work
// until first call, so it's fine that this assignment runs after their
// own script bodies — they just need it available by the time scenes mount.
window.THREE = THREE;

// Scratch vectors reused every frame for the spatial audio listener update
// (avoids per-frame allocation in the render hot path).
const _audVec1 = new THREE.Vector3();
const _audVec2 = new THREE.Vector3();
const _audVec3 = new THREE.Vector3();

// ---------- Asset loader cache (GLTF models from CDN) ----------
const gltfLoader = new GLTFLoader();
const modelCache = new Map();
// One-time migration: clear stale "cameraModeSeen" flags from earlier builds
// so users get the new approach-style flow with their character visible.
// Runs exactly once per device. Without this users who'd opened the page
// before would see the scene without their character because the old code
// persisted a "seen" flag — defeating the whole "see yourself" upgrade.
try {
  if (!localStorage.getItem("fobia.cameraFlowMigratedV2")) {
    ["heights", "dogs", "spiders", "snakes", "water"].forEach(k => {
      try { localStorage.removeItem(k + ".cameraModeSeen"); } catch {}
    });
    localStorage.setItem("fobia.cameraFlowMigratedV2", "1");
  }
} catch {}

function loadGLTF(url) {
  if (modelCache.has(url)) return modelCache.get(url);
  const promise = new Promise((resolve, reject) => {
    gltfLoader.load(url, resolve, undefined, reject);

    if (child.material) {

      for (const m of mats) {

// ---------- Device detection + quality tier ----------
const IS_TOUCH = (typeof window !== "undefined") && (("ontouchstart" in window) || (navigator.maxTouchPoints > 0));
const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent || "");

// We re-evaluate on every mount, so the user's choice takes effect on the next
// scene without a page reload.
function resolveQuality() {

  try { pref = localStorage.getItem("fobia.quality") || "auto"; } catch {}

  return pref;
}

function makeRenderer(container) {
  // Re-evaluate every mount so settings changes apply immediately
  QUALITY = resolveQuality();
  IS_LOW_POWER = QUALITY === "low";
  const isMedium = QUALITY === "medium";
  const renderer = new THREE.WebGLRenderer({
    // We do anti-aliasing in a post-process SMAA pass on high quality, so the
    // built-in MSAA is only requested on low/medium quality where SMAA is
    // disabled.
    antialias: !IS_LOW_POWER && isMedium,
    powerPreference: IS_LOW_POWER ? "low-power" : "high-performance",
    stencil: false,                    // we don't use stencil; saves bandwidth
  });
  renderer.setPixelRatio(IS_LOW_POWER ? 1 : Math.min(window.devicePixelRatio, isMedium ? 1.5 : 2));
  renderer.setSize(container.clientWidth || 800, container.clientHeight || 360);
  renderer.shadowMap.enabled = !IS_LOW_POWER;
  // VSM (Variance Shadow Maps) give a real soft penumbra at the cost of one
  // extra blur pass per shadow caster — much cleaner than PCF stair-stepping.
  // Falls back to PCF on medium and Basic on low.
  renderer.shadowMap.type = IS_LOW_POWER ? THREE.BasicShadowMap
                          : isMedium    ? THREE.PCFSoftShadowMap
                          : THREE.VSMShadowMap;
  // ACES Filmic — the gold-standard cinematic tone mapping. Real cameras
  // and films use this curve so our output matches viewer expectations of
  // "this looks like a real photograph". Exposure 1.05 lifts mid-tones a
  // touch (real cinematography under-exposes slightly compared to our
  // procedural lighting which lacks bounce), making every scene feel less
  // washed out and more like a professional render.
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  // aren't double-bright vs. direct lights.
  renderer.useLegacyLights = false;

  // Soft shadows give the single biggest "this isn't a video game" lift.
  // VSM shadows already use a blur radius set later in mount(); here we
  // bump the auto-update so shadows track moving meshes (cars, dog) every
  // frame. autoUpdate=true is the default; we just guard against any prior
  // override.
  renderer.shadowMap.autoUpdate = true;

  // when lights / shadows have actually changed. Improves visible quality
  // for animated scenes.
  // Enable WebXR — required for VRButton.createButton() to actually start a
  // session when the user clicks "ENTER VR". Browsers without WebXR support
  // simply ignore this flag.
  renderer.xr.enabled = true;
  return renderer;
}

// One shared PMREM-baked environment map for every scene. Built lazily the
// first time a scene mounts, then reused — building it costs ~10 ms and gives
// every metal/roughness surface real-looking reflections for free.
let _envMap = null;

  if (_envMap) return _envMap;

    _envMap = pmrem.fromScene(env, 0.04).texture;
    pmrem.dispose();
  } catch (e) {
    console.warn("PMREM env map build failed:", e);
    _envMap = null;
  }
  return _envMap;
}

// ---------- Touch joystick for mobile movement ----------
// Drives FPControls.keys directly so the existing walk logic just works.
class TouchJoystick {
  constructor(container, controls) {
    this.controls = controls;
    this.dom = document.createElement("div");
    this.dom.className = "joystick";
    this.dom.innerHTML = '<div class="joystick-thumb"></div>';
    container.appendChild(this.dom);
    this.thumb = this.dom.querySelector(".joystick-thumb");
    this.active = false;
    this.center = { x: 0, y: 0 };
    this.maxRadius = 44;
    this._down = this._down.bind(this);
    this._move = this._move.bind(this);
    this._up = this._up.bind(this);
    this.dom.addEventListener("pointerdown", this._down, { passive: false });
    window.addEventListener("pointermove", this._move, { passive: false });
    window.addEventListener("pointerup",   this._up);
    window.addEventListener("pointercancel", this._up);
  }
  _down(e) {
    e.preventDefault(); e.stopPropagation();
    this.active = true;
    const r = this.dom.getBoundingClientRect();
    this.center.x = r.left + r.width / 2;
    this.center.y = r.top + r.height / 2;
    try { this.dom.setPointerCapture(e.pointerId); } catch {}
    this._move(e);
  }
  _move(e) {
    if (!this.active) return;
    e.stopPropagation();
    let dx = e.clientX - this.center.x;
    let dy = e.clientY - this.center.y;
    const m = Math.hypot(dx, dy);
    if (m > this.maxRadius) {
      dx = dx / m * this.maxRadius;
      dy = dy / m * this.maxRadius;
    }
    this.thumb.style.transform = `translate(${dx}px, ${dy}px)`;
    const nx = dx / this.maxRadius;
    const ny = dy / this.maxRadius;
    // Forward = pushing thumb up = -y in screen coords
    this.controls.keys.KeyW = ny < -0.25;
    this.controls.keys.KeyS = ny >  0.25;
    this.controls.keys.KeyA = nx < -0.25;
    this.controls.keys.KeyD = nx >  0.25;
  }
  _up(e) {
    if (!this.active) return;
    this.active = false;
    this.thumb.style.transform = "";
    this.controls.keys.KeyW = false;
    this.controls.keys.KeyS = false;
    this.controls.keys.KeyA = false;
    this.controls.keys.KeyD = false;
  }
  dispose() {
    this.dom.removeEventListener("pointerdown", this._down);
    window.removeEventListener("pointermove", this._move);
    window.removeEventListener("pointerup",   this._up);
    window.removeEventListener("pointercancel", this._up);
    if (this.dom.parentNode) this.dom.parentNode.removeChild(this.dom);
  }
}

// ---------- First-person controls ----------
// Drag/touch to look. WASD or arrow keys to move (when mode === "walkable").
// Each scene supplies an initial camera position, look direction, and movement
// bounds — controls own the camera position and rotation thereafter.
class FPControls {
  constructor(camera, dom, opts = {}) {
    this.camera = camera;
    this.dom = dom;
    this.opts = Object.assign({
      mode: "lookOnly",     // "lookOnly" | "walkable"
      initialPos: [0, 0, 0],
      initialYaw: 0,
      initialPitch: 0,
      bounds: null,         // { minX, maxX, minZ, maxZ } in walkable mode
      speed: 2.5,           // units per second
      lookSpeed: 0.0045,    // radians per pixel

    this.lastY = 0;

    this._onMove = this._onMove.bind(this);

    this._onKeyUp = this._onKeyUp.bind(this);

    // the scene allowing full traversal.

      if (this.keys.KeyD || this.keys.ArrowRight) { mx +=  cosY; mz += -sinY; }
      if (this.keys.KeyA || this.keys.ArrowLeft)  { mx += -cosY; mz +=  sinY; }

        this.position.z += mz;

          // wander out of the scripted scene's intended viewpoint.

    if (movingNow) this._walkPhase += dt * Math.PI * 4; // 2 Hz

    // ---- Camera placement ----

    // offset. Behaviour mirrors modern 3rd-person games:
    //   - Camera sits behind the character at a fixed distance, slightly
    //     above the head, biased to one side (over-the-shoulder framing).
    //   - Looking up tilts the camera up around the character.
    //   - Looking down lowers the camera + pulls it back further so the
    //     ground-and-character composition stays in frame.
    //   - Position is SMOOTHED with damping so quick yaw changes don't whip

    const fpX = this.position.x + bobX;
    const fpY = this.position.y + bobY;
    const fpZ = this.position.z;

    // TP target — orbit behind the player. Yaw drives orbit angle; pitch
    // tilts the camera up/down around the character.
    const sinY = Math.sin(this.yaw), cosY = Math.cos(this.yaw);
    const sinP = Math.sin(this.pitch), cosP = Math.cos(this.pitch);
    // Distance increases when looking up/down so the framing doesn't crunch
    // against the character.
    const pitchAbs = Math.abs(this.pitch);
    const distScale = 1.0 + pitchAbs * 0.20;
    const tpDist = this.tpDistance * distScale;
    // Vertical orbit — when pitch < 0 (looking down) the camera rises so it
    // looks DOWN at the character; pitch > 0 (looking up) the camera drops.
    const tpHeight = this.tpHeight - sinP * 1.4;
    // Over-the-shoulder lateral offset (player-local right). Right-vector
    // in world: (cosY, 0, -sinY).
    const sideX = cosY * this.tpShoulder;
    const sideZ = -sinY * this.tpShoulder;
    // Camera sits behind player along their facing direction (player faces
    // -z when yaw=0 → camera at +z behind).
    const tpX = this.position.x + sinY * tpDist + sideX;
    const tpY = this.position.y + tpHeight;
    const tpZ = this.position.z + cosY * tpDist + sideZ;

    // ---- TP camera collision ----
    // Raycast from the player TOWARD the target camera position. If anything
    // is in the way (wall, penthouse, building edge), pull the camera in to
    // just before the hit point so we never see through walls or have the
    // camera land inside geometry. Standard third-person game technique.
    let safeTpX = tpX, safeTpY = tpY, safeTpZ = tpZ;
    if (this._collisionScene && this._collisionScene.length > 0
        && window.THREE && this.tpBlend > 0.05) {
      try {
        if (!this._tpRay) this._tpRay = new THREE.Raycaster();
        const ro = this._tpRay.ray.origin;
        const rd = this._tpRay.ray.direction;
        // Origin: a point slightly above the player's hips
        ro.set(this.position.x, this.position.y - 0.4, this.position.z);
        // Direction: from player to target camera
        const dx = tpX - ro.x, dy = tpY - ro.y, dz = tpZ - ro.z;
        const targetDist = Math.hypot(dx, dy, dz);
        if (targetDist > 0.05) {
          rd.set(dx / targetDist, dy / targetDist, dz / targetDist);
          this._tpRay.far = targetDist;
          const hits = this._tpRay.intersectObjects(this._collisionScene, true);
          if (hits && hits.length > 0) {
            let closest = targetDist;
            for (const h of hits) {
              if (h.distance < closest) closest = h.distance;
            }
            const safeDist = Math.max(0.6, closest - 0.20);
            safeTpX = ro.x + rd.x * safeDist;
            safeTpY = ro.y + rd.y * safeDist;
            safeTpZ = ro.z + rd.z * safeDist;
          }
        }
      } catch {}
    }

    // Damped follow — lag the actual camera position behind the target so
    // quick yaw turns feel like a real handheld follow shot.
    if (!this._tpSmoothPos || this.tpBlend < 0.05) {
      this._tpSmoothPos = new THREE.Vector3(safeTpX, safeTpY, safeTpZ);
    } else {
      // Snap-in faster when the target is suddenly closer (collision detected)
      // so the camera doesn't slowly drift through a wall before reacting.
      const dx = safeTpX - this._tpSmoothPos.x;
      const dy = safeTpY - this._tpSmoothPos.y;
      const dz = safeTpZ - this._tpSmoothPos.z;
      const distGap = Math.hypot(dx, dy, dz);
      const stiff = distGap > 1.0 ? 14 : 7;
      const k = Math.min(1, dt * stiff);
      this._tpSmoothPos.x += dx * k;
      this._tpSmoothPos.y += dy * k;
      this._tpSmoothPos.z += dz * k;
    }

    // Blend FP and TP positions
    const cx = fpX + (this._tpSmoothPos.x - fpX) * this.tpBlend;
    const cy = fpY + (this._tpSmoothPos.y - fpY) * this.tpBlend;
    const cz = fpZ + (this._tpSmoothPos.z - fpZ) * this.tpBlend;
    this.camera.position.set(cx, cy, cz);

    if (this.tpBlend > 0.001) {
      // Look at a target at roughly the character's chest height. Aiming
      // slightly LOWER than chest centres the character vertically in the
      // frame — was overshooting upward and putting the character in the
      // bottom third. The look-target also pitches with the user's pitch
      // so they can aim the camera up/down past the character.
      const lookYBase = this.position.y - 0.75;     // approx chest height
      const lookX = this.position.x + sinY * 0.3;   // less yaw bias
      const lookY = lookYBase + sinP * tpDist * 0.55;
      const lookZ = this.position.z + cosY * 0.3;
      // Damp the look-target too so framing changes are smooth
      if (!this._tpSmoothLook) {
        this._tpSmoothLook = new THREE.Vector3(lookX, lookY, lookZ);
      } else {
        const k = Math.min(1, dt * 8.0);
        this._tpSmoothLook.x += (lookX - this._tpSmoothLook.x) * k;
        this._tpSmoothLook.y += (lookY - this._tpSmoothLook.y) * k;
        this._tpSmoothLook.z += (lookZ - this._tpSmoothLook.z) * k;
      }
      this.camera.lookAt(this._tpSmoothLook);
      this.camera.rotation.order = "YXZ";
    } else {
      // Reset smoothing when fully in FP so re-entering TP starts fresh
      this._tpSmoothPos = null;
      this._tpSmoothLook = null;
    }
  }
  // Expose walk state so scene can drive Body animation
  getWalkState() { return { phase: this._walkPhase || 0, amount: this._walkAmt || 0 }; }

  // Toggle / set camera mode. Persists in localStorage so a user who likes
  // third-person view keeps it across sessions.
  // Optional `instant` flag bypasses the FP↔TP crossfade — used when a scene
  // forces the camera mode at mount so the cinematic intro starts at the
  // right blend value (otherwise the first few frames reset _tpSmoothPos
  // and the cinematic dolly-in is lost).
  setCameraMode(mode, instant = false) {
    if (mode !== "fp" && mode !== "tp") mode = "fp";
    this.cameraMode = mode;
    if (instant) {
      this.tpBlend = mode === "tp" ? 1 : 0;
    }
    try { localStorage.setItem("fobia.cameraMode", mode); } catch {}
  }
  // Set the list of meshes the TP camera should collide against. Scenes
  // populate this with their walls / building structures / large props so
  // the camera doesn't clip through them. Pass an array of THREE.Object3D.
  setCollisionScene(objects) {
    this._collisionScene = Array.isArray(objects) ? objects : null;
  }
  toggleCameraMode() {
    this.setCameraMode(this.cameraMode === "tp" ? "fp" : "tp");
    return this.cameraMode;
  }

  dispose() {
    this.enabled = false;
    this.dom.removeEventListener("pointerdown", this._onDown);
    window.removeEventListener("pointermove", this._onMove);
    window.removeEventListener("pointerup", this._onUp);
    window.removeEventListener("pointercancel", this._onUp);
    window.removeEventListener("keydown", this._onKey);
    window.removeEventListener("keyup",   this._onKeyUp);
    this.dom.style.cursor = "";
  }
}

// ---------- First-person body (world-anchored) ----------
// A full visible body added to the SCENE (not the camera). Each frame the body
// follows the camera's xz position + yaw, but NOT its pitch. The result: when
// you look down you actually see your own chest + hips + legs + feet, instead
// of a body that rotates out of view with your head.
class Body {
  constructor(scene, camera, opts = {}) {
    this.scene = scene;
    this.camera = camera;
    this.opts = Object.assign({
      skinColor:  0xd4a07a,
      pantsColor: 0x2c3a52,
      shoeColor:  0x18181c,
      shirtColor: 0x2c9d96,
      hairColor:  0x4a2c18,
      hairStyle:  "short",   // "short" | "long" | "buzz" | "pony" | "curly" | "bald"
      eyeColor:   0x3a2410,
      glasses:    "none",    // "none" | "round" | "square"
      facialHair: "none",    // "none" | "stubble" | "beard" | "moustache"
      // Body part offsets in body-local space (foot at y=0, head at y≈1.55).
      headY:      1.55,    // camera height = top of body
      neckY:      1.40,
      chestTopY:  1.28,    // lowered so the capsule's rounded top stays well below the camera
      waistY:     0.92,
      hipY:       0.82,
      kneeY:      0.45,
      ankleY:     0.04,
      width:      0.18,    // half torso width
      // Wind exposure — used for hair flutter, scarf flap. Caller can crank this
      // up in heights / driving / flying for visible cloth motion that sells
      // "I'm somewhere with a real breeze".
      windExposure: 0.0,
    }, opts);
    // Camera mode: "fp" hides the head + face (camera IS the head). "tp"
    // pulls the camera back so the user sees their visible character.
    this.cameraMode = "fp";
    // ---------- Posture state ----------
    // The scene drives these every frame to make the character respond to
    // its environment: leaning forward over a railing, crouching to pet a
    // dog, holding arms out for balance in water. Each value is 0..1; the
    // body smoothly lerps toward the targets in update() so transitions
    // are natural, not snappy. "reach" makes the hands extend forward as
    // if grabbing a railing or reaching for an object.
    this.posture = {
      lean: 0,             // forward chest tilt (0 upright → 1 fully leaning)
      crouch: 0,           // knee bend + body drop (0 standing → 1 squat)
      armSpread: 0,        // arms out to the sides for balance
      reach: 0,            // both hands forward, like grabbing a railing
      reachHeight: 0.5,    // 0 hip → 1 chest height for the reach gesture
    };
    this._postureSm = { lean: 0, crouch: 0, armSpread: 0, reach: 0, reachHeight: 0.5 };
    this.group = new THREE.Group();
    this._build();
    scene.add(this.group);
  }

  _build() {
    const o = this.opts;
    // Body materials. Real cloth and skin don't emit light, so emissive is
    // kept very low — just enough to keep the character readable in deep
    // shadow without looking like they're glowing. Roughness tuned for
    // each material: pants slightly rough, shoes shiny-but-leathery,
    // shirt cotton-rough, skin sub-surface-ish.
    const emissive = (hex, amt = 0.04) => new THREE.Color(hex).multiplyScalar(amt);
    // Convert numeric hex to "#rrggbb" for the realism module — its texture
    // cache is keyed by string so the same colour shares a single set of
    // generated maps across every body part using it.
    const toHex = (n) => "#" + (typeof n === "number" ? n.toString(16).padStart(6, "0") : String(n).replace("#", ""));
    const PR = window.PhobiaRealism;
    const pants = (PR && PR.fabricMaterial)
      ? PR.fabricMaterial(toHex(o.pantsColor), "denim")
      : new THREE.MeshStandardMaterial({
          color: o.pantsColor, roughness: 0.92, emissive: emissive(o.pantsColor, 0.03),
        });
    const shoes = new THREE.MeshStandardMaterial({
      color: o.shoeColor, roughness: 0.50, metalness: 0.08, emissive: emissive(o.shoeColor, 0.02),
    });
    const shirt = (PR && PR.fabricMaterial)
      ? PR.fabricMaterial(toHex(o.shirtColor), "cotton")
      : new THREE.MeshStandardMaterial({
          color: o.shirtColor, roughness: 0.88, emissive: emissive(o.shirtColor, 0.04),
        });
    const skin  = (PR && PR.skinMaterial)
      ? PR.skinMaterial(toHex(o.skinColor))
      : new THREE.MeshStandardMaterial({
          color: o.skinColor, roughness: 0.72, emissive: emissive(o.skinColor, 0.05),
        });
    const shirtFold = new THREE.MeshStandardMaterial({
      color: new THREE.Color(o.shirtColor).multiplyScalar(0.78), roughness: 0.95
    });

    // Soft shadow blob under the feet — a flat dark disc on the ground.
    // Grounds the character even in scenes where the lighting doesn't naturally
    // produce a real shadow under the body.
    const shadow = new THREE.Mesh(
      new THREE.CircleGeometry(0.42, 24),
      new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.35, depthWrite: false,
      })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.set(0, 0.005, 0);   // 5 mm above the ground
    shadow.renderOrder = -1;            // draw before the body so it's behind
    this.group.add(shadow);
    this.shadow = shadow;

    // Build body relative to feet at y=0. The whole group is then anchored to
    // (camera.xz, camera.y - height) every frame.
    // Neck (skin) — sits between the chest top and the camera
    const neck = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.085, o.neckY - o.chestTopY, 14), skin
    );
    neck.position.set(0, (o.neckY + o.chestTopY) / 2, 0);
    this.group.add(neck);

    // Chest — slightly oblong capsule (wider than deep) to read as a torso,
    // not a sphere. Slim in z so it doesn't poke into the camera. Stored
    // as `this.chest` so update() can drive a visible breathing scale.
    const chestH = o.chestTopY - o.waistY;
    const chest = new THREE.Mesh(
      new THREE.CapsuleGeometry(o.width, chestH - 0.10, 8, 14), shirt
    );
    chest.scale.set(1.4, 1, 0.6);     // wider in x, slimmer in z
    chest.position.set(0, (o.chestTopY + o.waistY) / 2, 0);
    chest.castShadow = true;
    this.group.add(chest);
    this.chest = chest;
    // Centre fold down the front of the shirt
    const shirtCenter = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, chestH - 0.10, 0.005), shirtFold
    );
    shirtCenter.position.set(0, (o.chestTopY + o.waistY) / 2, o.width * 0.62);
    this.group.add(shirtCenter);

    // Shoulders — bumps at the top corners of the chest
    this.shoulders = [];
    for (const sx of [-1, 1]) {
      const shoulder = new THREE.Mesh(
        new THREE.SphereGeometry(0.11, 14, 12), shirt
      );
      shoulder.position.set(sx * (o.width * 1.25), o.chestTopY - 0.06, 0);
      shoulder.castShadow = true;
      this.group.add(shoulder);
      this.shoulders.push({ mesh: shoulder, side: sx });
    }

    // Upper arm + elbow + forearm (two-segment articulated arm).
    // Letting the elbow bend independently means reaching / petting / gripping
    // gestures look anatomically correct rather than a single rigid capsule.
    this.arms = [];
    const upperLen = 0.28, foreLen = 0.26;
    for (const sx of [-1, 1]) {
      // armRoot rotates at the shoulder
      const armRoot = new THREE.Group();
      armRoot.position.set(sx * (o.width * 1.40), o.chestTopY - 0.10, 0);
      this.group.add(armRoot);
      // Upper arm hangs straight down from the shoulder by default
      const upper = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.075, upperLen, 8, 12), shirt
      );
      upper.position.set(0, -upperLen / 2, 0);
      upper.castShadow = true;
      armRoot.add(upper);
      // Elbow group at the bottom of the upper arm
      const elbow = new THREE.Group();
      elbow.position.set(0, -upperLen - 0.02, 0);
      armRoot.add(elbow);
      // Forearm hangs down from the elbow
      const fore = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.06, foreLen, 8, 12), shirt
      );
      fore.position.set(0, -foreLen / 2, 0);
      fore.castShadow = true;
      elbow.add(fore);
      this.arms.push({ root: armRoot, elbow, side: sx });
    }

    // Hips — pants belt block
    const hips = new THREE.Mesh(
      new THREE.BoxGeometry(o.width * 2.2, o.waistY - o.hipY, 0.26), pants
    );
    hips.position.set(0, (o.waistY + o.hipY) / 2, 0);
    hips.castShadow = true;
    this.group.add(hips);

    // Legs
    const legLen = o.hipY - o.ankleY;
    this.legs = [];
    for (const sx of [-1, 1]) {
      const leg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.095, 0.075, legLen - 0.05, 14), pants
      );
      leg.position.set(sx * 0.11, (o.hipY + o.ankleY) / 2 - 0.02, 0);
      leg.castShadow = true;
      this.group.add(leg);
      this.legs.push({ mesh: leg, side: sx });
    }

    // Feet — flat shoes, slightly forward
    this.feet = [];
    for (const sx of [-1, 1]) {
      const foot = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 0.06, 0.26), shoes
      );
      foot.position.set(sx * 0.11, o.ankleY, 0.06);
      foot.castShadow = true;
      this.group.add(foot);
      this.feet.push({ mesh: foot, side: sx });
    }

    // ---------- Head + face ----------
    // The head sits where the camera sits in first-person, so its mesh is
    // hidden by default. Switching to third-person camera mode reveals it,
    // letting the user actually SEE themselves walking the platform / petting
    // the dog. The face is anatomically simple but readable: skull, hair,
    // eyes (with blink lids), eyebrows, mouth, nose, optional glasses, beard.
    this.head = new THREE.Group();
    // Slightly lower than the camera (eyes sit a few cm below the top of the
    // head, and the camera approximates the eye position).
    this.head.position.set(0, o.headY - 0.06, 0);
    this.head.visible = false;       // FP default — camera is the head
    this.group.add(this.head);

    // Skull
    const skull = new THREE.Mesh(
      new THREE.SphereGeometry(0.115, 28, 22),
      new THREE.MeshStandardMaterial({
        color: o.skinColor, roughness: 0.78, metalness: 0,
        emissive: emissive(o.skinColor, 0.10),
      })
    );
    skull.scale.set(1.0, 1.10, 0.95);
    skull.castShadow = true;
    this.head.add(skull);

    // Cheek shading bumps (slightly darker subsurface tone)
    const cheekMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(o.skinColor).multiplyScalar(0.86),
      roughness: 0.95,
      transparent: true, opacity: 0.55, depthWrite: false,
    });
    for (const sx of [-1, 1]) {
      const cheek = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 10), cheekMat);
      cheek.scale.set(1.1, 0.7, 0.4);
      cheek.position.set(sx * 0.075, -0.005, 0.085);
      this.head.add(cheek);
    }

    // Hair — layered on top of the skull, geometry varies by style.
    // PBR streak normal map (when realism module loaded) gives the hair
    // visible directional shading instead of reading as a paint cap.
    const hairMat = (PR && PR.hairMaterial)
      ? PR.hairMaterial(toHex(o.hairColor))
      : new THREE.MeshStandardMaterial({
          color: o.hairColor, roughness: 1.0,
          emissive: new THREE.Color(o.hairColor).multiplyScalar(0.04),
        });
    // Pony-tail / long hair gets a separate "hair-back" group that flutters
    // independently in the wind. Initialise to nothing for "bald".
    this.hair = new THREE.Group();
    this.head.add(this.hair);
    this.hairFlutter = null;          // set below for long / pony / curly styles
    if (o.hairStyle === "short") {
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 24, 18, 0, Math.PI * 2, 0, Math.PI / 2.0),
        hairMat
      );
      cap.scale.set(1.02, 1.02, 0.98);
      cap.position.set(0, 0.018, 0);
      this.hair.add(cap);
      // Side-burn tufts that flick gently in the wind
      for (const sx of [-1, 1]) {
        const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 6), hairMat);
        tuft.scale.set(0.7, 1.4, 0.6);
        tuft.position.set(sx * 0.115, 0.005, 0.005);
        this.hair.add(tuft);
      }
    } else if (o.hairStyle === "long") {
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.123, 24, 18, 0, Math.PI * 2, 0, Math.PI / 1.9),
        hairMat
      );
      cap.position.set(0, 0.012, 0);
      this.hair.add(cap);
      // Long sheet down the back — flutters in wind via _windPhase
      const back = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.34, 6, 8), hairMat);
      back.position.set(0, -0.12, -0.075);
      back.rotation.x = -0.10;
      back.material.side = THREE.DoubleSide;
      this.hair.add(back);
      this.hairFlutter = back;
    } else if (o.hairStyle === "buzz") {
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.116, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2.4),
        new THREE.MeshStandardMaterial({
          color: o.hairColor, roughness: 1.0, transparent: true, opacity: 0.85,
        })
      );
      cap.position.set(0, 0.005, 0);
      this.hair.add(cap);
    } else if (o.hairStyle === "pony") {
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 24, 18, 0, Math.PI * 2, 0, Math.PI / 2.0),
        hairMat
      );
      cap.position.set(0, 0.015, 0);
      this.hair.add(cap);
      // Pony tail — a stretched ovoid down behind the head
      const tail = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 10), hairMat);
      tail.scale.set(0.9, 2.4, 0.9);
      tail.position.set(0, -0.06, -0.115);
      this.hair.add(tail);
      this.hairFlutter = tail;
    } else if (o.hairStyle === "curly") {
      // Cluster of small spheres
      for (let i = 0; i < 14; i++) {
        const a = (i / 14) * Math.PI * 2;
        const r = 0.10 + Math.random() * 0.012;
        const curl = new THREE.Mesh(new THREE.SphereGeometry(0.03 + Math.random() * 0.01, 10, 8), hairMat);
        curl.position.set(Math.cos(a) * r, 0.04 + Math.random() * 0.04, Math.sin(a) * r * 0.85);
        this.hair.add(curl);
      }
    } /* "bald" intentionally adds nothing */

    // Eyes — full set per side: socket darken, white sclera, iris, pupil,
    // catchlight highlight, eyelid for blinks. Real-time blink scale-y on
    // the lid imitates the wettest "alive" cue.
    const eyeWhiteMat = new THREE.MeshStandardMaterial({
      color: 0xfdf3e6, roughness: 0.20, metalness: 0,
      emissive: 0x161210, emissiveIntensity: 0.05,
    });
    const irisMat = new THREE.MeshStandardMaterial({
      color: o.eyeColor, roughness: 0.18, metalness: 0.12,
      emissive: new THREE.Color(o.eyeColor).multiplyScalar(0.25),
    });
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x05030a });
    const lidMat = new THREE.MeshStandardMaterial({
      color: o.skinColor, roughness: 0.9,
    });
    this.eyes = [];
    for (const sx of [-1, 1]) {
      const eyeGroup = new THREE.Group();
      eyeGroup.position.set(sx * 0.040, 0.005, 0.103);
      this.head.add(eyeGroup);
      const sclera = new THREE.Mesh(new THREE.SphereGeometry(0.022, 14, 12), eyeWhiteMat);
      sclera.scale.set(1.0, 1.0, 0.55);
      eyeGroup.add(sclera);
      const iris = new THREE.Mesh(new THREE.SphereGeometry(0.014, 14, 12), irisMat);
      iris.position.set(0, 0, 0.012);
      iris.scale.set(1, 1, 0.6);
      eyeGroup.add(iris);
      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.0065, 10, 8), pupilMat);
      pupil.position.set(0, 0, 0.020);
      eyeGroup.add(pupil);
      // Catchlight (white speck — single biggest "alive" cue)
      const hl = new THREE.Mesh(
        new THREE.SphereGeometry(0.004, 6, 4),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      hl.position.set(sx * 0.004, 0.006, 0.024);
      eyeGroup.add(hl);
      // Eyelid — half-sphere we scale on Y for blinks (0.05 open → 1.0 closed)
      const lid = new THREE.Mesh(
        new THREE.SphereGeometry(0.024, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2),
        lidMat
      );
      lid.scale.set(1.0, 0.05, 0.55);
      lid.position.set(0, 0.001, 0.001);
      eyeGroup.add(lid);
      // Eyebrow — short curved bar above the eye, in hair colour
      const brow = new THREE.Mesh(
        new THREE.BoxGeometry(0.040, 0.005, 0.012),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color(o.hairColor).multiplyScalar(0.78), roughness: 1.0,
        })
      );
      brow.position.set(sx * 0.001, 0.030, 0.015);
      brow.rotation.z = sx * -0.10;
      eyeGroup.add(brow);
      // Cache base brow rotation/position so the reactive-face routine
      // can additively tilt it without losing the rest pose. Cache the
      // base lid scaleY too so blinks compose with fear-widen.
      const browBaseRotZ = sx * -0.10;
      const browBaseY = 0.030;
      this.eyes.push({
        group: eyeGroup, lid, brow,
        side: sx, browBaseRotZ, browBaseY,
        lidBaseY: 0.05,
      });
    }

    // Nose — short rounded prism
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.016, 12, 10),
      new THREE.MeshStandardMaterial({ color: o.skinColor, roughness: 0.85 })
    );
    nose.scale.set(0.9, 1.4, 1.1);
    nose.position.set(0, -0.022, 0.110);
    this.head.add(nose);

    // Mouth — a faint smile arc (Torus partial)
    const mouth = new THREE.Mesh(
      new THREE.TorusGeometry(0.024, 0.0035, 6, 16, Math.PI * 0.85),
      new THREE.MeshBasicMaterial({ color: 0x6a3a30 })
    );
    mouth.rotation.z = -Math.PI / 2;
    mouth.rotation.x = -0.12;
    mouth.position.set(0, -0.057, 0.107);
    this.head.add(mouth);
    this.mouth = mouth;
    // Cache the mouth's resting transform so the fear-reactive face routine
    // can drop the lower lip + scale up the mouth opening additively.
    this._mouthBase = {
      y: mouth.position.y, rotX: mouth.rotation.x, scaleY: 1, scaleX: 1,
    };

    // Optional glasses
    if (o.glasses === "round" || o.glasses === "square") {
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x1a1410, metalness: 0.5, roughness: 0.4,
      });
      const ringGeo = o.glasses === "round"
        ? new THREE.TorusGeometry(0.024, 0.003, 8, 18)
        : new THREE.TorusGeometry(0.024, 0.003, 4, 8);   // chunkier, square-ish
      for (const sx of [-1, 1]) {
        const ring = new THREE.Mesh(ringGeo, frameMat);
        ring.position.set(sx * 0.040, 0.005, 0.118);
        if (o.glasses === "square") ring.rotation.z = Math.PI / 4;
        this.head.add(ring);
      }
      // Bridge between the two
      const bridge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.002, 0.002, 0.030, 8),
        frameMat
      );
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.005, 0.118);
      this.head.add(bridge);
    }

    // Optional facial hair
    const facialMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(o.hairColor).multiplyScalar(0.85), roughness: 1.0,
    });
    if (o.facialHair === "stubble") {
      const stubble = new THREE.Mesh(
        new THREE.SphereGeometry(0.082, 18, 14, 0, Math.PI * 2, Math.PI * 0.55, Math.PI * 0.45),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color(o.hairColor).multiplyScalar(0.6),
          roughness: 1.0, transparent: true, opacity: 0.45,
        })
      );
      stubble.position.set(0, -0.03, 0.025);
      this.head.add(stubble);
    } else if (o.facialHair === "beard") {
      const beard = new THREE.Mesh(
        new THREE.SphereGeometry(0.090, 20, 16, 0, Math.PI * 2, Math.PI * 0.55, Math.PI * 0.45),
        facialMat
      );
      beard.position.set(0, -0.04, 0.02);
      this.head.add(beard);
    } else if (o.facialHair === "moustache") {
      const stash = new THREE.Mesh(
        new THREE.BoxGeometry(0.050, 0.008, 0.010),
        facialMat
      );
      stash.position.set(0, -0.040, 0.110);
      this.head.add(stash);
    }

    // ---------- Optional scarf ----------
    // A thin cloth strip around the neck that flutters when windExposure > 0.
    // Heights / driving / flying scenes can light it up; calm rooms keep it
    // still. Same colour as the shirt-fold so it looks like part of the outfit.
    const scarfMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(o.shirtColor).multiplyScalar(1.15),
      roughness: 1.0,
      side: THREE.DoubleSide,
    });
    this.scarf = new THREE.Group();
    this.scarf.position.set(0, o.neckY - 0.04, 0);
    this.group.add(this.scarf);
    // Wrap around the neck (a thin torus the same colour as the scarf)
    const scarfWrap = new THREE.Mesh(
      new THREE.TorusGeometry(0.085, 0.018, 8, 18),
      scarfMat
    );
    scarfWrap.rotation.x = Math.PI / 2;
    scarfWrap.scale.set(1, 0.7, 1);
    this.scarf.add(scarfWrap);
    // Tails of the scarf — long flat strips that flap. Two streamers so it
    // reads like a real wrapped scarf, one slightly shorter.
    const scarfTails = [];
    for (let i = 0; i < 2; i++) {
      const tail = new THREE.Mesh(
        new THREE.PlaneGeometry(0.05, 0.30 + i * 0.04, 1, 6),
        scarfMat
      );
      tail.position.set((i ? -0.03 : 0.03), -0.18 - i * 0.02, 0.04);
      tail.rotation.x = -0.10;
      this.scarf.add(tail);
      scarfTails.push(tail);
    }
    this.scarfTails = scarfTails;
    // Hide the scarf when wind exposure is zero (most indoor scenes)
    this.scarf.visible = o.windExposure > 0;

    // Wind / blink phase trackers
    this._windPhase = 0;
    this._blinkTimer = 1 + Math.random() * 4;
    this._blinkStrength = 0;
  }

  // Toggle camera mode — when switched to "tp" we make the head/face visible
  // so the user can SEE their character. In "fp" the head stays hidden so the
  // camera (which is at the eye position) doesn't render INSIDE a sphere.
  setCameraMode(mode) {
    this.cameraMode = mode;
    if (this.head) this.head.visible = (mode === "tp");
  }

  // Each frame: anchor the body to the player position (controls.position when
  // present, falling back to the camera position so the body still works for
  // legacy callers). Yaw copies the user's facing direction so the body turns
  // with the head. Walk-cycle, blink, hair / scarf flutter, and breath
  // animations all run here.
  update(t, walkPhase = 0, walkAmt = 0, controls = null, hands = null) {
    const cam = this.camera;
    const height = this.opts.headY;     // body height in body-space
    // Anchor: prefer controls.position (logical player) so the body doesn't
    // bob with the camera in TP mode. Fall back to camera position in FP mode
    // when no controls are passed in.
    let ax, ay, az;
    if (controls && controls.position) {
      ax = controls.position.x;
      ay = controls.position.y - height;
      az = controls.position.z;
    } else {
      ax = cam.position.x;
      ay = cam.position.y - height;
      az = cam.position.z;
    }
    this.group.position.set(ax, ay, az);
    // Yaw follows the camera's yaw so the body turns with the head.
    if (controls && typeof controls.yaw === "number") {
      this.group.rotation.y = controls.yaw;  // body faces same direction as the camera
    }
    // Subtle breath (always-on idle motion). Bigger amplitude when standing
    // still (idle), smaller when walking (overshadowed by step bob anyway).
    const idleFactor = 1 - (walkAmt || 0);
    const breath = Math.sin(t * 1.4) * (0.006 + idleFactor * 0.003);
    this.group.position.y += breath;
    // Visible chest breathing — chest scale rises with each inhale. The
    // rib-cage expansion is the strongest "alive person" cue you can give a
    // procedural body. We modulate scale.y (vertical rib lift) and a small
    // scale.x (lateral lung expansion).
    if (this.chest) {
      const breathPhase = Math.sin(t * 1.4);          // matches the y-bob
      this.chest.scale.y = 1.0 + breathPhase * 0.045 * (0.6 + idleFactor * 0.4);
      this.chest.scale.x = 1.4 + breathPhase * 0.025 * (0.6 + idleFactor * 0.4);
    }
    // Idle head turns — every 6-12 s the head naturally turns slightly to
    // either side as if scanning the environment. Only fires when not
    // walking (so it doesn't fight the camera direction). Adds the "alive"
    // signal to the body in third-person view.
    this._nextHeadTurnAt = this._nextHeadTurnAt || (t + 4 + Math.random() * 6);
    this._headTurnAmount = this._headTurnAmount || 0;
    this._headTurnTarget = this._headTurnTarget || 0;
    if (idleFactor > 0.7 && t > this._nextHeadTurnAt) {
      this._headTurnTarget = (Math.random() - 0.5) * 0.6;
      this._nextHeadTurnAt = t + 5 + Math.random() * 7;
      // Schedule a return to neutral after ~1.5 s
      setTimeout(() => { this._headTurnTarget = 0; }, 1500);
    }
    this._headTurnAmount += (this._headTurnTarget - this._headTurnAmount) * 0.04;
    if (this.head) {
      this.head.rotation.y = this._headTurnAmount;
      // Tiny pitch wobble for life
      this.head.rotation.x = Math.sin(t * 0.7) * 0.02;
    }

    // ---------- Natural walk cycle ----------
    // Real walking: leg swings forward (positive sin), then plants and pushes
    // back (negative sin). Foot lifts with a heel-toe roll. Body leans
    // forward slightly, hips counter-twist, shoulders bob. Arms swing
    // OPPOSITE to legs (right arm forward when left leg forward) — handled
    // in the arms block below.
    this.legs.forEach((leg) => {
      const side = leg.side;
      const phase = walkPhase + (side > 0 ? 0 : Math.PI);
      // Full sinusoidal swing: forward (+) and backward (-)
      const swing = Math.sin(phase) * 0.55 * walkAmt;
      leg.mesh.rotation.x = -swing;     // negative because rotating about hip
      leg.mesh.position.z = swing * 0.08;
    });
    this.feet.forEach((foot) => {
      const side = foot.side;
      const phase = walkPhase + (side > 0 ? 0 : Math.PI);
      const swing = Math.sin(phase);
      // Lift only when foot is forward (swing > 0)
      const lift = Math.max(0, swing) * 0.08 * walkAmt;
      foot.mesh.position.y = this.opts.ankleY + lift;
      foot.mesh.position.z = 0.06 + swing * 0.12 * walkAmt;
      // Heel-toe roll: foot rotates up at peak swing, down at plant
      foot.mesh.rotation.x = -swing * 0.35 * walkAmt;
    });
    // ---------- Posture (smoothed lerp toward targets set by the scene) ----------
    // The scene calls body.setPosture({ lean, crouch, armSpread, reach })
    // each frame to make the character respond to context: lean over a
    // railing, crouch to pet a dog, hold arms out for water balance.
    const ps = this._postureSm;
    const pt = this.posture;
    const lerpRate = Math.min(1, (1 / 60) * 4.5);    // ~4.5/s smoothing
    ps.lean       += (pt.lean       - ps.lean      ) * lerpRate;
    ps.crouch     += (pt.crouch     - ps.crouch    ) * lerpRate;
    ps.armSpread  += (pt.armSpread  - ps.armSpread ) * lerpRate;
    ps.reach      += (pt.reach      - ps.reach     ) * lerpRate;
    ps.reachHeight += (pt.reachHeight - ps.reachHeight) * lerpRate;

    // Subtle forward body lean while walking (~3°) PLUS posture lean. Capped
    // at ~17° so the chest doesn't visibly disconnect from the neck (we
    // don't have a true upper-body skeleton to keep them rigid). Head tilts
    // along with the chest so the silhouette reads as a real lean.
    const walkLean = walkAmt * 0.05;
    const postureLean = ps.lean * 0.30;            // capped — was 0.55
    const totalLean = walkLean + postureLean;
    if (this.chest) {
      this.chest.rotation.x = totalLean;
    }
    // Head tilts WITH the chest (about 60% as much, so the user can still
    // see forward when leaning over a railing).
    if (this.head && totalLean > 0.001) {
      this.head.rotation.x = totalLean * 0.6;
    } else if (this.head) {
      this.head.rotation.x = 0;
    }
    // Crouch — bend the legs forward and drop the chest + head by a few
    // centimetres for the crouched silhouette. Feet stay on the floor (we
    // never modify the group y) so the body never clips through the ground.
    // Chest + head positions are restored from cached baselines each frame
    // so the offset doesn't compound.
    if (this._chestBaseY === undefined && this.chest) this._chestBaseY = this.chest.position.y;
    if (this._headBaseY === undefined && this.head)   this._headBaseY  = this.head.position.y;
    const crouchDrop = ps.crouch * 0.10;
    if (this.chest && this._chestBaseY !== undefined) {
      this.chest.position.y = this._chestBaseY - crouchDrop;
    }
    if (this.head && this._headBaseY !== undefined) {
      this.head.position.y = this._headBaseY - crouchDrop;
    }
    if (ps.crouch > 0.01 && this.legs) {
      const kneeBend = ps.crouch * 0.45;
      this.legs.forEach(leg => {
        leg.mesh.rotation.x += kneeBend * 0.35;
      });
    }
    // Hip counter-twist: hips rotate slightly opposite to the upper body
    // each step. It's the hallmark of a real walk cycle. We rotate the
    // whole group by a tiny amount on top of the camera-driven yaw.
    if (this._hipTwist === undefined) this._hipTwist = 0;
    const hipTwistTarget = Math.sin(walkPhase) * 0.06 * walkAmt;
    this._hipTwist += (hipTwistTarget - this._hipTwist) * 0.25;
    // Footstep audio + visible dust puff each time a foot plants. The
    // dust is an invisible-by-default Points cloud we lazy-create the
    // first time a step fires; each puff is N points expanding from the
    // foot's world position with gravity-decay fade.
    if (walkAmt > 0.4) {
      if (this._lastStepBucket == null) this._lastStepBucket = -1;
      const stepBucket = Math.floor(walkPhase / Math.PI);
      if (stepBucket !== this._lastStepBucket) {
        if (this._lastStepBucket !== -1 && window.PhobiaAudio?.footstep) {
          try { window.PhobiaAudio.footstep(walkAmt, this.opts.surface); } catch {}
          // Spawn a small dust puff at whichever foot just planted.
          // The PLANTED foot is the one with the LOWEST current y (sin
          // crossing zero from above), but tracking that exactly is
          // expensive — instead we alternate based on stepBucket parity.
          this._spawnFootDust(stepBucket % 2 === 0 ? -1 : 1, walkAmt);
        }
        this._lastStepBucket = stepBucket;
      }
    }
    // Update active dust puffs (fade + spread). dt-based timing so the
    // particles look identical at any framerate.
    if (this._dustPuffs && this._dustPuffs.length > 0) {
      const dustDt = (this._lastBodyT == null)
        ? (1 / 60)
        : Math.max(0, Math.min(0.05, t - this._lastBodyT));
      const aliveDust = [];
      for (const puff of this._dustPuffs) {
        puff.life -= dustDt;
        if (puff.life <= 0) {
          if (puff.mesh.parent) puff.mesh.parent.remove(puff.mesh);
          puff.mesh.geometry.dispose();
          puff.mesh.material.dispose();
          continue;
        }
        // Spread + rise + fade
        const ageK = 1 - puff.life / puff.maxLife;
        const pos = puff.mesh.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          pos.array[i * 3]     += puff.velocities[i * 3]     * dustDt;
          pos.array[i * 3 + 1] += puff.velocities[i * 3 + 1] * dustDt;
          pos.array[i * 3 + 2] += puff.velocities[i * 3 + 2] * dustDt;
          // Slight gravity / settle
          puff.velocities[i * 3 + 1] -= 0.4 * dustDt;
        }
        pos.needsUpdate = true;
        puff.mesh.material.opacity = (1 - ageK) * 0.55;
        puff.mesh.material.size = puff.baseSize + ageK * 0.04;
        aliveDust.push(puff);
      }
      this._dustPuffs = aliveDust;
    }
    this._lastBodyT = t;
    // Arms — counter-swing while walking, OR rotate forward for hand gestures.
    // Now with a real elbow joint: each gesture also bends the forearm forward
    // so reaching feels like reaching, not like a stiff broom sweep.
    if (this.arms) {
      const gesture = hands && hands.gestureType ? hands.gestureType : "rest";
      const gestureStrength = hands?.gestureStrength || 0;
      // Each gesture maps to {shoulder, elbow} target rotations (right arm).
      // Shoulder pitches the upper arm forward (negative = up/forward).
      // Elbow bends the forearm forward off the upper arm (positive = forward).
      let rightShoulder = 0, rightElbow = 0;
      let leftShoulder = 0, leftElbow = 0;
      const pulse = hands?.actionPulse || 0;
      if (gesture === "pet") {
        rightShoulder = -1.0;
        rightElbow    = 0.7 + pulse * 0.3;
      } else if (gesture === "grab") {
        rightShoulder = -0.6; rightElbow = 0.55;
        leftShoulder  = -0.6; leftElbow  = 0.55;
      } else if (gesture === "paddle") {
        rightShoulder = -0.5; rightElbow = 0.45;
        leftShoulder  = -0.5; leftElbow  = 0.45;
      } else if (gesture === "touch") {
        rightShoulder = -0.7;
        rightElbow    = 0.5 + pulse * 0.4;
      } else if (gesture === "brush") {
        rightShoulder = -0.4 - 0.3 * pulse;
        rightElbow    = 0.5 + pulse * 0.3;
      }
      // Posture-driven arm targets — these COMBINE with gesture targets so a
      // scene can set both (e.g. dogs scene sets gesture="pet" + posture
      // crouch + reach). We pick whichever is stronger per axis.
      // - reach: both hands forward at chest height — railing grip / wading
      // - armSpread: arms held lateral, like a tightrope walker for balance
      const reachStrength = ps.reach;
      const spreadStrength = ps.armSpread;
      // reach: shoulder pitched forward (-rad), elbow slightly bent
      const reachShoulder = -1.2 + (1 - ps.reachHeight) * 0.35;   // chest height = -1.2
      const reachElbow    = 0.45 + reachStrength * 0.20;
      // armSpread: shoulder pitched LATERALLY (rotation.z, not x). Arms out.
      // Implemented below via z-rotation; we don't change shoulder.x for it.

      this.arms.forEach((arm) => {
        const side = arm.side;       // +1 right, -1 left
        // Right arm phase = LEFT leg phase, and vice versa, so the arm
        // swings OPPOSITE to the same-side leg (which is how humans walk).
        // Wider amplitude than the legs since arms swing more freely.
        const armPhase = walkPhase + (side > 0 ? Math.PI : 0);
        const swing = Math.sin(armPhase) * 0.65 * walkAmt;
        const shoulderTarget = side > 0 ? rightShoulder : leftShoulder;
        const elbowTarget    = side > 0 ? rightElbow    : leftElbow;
        // Layered priority: gesture > reach > walk swing.
        const gestureWeight = gestureStrength;
        const reachWeight   = (1 - gestureWeight) * reachStrength;
        const swingWeight   = (1 - gestureWeight) * (1 - reachStrength);
        arm.root.rotation.x =
            shoulderTarget * gestureWeight
          + reachShoulder  * reachWeight
          + swing          * swingWeight;
        // Lateral arm sway: armSpread puts arms wide (large z-rotation).
        // Otherwise small natural sway based on walk phase + side bias.
        const spreadZ = side * (0.95 * spreadStrength);
        const naturalZ = side * 0.08 + Math.sin(armPhase * 0.5) * 0.04 * walkAmt;
        arm.root.rotation.z = spreadZ + naturalZ * (1 - spreadStrength);
        // Elbow: gesture > reach > walk passive bend
        const passiveBend = 0.18 + Math.max(0, Math.sin(armPhase)) * 0.30 * walkAmt;
        arm.elbow.rotation.x =
            elbowTarget   * gestureWeight
          + reachElbow    * reachWeight
          + passiveBend   * swingWeight;
      });
    }
    // Shoulders bob with the walk
    if (this.shoulders) {
      const bob = Math.abs(Math.sin(walkPhase)) * 0.025 * walkAmt;
      this.shoulders.forEach(s => { s.mesh.position.y = this.opts.chestTopY - 0.06 + bob; });
    }

    // ---------- Skeletal-feeling rig additions ----------
    // The Body class doesn't use SkinnedMesh + Bones — it composes
    // independent meshes — but real human walking has four extra cues
    // beyond the leg-arm swing the keyframes already provide:
    //   1. Hip drop (Trendelenburg)  — the swing-side hip drops as the
    //      stance leg supports body weight; without this the pelvis looks
    //      stapled to the spine.
    //   2. Pelvis-shoulder counter-rotation — pelvis rotates one way while
    //      the shoulder line rotates the other (single biggest "real
    //      walking" cue you can give a procedural body).
    //   3. Lateral weight shift — body sways side-to-side as weight
    //      transfers between legs.
    //   4. Idle weight shift — when standing still, weight rocks slowly
    //      from one foot to the other every few seconds.
    // Each is additive on top of the existing walk cycle so it composes
    // with crouch, reach, lean, etc. We cache base positions/rotations on
    // first frame so the additions don't compound across frames.
    if (walkAmt > 0.02) {
      // ---- Walking gait additions ----
      const walkMag = Math.min(1, walkAmt);
      // Pelvis (chest+hip line) yaws +/- around the body's vertical axis
      // in sync with the leg swing. Shoulders counter-rotate.
      const pelvisYaw = Math.sin(walkPhase) * 0.10 * walkMag;
      const shoulderYaw = -pelvisYaw * 0.85;
      if (this.chest) this.chest.rotation.y = shoulderYaw;
      // Hip drop — sin(walkPhase) is +1 when right leg forward; the
      // *swing* leg is the forward one, so the hip on the swing side
      // drops by ~3 cm. Apply by tilting the chest's roll (z rotation).
      const hipRoll = Math.sin(walkPhase) * 0.05 * walkMag;
      if (this.chest) this.chest.rotation.z = hipRoll;
      // Lateral weight shift — body's whole-group x sways with each step
      // (positive when stance is right leg). Caps at ~2 cm.
      const lateralShift = Math.sin(walkPhase + Math.PI / 2) * 0.02 * walkMag;
      this.group.position.x += lateralShift;
      // Tiny vertical bob beyond the existing camera bob — the body
      // itself rises and falls with each step.
      const stepBob = Math.abs(Math.sin(walkPhase)) * 0.012 * walkMag;
      this.group.position.y += stepBob;
    } else if (this.chest) {
      // ---- Idle-stance additions ----
      // When standing still, weight slowly shifts from one foot to the
      // other every ~6-8 s. Hip drops on the *unweighted* side, body
      // sways laterally, and the head subtly turns to follow the shift.
      this._idleShiftPhase = (this._idleShiftPhase || 0) + (1 / 60) * 0.20;
      const idleAmt = Math.max(0, 1 - (walkAmt || 0));
      const slowShift = Math.sin(this._idleShiftPhase) * idleAmt;
      this.chest.rotation.z = slowShift * 0.04;       // lean left/right
      this.chest.rotation.y = 0;                       // no walk twist
      // Tiny lateral sway — barely perceptible
      this.group.position.x += slowShift * 0.012;
      // The "idle stance" head bob is already handled by the existing
      // breathing code; we don't duplicate it here.
    }

    // ---------- Wind flutter (hair + scarf) ----------
    // The phase increments at a rate proportional to wind exposure so a calm
    // room has nearly-still cloth and a windy ledge has obvious flap. Caller
    // can crank `body.opts.windExposure` mid-scene (e.g. heights amplifies it
    // when the user looks down or steps to the edge).
    const wind = Math.max(0, this.opts.windExposure || 0);
    this._windPhase += (wind > 0 ? 0.06 + wind * 0.10 : 0);
    if (this.scarf) {
      const visible = wind > 0.001;
      if (this.scarf.visible !== visible) this.scarf.visible = visible;
      if (visible && this.scarfTails) {
        const flap = wind;
        // Two tails out of phase so they look like real cloth, not a sign
        for (let i = 0; i < this.scarfTails.length; i++) {
          const tail = this.scarfTails[i];
          const phase = this._windPhase + i * 1.3;
          tail.rotation.x = -0.10 + Math.sin(phase * 1.4) * 0.30 * flap;
          tail.rotation.z = Math.sin(phase * 0.9 + 0.4) * 0.45 * flap;
          tail.position.x = (i ? -0.03 : 0.03) + Math.sin(phase * 0.7) * 0.04 * flap;
        }
      }
    }
    if (this.hairFlutter && wind > 0.001) {
      // Long hair / pony tail / curls react to gusts. Flutter is a damped
      // rotation around the head's hinge.
      const phase = this._windPhase * 0.9;
      this.hairFlutter.rotation.x = Math.sin(phase * 1.6) * 0.15 * wind;
      this.hairFlutter.rotation.z = Math.sin(phase + 0.6) * 0.12 * wind;
    }

    // ---------- Blinking ----------
    // Real humans blink ~10x/min. Animates the eyelid scale.y from 0.05 (open)
    // to 1.0 (closed) over ~140 ms. Only meaningful when head is visible
    // (third-person mode), but the timer still ticks so the blink rhythm is
    // continuous when the user toggles between modes.
    if (this.eyes && this.eyes.length === 2) {
      this._blinkTimer -= 1 / 60;
      if (this._blinkTimer < 0) {
        this._blinkStrength = 1.0;
        this._blinkTimer = 4 + Math.random() * 4;
      }
      this._blinkStrength = Math.max(0, this._blinkStrength - 0.10);
      const lidY = 0.05 + this._blinkStrength * 0.95;
      for (const e of this.eyes) {
        if (e.lid) e.lid.scale.y = lidY;
      }
    }

    // ---------- Reactive face — drives expression off PhobiaFear.suds ----------
    // Fear (0..100) translates to micro-expression on the user's avatar so
    // their character visibly *feels* what they feel: eyes widen, brows
    // arch up at the inside (the universal "alarm" cue), mouth parts.
    // Only meaningful when head is visible (third-person) but the maths
    // is cheap so we always run it — the renderer ignores hidden nodes.
    let fearLevel = 0;
    if (window.PhobiaFear && typeof window.PhobiaFear.suds === "number") {
      fearLevel = Math.max(0, Math.min(1, window.PhobiaFear.suds / 100));
    }
    // Damp the visible reaction so frame-to-frame fear flicker doesn't
    // jitter the face — humans don't change expression every 16 ms.
    if (this._fearVisual === undefined) this._fearVisual = 0;
    this._fearVisual += (fearLevel - this._fearVisual) * Math.min(1, (1 / 60) * 2.2);
    const fv = this._fearVisual;

    // Eyes — widen by *lowering* the lid baseline so the visible sclera
    // is taller than usual. Compose with the existing blink so blinks
    // still fully close the eye even when widened.
    if (this.eyes && this.eyes.length === 2 && fv > 0.02) {
      const widenAmt = fv * 0.04;        // up to 4 cm of extra opening at SUDS 100
      const browLift = fv * 0.012;
      const browArchInside = fv * 0.55;  // inside edge of the brow tilts UP
      for (const e of this.eyes) {
        if (e.lid) {
          // Subtract from current lid scale only when not blinking — use the
          // base 0.05 plus blink contribution we already wrote, then shave
          // a touch more so the eye reads as wider.
          e.lid.scale.y = Math.max(0.02, e.lid.scale.y - widenAmt * 0.5);
        }
        if (e.brow && typeof e.browBaseRotZ === "number") {
          // Inside-edge raise: tilt brow rotation.z so its inner end goes up.
          // For the left eye (side=-1), we rotate +z to raise the inside.
          // For the right eye (side=+1), we rotate -z. browBaseRotZ already
          // tilts outward; add a fear-driven inside-up component.
          e.brow.rotation.z = e.browBaseRotZ + e.side * browArchInside;
          if (typeof e.browBaseY === "number") {
            e.brow.position.y = e.browBaseY + browLift;
          }
        }
      }
    }
    // Mouth — drops at the corners (fear face) and opens slightly. Composed
    // additively from the cached rest pose so it returns when fear drops.
    if (this.mouth && this._mouthBase) {
      const drop = fv * 0.012;
      const open = fv * 0.6;
      this.mouth.position.y = this._mouthBase.y - drop;
      this.mouth.rotation.x = this._mouthBase.rotX - fv * 0.18;
      this.mouth.scale.y = this._mouthBase.scaleY * (1 + open);
      this.mouth.scale.x = this._mouthBase.scaleX * (1 + fv * 0.10);
    }
    // Subtle head pull-back when fear is high (real freeze-response cue —
    // the head retreats from the threat by a couple of cm). Composed on
    // top of the existing crouch / head-turn drivers.
    if (this.head && fv > 0.05) {
      this.head.rotation.x -= fv * 0.05;     // chin tucks slightly up
    }
  }

  // Spawn a small dust puff at the planted foot. Surface determines the
  // particle colour (concrete = grey, wood = brown, grass = green tint,
  // splash = blue ripple) so each step matches the floor it lands on.
  _spawnFootDust(side, walkAmt) {
    if (!this.scene) return;
    // Skip on slow walks (subtle steps don't kick up dust)
    if (walkAmt < 0.5) return;
    // Foot world position — we approximate by reading the body group
    // position + the foot mesh's local position (after the walk-cycle has
    // updated it).
    const foot = this.feet && this.feet.find(f => f.side === side);
    if (!foot) return;
    const wp = new THREE.Vector3();
    foot.mesh.getWorldPosition(wp);
    // Surface palette
    const surface = this.opts.surface || "hard";
    let colour, baseSize, isWater = false;
    switch (surface) {
      case "wood":   colour = 0x8a6a3e; baseSize = 0.022; break;
      case "soft":   colour = 0xb7a78a; baseSize = 0.020; break;
      case "grass":  colour = 0x6a8a4a; baseSize = 0.025; break;
      case "splash": colour = 0xaccfe6; baseSize = 0.035; isWater = true; break;
      case "hard":
      default:       colour = 0xb0b4b8; baseSize = 0.022; break;
    }
    const N = isWater ? 8 : 6;
    const positions = new Float32Array(N * 3);
    const velocities = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      // Start at the foot, scattered in a small disc
      positions[i * 3]     = wp.x + (Math.random() - 0.5) * 0.05;
      positions[i * 3 + 1] = wp.y + 0.005 + Math.random() * 0.01;
      positions[i * 3 + 2] = wp.z + (Math.random() - 0.5) * 0.05;
      // Velocity radiating outward + slight upward
      const a = Math.random() * Math.PI * 2;
      const speed = 0.3 + Math.random() * 0.4;
      velocities[i * 3]     = Math.cos(a) * speed;
      velocities[i * 3 + 1] = (isWater ? 0.5 : 0.2) + Math.random() * 0.2;
      velocities[i * 3 + 2] = Math.sin(a) * speed;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: colour, size: baseSize,
      transparent: true, opacity: 0.55, depthWrite: false,
      sizeAttenuation: true,
    });
    const points = new THREE.Points(geo, mat);
    this.scene.add(points);
    if (!this._dustPuffs) this._dustPuffs = [];
    this._dustPuffs.push({
      mesh: points, velocities, life: 0.8, maxLife: 0.8, baseSize,
    });
  }

  // Adjust runtime wind exposure (scenes can ramp it dynamically e.g. heights
  // amplifies the flutter when the user is at the edge / looking down).
  setWindExposure(amount) {
    this.opts.windExposure = Math.max(0, Math.min(1.4, amount || 0));
    if (this.scarf) this.scarf.visible = this.opts.windExposure > 0.001;
  }
  // Set posture targets — the body smoothly lerps toward these in update().
  // Pass any subset of { lean, crouch, armSpread, reach, reachHeight }.
  // Each is 0..1 (clamped). reach makes the hands extend forward; reachHeight
  // 0 = at hip, 0.5 = waist, 1 = chest level for the reach gesture.
  setPosture(opts) {
    if (!opts) return;
    const p = this.posture;
    if (opts.lean       != null) p.lean       = Math.max(0, Math.min(1, opts.lean));
    if (opts.crouch     != null) p.crouch     = Math.max(0, Math.min(1, opts.crouch));
    if (opts.armSpread  != null) p.armSpread  = Math.max(0, Math.min(1, opts.armSpread));
    if (opts.reach      != null) p.reach      = Math.max(0, Math.min(1, opts.reach));
    if (opts.reachHeight != null) p.reachHeight = Math.max(0, Math.min(1, opts.reachHeight));
  }

  dispose() {
    // Clean up any in-flight footstep dust particles (added directly to
    // the scene, not the body group, so they wouldn't be caught by the
    // group traversal below).
    if (this._dustPuffs) {
      this._dustPuffs.forEach(puff => {
        if (puff.mesh && puff.mesh.parent) puff.mesh.parent.remove(puff.mesh);
        if (puff.mesh && puff.mesh.geometry) puff.mesh.geometry.dispose();
        if (puff.mesh && puff.mesh.material) puff.mesh.material.dispose();
      });
      this._dustPuffs = null;
    }
    if (this.group.parent) this.group.parent.remove(this.group);
    this.group.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach(m => m.dispose());
      }
    });
  }
}

// =============================================================================
// ---------- TherapistNPC ----------
// =============================================================================
//
// A procedural therapist character that stands in the safe zone of approach
// scenes and acts as the user's emotional anchor. She is fully animated:
//   - constant gentle breathing (chest scale + body sway)
//   - eyes blink, head subtly tracks the player (turns toward them when they
//     are near, returns to neutral when they go far)
//   - idle gestures cycle every 8-15 s: hand to chest (warmth), palm out
//     (calming), gentle nod, hands clasped in front (active listening)
//   - SPEAKING animation: mouth opens/closes in sync with PhobiaVoice events,
//     head turns directly to the player, the gesture freezes briefly so she
//     looks like she's making eye contact while talking.
// She replaces the disembodied "voice from nowhere" with a real character
// the user can SEE coaching them — the single biggest UX upgrade for an
// exposure therapy tool. Visible in both first-person (you walk past her)
// and third-person (she's in frame next to you).
//
class TherapistNPC {
  constructor(scene, camera, opts = {}) {
    this.scene = scene;
    this.camera = camera;
    this.opts = Object.assign({
      position: new THREE.Vector3(0, 0, 4),
      facing: 0,                     // initial yaw (radians)
      // Older, kindly appearance — distinct from the player. Soft beige
      // sweater, silver-streaked hair, warm skin tone, friendly green eyes.
      skinColor:  0xeac0a0,
      hairColor:  0x8a8a92,          // grey/silver — visually distinct from player
      shirtColor: 0xc6a07a,          // warm beige sweater
      pantsColor: 0x3a4456,
      shoeColor:  0x282830,
      eyeColor:   0x305838,
      // Greeting line — said on first sight of the player approaching
      greetingLine: "Hello. I'm here. Take your time.",
    }, opts);
    this.group = new THREE.Group();
    this.group.position.copy(this.opts.position);
    this.group.rotation.y = this.opts.facing;
    this.gestureT = 0;
    this.gestureName = "rest";
    this.nextGestureAt = 4 + Math.random() * 4;
    this.speaking = 0;             // seconds of remaining speech animation
    this.lookTarget = null;
    this.headYaw = 0;
    this.headPitch = 0;
    this.handTarget = { left: { sh: 0, el: 0.1 }, right: { sh: 0, el: 0.1 } };
    this._blinkTimer = 1 + Math.random() * 4;
    this._blinkStrength = 0;
    this._build();
    scene.add(this.group);
  }

  _build() {
    const o = this.opts;
    const emissive = (hex, amt = 0.15) => new THREE.Color(hex).multiplyScalar(amt);
    const skin = new THREE.MeshStandardMaterial({
      color: o.skinColor, roughness: 0.78, emissive: emissive(o.skinColor, 0.10),
    });
    const shirt = new THREE.MeshStandardMaterial({
      color: o.shirtColor, roughness: 0.95, emissive: emissive(o.shirtColor, 0.06),
    });
    const pants = new THREE.MeshStandardMaterial({
      color: o.pantsColor, roughness: 0.95,
    });
    const shoes = new THREE.MeshStandardMaterial({
      color: o.shoeColor, roughness: 0.6, metalness: 0.05,
    });
    const hairMat = new THREE.MeshStandardMaterial({
      color: o.hairColor, roughness: 1.0,
      emissive: new THREE.Color(o.hairColor).multiplyScalar(0.04),
    });

    // Soft contact-shadow disc on the ground
    const shadow = new THREE.Mesh(
      new THREE.CircleGeometry(0.45, 28),
      new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.32, depthWrite: false,
      })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.set(0, 0.005, 0);
    shadow.renderOrder = -1;
    this.group.add(shadow);

    // ---- Body ----
    // Chest — capsule, slightly oblong, with sweater material
    const chestH = 0.36;
    const chest = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.18, chestH, 8, 14), shirt
    );
    chest.scale.set(1.35, 1.0, 0.65);
    chest.position.set(0, 1.10, 0);
    chest.castShadow = true;
    this.group.add(chest);
    this.chest = chest;
    // Hips
    const hips = new THREE.Mesh(
      new THREE.BoxGeometry(0.40, 0.10, 0.26), pants
    );
    hips.position.set(0, 0.87, 0);
    hips.castShadow = true;
    this.group.add(hips);
    // Legs (stationary, slight stance angle)
    for (const sx of [-1, 1]) {
      const leg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.085, 0.07, 0.78, 14), pants
      );
      leg.position.set(sx * 0.10, 0.45, 0);
      leg.rotation.z = sx * 0.02;     // slight A-stance
      leg.castShadow = true;
      this.group.add(leg);
    }
    // Feet
    for (const sx of [-1, 1]) {
      const foot = new THREE.Mesh(
        new THREE.BoxGeometry(0.13, 0.05, 0.24), shoes
      );
      foot.position.set(sx * 0.10, 0.025, 0.05);
      foot.castShadow = true;
      this.group.add(foot);
    }
    // Neck
    const neck = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.075, 0.10, 14), skin
    );
    neck.position.set(0, 1.36, 0);
    this.group.add(neck);
    // Shoulders
    for (const sx of [-1, 1]) {
      const shoulder = new THREE.Mesh(
        new THREE.SphereGeometry(0.10, 14, 12), shirt
      );
      shoulder.position.set(sx * 0.22, 1.30, 0);
      shoulder.castShadow = true;
      this.group.add(shoulder);
    }

    // ---- Articulated arms (shoulder + elbow groups) for gestures ----
    this.arms = [];
    const upperLen = 0.27, foreLen = 0.25;
    for (const sx of [-1, 1]) {
      const armRoot = new THREE.Group();
      armRoot.position.set(sx * 0.25, 1.27, 0);
      this.group.add(armRoot);
      const upper = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.07, upperLen, 8, 12), shirt
      );
      upper.position.set(0, -upperLen / 2, 0);
      upper.castShadow = true;
      armRoot.add(upper);
      const elbow = new THREE.Group();
      elbow.position.set(0, -upperLen - 0.02, 0);
      armRoot.add(elbow);
      const fore = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.055, foreLen, 8, 12), skin
      );
      fore.position.set(0, -foreLen / 2, 0);
      fore.castShadow = true;
      elbow.add(fore);
      // Hand
      const hand = new THREE.Mesh(
        new THREE.SphereGeometry(0.055, 12, 10), skin
      );
      hand.scale.set(1.0, 1.4, 0.6);
      hand.position.set(0, -foreLen - 0.04, 0);
      elbow.add(hand);
      this.arms.push({ root: armRoot, elbow, side: sx, upper, fore, hand });
    }

    // ---- Head + face ----
    this.head = new THREE.Group();
    this.head.position.set(0, 1.49, 0);
    this.group.add(this.head);
    // Skull
    const skull = new THREE.Mesh(
      new THREE.SphereGeometry(0.115, 28, 22), skin
    );
    skull.scale.set(1.0, 1.10, 0.95);
    skull.castShadow = true;
    this.head.add(skull);
    // Hair — short cap with hint of body
    const hairCap = new THREE.Mesh(
      new THREE.SphereGeometry(0.123, 24, 18, 0, Math.PI * 2, 0, Math.PI / 2.0),
      hairMat
    );
    hairCap.position.set(0, 0.020, 0);
    this.head.add(hairCap);
    // Hair "tucked behind ear" tufts
    for (const sx of [-1, 1]) {
      const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), hairMat);
      tuft.scale.set(0.7, 1.4, 0.6);
      tuft.position.set(sx * 0.108, -0.005, -0.02);
      this.head.add(tuft);
    }

    // Eyes (sclera, iris, pupil, catchlight, eyelid)
    const eyeWhiteMat = new THREE.MeshStandardMaterial({
      color: 0xfdf3e6, roughness: 0.20, emissive: 0x161210, emissiveIntensity: 0.05,
    });
    const irisMat = new THREE.MeshStandardMaterial({
      color: o.eyeColor, roughness: 0.18, metalness: 0.12,
      emissive: new THREE.Color(o.eyeColor).multiplyScalar(0.30),
    });
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x05030a });
    const lidMat = new THREE.MeshStandardMaterial({ color: o.skinColor, roughness: 0.9 });
