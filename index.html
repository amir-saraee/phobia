// ---------- Routing ----------
// Hash-based router. Each view has a stable URL — refresh keeps you on the
// same page, browser back/forward works, and you can deep-link friends to a
// specific phobia ladder or your insights page.
const root = document.getElementById("app");
let _suppressHashSync = false;

function serializeRoute(view, params = {}) {
  switch (view) {
    case "welcome":   return "/";
    case "select":    return "/fears";
    case "insights":  return "/insights";
    case "profiles":  return "/profiles";
    case "character": return params.editing ? "/me/edit" : "/me";
    case "custom":    return "/custom" + (params.editing ? "/" + encodeURIComponent(params.editing) : "");
    case "ladder":    return "/" + encodeURIComponent(params.phobia || "");
    case "phobia-progress": return "/" + encodeURIComponent(params.phobia) + "/progress";
    case "predict":   return "/" + encodeURIComponent(params.phobia) + "/predict/" + (params.level ?? 0);
    case "exposure":  return "/" + encodeURIComponent(params.phobia) + "/exposure/" + (params.level ?? 0);
    case "rate":      return "/" + encodeURIComponent(params.phobia) + "/rate/" + (params.level ?? 0);
    case "breathe":   return "/" + encodeURIComponent(params.phobia) + "/breathe/" + (params.level ?? 0);
    case "complete":  return "/" + encodeURIComponent(params.phobia) + "/done/" + (params.level ?? 0);
    default:          return "/";
  }
}

function parseRoute(hash) {
  const path = (hash || "").replace(/^#/, "");
  const parts = path.replace(/^\//, "").split("/").filter(Boolean).map(decodeURIComponent);
  if (parts.length === 0) return { view: "welcome", params: {} };
  switch (parts[0]) {
    case "fears":    return { view: "select",    params: {} };
    case "insights": return { view: "insights",  params: {} };
    case "profiles": return { view: "profiles",  params: {} };
    case "me":       return { view: "character", params: { editing: parts[1] === "edit" } };
    case "custom":   return { view: "custom",    params: { editing: parts[1] || null } };
  }
  // Phobia-scoped routes (built-in or custom)
  const phobia = parts[0];
  if (PHOBIAS[phobia]) {
    const lvl = parts[2] != null ? parseInt(parts[2], 10) : 0;
    if (parts[1] === "progress") return { view: "phobia-progress", params: { phobia } };
    if (parts[1] === "predict")  return { view: "predict",  params: { phobia, level: lvl } };
    if (parts[1] === "exposure") return { view: "exposure", params: { phobia, level: lvl } };
    if (parts[1] === "rate")     return { view: "rate",     params: { phobia, level: lvl } };
    if (parts[1] === "breathe")  return { view: "breathe",  params: { phobia, level: lvl } };
    if (parts[1] === "done")     return { view: "complete", params: { phobia, level: lvl } };
    return { view: "ladder", params: { phobia } };
  }
  return { view: "welcome", params: {} };
}

// We control scroll behaviour explicitly: every navigation (in-app click,
// hash change, initial load) starts the new page at top. The browser's
// "scroll restoration" feature would interfere — turn it off so it doesn't
// fight with our scrollToTop().
if ("scrollRestoration" in history) {
  try { history.scrollRestoration = "manual"; } catch {}
}

function go(view, params) {
  params = params || {};
  const hash = "#" + serializeRoute(view, params);
  if (location.hash !== hash) {
    _suppressHashSync = true;
    history.pushState({ view, params }, "", hash);
    _suppressHashSync = false;
  }
  render(view, params);
  // SPA navigation should always start the new page at the top — otherwise
  // the previous page's scroll position bleeds into the next view (e.g. you
  // scroll halfway down the home grid, click a phobia, and land mid-ladder
  // unable to see its title). `instant` skips smooth-scroll so users don't
  // see a fly-by.
  scrollToTop();
}

// popstate (Back / Forward) is handled separately so we DO restore the prior
// scroll position when the user uses browser navigation. Hashchange + a click
// on an in-app button always go to the top.
function scrollToTop() {
  try {
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
  } catch {
    window.scrollTo(0, 0);
  }
  // Some mobile browsers track scroll on document.documentElement / body
  // differently; reset both to be safe.
  if (document.documentElement) document.documentElement.scrollTop = 0;
  if (document.body) document.body.scrollTop = 0;
}

window.addEventListener("hashchange", () => {
  if (_suppressHashSync) return;
  const route = parseRoute(location.hash);
  render(route.view, route.params);
  scrollToTop();
});
window.addEventListener("popstate", () => {
  const route = parseRoute(location.hash);
  render(route.view, route.params);
  // Don't force scroll on popstate — let the browser restore the prior
  // scroll position so Back / Forward feels natural.
});

function render(view, params) {
  // Tear down any active 3D scene + audio + voice before swapping the DOM
  if (window.Scene3D && typeof window.Scene3D.unmount === "function") {
    window.Scene3D.unmount();
  }
  if (window.PhobiaVoice) window.PhobiaVoice.stop();
  const muted = window.PhobiaAudio && window.PhobiaAudio.isMuted();
  const menuBtn = `<button class="audio-btn" id="menuBtn" title="Menu" aria-label="Open menu">☰</button>`;
  const audioBtn = `<button class="audio-btn" id="audioBtn" title="Toggle sound" aria-label="Toggle sound">${muted ? "🔇" : "🔊"}</button>`;
  const insightsBtn = (state.log && state.log.length > 0)
    ? `<button class="audio-btn" id="insightsBtn" title="Your progress" aria-label="Your progress" data-action="open-insights">📊</button>` : "";
  const settingsBtn = `<button class="audio-btn" id="settingsBtn" title="Settings" aria-label="Open settings">⚙</button>`;
  // Character avatar in header (when one exists). The badge opens the profile
  // picker if the user has more than one character, otherwise the editor.
  const character = window.Character && window.Character.loadCharacter();
  const allChars = window.Character ? window.Character.loadCharacters() : [];
  const streak = computeStreak();
  const charBadge = character ? `
    <button class="char-badge" id="charBadge" title="${allChars.length > 1 ? "Switch character" : "Edit character"}">
      <span class="char-badge-avatar">${window.Character.avatarSVG(character, 28)}</span>
      ${character.name ? `<span class="char-badge-name">${character.name}</span>` : ""}
      ${allChars.length > 1 ? `<span class="char-badge-count">${allChars.length}</span>` : ""}
      ${streak >= 2 ? `<span class="char-badge-streak" title="${streak}-day streak">🔥 ${streak}</span>` : ""}
    </button>` : "";
  const html = `
    <a class="skip-link" href="#view">Skip to main content</a>
    <header class="brand" role="banner">
      <div class="brand-left">
        ${menuBtn}
        <h1><span class="dot"></span> Mira</h1>
      </div>
      <nav class="nav-actions" aria-label="App navigation">
        ${getCourage() > 0 ? `<span class="courage-badge" id="courageBadge" title="Your courage points — earned by completing steps">⚡ ${getCourage()}</span>` : ""}
        ${charBadge}
        ${insightsBtn}
        ${audioBtn}
        ${settingsBtn}
        ${view !== "welcome" && view !== "character" ? `<button class="home-btn" id="home" aria-label="Back to phobia list">Home</button>` : ""}
      </nav>
    </header>
    <main id="view" role="main"></main>
  `;
  root.innerHTML = html;
  const v = document.getElementById("view");
  // Set focus to main content for screen readers when navigating
  if (v && v.setAttribute) { v.setAttribute("tabindex", "-1"); }
  if (view === "welcome")     v.innerHTML = viewWelcome();
  if (view === "character")   v.innerHTML = viewCharacterPage(params.editing);
  if (view === "select")      v.innerHTML = viewSelect();
  if (view === "ladder")      v.innerHTML = viewLadder(params.phobia);
  if (view === "predict")     v.innerHTML = viewPredict(params.phobia, params.level);
  if (view === "exposure")    v.innerHTML = viewExposure(params.phobia, params.level);
  if (view === "rate")        v.innerHTML = viewRate(params.phobia, params.level);
  if (view === "breathe")     v.innerHTML = viewBreathe(params.phobia, params.level);
  if (view === "complete") {
    // suds/predicted may not be on params (e.g. on URL refresh) — pull them
    // from the most recent matching log entry instead so the page reads right.
    let suds = params.suds, predicted = params.predicted;
    if (suds == null && state.log) {
      const recent = [...state.log].reverse().find(l => l.phobia === params.phobia && l.level === params.level);
      if (recent) { suds = recent.suds; predicted = recent.predicted; }
    }
    v.innerHTML = viewComplete(params.phobia, params.level, suds, predicted);
  }
  if (view === "insights")    v.innerHTML = viewInsights();
  if (view === "profiles")    v.innerHTML = viewProfiles();
  if (view === "custom")      v.innerHTML = viewCustom(params.editing);
  if (view === "phobia-progress") v.innerHTML = viewPhobiaProgress(params.phobia);

  // Background ambient pad — runs on non-exposure views when music is enabled
  ensureAmbient(view);

  attachHandlers(view, params);
  if (view === "character") attachCharacterHandlers(params.editing);
  if (view === "custom")    attachCustomHandlers(params.editing);
  if (view === "exposure")  mountExposure(params.phobia, params.level);
  if (view === "breathe")   runBreathing();

  // ---- View entrance animation ----
  // Trigger the fade-up animation by toggling the .view-enter class. Strip
  // it after the animation finishes so future re-renders can re-trigger it.
  // Skipped for the exposure scene because the canvas already does its own
  // smooth scene-ready fade — stacking animations looks janky.
  if (v && view !== "exposure") {
    v.classList.remove("view-enter");
    // Force a reflow so removing+adding the class re-runs the animation
    void v.offsetWidth;
    v.classList.add("view-enter");
    setTimeout(() => v && v.classList.remove("view-enter"), 500);
  }
}

function viewCharacterPage(editing) {
  if (!window.Character) return `<div class="panel"><p>Loading…</p></div>`;
  const existing = editing ? window.Character.loadCharacter() : null;
  return `
    <div class="panel">
      ${window.Character.viewCharacterCreator(existing, PHOBIAS)}
    </div>
  `;
}

function attachCharacterHandlers(editing) {
  if (!window.Character) return;
  const existing = editing ? window.Character.loadCharacter() : null;
  window.Character.attachCreatorHandlers(
    existing, PHOBIAS,
    (savedChar) => {
      // After saving, take them straight to the ladder for their primary phobia
      go("ladder", { phobia: savedChar.primaryPhobia });
    },
    () => { go(existing ? "select" : "welcome"); }
  );
}

function attachHandlers(view, params) {
  const home = document.getElementById("home");
  if (home) home.onclick = () => { PhobiaAudio.unlock(); go("select"); };
  const audioBtn = document.getElementById("audioBtn");
  if (audioBtn) {
    audioBtn.onclick = () => {
      PhobiaAudio.unlock();
      const next = !PhobiaAudio.isMuted();
      PhobiaAudio.setMuted(next);
      audioBtn.textContent = next ? "🔇" : "🔊";
    };
  }
  const settingsBtn = document.getElementById("settingsBtn");
  if (settingsBtn) settingsBtn.onclick = openSettings;
  const menuBtn = document.getElementById("menuBtn");
  if (menuBtn) menuBtn.onclick = openMenu;
  const howBtn = document.getElementById("howItWorksBtn");
  if (howBtn) howBtn.onclick = () => {
    const panel = document.getElementById("howItWorksPanel");
    if (panel) panel.scrollIntoView({ behavior: "smooth", block: "start" });
  };
  const charBadge = document.getElementById("charBadge");
  if (charBadge) charBadge.onclick = () => {
    const all = window.Character ? window.Character.loadCharacters() : [];
    if (all.length > 1) go("profiles");
    else go("character", { editing: true });
  };
  // Share progress card (on the insights view)
  const shareBtn = document.getElementById("shareCardBtn");
  if (shareBtn) shareBtn.onclick = () => generateProgressCard();

  // Session journal save (on the complete view)
  const saveJournal = document.getElementById("saveJournal");
  if (saveJournal) saveJournal.onclick = () => {
    const note = (document.getElementById("journalNote")?.value || "").trim();
    if (!note) return;
    // Attach the note to the most recent log entry for this phobia
    const last = state.log[state.log.length - 1];
    if (last) {
      last.note = note.slice(0, 500);
      saveState();
      const ind = document.getElementById("journalSaved");
      if (ind) {
        ind.style.opacity = "1";
        setTimeout(() => { ind.style.opacity = "0"; }, 1800);
      }
    }
  };
  // delegated on click for any [data-action]
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", (e) => {
      // Stop propagation if marked, so inner buttons don't trigger the parent card
      if (el.dataset.stop) e.stopPropagation();
      // First-click audio unlock per browser autoplay policy
      PhobiaAudio.unlock();
      handleAction(el.dataset, params);
    });
  });
}

// ---------- Ambient pad (background music on non-exposure views) ----------
function ensureAmbient(view) {
  const wantMusic = (() => { try { return localStorage.getItem("fobia.music") === "1"; } catch { return false; } })();
  // Music is allowed everywhere now — including exposure — at a low gain so the
  // scene's diegetic audio (wind, traffic, dog, etc.) still leads. The user can
  // disable from Settings if they prefer scene-only sound.
  if (!wantMusic) {
    if (ambientPad) { try { ambientPad.stop(); } catch {} ambientPad = null; }
    return;
  }
  if (!ambientPad) {
    PhobiaAudio.unlock();
    ambientPad = PhobiaAudio.startAmbientPad();
  }
  // Duck the pad during exposure so it doesn't compete with diegetic sound.
  // The natural pad level is ~0.045; in exposure we drop to ~0.018 so the
  // scene's wind/traffic/dog audio still leads the mix.
  try {
    if (ambientPad.setGain) ambientPad.setGain(view === "exposure" ? 0.018 : 0.045);
  } catch {}
}

    let perm = Notification.permission;

    if (perm === "granted") {
      try { localStorage.setItem("fobia.reminders", "1"); } catch {}
      remindersBtn.classList.add("on");
      try {
        new Notification("Step Up", {
          body: "Reminders are on. We'll nudge you once a day.",
          icon: "icon.svg",
        });
      } catch {}
      scheduleReminders();
    } else {
      // Permission denied — show a tiny inline note
      const note = document.createElement("div");
      note.className = "settings-note";
      note.textContent = "Browser blocked notifications. Enable in your browser settings.";
      remindersBtn.parentElement.appendChild(note);
      setTimeout(() => note.remove(), 3000);
    }
  };
  // Profile picker shortcut
  drawer.querySelector("#profilesBtn").onclick = () => {
    close();
    go("profiles");
  };
  // Export your data
  drawer.querySelector("#exportBtn").onclick = () => exportData();
  drawer.querySelector("#importBtn").onclick = () => importData();
  drawer.querySelector("#customBtn").onclick = () => { close(); go("custom"); };
  drawer.querySelector("#replayTourBtn").onclick = (e) => {
    try { localStorage.removeItem("fobia.tutorialSeen"); } catch {}
    const note = document.createElement("div");
    note.className = "settings-note";
    note.textContent = "Saved — you'll see the tour at your next rung.";
    e.currentTarget.parentElement.appendChild(note);
    setTimeout(() => note.remove(), 2200);
  };
  const langSel = drawer.querySelector("#langSelect");
  if (langSel) langSel.onchange = () => {
    if (window.I18n) window.I18n.setLang(langSel.value);
    // Re-render the current view so translated strings appear
    const route = parseRoute(location.hash);
    render(route.view, route.params);
  };
}
function closeSettings() {
  const drawer = document.querySelector(".settings-drawer");
  const backdrop = document.querySelector(".settings-backdrop");
  if (drawer) {
    drawer.classList.remove("open");
    setTimeout(() => drawer.remove(), 300);
  }
  if (backdrop) {
    backdrop.classList.remove("show");
    setTimeout(() => backdrop.remove(), 300);
  }
}

function handleAction(d, params) {
  switch (d.action) {
    case "begin":           {
      // First-time visitors go through the character creator; returners go to select.
      const existing = window.Character && window.Character.loadCharacter();
      go(existing ? "select" : "character", existing ? {} : { editing: false });
      break;
    }
    case "select-phobia":   go("ladder", { phobia: d.phobia }); break;
    case "start-level":     go("predict", { phobia: d.phobia, level: parseInt(d.level, 10) }); break;
    case "confirm-predict": {
      const lvl = parseInt(d.level, 10);
      const slider = document.getElementById("predictedSuds");
      const predicted = slider ? parseInt(slider.value, 10) : null;
      pendingPrediction = { phobia: d.phobia, level: lvl, predicted, ts: Date.now() };
      go("exposure", { phobia: d.phobia, level: lvl });
      break;
    }
    case "to-rate":         go("rate", { phobia: d.phobia, level: parseInt(d.level, 10) }); break;
    case "submit-rate":     handleRateSubmit(d, params); break;
    case "do-breathe":      go("breathe", { phobia: d.phobia, level: parseInt(d.level, 10) }); break;
    case "after-breathe":   go("rate", { phobia: d.phobia, level: parseInt(d.level, 10) }); break;
    case "next-level":      go("exposure", { phobia: d.phobia, level: parseInt(d.level, 10) }); break;
    case "back-ladder":     go("ladder", { phobia: d.phobia }); break;
    case "open-insights":   go("insights"); break;
    case "open-profiles":   go("profiles"); break;
    case "select-character": {
      window.Character.setActiveCharacter(d.id);
      activateCharacterState();
      applyVoicePreset();
      const c = window.Character.loadCharacter();
      // Take them straight to the ladder of their primary phobia
      if (c && c.primaryPhobia) go("ladder", { phobia: c.primaryPhobia });
      else go("select");
      break;
    }
    case "edit-character": {
      window.Character.setActiveCharacter(d.id);
      activateCharacterState();
      go("character", { editing: true });
      break;
    }
    case "delete-character": {
      const c = window.Character.loadCharacters().find(x => x.id === d.id);
      if (c && confirm(`Delete the character "${c.name || "Unnamed"}" and all its progress?`)) {
        // Also remove their state slice
        if (state.byCharacter) delete state.byCharacter[d.id];
        saveState();
        window.Character.deleteCharacter(d.id);
        activateCharacterState();
        go("profiles");
      }
      break;
    }
    case "new-character": {
      // Open the creator with no existing data
      window.Character.setActiveCharacter("__new__"); // sentinel, won't match anything
      go("character", { editing: false });
      break;
    }
    case "custom-edit":     go("custom", { editing: d.key }); break;
    case "custom-delete": {
      if (confirm("Delete this custom ladder?")) {
        const all = loadCustomPhobias();
        delete all[d.key];
        saveCustomPhobias(all);
        delete PHOBIAS[d.key];
        go("custom");
      }
      break;
    }
    case "open-select":     go("select"); break;
    case "edit-goal":       openGoalEditor(d.phobia); break;
    case "reset-progress":  if (confirm("Reset all progress?")) { state = { progress: {}, log: [] }; saveState(); go("select"); } break;
  }
}

function handleRateSubmit(d, params) {
  const phobia = d.phobia;
  const level = parseInt(d.level, 10);
  // Read directly from the slider for robustness; fall back to the displayed value, then 0.
  const slider = document.getElementById("suds");
  const text = document.getElementById("sudsValue");
  let suds = NaN;
  if (slider) suds = parseInt(slider.value, 10);
  if (Number.isNaN(suds) && text) suds = parseInt(text.textContent, 10);
  if (Number.isNaN(suds)) suds = 0;
  // Pull and clear the prediction made before this rung
  const predicted = (pendingPrediction && pendingPrediction.phobia === phobia && pendingPrediction.level === level)
    ? pendingPrediction.predicted : null;
  pendingPrediction = null;
  markCompleted(phobia, level, suds, predicted);
  go("complete", { phobia, level, suds, predicted });
}

function viewLadder(phobiaKey) {
  const p = PHOBIAS[phobiaKey];
  const prog = getProgress(phobiaKey);
  const previous = state.log.filter(l => l.phobia === phobiaKey);
  const info = (window.PhobiaInfo && window.PhobiaInfo[phobiaKey]) || null;

  // Build the rich info block if we have data
  const infoBlock = info ? `

        <p class="info-summary">${info.summary}</p>

        </div>
        <div class="info-warning">
          <strong>When to step back:</strong> ${info.warning}

      </div>
    </details>
  ` : "";

  // All rungs are ALWAYS playable — the user picks the difficulty they're
  // ready for. Done / current / future are visual indicators of YOUR
  // progress, not gates. This is "your adventure, your pace".
  const items = p.levels.map((lv, i) => {
    const done = i <= prog.highestCompleted;
    const current = i === prog.highestCompleted + 1;
    const intensity = Array.from({ length: 5 }, (_, k) => `<i class="${k <= i ? 'on' : ''}"></i>`).join("");
    const lastSuds = previous.filter(l => l.level === i).slice(-1)[0]?.suds;
    const stats = [];
    if (lastSuds != null) stats.push(`last anxiety ${lastSuds}/10`);
    const minHold = 6 + i * 4;
    stats.push(`hold ~${minHold}s`);
    const buttonLabel = done ? "Try again" : (current ? "Start" : "Try this one");
    const buttonClass = current ? "btn-primary" : (done ? "btn-ghost" : "btn-ghost");
    return `

        <div class="info">

          <div class="desc">${lv.desc}</div>
          <div class="intensity-bars">${intensity}</div>
          <div class="stats">${stats.join(" · ")}</div>

            data-action="start-level" data-phobia="${phobiaKey}" data-level="${i}">

  // Insert little connector lines between rungs
  const climb = items.map((it, idx) => idx === 0 ? it : `<div class="climb-line"></div>${it}`).join("");

  // Show user's other phobias as quick-switch tabs
  const character = window.Character && window.Character.loadCharacter();
  const allMine = character ? [character.primaryPhobia, ...(character.additionalPhobias || [])].filter(Boolean) : [];
  const tabs = allMine.length > 1 ? `

      ${allMine.map(k => `

          ${PHOBIAS[k]?.label || k}
        </button>

  const sessionsOnThisPhobia = state.log.filter(l => l.phobia === phobiaKey).length;
  const progressLink = sessionsOnThisPhobia > 0
    ? `<a href="#${serializeRoute("phobia-progress", { phobia: phobiaKey })}" class="ladder-progress-link">📊 ${sessionsOnThisPhobia} session${sessionsOnThisPhobia === 1 ? "" : "s"} · view progress</a>`
    : "";

  // Goal block — show progress toward the user's goal for this phobia
  const goal = getGoal(phobiaKey);
  const wkSessions = thisWeekSessions(phobiaKey);
  const goalBlock = `
    <div class="goal-block">
      ${goal ? `
        <div class="goal-row">

            <div class="goal-meter-label">
              <span>Target rung</span>

            </div>
            <div class="goal-meter-track">
              <div class="goal-meter-fill" style="width:${Math.min(100, ((prog.highestCompleted + 1) / (goal.targetRung + 1)) * 100)}%"></div>
            </div>

          <div class="goal-meter">

            </div>
          </div>
          <button class="btn-ghost" data-action="edit-goal" data-phobia="${phobiaKey}" style="font-size:11px;padding:5px 10px;">Edit goal</button>

  return `

}

// Tiny SVG line+dot chart for SUDS history. Returns an inline-SVG string.
function drawSudsChart(sessions, w = 320, h = 100) {
  if (!sessions || sessions.length === 0) {
    return `<svg viewBox="0 0 ${w} ${h}" class="insight-chart"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#94a3b8" font-size="12">No sessions yet</text></svg>`;
  }
  const padX = 10, padY = 12;
  const innerW = w - padX * 2;
  const innerH = h - padY * 2;
  // X-axis: session index. Y-axis: SUDS 0..10 (top is calm, bottom is panic — invert so high = up)
  const points = sessions.map((s, i) => {
    const x = padX + (sessions.length === 1 ? innerW / 2 : (i / (sessions.length - 1)) * innerW);
    const y = padY + (1 - (s.suds / 10)) * innerH;
    return [x, y, s];
  });
  // Predicted dots (lighter)
  const predictedDots = sessions.map((s, i) => {
    if (s.predicted == null) return "";
    const x = padX + (sessions.length === 1 ? innerW / 2 : (i / (sessions.length - 1)) * innerW);
    const y = padY + (1 - (s.predicted / 10)) * innerH;
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="#94a3b8" opacity="0.6"/>`;
  }).join("");
  // Connect actual SUDS with a smooth line
  const linePts = points.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const dots = points.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="#7cd1c5"/>`).join("");
  // Reference grid lines at 3 and 7 (low/high SUDS thresholds)
  const grid = [3, 7].map(v => {
    const y = padY + (1 - v / 10) * innerH;
    return `<line x1="${padX}" y1="${y}" x2="${w - padX}" y2="${y}" stroke="#25324f" stroke-width="1" stroke-dasharray="2,3"/>`;
  }).join("");
  return `
    <svg viewBox="0 0 ${w} ${h}" class="insight-chart" preserveAspectRatio="none" width="100%" height="${h}">
      ${grid}
      <polyline points="${linePts}" fill="none" stroke="#7cd1c5" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${predictedDots}
      ${dots}
      <text x="${padX}" y="${padY - 2}" fill="#64748b" font-size="9">10 panic</text>
      <text x="${padX}" y="${h - 2}" fill="#64748b" font-size="9">0 calm</text>
    </svg>
  `;
}

function viewPhobiaProgress(phobiaKey) {

      title: lv.title,
      attempts: ss.length,
      avg: ss.length ? (ss.reduce((s, l) => s + l.suds, 0) / ss.length) : null,
      best: ss.length ? Math.min(...ss.map(s => s.suds)) : null,
    };
  });

  // Journal notes timeline (most recent first)
  const notes = sessions.filter(s => s.note).slice().reverse();

  return `
    <div class="panel">
      <a href="#${serializeRoute("ladder", { phobia: phobiaKey })}" class="back-link">← Back to ${p.label} ladder</a>

      <p>${highest}/${total} rungs · ${sessions.length} session${sessions.length === 1 ? "" : "s"}</p>

      <div class="stats-row">
        <div class="stat"><div class="stat-num">${highest}</div><div class="stat-lbl">highest rung</div></div>
        <div class="stat"><div class="stat-num">${sessions.length}</div><div class="stat-lbl">sessions</div></div>
        <div class="stat"><div class="stat-num">${sessions.length ? (sessions.reduce((s, l) => s + l.suds, 0) / sessions.length).toFixed(1) : "—"}</div><div class="stat-lbl">avg SUDS</div></div>
      </div>

      <div class="insight-card">
        <h3>SUDS over time</h3>
        ${drawSudsChart(sessions, 600, 120)}
        <div class="insight-legend">
          <span><span class="dotmark" style="background:var(--accent)"></span>actual</span>
          <span><span class="dotmark" style="background:#94a3b8;opacity:.6"></span>predicted</span>
        </div>
      </div>

      <h3 style="margin-top:18px">Per rung</h3>
      <div class="rung-stats">
        ${rungStats.map((r, i) => `
          <div class="rung-stat ${r.attempts ? "" : "untouched"}">
            <div class="rung-stat-num">${i + 1}</div>
            <div class="rung-stat-text">
              <strong>${r.title}</strong>
              <span class="small">${r.attempts ? `${r.attempts} attempt${r.attempts === 1 ? "" : "s"} · avg ${r.avg.toFixed(1)} · best ${r.best}` : "Not yet attempted"}</span>
            </div>
          </div>
        `).join("")}
      </div>

      ${notes.length ? `
        <h3 style="margin-top:18px">Journal</h3>
        <div class="journal-list">
          ${notes.map(n => `
            <div class="journal-entry">
              <div class="journal-meta">
                <span class="journal-rung">Rung ${n.level + 1}</span>
                <span class="small">${new Date(n.ts).toLocaleString()}</span>
                <span class="small">SUDS ${n.suds}/10</span>
              </div>
              <p>${escapeHtml(n.note)}</p>
            </div>
          `).join("")}
        </div>
      ` : ""}
    </div>
  `;
}

function viewProfiles() {
  if (!window.Character) return `<div class="panel"><p>Loading…</p></div>`;
  const all = window.Character.loadCharacters();
  const activeId = window.Character.activeCharacterId();
  const cards = all.map(c => {
    const isActive = c.id === activeId;
    const sessions = (state.byCharacter && state.byCharacter[c.id] && state.byCharacter[c.id].log) || [];
    const phobiaCount = c.primaryPhobia ? 1 + (c.additionalPhobias || []).length : 0;
    return `
      <div class="profile-card ${isActive ? "active" : ""}" data-action="select-character" data-id="${c.id}">
        <div class="profile-avatar">${window.Character.avatarSVG(c, 70)}</div>
        <div class="profile-text">
          <strong>${c.name || "Unnamed"}</strong>
          <span class="small">${phobiaCount} fear${phobiaCount === 1 ? "" : "s"} · ${sessions.length} session${sessions.length === 1 ? "" : "s"}</span>
          ${isActive ? `<span class="profile-badge">active</span>` : ""}
        </div>
        <div class="profile-actions">
          <button class="btn-ghost" data-action="edit-character" data-id="${c.id}" data-stop="1">Edit</button>
          ${all.length > 1 ? `<button class="btn-warn" data-action="delete-character" data-id="${c.id}" data-stop="1">Delete</button>` : ""}
        </div>
      </div>
    `;
  }).join("");
  return `
    <div class="panel">
      <h2>Your characters</h2>
      <p>Each character keeps its own ladder progress, SUDS log, and phobia list. Switch between them any time.</p>
      <div class="profiles-grid">${cards}</div>
      <div class="actions">
        <button class="btn-primary" data-action="new-character">+ New character</button>
      </div>
    </div>
  `;
}

function viewInsights() {
  const character = window.Character && window.Character.loadCharacter();
  const myPhobias = character
    ? [character.primaryPhobia, ...(character.additionalPhobias || [])].filter(Boolean)
    : Object.keys(state.progress);
  // Always include any phobias in the log even if not in profile
  for (const k of Object.keys(state.progress)) if (!myPhobias.includes(k)) myPhobias.push(k);

  const totalSessions = state.log.length;
  const completedRungs = Object.values(state.progress).reduce((sum, p) => sum + (p.highestCompleted + 1), 0);
  // Average prediction-vs-actual gap (only sessions that recorded a prediction)
  const predicted = state.log.filter(l => l.predicted != null);
  const avgGap = predicted.length
    ? predicted.reduce((s, l) => s + (l.predicted - l.suds), 0) / predicted.length
    : null;

  if (myPhobias.length === 0) {
    return `<div class="panel">
      <h2>Your progress</h2>
      <p>Once you've completed a rung, this is where the data lives. SUDS scores, prediction-vs-actual gaps, and your highest rung per phobia.</p>
    </div>`;
  }

  const cards = myPhobias.map(key => {
    const p = PHOBIAS[key];
    if (!p) return "";
    const sessions = state.log.filter(l => l.phobia === key);
    const prog = state.progress[key];
    const highest = prog ? prog.highestCompleted + 1 : 0;
    const total = p.levels.length;
    const avg = sessions.length
      ? (sessions.reduce((s, l) => s + l.suds, 0) / sessions.length).toFixed(1)
      : "—";
    return `
      <div class="insight-card">
        <div class="insight-head">
          <div class="insight-icon">${p.icon}</div>
          <div>
            <h3>${p.label}</h3>
            <div class="small">${highest}/${total} rungs · ${sessions.length} session${sessions.length === 1 ? "" : "s"} · avg SUDS ${avg}</div>
          </div>
        </div>
        ${drawSudsChart(sessions, 320, 90)}
        <div class="insight-legend">
          <span><span class="dotmark" style="background:#7cd1c5"></span>actual</span>
          <span><span class="dotmark" style="background:#94a3b8;opacity:.6"></span>predicted</span>
        </div>
        <div class="actions" style="margin-top:8px">
          <button class="btn-ghost" data-action="select-phobia" data-phobia="${key}">Open ladder</button>
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="panel">
      <h2>Your progress</h2>
      <p>Each chart plots how anxious you actually felt on each rung you climbed. Lighter dots are your <em>predictions</em> — the gap between predicted and actual is where the brain learns.</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">${totalSessions}</div><div class="stat-lbl">total sessions</div></div>
        <div class="stat"><div class="stat-num">${completedRungs}</div><div class="stat-lbl">rungs climbed</div></div>
        <div class="stat"><div class="stat-num">${avgGap == null ? "—" : (avgGap >= 0 ? "+" : "") + avgGap.toFixed(1)}</div><div class="stat-lbl">avg over-prediction</div></div>
      </div>
      <div class="insights-grid">${cards}</div>

      ${(() => {
        const unlocked = unlockedMilestones();
        return `
          <h3 style="margin-top:24px">Milestones</h3>
          <p class="small">Auto-unlocked as you make progress. ${unlocked.length} of ${MILESTONES.length} earned.</p>
          <div class="milestones-grid">
            ${MILESTONES.map(m => {
              const got = unlocked.includes(m.id);
              return `<div class="milestone ${got ? "earned" : "locked"}">
                <div class="milestone-icon">${got ? m.icon : "🔒"}</div>
                <div class="milestone-text">
                  <strong>${m.title}</strong>
                  <span class="small">${m.desc}</span>
                </div>
              </div>`;
            }).join("")}
          </div>
        `;
      })()}

      <div class="actions" style="margin-top:18px">
        <button class="btn-primary" id="shareCardBtn">Share progress card</button>
      </div>
    </div>
  `;
}

function viewPredict(phobiaKey, levelIdx) {
  const p = PHOBIAS[phobiaKey];
  const lv = p.levels[levelIdx];
  // Suggest the predicted value based on past rungs of the same phobia
  const past = state.log.filter(l => l.phobia === phobiaKey && l.level === levelIdx);
  const suggested = past.length ? past[past.length - 1].suds : Math.min(8, 4 + levelIdx);
  return `
    <div class="panel">
      <span class="badge">Rung ${levelIdx+1} of ${p.levels.length} — ${p.label}</span>
      <h2 style="margin-top:10px">Before you start</h2>
      <p>One thing that makes exposure work: <em>predict</em> what you think will happen, then see how it actually goes.
      Most people over-predict the fear — and that's the lesson the brain needs to update.</p>

      <div class="suds" style="margin-top:18px">
        <label for="predictedSuds">How anxious do you expect to feel during <strong>${lv.title}</strong>?</label>
        <div class="scale-row">
          <span class="small">0 calm</span>
          <input type="range" id="predictedSuds" min="0" max="10" value="${suggested}"/>
          <span class="small">10 panic</span>
          <div class="value" id="predictedValue">${suggested}</div>
        </div>
        <div class="hint">After the rung, you'll rate how it actually felt — and we'll compare. The gap is where the learning happens.</div>
      </div>

      <div class="actions">
        <button class="btn-ghost" data-action="back-ladder" data-phobia="${phobiaKey}">Back</button>
        <button class="btn-primary" data-action="confirm-predict" data-phobia="${phobiaKey}" data-level="${levelIdx}">Begin the rung</button>
      </div>
    </div>
  `;
}

  if (phobiaKey === "dogs" && intensity !== "barking") {
    // Dogs is character-driven: walk near the dog, the dog notices and reacts;

function viewRate(phobiaKey, levelIdx) {

          <span class="small">0 calm</span>

          <div class="value" id="sudsValue">3</div>

        <button class="btn-warn" data-action="do-breathe" data-phobia="${phobiaKey}" data-level="${levelIdx}">Take a breath first</button>

function viewBreathe(phobiaKey, levelIdx) {
  return `
    <div class="panel">
      <h2>Box breathing</h2>
      <p>Follow the circle. Inhale 4 seconds, hold, exhale 4 seconds. Repeat for as long as you like.</p>
      <div class="breath-wrap">
        <div class="breath-circle" id="breathCircle">Breathe</div>
      </div>
      <div class="actions" style="justify-content: center;">
        <button class="btn-primary" data-action="after-breathe" data-phobia="${phobiaKey}" data-level="${levelIdx}">I'm calmer — continue</button>
      </div>
    </div>

function viewComplete(phobiaKey, levelIdx, suds, predicted) {
  const p = PHOBIAS[phobiaKey];
  const isLast = levelIdx === p.levels.length - 1;
  const next = levelIdx + 1;
  const advice = suds <= 3 ? "You're handling this well. The next rung will be a small bump."
               : suds <= 6 ? "Solid. Consider repeating this rung once more before climbing."
               : "Stay on this rung for a few more passes. Repeat until the SUDS drops.";

  // Prediction comparison block
  let predictionBlock = "";
  if (predicted != null && !Number.isNaN(predicted)) {
    const diff = predicted - suds;
    let lesson, tone;
    if (diff >= 2) {
      tone = "good";
      lesson = `Your fear was <strong>${diff} point${diff === 1 ? "" : "s"} smaller</strong> than you predicted. The brain learns by noticing this gap — please notice it.`;
    } else if (diff <= -2) {
      tone = "warn";
      lesson = `Your fear was a touch higher than you predicted. That's data too — sit with what surprised you, then plan a repeat.`;
    } else {
      tone = "neutral";
      lesson = `Your prediction was close to what you felt. That's a sign you're getting accurate at reading your own body.`;
    }
    predictionBlock = `
      <div class="prediction-card prediction-${tone}">
        <div class="prediction-meters">
          <div class="meter-row">
            <span class="meter-label">Predicted</span>
            <div class="meter-track"><div class="meter-fill" style="width:${predicted * 10}%; background:#94a3b8"></div></div>
            <span class="meter-value">${predicted}/10</span>
          </div>
          <div class="meter-row">
            <span class="meter-label">Actual</span>
            <div class="meter-track"><div class="meter-fill" style="width:${suds * 10}%"></div></div>
            <span class="meter-value">${suds}/10</span>
          </div>
        </div>
        <p class="prediction-lesson">${lesson}</p>
      </div>
    `;
  }

  return `
    <div class="panel">
      <span class="badge">Rung ${levelIdx+1} done</span>
      <h2 style="margin-top: 10px;">Nice work.</h2>
      <p>You completed <strong>${p.levels[levelIdx].title}</strong>. You rated your anxiety at <strong>${suds}/10</strong>.</p>
      ${predictionBlock}
      <p>${advice}</p>

      <div class="journal-row">
        <label for="journalNote">Anything to remember? <span class="small">(optional — what helped, what surprised you)</span></label>
        <textarea id="journalNote" rows="2" maxlength="500" placeholder="The railing felt solid. My SUDS dropped from 7 to 4 after about 30 seconds."></textarea>
        <button class="btn-ghost" id="saveJournal" style="font-size:12px; padding:6px 12px;">Save note</button>
        <span class="small" id="journalSaved" style="opacity:0; transition:opacity .25s; color:var(--ok)">saved</span>
      </div>

      <div class="actions">
        ${!isLast ? `<button class="btn-primary" data-action="next-level" data-phobia="${phobiaKey}" data-level="${next}">Climb to rung ${next+1}</button>` : `<button class="btn-primary" data-action="back-ladder" data-phobia="${phobiaKey}">You finished the ladder</button>`}
        <button class="btn-ghost" data-action="back-ladder" data-phobia="${phobiaKey}">Back to ladder</button>
      </div>
    </div>
  `;
}

// ---------- Exposure scene mount ----------
function mountExposure(phobiaKey, levelIdx) {
  const p = PHOBIAS[phobiaKey];
  const lv = p.levels[levelIdx];
  const stage = document.getElementById("stage");
  const minHold = parseInt(stage.dataset.minHold, 10) || 6;

  // Read user preferences
  const heartEnabled = (() => {
    try { return localStorage.getItem("fobia.heart") !== "0"; } catch { return true; }
  })();
  const motionReduced = (() => {
    try { return localStorage.getItem("fobia.reducedMotion") === "1"; } catch { return false; }
  })();

  // Heart rate ramps up with the rung: rung 1 ≈ 70 bpm, rung 5 ≈ 132 bpm
  const bpm = 68 + levelIdx * 16;
  // Vignette opacity: only really visible on the harder rungs, and even then
  // capped at ~0.55 so it never feels like an alarm. Lower rungs get nothing.
  const heartIntensity = heartEnabled ? Math.max(0, (levelIdx - 2) / 3) * 0.55 : 0;

  // Heart-rate vignette overlay (sits over the scene)
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.style.setProperty("--bpm-dur", (60 / bpm) + "s");
  heart.style.setProperty("--heart-opacity", "0");
  stage.appendChild(heart);

  // Continuous shake only on the very top rung (unless reduce-motion is on).
  // Anything more felt like a panic-trigger rather than a stress cue.
  if (levelIdx >= 4 && !motionReduced) stage.classList.add("shake");

  // Quick action bar — always-visible icons in the top-right of the stage:
  //  - voice mute / unmute
  //  - sound mute / unmute
  //  - theater mode (taller stage that fills the viewport)
  //  - fullscreen mode (browser fullscreen API)
  // Theater + fullscreen are independent so the user can pick whichever
  // feels right (theater stays inside the page, fullscreen takes the screen).
  const quickBar = document.createElement("div");
  quickBar.className = "stage-quick-bar";
  function isTheater() { return stage.classList.contains("theater"); }
  function isFullscreen() {
    return document.fullscreenElement === stage ||
           document.webkitFullscreenElement === stage;
  }
  function refreshQuickBar() {
    const vMuted = window.PhobiaVoice && window.PhobiaVoice.isMuted();
    const aMuted = window.PhobiaAudio && window.PhobiaAudio.isMuted();
    const theater = isTheater();
    const full = isFullscreen();
    // Only the two essential controls — voice mute + sound mute. Theater +
    // fullscreen were visual clutter that crowded the canvas corner; users
    // who want fullscreen can use the browser's native option (F11).
    quickBar.innerHTML = `
      <button class="stage-quick-btn ${vMuted ? "muted" : ""}" id="quickVoice"
        title="${vMuted ? "Voice guidance muted — click to unmute" : "Mute voice guidance"}"
        aria-label="${vMuted ? "Voice muted" : "Mute voice"}">${vMuted ? "🔇" : "🗣️"}</button>
      <button class="stage-quick-btn ${aMuted ? "muted" : ""}" id="quickAudio"
        title="${aMuted ? "Scene sound muted — click to unmute" : "Mute scene sound"}"
        aria-label="${aMuted ? "Sound muted" : "Mute sound"}">${aMuted ? "🔈" : "🔊"}</button>
    `;
    const v = quickBar.querySelector("#quickVoice");
    const a = quickBar.querySelector("#quickAudio");
    if (v) v.onclick = () => {
      const next = !window.PhobiaVoice.isMuted();
      window.PhobiaVoice.setMuted(next);
      if (next) window.PhobiaVoice.stop();
      refreshQuickBar();
    };
    if (a) a.onclick = () => {
      window.PhobiaAudio.unlock();
      const next = !window.PhobiaAudio.isMuted();
      window.PhobiaAudio.setMuted(next);
      const ab = document.getElementById("audioBtn");
      if (ab) ab.textContent = next ? "🔇" : "🔊";
      refreshQuickBar();
    };
  }
  // Re-render the icons when fullscreen state changes (e.g. user pressed Esc)
  document.addEventListener("fullscreenchange", refreshQuickBar);
  document.addEventListener("webkitfullscreenchange", refreshQuickBar);
  refreshQuickBar();
  stage.appendChild(quickBar);

  // Closed captions for voice (respect user's preference)
  let captions = null;
  let captionsTimer = null;
  const captionsEnabled = (() => {
    try { return localStorage.getItem("fobia.captions") !== "0"; } catch { return true; }
  })();
  if (captionsEnabled) {
    captions = document.createElement("div");
    captions.className = "captions";
    stage.appendChild(captions);
  }
  function onVoiceLine(e) {
    if (!captions || !captions.isConnected) return;
    captions.textContent = e.detail.text;
    captions.classList.add("show");
    if (captionsTimer) clearTimeout(captionsTimer);
    captionsTimer = setTimeout(() => {
      captions.classList.remove("show");
    }, e.detail.durationMs);
  }
  window.addEventListener("voice-line", onVoiceLine);

  // Try 3D first; fall back to SVG if not available or it fails
  function mountSVGFallback() {
    const sc = document.createElement("div");
    sc.className = "scene";
    stage.insertBefore(sc, stage.firstChild);
    p.render(sc, lv, levelIdx);
  }
  function mount3DIfPossible() {
    if (!window.Scene3D || !window.Scene3D.ready) return false;
    try {
      // Preserve the heart overlay; only remove canvases/scene divs
      [...stage.querySelectorAll("canvas, .scene, .vignette, .mode-badge, .loading, .controls-hint, .reach-hint")].forEach(el => el.remove());
      // If a character profile exists, propagate its full appearance (skin /
      // shirt / hair / eyes / glasses / facial hair) through to the first-person
      // hands and visible body so the user really sees themselves — both in
      // first-person (their own hands and chest) and third-person (full head
      // with hair, eyes that match, optional glasses + beard).
      const character = window.Character && window.Character.loadCharacter();
      const opts = {};
      if (character) {
        opts.skinColor = window.Character.hexToInt(window.Character.skinHex(character));
        opts.shirtColor = window.Character.hexToInt(window.Character.topHex(character));
        opts.hairColor = window.Character.hexToInt(window.Character.hairHex(character));
        opts.eyeColor  = window.Character.hexToInt(window.Character.eyeHex(character));
        opts.hairStyle = character.hairStyle || "short";
        opts.glasses   = character.glasses || "none";
        opts.facialHair = character.facialHair || "none";
      }
      window.Scene3D.mount(phobiaKey, stage, lv, levelIdx, opts);
      return true;
    } catch (err) {
      console.warn("3D scene failed, using SVG fallback:", err);
      return false;
    }
  }

  if (!mount3DIfPossible()) {
    mountSVGFallback();
    if (!window.Scene3D || !window.Scene3D.ready) {
      window.addEventListener("scene3d-ready", () => {
        if (!stage.isConnected) return;
        [...stage.querySelectorAll(".scene")].forEach(el => el.remove());
        mount3DIfPossible();
      }, { once: true });
    }
  }

  // ---- First-time tutorial — only shown once per device ----
  // Three steps with animated arrows pointing at the relevant UI element.
  const seenTutorial = (() => { try { return localStorage.getItem("fobia.tutorialSeen") === "1"; } catch { return false; } })();
  if (!seenTutorial) {
    runTutorialTour(stage);
  }

  // ---- Pre-stage countdown ("Get ready · 3 · 2 · 1 · go") ----
  // The user can tap "Start when you're ready" to skip the wait, OR just
  // wait for the count to finish — either way the scene starts predictably.
  const countdown = document.createElement("div");
  countdown.className = "countdown";
  countdown.innerHTML = `
    <div class="label">Get ready — there's no rush</div>
    <div class="num" id="cdNum">3</div>
    <div class="hint">Notice your breath. Soften your shoulders.<br>Take a moment.</div>
    <button class="btn-ghost" id="cdStartNow" style="margin-top:14px;font-size:13px;padding:6px 14px;">Start when you're ready</button>
  `;
  stage.appendChild(countdown);

  let started = false;
  let stageAudio = []; // collection of audio handles to stop on unmount
  let voiceTimers = [];  // timeouts for scripted voice cues
  // Inactivity reminder — fires once if the user is completely still for 30s
  // after the scene starts. The cue is gentle ("you're still with it — keep
  // breathing") and never repeats during the same rung.
  let lastActivity = Date.now();
  let inactivityFired = false;
  let inactivityInterval = null;
  const onAnyActivity = () => { lastActivity = Date.now(); };
  const INACTIVITY_EVENTS = ["mousemove", "mousedown", "wheel", "keydown", "touchstart", "touchmove", "pointerdown"];
  const startScene = () => {
    if (started) return;
    started = true;
    // Reveal heart-rate vignette gradually
    setTimeout(() => {
      heart.style.setProperty("--heart-opacity", String(heartIntensity));
    }, 250);
    // Start audio appropriate to this scene
    PhobiaAudio.unlock();
    stageAudio = startSceneAudio(phobiaKey, levelIdx);
    // Start heartbeat for the harder rungs
    if (levelIdx >= 2) {
      stageAudio.push(PhobiaAudio.startHeartbeat(bpm));
    }
    // Schedule scripted voice cues — about every 14 seconds (slower cadence
    // so the user has time to actually sit with the previous instruction).
    const lines = (VOICE_LINES[phobiaKey] || [])[levelIdx] || [];
    lines.forEach((line, i) => {
      const delay = 1400 + i * 14000;
      voiceTimers.push(setTimeout(() => {
        if (timer && timer.isConnected) PhobiaVoice.speak(line);
      }, delay));
    });
    // Inactivity watcher — start once the scene is live.
    lastActivity = Date.now();
    INACTIVITY_EVENTS.forEach(ev => window.addEventListener(ev, onAnyActivity, { passive: true }));
    inactivityInterval = setInterval(() => {
      if (inactivityFired) return;
      if (!timer || !timer.isConnected) return;
      const stillFor = (Date.now() - lastActivity) / 1000;
      if (stillFor >= 30) {
        inactivityFired = true;
        try {
          if (window.PhobiaVoice) {
            window.PhobiaVoice.speak("Still with it. Look around if you like — your body is learning that this is safe.");
          }
        } catch {}
      }
    }, 1000);
  };

  // Slower 4-second countdown (3 → 2 → 1 → go) so the user has time to
  // actually settle their breath before the scene begins. Holding the
  // count-numbers for ~1100 ms each instead of 800 ms feels noticeably
  // less rushed without dragging.
  const cdNum = countdown.querySelector("#cdNum");
  let cdTimers = [];
  let cdDone = false;
  // Faster count — 800 ms per number for a snappier "ready, set, go" feel.
  // Total wait drops from ~3.3 s to ~2.4 s. Users can still skip via the
  // "Start when you're ready" button below.
  cdTimers.push(setTimeout(() => { if (cdNum) cdNum.textContent = "2"; }, 800));
  cdTimers.push(setTimeout(() => { if (cdNum) cdNum.textContent = "1"; }, 1600));
  cdTimers.push(setTimeout(() => {
    if (cdDone || !countdown.isConnected) return;
    cdDone = true;
    countdown.style.opacity = "0";
    startScene();
    setTimeout(() => countdown.remove(), 600);
  }, 2400));
  // Manual override: skip the rest of the count if the user is ready early.
  const startNowBtn = countdown.querySelector("#cdStartNow");
  if (startNowBtn) {
    startNowBtn.onclick = () => {
      if (cdDone || !countdown.isConnected) return;
      cdDone = true;
      cdTimers.forEach(id => clearTimeout(id));
      cdTimers = [];
      countdown.style.opacity = "0";
      startScene();
      setTimeout(() => countdown.remove(), 600);
    };
  }

  // ---- Hold timer ----
  // The rung COMPLETES when the user has spent `minHold` seconds actually
  // FACING the fear — not just sitting in the scene. We weight time by the
  // PhobiaFear value, which scenes drive from proximity / gaze:
  //   fear > 30  → 1.0× time credit (genuinely facing it)
  //   fear > 10  → 0.4× credit  (in scene, not yet engaged)
  //   fear ≤ 10  → 0×           (back at safety, not earning credit)
  // Look-only scenes (driving, flying, speaking, needles, enclosed, storms,
  // dark) don't have an approach mechanic — the user just sits and lets the
  // scene happen. For these we detect "fear never climbed > 25 in the first
  // 5 s" → switch to wall-clock crediting so the rung still completes.
  const t0 = Date.now();
  let facingTimeMs = 0;
  let lastTickAt = Date.now();
  let isLookOnlyScene = false;
  let peakFearSoFar = 0;
  const timer = document.getElementById("timer");
  const continueBtn = document.getElementById("continueBtn");
  const holdBar = document.getElementById("holdBarFill");
  const holdLabel = document.getElementById("holdLabel");

  // Visual state: hold-bar dims when user isn't in fear zone, brightens
  // when they are. Communicates "you're earning credit right now".
  const interval = setInterval(() => {
    if (!timer || !timer.isConnected) { clearInterval(interval); stopAllAudio(); return; }
    const wallElapsed = Math.floor((Date.now() - t0) / 1000);
    timer.textContent = String(Math.floor(wallElapsed / 60)).padStart(2, "0") + ":" + String(wallElapsed % 60).padStart(2, "0");

    // Compute credit based on current fear value
    const now = Date.now();
    const dtMs = Math.max(0, Math.min(500, now - lastTickAt));
    lastTickAt = now;
    const fear = (window.PhobiaFear && window.PhobiaFear.get) ? window.PhobiaFear.get() : 0;
    peakFearSoFar = Math.max(peakFearSoFar, fear);
    // After 5 seconds, if fear never climbed > 25, this is a look-only scene
    // (driving, flying, speaking, needles, enclosed, storms, dark). Switch
    // to wall-clock crediting so the user can still complete the rung by
    // simply staying present.
    if (!isLookOnlyScene && wallElapsed > 5 && peakFearSoFar < 25) {
      isLookOnlyScene = true;
    }
    let creditFactor;
    if (isLookOnlyScene) {
      creditFactor = 1.0;
    } else if (fear > 30) {
      creditFactor = 1.0;          // facing the fear → full credit
    } else if (fear > 10) {
      creditFactor = 0.5;          // approaching → most credit (was 0.4)
    } else {
      creditFactor = 0.25;         // just being there earns SOME credit
                                    // — never zero, so no one is stuck.
    }
    // Ungrounded scenes (no PhobiaFear set up at all) also fall back to wall-clock.
    const sceneKey = window.PhobiaFear && window.PhobiaFear.getScene && window.PhobiaFear.getScene();
    const hasFearInputs = !!sceneKey;
    if (!hasFearInputs) creditFactor = 1.0;
    facingTimeMs += dtMs * creditFactor;
    const facingSec = Math.floor(facingTimeMs / 1000);

    if (continueBtn && holdBar && holdLabel) {
      const pct = Math.min(100, (facingTimeMs / 1000 / minHold) * 100);
      holdBar.style.width = pct + "%";
      // Mark the hold-bar "active" when credit is being earned, "idle" otherwise
      const inZone = creditFactor > 0.5;
      holdBar.parentElement.classList.toggle("in-zone", inZone);
      holdBar.parentElement.classList.toggle("idle", !inZone && hasFearInputs);

      if (facingSec < minHold) {
        const remain = minHold - facingSec;
        continueBtn.textContent = `Stay with it · ${remain}s`;
        if (isLookOnlyScene || !hasFearInputs) {
          holdLabel.textContent = `${facingSec} / ${minHold}s · stay with it`;
        } else if (inZone) {
          holdLabel.textContent = `${facingSec} / ${minHold}s · holding · full credit`;
        } else if (fear > 5) {
          holdLabel.textContent = `${facingSec} / ${minHold}s · walk closer for full credit`;
        } else {
          holdLabel.textContent = `${facingSec} / ${minHold}s · take your time`;
        }
      } else if (continueBtn.classList.contains("holding")) {
        continueBtn.classList.remove("holding");
        continueBtn.classList.add("ready-pulse");
        continueBtn.textContent = "I'm ready — continue";
        holdLabel.textContent = `held ${facingSec}s — well done`;
        // ---- Completion celebration ----
        // The user actually faced the fear long enough — give them a clear,
        // felt moment of accomplishment. Voice cue + achievement toast +
        // a soft green pulse on the hold-bar.
        if (window.PhobiaVoice) {
          try {
            window.PhobiaVoice.speak("You did it. You stayed with it. That is real progress.");
          } catch {}
        }
        if (window.PhobiaFX && window.PhobiaFX.achievement) {
          window.PhobiaFX.achievement(
            `${phobiaKey}.rungHeld.${levelIdx}`,
            "✨",
            "Rung held",
            `You faced rung ${levelIdx + 1} for ${facingSec}s. Real exposure.`
          );
        }
        if (window.PhobiaFX && window.PhobiaFX.contextPrompt) {
          window.PhobiaFX.contextPrompt(
            "You did it. You stayed with the fear and it didn't break you.",
            5000
          );
        }
        if (holdBar && holdBar.parentElement) {
          holdBar.parentElement.classList.add("complete");
          setTimeout(() => {
            if (holdBar.parentElement) holdBar.parentElement.classList.remove("complete");
          }, 2000);
        }
      }
    }
  }, 250);

  function stopAllAudio() {
    stageAudio.forEach(a => { try { a.stop && a.stop(); } catch {} });
    stageAudio = [];
    voiceTimers.forEach(id => clearTimeout(id));
    voiceTimers = [];
    if (window.PhobiaVoice) window.PhobiaVoice.stop();
    window.removeEventListener("voice-line", onVoiceLine);
    if (captionsTimer) clearTimeout(captionsTimer);
    // Tear down the inactivity watcher
    if (inactivityInterval) { clearInterval(inactivityInterval); inactivityInterval = null; }
    INACTIVITY_EVENTS.forEach(ev => window.removeEventListener(ev, onAnyActivity));
  }
  // Also stop audio when 3D scene tears down (page navigation)
  window.addEventListener("beforeunload", stopAllAudio);

  // SUDS slider live update (defensive — kept for legacy SVG path too)
  const suds = document.getElementById("suds");
  if (suds) {
    const out = document.getElementById("sudsValue");
    suds.addEventListener("input", () => { if (out) out.textContent = suds.value; });
  }
}

// ---------- Per-scene audio mixes ----------
function startSceneAudio(phobiaKey, levelIdx) {
  const A = window.PhobiaAudio; if (!A) return [];
  const intensity = (levelIdx + 1) / 5; // 0.2 .. 1.0
  const handles = [];
  switch (phobiaKey) {
    case "heights": {
      handles.push(A.startCityHum());
      handles.push(A.startWind(0.25 + intensity * 0.85));
      if (levelIdx >= 3) handles.push(A.startBreathing(0.18 + intensity * 0.15));
      break;
    }
    case "water": {
      if (levelIdx >= 4) {
        handles.push(A.startUnderwater());
        handles.push(A.startBreathing(0.3));
      } else {
        handles.push(A.startWaterLap(0.3 + intensity * 0.7));
      }
      break;
    }
    case "dogs": {
      handles.push(A.startRoomTone(0.2));
      // Discrete barks are fired from inside the 3D dog scene so they sync with
      // the visual lunges. We only handle ambient panting here.
      const lv = PHOBIAS.dogs.levels[levelIdx];
      if (lv.intensity === "calm")  handles.push(A.startBreathing(0.7));
      if (lv.intensity === "alert") handles.push(A.startBreathing(0.55));
      if (lv.intensity === "barking") handles.push(A.startBreathing(0.9));
      break;
    }
    case "spiders": {
      handles.push(A.startRoomTone(0.18));
      handles.push(A.startSkittering());
      if (levelIdx >= 3) handles.push(A.startBreathing(0.35));
      break;
    }
    case "enclosed": {
      handles.push(A.startRoomTone(0.3 + intensity * 0.4));
      if (levelIdx >= 3) handles.push(A.startBreathing(0.4 + intensity * 0.2));
      if (levelIdx >= 4) handles.push(A.startMRI());
      // Door creak at the start as the doors close behind you
      if (levelIdx >= 1) setTimeout(() => A.doorCreak(), 600);
      break;
    }
    case "flying": {
      // Engine pod sits outside the left window — pan the drone to that
      // position so the user actually hears the engine "out there" instead
      // of in their ears. Coordinates match the engine mesh in setupFlying.
      handles.push(A.startEngineDrone(0.4 + intensity * 0.6, { x: -4.0, y: -0.05, z: -4.2 }));
      if (levelIdx >= 3) handles.push(A.startBreathing(0.3 + intensity * 0.2));
      // Quiet cabin chatter via room tone (no panning — surrounds you)
      handles.push(A.startRoomTone(0.15));
      break;
    }
    case "needles": {
      handles.push(A.startRoomTone(0.18));
      if (levelIdx >= 2) handles.push(A.startBreathing(0.4 + intensity * 0.2));
      break;
    }
    case "snakes": {
      handles.push(A.startWind(0.2));      // outdoor ambience
      handles.push(A.startHiss(0.15 + intensity * 0.4));
      if (levelIdx >= 3) handles.push(A.startBreathing(0.3));
      break;
    }
    case "speaking": {
      handles.push(A.startAudienceMurmur(level.crowd != null ? level.crowd : intensity));
      if (levelIdx >= 2) handles.push(A.startBreathing(0.4 + intensity * 0.25));
      break;
    }
    case "driving": {
      const speed = level.speed != null ? level.speed : intensity;
      handles.push(A.startDrivingDrone(speed));
      if (levelIdx >= 4) handles.push(A.startRain(0.6));
      if (levelIdx >= 3) handles.push(A.startBreathing(0.35));
      break;
    }
    case "storms": {
      handles.push(A.startRain(0.4 + intensity * 0.5));
      if (levelIdx >= 2) handles.push(A.startBreathing(0.35));
      break;
    }
    case "dark": {
      handles.push(A.startRoomTone(0.3 + intensity * 0.3));
      if (levelIdx >= 2) handles.push(A.startBreathing(0.4 + intensity * 0.2));
      break;
    }
  }
  return handles;
}

// SUDS slider live update (also used on rate + predict views)
document.addEventListener("input", (e) => {
  if (!e.target) return;
  if (e.target.id === "suds") {
    const out = document.getElementById("sudsValue");
    if (out) out.textContent = e.target.value;
  } else if (e.target.id === "predictedSuds") {
    const out = document.getElementById("predictedValue");
    if (out) out.textContent = e.target.value;
  }
});

// ---------- Breathing animation ----------
function runBreathing() {
  const c = document.getElementById("breathCircle");
  if (!c) return;
  const phases = [
    { cls: "inhale", text: "Inhale…", ms: 4000 },
    { cls: "",       text: "Hold",    ms: 2000 },
    { cls: "exhale", text: "Exhale…", ms: 4000 },
    { cls: "",       text: "Hold",    ms: 2000 }
  ];
  let i = 0;
  function step() {
    if (!c.isConnected) return;
    c.classList.remove("inhale", "exhale");
    const phase = phases[i % phases.length];
    if (phase.cls) c.classList.add(phase.cls);
    c.textContent = phase.text;
    i++;
    setTimeout(step, phase.ms);
  }
  step();
}

// ---------- Scene renderers ----------
function renderHeights(el, lv, idx) {
  const h = lv.height; // 0..1
  // Sky gradient gets darker with height; horizon drops as we go up.
  const horizon = 70 - h*45; // % from top
  el.innerHTML = `
    <svg viewBox="0 0 800 360" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky${idx}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stop-color="#1e3a8a"/>
          <stop offset="1" stop-color="#7dd3fc"/>
        </linearGradient>
      </defs>
      <rect width="800" height="360" fill="url(#sky${idx})"/>
      <!-- distant clouds -->
      <ellipse cx="120" cy="${60+ (1-h)*60}" rx="60" ry="10" fill="rgba(255,255,255,.5)"/>
      <ellipse cx="600" cy="${100+(1-h)*40}" rx="80" ry="12" fill="rgba(255,255,255,.4)"/>
      <!-- ground / city / street -->
      <g class="ground" transform="translate(0,${horizon*3.6})">
        <rect x="0" y="0" width="800" height="400" fill="#1f2937"/>
        ${Array.from({length: 12}).map((_,i) => {
          const x = i*70 + 10;
          const w = 50;
          const bh = 20 + (i*7)%80;
          return `<rect x="${x}" y="${-bh}" width="${w}" height="${bh}" fill="#0f172a" stroke="#334155"/>`;
        }).join("")}
        <!-- street -->
        <rect x="0" y="-2" width="800" height="6" fill="#334155"/>
      </g>

  const p = PHOBIAS[key];
  return p ? `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="120" fill="var(--panel-3)"/><g transform="translate(84 44) scale(1.3)">${p.icon.replace(/<svg[^>]*>|<\/svg>/g, "")}</g></svg>` : "";

// Apply the saved theme (light or dark) by toggling a body class. CSS uses
// :root vs body.light-mode overrides for the major colour variables.
function applyTheme() {
  let pref = "dark";
  try { pref = localStorage.getItem("fobia.theme") || "dark"; } catch {}
  document.body.classList.toggle("light-mode", pref === "light");
  // Also keep the theme-color meta in sync so installed PWAs match
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", pref === "light" ? "#f0f4f9" : "#0f1724");
}

// Daily reminder scheduler — checks every hour while the app is open. We can't
// schedule across closed-tab time without a push server, but if the user opens
// the app any time after 22h since the last reminder, we'll fire one.
let reminderInterval = null;
function scheduleReminders() {
  if (reminderInterval) clearInterval(reminderInterval);
  if (localStorage.getItem("fobia.reminders") !== "1") return;
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const tick = () => {
    const last = parseInt(localStorage.getItem("fobia.lastReminder") || "0", 10);
    const now = Date.now();
    if (now - last > 1000 * 60 * 60 * 22) {
      try {
        const ch = window.Character && window.Character.loadCharacter();
        const name = ch?.name ? `, ${ch.name}` : "";
        new Notification("Step Up", {
          body: `A small rung today${name}? You don't have to climb far.`,
          icon: "icon.svg",
        });
        localStorage.setItem("fobia.lastReminder", String(now));
      } catch {}
    }
  };
  // Run an initial check on app load (foreground reminder for users returning)
  tick();
  reminderInterval = setInterval(tick, 1000 * 60 * 60);   // every hour
}

// Import a previously-exported JSON file. Restores characters, state and
// settings into localStorage and reloads the app so all caches refresh.
function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json,.json";
  input.onchange = async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data || data.version == null) {
        alert("This doesn't look like a Step Up export. Aborting.");
        return;
      }
      if (!confirm("Import this file? It will replace every character, session, note and setting on this device.")) return;
      // Restore each section if present
      if (Array.isArray(data.characters)) {
        localStorage.setItem("fobia.characters.v2", JSON.stringify(data.characters));
      }
      if (data.activeCharacterId) {
        localStorage.setItem("fobia.activeCharacter.v1", data.activeCharacterId);
      }
      if (data.state) {
        localStorage.setItem("fobia.state.v1", JSON.stringify(data.state));
      }
      if (data.settings) {
        for (const [k, v] of Object.entries(data.settings)) {
          if (v != null) localStorage.setItem("fobia." + k, v);
        }
      }
      if (data.customPhobias) {
        localStorage.setItem("fobia.customPhobias.v1", JSON.stringify(data.customPhobias));
      }
      alert("Imported. Reloading…");
      location.reload();
    } catch (err) {
      alert("Couldn't read that file. Make sure it's a Step Up export.\n\n" + err.message);
    }
  };
  input.click();
}

function escapeHtml(s) {

}

// ---------- Shareable progress card ----------
// Renders the user's progress as a 1080×1080 PNG via Canvas. Uses Web Share
// API when available (mobile), falls back to download.
function generateProgressCard() {
  const W = 1080, H = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  // Background gradient (matches the app's brand)
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, "#1f2a44");
  bg.addColorStop(1, "#0f1724");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  // Subtle background spotlight
  const spot = ctx.createRadialGradient(W * 0.85, H * 0.05, 50, W * 0.85, H * 0.05, W * 0.6);
  spot.addColorStop(0, "rgba(124,209,197,.15)");
  spot.addColorStop(1, "rgba(124,209,197,0)");
  ctx.fillStyle = spot;
  ctx.fillRect(0, 0, W, H);

  // Brand
  ctx.fillStyle = "#7cd1c5";
  ctx.font = "600 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText("● STEP UP", 80, 90);
  ctx.fillStyle = "#94a3b8";
  ctx.font = "20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText("Gradual phobia exposure", 80, 122);

  // Character name + avatar (rendered through SVG → image)
  const ch = window.Character && window.Character.loadCharacter();
  const name = ch?.name || "Anonymous";
  ctx.fillStyle = "#fff";
  ctx.font = "700 64px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText(name, 80, 220);

  // Stats
  const totalSessions = state.log.length;
  const completedRungs = Object.values(state.progress || {}).reduce((s, p) => s + (p.highestCompleted + 1), 0);
  const ladders = Object.entries(PHOBIAS).filter(([k, p]) =>
    state.progress && state.progress[k] && state.progress[k].highestCompleted >= p.levels.length - 1).length;
  const predicted = state.log.filter(l => l.predicted != null);
  const avgGap = predicted.length
    ? predicted.reduce((s, l) => s + (l.predicted - l.suds), 0) / predicted.length
    : null;
  const streak = computeStreak();

  function drawStat(x, y, val, label) {
    ctx.fillStyle = "#7cd1c5";
    ctx.font = "700 96px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.fillText(val, x, y);
    ctx.fillStyle = "#94a3b8";
    ctx.font = "500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.fillText(label, x, y + 36);
  }
  drawStat( 80, 380, String(totalSessions),  "TOTAL SESSIONS");
  drawStat(380, 380, String(completedRungs), "RUNGS CLIMBED");
  drawStat(680, 380, streak >= 1 ? `🔥 ${streak}` : "—", "DAY STREAK");
  drawStat( 80, 540, ladders > 0 ? String(ladders) : "—", "LADDERS COMPLETE");
  drawStat(380, 540, avgGap == null ? "—" : (avgGap >= 0 ? "+" : "") + avgGap.toFixed(1), "AVG OVER-PREDICTION");

  // Per-phobia mini chart
  const myPhobias = ch
    ? [ch.primaryPhobia, ...(ch.additionalPhobias || [])].filter(Boolean)
    : Object.keys(state.progress || {});
  const lineY = 700;
  ctx.strokeStyle = "#243049";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(80, lineY); ctx.lineTo(W - 80, lineY); ctx.stroke();

  ctx.fillStyle = "#fff";
  ctx.font = "600 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText("Your fears in motion", 80, 760);

  let row = 0;
  for (const key of myPhobias.slice(0, 4)) {
    const p = PHOBIAS[key]; if (!p) continue;
    const sessions = state.log.filter(l => l.phobia === key);
    if (sessions.length === 0) continue;
    const baseY = 800 + row * 60;
    // Phobia label
    ctx.fillStyle = "#cbd5e1";
    ctx.font = "500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.fillText(p.label, 80, baseY);
    // Mini SUDS line for this phobia
    const chartX = 380, chartW = W - 80 - chartX, chartH = 30;
    ctx.strokeStyle = "rgba(124,209,197,.5)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    sessions.forEach((s, i) => {
      const x = chartX + (sessions.length === 1 ? chartW / 2 : (i / (sessions.length - 1)) * chartW);
      const y = baseY - (s.suds / 10) * chartH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    // Average SUDS pill
    const avg = (sessions.reduce((s, l) => s + l.suds, 0) / sessions.length).toFixed(1);
    ctx.fillStyle = "#94a3b8";
    ctx.font = "500 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    ctx.fillText(`avg ${avg}`, 80, baseY + 24);
    row++;
  }

  // Footer
  ctx.fillStyle = "#5a6478";
  ctx.font = "500 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  ctx.fillText("Step Up · prototype, not therapy", 80, H - 60);

  // Output
  canvas.toBlob((blob) => {
    if (!blob) return;
    const file = new File([blob], "step-up-progress.png", { type: "image/png" });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: "My Step Up progress",
        text: `${totalSessions} sessions, ${completedRungs} rungs climbed.`,
      }).catch(() => {/* user cancelled */});
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "step-up-progress.png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  }, "image/png");
}
