          if (window.PhobiaVoice) window.PhobiaVoice.speak("Look at the sky. The plane is held by air, like a fish in water.");
        } else if (btn.dataset.cmd === "grip") {
          if (window.PhobiaVoice) window.PhobiaVoice.speak("Squeeze for ten seconds. Release. Squeeze. Release.");
        } else if (btn.dataset.cmd === "tray") {
          trayTargetAngle = (trayTargetAngle <= -Math.PI / 4) ? 0 : -Math.PI / 2;
          if (window.PhobiaVoice) {
            window.PhobiaVoice.speak(trayTargetAngle === 0 ? "Tray down. Something to rest your hands on." : "Tray stowed.");
          }
        }
      };
    });
  }
  // Spacebar as a keyboard alt for the breath hold (works without taking the focus)
  function onFlyKey(e) {
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    if (e.code !== "Space") return;
    e.preventDefault();
    if (e.type === "keydown" && !breathHeld) {
      breathHeld = true;
      if (window.PhobiaVoice && Math.random() < 0.05) {
        window.PhobiaVoice.speak("Four in. Six out.");
      }
    } else if (e.type === "keyup") {
      breathHeld = false;
    }
  }
  window.addEventListener("keydown", onFlyKey);
  window.addEventListener("keyup", onFlyKey);
  setTimeout(wireFlyingCmds, 0);

  // ---- Breath HUD (rim ring at the bottom of the stage) ----
  // Shows the inhale/exhale phase as a soft expanding ring + a count of
  // completed cycles so the user can see their breath taking visible effect.
  let breathHud = null;
  setTimeout(() => {
    const stage = document.getElementById("stage");
    if (!stage) return;
    let hud = stage.querySelector(".breath-hud");
    if (!hud) {
      hud = document.createElement("div");
      hud.className = "breath-hud";
      hud.innerHTML = `
        <div class="breath-ring"><div class="breath-fill"></div></div>
        <div class="breath-label">Press &amp; hold the breath button (or Space) — 4 in · 6 out</div>
      `;
      stage.appendChild(hud);
    }
    breathHud = hud;
  }, 80);

  return {
    controls: {
      mode: "lookOnly",
      initialPos: [0, 0, 0],
      initialYaw: -0.4, // look slightly toward window
      initialPitch: 0,
      lookSpeed: 0.0035,
      pitchMin: -0.6, pitchMax: 0.4,
      cameraModeLocked: "fp",        // sitting in airplane seat — FP only
    },
    hands: { sleeveColor: 0x2c4a6e },
    bloom: { strength: 0.45, threshold: 0.85 },
    interact(controls) {
      if (breathHeld) {
        return { gesture: "rest", hint: "breathing · 4 in · 6 out · let the cabin settle" };
      }
      if (controls.pitch < -0.2) return { gesture: "grab", hint: "grip the armrests · or hold Space to breathe" };
      return { gesture: "rest", hint: "press & hold the breath button to settle the cabin" };
    },
    onClick() {},
    update(t, controls, dt) {
      if (controls) flyingControls = controls;
      const d = dt || 0.016;
      // ---- Breath cycle (4 in, 6 out = 10 s total) ----
      // Advances only while held. Each completed cycle bumps calmFloor (max
      // 0.55) so sustained breathing carries persistent damping into bumps.
      if (breathHeld) {
        breathT += d;
        if (breathT >= 10) {
          breathT = 0;
          calmCycles += 1;
          calmFloor = Math.min(0.55, calmFloor + 0.10);
          if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
            try { window.PhobiaAudio.indicatorClick(); } catch {}
          }
        }
        // During the exhale (4..10 s), instantaneous damping is at its peak.
        // During the inhale (0..4 s), damping is rising from prev value.
        const exhalePhase = breathT >= 4 ? (breathT - 4) / 6 : 0;
        const inhalePhase = breathT < 4 ? breathT / 4 : 1;
        calmTurbulence = Math.max(calmTurbulence, 0.4 + inhalePhase * 0.3 + exhalePhase * 0.3);
      } else {
        // Slowly decay back toward calmFloor (so the persistent gain remains
        // even after the user releases the button).
        calmTurbulence = Math.max(calmFloor, calmTurbulence - d * 0.4);
        breathT = Math.max(0, breathT - d * 1.2);   // wind back to ready
      }
      // ---- Update breath HUD ----
      if (breathHud) {
        const ring = breathHud.querySelector(".breath-fill");
        const label = breathHud.querySelector(".breath-label");
        if (ring) {
          // The ring scales 0.4 → 1.0 during inhale (0..4s), 1.0 → 0.4 during exhale (4..10s)
          let scale = 0.4;
          if (breathT < 4)         scale = 0.4 + (breathT / 4) * 0.6;
          else if (breathT < 10)   scale = 1.0 - ((breathT - 4) / 6) * 0.6;
          ring.style.transform = `scale(${scale.toFixed(3)})`;
          ring.style.opacity = breathHeld ? "0.85" : "0.45";
        }
        if (label) {
          label.textContent = breathHeld
            ? (breathT < 4
                ? `Breathe in — ${(4 - breathT).toFixed(1)}s · cycles: ${calmCycles}`
                : `Breathe out — ${(10 - breathT).toFixed(1)}s · cycles: ${calmCycles}`)
            : (calmCycles > 0
                ? `Hold the breath button to continue · ${calmCycles} cycle${calmCycles === 1 ? "" : "s"} · cabin holding calm`
                : "Press & hold the breath button (or Space) — 4 in · 6 out");
        }
      }
      // Animate tray to target angle
      trayPivot.rotation.x += (trayTargetAngle - trayPivot.rotation.x) * 0.15;
      const dampening = 1 - calmTurbulence * 0.85;
      // Continuous turbulence
      const tShake = stage * 0.06 * dampening;
      camera.position.y += Math.sin(t * 9.0) * tShake;
      camera.position.x += Math.cos(t * 7.0) * tShake * 0.5;
      camera.rotation.z += Math.sin(t * 5.0) * stage * 0.005 * dampening;
      // Random jolts dampened by calm
      if (stage > 0.85 && Math.random() < 0.005 * dampening) {
        camera.position.y += (Math.random() - 0.5) * 0.15 * dampening;
        camera.rotation.z += (Math.random() - 0.5) * 0.03 * dampening;
      }
    },
    dispose() {
      try {
        window.removeEventListener("keydown", onFlyKey);
        window.removeEventListener("keyup", onFlyKey);
      } catch {}
      const stage = document.getElementById("stage");
      if (stage) {
        const hud = stage.querySelector(".breath-hud");
        if (hud) hud.remove();
      }
    },
  };
}

// ---------- Needles (medical) ----------
function setupNeedles(scene, camera, level) {
  const proximity = level.proximity;

  scene.background = new THREE.Color(0xe8eef4);
  // Bright clinical lighting
  const ceiling = new THREE.RectAreaLight(0xffffff, 4, 4, 4);
  ceiling.position.set(0, 3, -1);
  ceiling.lookAt(0, 0, -1);
  scene.add(ceiling);
  scene.add(new THREE.AmbientLight(0xeef4ff, 0.7));

  // Floor (linoleum)
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshStandardMaterial({ color: 0xc4c8d0, roughness: 0.4 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xeef2f6, roughness: 0.95 });
  const back = new THREE.Mesh(new THREE.PlaneGeometry(20, 8), wallMat);
  back.position.set(0, 2, -8);
  scene.add(back);

  // Wall mirror — clinical bathroom-style mirror to the right.
  // The user sees themselves reflected as the syringe approaches.
  if (!IS_LOW_POWER) {
    const mirror = new Reflector(
      new THREE.PlaneGeometry(1.4, 1.6),
      { textureWidth: 512, textureHeight: 512, color: 0x9ab0c0 }
    );
    mirror.position.set(3.5, 0.3, -3);
    mirror.rotation.y = -Math.PI / 2;       // faces the user
    scene.add(mirror);
    // Frame around the mirror
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(0.05, 1.7, 1.5),
      new THREE.MeshStandardMaterial({ color: 0xb8c0c8, metalness: 0.4, roughness: 0.4 })
    );
    frame.position.set(3.55, 0.3, -3);
    scene.add(frame);
  }
  const left = new THREE.Mesh(new THREE.PlaneGeometry(20, 8), wallMat);
  left.rotation.y = Math.PI / 2; left.position.set(-8, 2, -1);
  scene.add(left);
  const right = new THREE.Mesh(new THREE.PlaneGeometry(20, 8), wallMat);
  right.rotation.y = -Math.PI / 2; right.position.set(8, 2, -1);
  scene.add(right);

  // Medical tray (reflective)
  const tray = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.04, 0.5),
    new THREE.MeshStandardMaterial({ color: 0xc8cdd4, metalness: 0.7, roughness: 0.2 })
  );
  // Tray distance follows proximity (closer at higher rung)
  const trayZ = -3.5 + proximity * 2.5;
  tray.position.set(0.5, -0.4, trayZ);
  tray.castShadow = true;
  scene.add(tray);

  // Syringe — a barrel + plunger + needle
  const syringe = new THREE.Group();
  const barrel = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.025, 0.18, 16),
    new THREE.MeshStandardMaterial({ color: 0xeaeef2, transparent: true, opacity: 0.85, roughness: 0.2 })
  );
  barrel.rotation.z = Math.PI / 2;
  syringe.add(barrel);
  const plunger = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.018, 0.05, 16),
    new THREE.MeshStandardMaterial({ color: 0xdcdfe4, roughness: 0.5 })
  );
  plunger.rotation.z = Math.PI / 2;
  plunger.position.x = -0.10;
  syringe.add(plunger);
  const flange = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, 0.012, 16),
    new THREE.MeshStandardMaterial({ color: 0xdcdfe4, roughness: 0.5 })
  );
  flange.rotation.z = Math.PI / 2;
  flange.position.x = -0.135;
  syringe.add(flange);
  // Needle
  const needle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.003, 0.001, 0.06, 8),
    new THREE.MeshStandardMaterial({ color: 0xb8b8c0, metalness: 0.9, roughness: 0.1 })
  );
  needle.rotation.z = Math.PI / 2;
  needle.position.x = 0.12;
  syringe.add(needle);
  // Liquid (level varies with proximity)
  const liquid = new THREE.Mesh(
    new THREE.CylinderGeometry(0.022, 0.022, 0.10, 16),
    new THREE.MeshStandardMaterial({ color: 0xc6e8d8, transparent: true, opacity: 0.85 })
  );
  liquid.rotation.z = Math.PI / 2;
  liquid.position.x = -0.04;
  syringe.add(liquid);

  // Position the syringe based on proximity
  const syringeZ = -3.0 + proximity * 2.6;
  syringe.position.set(0.4, -0.35, syringeZ);
  // At the highest rung, the syringe rotates to point toward the camera/arm
  if (proximity > 0.7) {
    syringe.rotation.y = -0.6 + (proximity - 0.7) * 1.2;
  }
  scene.add(syringe);

  // ----- Visible nurse character holding the syringe -----
  // Procedural humanoid in pale-blue scrubs standing near the tray. The
  // syringe's z-position drives the nurse's z-position so they appear to
  // step closer with the rung. At low rungs the nurse is across the room;
  // at the highest rung they're right in front of the user with the
  // syringe held in their hand.
  const nurseGroup = new THREE.Group();
  const scrubColor = 0x4a8fb8;     // pale clinical blue
  const scrubTrim  = 0x365a7c;
  const nurseSkin  = 0xe6c5a8;     // lighter palette so the nurse reads as a clinician under fluorescents
  const nurseHair  = 0x3a2418;
  // PBR upgrade — fabric weave on the scrubs (cotton), skin pores on the
  // nurse's face/hands, hair streak normals on the bun. The nurse is
  // *right in the user's face* during the close-up rungs of needles, so
  // the fidelity bump matters more here than almost anywhere else.
  const __PR = window.PhobiaRealism;
  const scrubMat = (__PR && __PR.fabricMaterial)
    ? __PR.fabricMaterial("#4a8fb8", "cotton")
    : new THREE.MeshStandardMaterial({ color: scrubColor, roughness: 0.95 });
  const trimMat  = (__PR && __PR.fabricMaterial)
    ? __PR.fabricMaterial("#365a7c", "cotton")
    : new THREE.MeshStandardMaterial({ color: scrubTrim,  roughness: 0.95 });
  const nurseSkinMat = (__PR && __PR.skinMaterial)
    ? __PR.skinMaterial("#e6c5a8")
    : new THREE.MeshStandardMaterial({ color: nurseSkin, roughness: 0.85 });
  const nurseHairMat = (__PR && __PR.hairMaterial)
    ? __PR.hairMaterial("#3a2418")
    : new THREE.MeshStandardMaterial({ color: nurseHair, roughness: 1.0 });
  // Torso (scrubs top)
  const nurseTorso = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.20, 0.55, 8, 14), scrubMat
  );
  nurseTorso.position.y = 0.55;
  nurseTorso.castShadow = true;
  nurseGroup.add(nurseTorso);
  // V-neckline trim (a small dark patch at the throat)
  const neckline = new THREE.Mesh(
    new THREE.BoxGeometry(0.16, 0.04, 0.04), trimMat
  );
  neckline.position.set(0, 0.86, 0.16);
  nurseGroup.add(neckline);
  // Neck
  const nurseNeck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.075, 0.10, 12), nurseSkinMat
  );
  nurseNeck.position.y = 0.92;
  nurseGroup.add(nurseNeck);
  // Head
  const nurseHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.13, 16, 12), nurseSkinMat
  );
  nurseHead.scale.set(0.95, 1.05, 0.95);
  nurseHead.position.y = 1.10;
  nurseHead.castShadow = true;
  nurseGroup.add(nurseHead);
  // Hair (pulled-back bun-ish — close-fit cap)
  const nurseHairCap = new THREE.Mesh(
    new THREE.SphereGeometry(0.135, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55),
    nurseHairMat
  );
  nurseHairCap.scale.copy(nurseHead.scale);
  nurseHairCap.position.copy(nurseHead.position);
  nurseGroup.add(nurseHairCap);
  // Bun on the back of the head
  const bun = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10), nurseHairMat
  );
  bun.position.set(0, 1.06, -0.10);
  nurseGroup.add(bun);
  // Eyes (dark dots)
  for (const sx of [-1, 1]) {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.014, 10, 8),
      new THREE.MeshBasicMaterial({ color: 0x141014 })
    );
    eye.position.set(sx * 0.04, 1.12, 0.115);
    nurseGroup.add(eye);
  }
  // Soft smile
  const nurseSmile = new THREE.Mesh(
    new THREE.TorusGeometry(0.025, 0.004, 6, 12, Math.PI),
    new THREE.MeshBasicMaterial({ color: 0x8a4a4a })
  );
  nurseSmile.rotation.z = Math.PI;
  nurseSmile.position.set(0, 1.06, 0.12);
  nurseGroup.add(nurseSmile);
  // Shoulders (rounded caps)
  for (const sx of [-1, 1]) {
    const shoulder = new THREE.Mesh(
      new THREE.SphereGeometry(0.10, 12, 10), scrubMat
    );
    shoulder.position.set(sx * 0.22, 0.86, 0);
    nurseGroup.add(shoulder);
  }
  // Right arm reaching toward the syringe — articulated upper + forearm
  // The hand will visibly grip the syringe so the user sees a person
  // performing the procedure, not a floating instrument.
  const nurseRightArmRoot = new THREE.Group();
  nurseRightArmRoot.position.set(-0.22, 0.85, 0);   // right shoulder (mirrored: nurse faces user)
  nurseRightArmRoot.rotation.z = 0.3;
  nurseRightArmRoot.rotation.x = -0.4;              // arm angled forward
  nurseGroup.add(nurseRightArmRoot);
  const upperArm = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.07, 0.28, 8, 12), scrubMat
  );
  upperArm.position.set(0, -0.14, 0);
  upperArm.castShadow = true;
  nurseRightArmRoot.add(upperArm);
  // Cuff (slightly darker band)
  const cuff = new THREE.Mesh(
    new THREE.CylinderGeometry(0.075, 0.075, 0.025, 12), trimMat
  );
  cuff.position.set(0, -0.30, 0);
  nurseRightArmRoot.add(cuff);
  // Forearm
  const forearmGroup = new THREE.Group();
  forearmGroup.position.set(0, -0.31, 0);
  forearmGroup.rotation.x = 0.5;                     // forearm bent forward
  nurseRightArmRoot.add(forearmGroup);
  const nurseForearm = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.055, 0.24, 8, 12), nurseSkinMat
  );
  nurseForearm.position.set(0, -0.12, 0);
  forearmGroup.add(nurseForearm);
  // Hand (palm) — this is where the syringe attaches
  const nurseHand = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10), nurseSkinMat
  );
  nurseHand.scale.set(0.85, 0.55, 1.1);
  nurseHand.position.set(0, -0.27, 0);
  forearmGroup.add(nurseHand);
  // Left arm — relaxed at the side
  const nurseLeftArm = new THREE.Group();
  nurseLeftArm.position.set(0.22, 0.85, 0);
  nurseLeftArm.rotation.z = -0.1;
  nurseGroup.add(nurseLeftArm);
  const leftUpper = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.07, 0.30, 8, 12), scrubMat
  );
  leftUpper.position.set(0, -0.16, 0);
  nurseLeftArm.add(leftUpper);
  const leftForearm = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.055, 0.26, 8, 12), nurseSkinMat
  );
  leftForearm.position.set(0, -0.46, 0);
  nurseLeftArm.add(leftForearm);
  const leftHand = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10), nurseSkinMat
  );
  leftHand.scale.set(0.85, 0.55, 1.1);
  leftHand.position.set(0, -0.62, 0);
  nurseLeftArm.add(leftHand);
  // Trousers + shoes
  for (const sx of [-1, 1]) {
    const leg = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.085, 0.55, 8, 12), trimMat
    );
    leg.position.set(sx * 0.10, 0.05, 0);
    leg.castShadow = true;
    nurseGroup.add(leg);
    const shoe = new THREE.Mesh(
      new THREE.BoxGeometry(0.10, 0.06, 0.20),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.7 })
    );
    shoe.position.set(sx * 0.10, -0.30, 0.05);
    shoe.castShadow = true;
    nurseGroup.add(shoe);
  }
  // Position the nurse so they're holding the syringe — a step behind it
  // so it appears in their right hand. The nurse stands at the same Z as
  // the syringe, offset slightly to the right and BEHIND it so the syringe
  // sits in the nurse's hand pointing toward the camera.
  nurseGroup.position.set(0.85, -1.0, syringeZ + 0.4);
  // Face the user
  nurseGroup.rotation.y = -0.4;
  scene.add(nurseGroup);

  // Re-parent the syringe to the nurse's hand so they move together. We
  // want the syringe to track the nurse's right hand exactly so it never
  // drifts off the palm. Inside the local hand frame we position the
  // syringe so the needle points away from the nurse and toward the camera.
  scene.remove(syringe);
  forearmGroup.add(syringe);
  // Clear the previous absolute syringe position; place inside the hand
  syringe.position.set(0, -0.30, 0);
  syringe.rotation.set(0, -1.0, 0);    // angle the needle toward the user

  // The user's arm + hand. Visible from the second rung on so they can
  // see themselves making a fist as the syringe approaches.
  let armGroup = null;
  let fingerJoints = [];   // [{proximal, distal}] — each finger's two joints
  let thumbJoint = null;
  const armSkin = (window.Character && window.Character.loadCharacter())
              ? window.Character.hexToInt(window.Character.skinHex(window.Character.loadCharacter()))
              : 0xe8b794;
  if (proximity > 0.35) {
    armGroup = new THREE.Group();
    armGroup.position.set(0.18, -0.55, -0.55);
    armGroup.rotation.z = -0.3;
    armGroup.rotation.x = Math.PI / 2.4;
    scene.add(armGroup);

    const armSkinMat = new THREE.MeshStandardMaterial({ color: armSkin, roughness: 0.78 });
    const forearm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.062, 0.052, 0.42, 18),
      armSkinMat
    );
    forearm.castShadow = true;
    armGroup.add(forearm);

    // Antiseptic swab patch + faint vein
    const patch = new THREE.Mesh(
      new THREE.CircleGeometry(0.05, 18),
      new THREE.MeshStandardMaterial({ color: 0xfff8d8, transparent: true, opacity: 0.85 })
    );
    patch.rotation.x = -Math.PI / 2;
    patch.position.set(0, 0.04, 0.05);
    armGroup.add(patch);
    const vein = new THREE.Mesh(
      new THREE.PlaneGeometry(0.008, 0.04),
      new THREE.MeshBasicMaterial({ color: 0x3a5070, transparent: true, opacity: 0.45 })
    );
    vein.rotation.x = -Math.PI / 2;
    vein.position.set(0.004, 0.041, 0.05);
    armGroup.add(vein);

    // Wrist + palm
    const wrist = new THREE.Mesh(new THREE.SphereGeometry(0.052, 14, 12), armSkinMat);
    wrist.position.y = -0.21;
    wrist.scale.set(1, 0.8, 1);
    armGroup.add(wrist);
    const handBase = new THREE.Group();
    handBase.position.set(0, -0.28, 0);
    armGroup.add(handBase);
    const palm = new THREE.Mesh(new THREE.SphereGeometry(0.075, 16, 14), armSkinMat);
    palm.scale.set(1.0, 0.55, 0.85);
    handBase.add(palm);

    // Four fingers — proximal + distal joints, so they curl into a real fist
    const fingerOffsets = [-0.045, -0.015, 0.015, 0.045];
    for (const fx of fingerOffsets) {
      const proximal = new THREE.Group();
      proximal.position.set(fx, -0.005, 0.072);
      handBase.add(proximal);
      const seg1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.011, 0.045, 10),
        armSkinMat
      );
      seg1.position.y = -0.022;
      proximal.add(seg1);
      const distal = new THREE.Group();
      distal.position.set(0, -0.045, 0);
      proximal.add(distal);
      const seg2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.011, 0.009, 0.038, 10),
        armSkinMat
      );
      seg2.position.y = -0.019;
      distal.add(seg2);
      fingerJoints.push({ proximal, distal });
    }
    // Thumb runs sideways off the palm
    thumbJoint = new THREE.Group();
    thumbJoint.position.set(-0.062, 0.005, 0.04);
    thumbJoint.rotation.z = -0.6;
    handBase.add(thumbJoint);
    const thumbSeg = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.014, 0.05, 6, 10),
      armSkinMat
    );
    thumbSeg.position.y = -0.03;
    thumbJoint.add(thumbSeg);
  }

  camera.fov = 55;
  camera.updateProjectionMatrix();

  let needlesControls = null;
  let lookAwayT = 0;       // 0..1 — fades back to 0 over time

  // ----- Press-and-hold to clench fist (real human action) -----
  // The nurse's instruction: "Make a fist." Pressing the screen clenches the
  // hand. While held, the needle advances at a steady, predictable rate. If
  // you let go, it stops. The user holds *all* the agency — same as in real
  // life, where you can ask the nurse to pause at any moment.
  let fistAmt = 0;            // 0=open, 1=tight fist (smoothed visually)
  let fistTarget = 0;
  let fistHeld = false;
  let needleAdvance = 0;      // 0..1 — how far the needle has progressed
  // The NURSE moves toward the user (not the syringe alone). This is the
  // realistic motion: the clinician approaches with the syringe in hand.
  // Capture the nurse's resting position; approach target is right beside
  // the user's arm.
  const nurseBaseX = nurseGroup.position.x;
  const nurseBaseY = nurseGroup.position.y;
  const nurseBaseZ = nurseGroup.position.z;
  const nurseApproachX = 0.55;     // stands slightly right of user
  const nurseApproachY = -1.0;     // ground level unchanged
  const nurseApproachZ = -0.50;    // close to the user's arm
  // Gripping is only enabled at proximity ≥ 0.35 (when the hand is visible)
  function bindNeedleHold() {
    const canvasDom = document.querySelector("#stage canvas");
    if (!canvasDom) return;
    canvasDom.addEventListener("pointerdown", (e) => {
      if (proximity < 0.35) return;
      fistHeld = true;
      fistTarget = 1.0;
    });
    function release() {
      fistHeld = false;
      fistTarget = 0;
    }
    canvasDom.addEventListener("pointerup", release);
    canvasDom.addEventListener("pointercancel", release);
    canvasDom.addEventListener("pointerleave", release);
    // Spacebar / 'F' as keyboard alternative
    window.addEventListener("keydown", (e) => {
      if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
      if (proximity < 0.35) return;
      if (e.code === "Space" || e.key.toLowerCase() === "f") {
        e.preventDefault();
        fistHeld = true; fistTarget = 1.0;
      }
    });
    window.addEventListener("keyup", (e) => {
      if (e.code === "Space" || e.key.toLowerCase() === "f") release();
    });
  }
  setTimeout(bindNeedleHold, 60);

  // Tiny on-stage HUD: shows whether the fist is held and a "calm" pulse so
  // the user can pace their breath. We piggy-back on the trust-hud styling.
  let needleHud = null;
  function refreshNeedleHud() {
    if (!needleHud) return;
    const pct = Math.round(fistAmt * 100);
    needleHud.querySelector(".trust-bar-fill").style.width = pct + "%";
    needleHud.querySelector(".trust-pct").textContent = fistHeld ? "holding" : "release";
  }
  setTimeout(() => {
    if (proximity < 0.35) return;
    const stage = document.getElementById("stage");
    if (!stage) return;
    let hud = stage.querySelector(".trust-hud");
    if (!hud) {
      hud = document.createElement("div");
      hud.className = "trust-hud";
      hud.innerHTML = `
        <div class="trust-row">
          <div class="trust-name">Make a fist</div>
          <div class="trust-pct">release</div>
        </div>
        <div class="trust-bar"><div class="trust-bar-fill"></div></div>
        <div class="trust-hint">Press and hold · breathe out · release any time</div>
      `;
      stage.appendChild(hud);
    }
    needleHud = hud;
  }, 80);

  function wireNeedlesCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="needles"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const c = needlesControls; if (!c) return;
        if (btn.dataset.cmd === "look-away") {
          // Tween yaw to look at the wall instead of the syringe
          const fromY = c.yaw, toY = -1.0, fromP = c.pitch, toP = 0.0;
          let k = 0;
          const id = setInterval(() => {
            k += 0.05;
            if (k >= 1) { c.yaw = toY; c.pitch = toP; clearInterval(id); return; }
            c.yaw   = fromY + (toY - fromY) * k;
            c.pitch = fromP + (toP - fromP) * k;
          }, 16);
          if (window.PhobiaVoice) window.PhobiaVoice.speak("Looking away. Studies show this reduces reported pain.");
        } else if (btn.dataset.cmd === "look-back") {
          const fromY = c.yaw, toY = 0, fromP = c.pitch, toP = -0.2;
          let k = 0;
          const id = setInterval(() => {
            k += 0.05;
            if (k >= 1) { c.yaw = toY; c.pitch = toP; clearInterval(id); return; }
            c.yaw   = fromY + (toY - fromY) * k;
            c.pitch = fromP + (toP - fromP) * k;
          }, 16);
        } else if (btn.dataset.cmd === "bandage") {
          if (window.PhobiaVoice) window.PhobiaVoice.speak("Press for thirty seconds. Notice the warmth. The needle is gone.");
        }
      };
    });
  }
  setTimeout(wireNeedlesCmds, 0);

  return {
    controls: {
      mode: "lookOnly",
      initialPos: [0, 0, 0],
      initialYaw: 0,
      initialPitch: -0.2,
      lookSpeed: 0.003,
      cameraModeLocked: "fp",          // looking at your own arm — FP only
    },
    hands: { sleeveColor: 0x9a9aa6 }, // light hospital-gown grey
    bloom: { strength: 0.25, threshold: 0.95 },
    surface: "hard",   // clinic linoleum
    interact() {
      if (proximity < 0.35) return { gesture: "rest" };
      return {
        gesture: "grab",
        hint: fistHeld
          ? "holding the fist · slow exhale · release whenever you need"
          : "press and hold to make a fist · let the needle approach at your pace",
      };
    },
    onClick() {},
    update(t, controls, dt) {
      if (controls) needlesControls = controls;
      const d = dt || 0.016;
      // Smooth the fist toward its target — quick clench, slow release
      const k = fistTarget > fistAmt ? 8.0 : 4.0;
      fistAmt += (fistTarget - fistAmt) * Math.min(1, d * k);
      // Drive each finger joint. Real fingers curl ~90° at the proximal
      // and ~60° at the distal — so a "tight fist" rotates them by those
      // angles (Math.PI/2 and Math.PI/3).
      for (const f of fingerJoints) {
        f.proximal.rotation.x = fistAmt * (Math.PI / 2);
        f.distal.rotation.x   = fistAmt * (Math.PI / 3);
      }
      if (thumbJoint) {
        thumbJoint.rotation.z = -0.6 + fistAmt * 0.7;     // thumb folds in
        thumbJoint.rotation.x = fistAmt * 0.4;
      }
      // Steady advance only while fist is held. Linear so the user can pace
      // exactly how long the procedure takes.
      if (fistHeld) {
        needleAdvance = Math.min(1, needleAdvance + d * 0.10);
      }
      // When fully advanced, hold the needle in place for ~0.8 s, then retreat.
      let withdraw = 0;
      if (needleAdvance >= 0.999 && fistHeld) {
        // Brief "in the arm" beat. After 0.8 s of holding here, withdraw.
        if (!syringe.userData._heldT) syringe.userData._heldT = 0;
        syringe.userData._heldT += d;
        if (syringe.userData._heldT > 0.8) {
          withdraw = Math.min(1, (syringe.userData._heldT - 0.8) / 0.6);
          if (withdraw >= 1) {
            // Allow another "approach" — reset for a clean second attempt
            // but only if user releases first. We pause here.
            withdraw = 1;
          }
        }
      }
      // Position the NURSE (with syringe in hand) from base → approach
      // × needleAdvance, then retreat. The syringe is parented to the
      // nurse's forearm so it follows automatically.
      const adv = needleAdvance * (1 - withdraw);
      nurseGroup.position.x = nurseBaseX + (nurseApproachX - nurseBaseX) * adv;
      nurseGroup.position.y = nurseBaseY + (nurseApproachY - nurseBaseY) * adv;
      nurseGroup.position.z = nurseBaseZ + (nurseApproachZ - nurseBaseZ) * adv;
      // Nurse turns to face the user as they approach
      nurseGroup.rotation.y = -0.4 + adv * -0.4;
      // Plunger depresses slightly when fully in
      if (adv > 0.95) {
        plunger.position.x = -0.10 + (adv - 0.95) * 0.4 * 0.05;
      }
      refreshNeedleHud();
      // Subtle breathing camera at higher rungs (slows when holding the fist)
      const breath = fistHeld ? 0.6 : 1.0;
      camera.position.y += Math.sin(t * 1.4) * 0.01 * (0.5 + proximity) * breath;
    },
    dispose() {
      const stage = document.getElementById("stage");
      if (stage) {
        const hud = stage.querySelector(".trust-hud");
        if (hud) hud.remove();
      }
    },
  };
}

// ---------- Snakes ----------
function setupSnakes(scene, camera, level) {
  const size = level.size;

  scene.background = new THREE.Color(0x3a4030);
  scene.fog = new THREE.Fog(0x3a4030, 8, 30);

  const sun = new THREE.DirectionalLight(0xfff0c0, 1.6);
  sun.position.set(8, 12, 4);
  sun.castShadow = true;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x88a070, 0x4a3a25, 0.5));

  // Earth/grass floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x5e6b3a, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);
  // Dirt path running through the grass — gives the user a clear sense of
  // standing on a trail with the snake on or near the path.
  const path = new THREE.Mesh(
    new THREE.PlaneGeometry(2.4, 40),
    new THREE.MeshStandardMaterial({ color: 0x8a6d40, roughness: 0.95 })
  );
  path.rotation.x = -Math.PI / 2;
  path.position.set(0, -0.99, 0);
  path.receiveShadow = true;
  scene.add(path);
  // Tufts of grass alongside (small flat blades)
  for (let i = 0; i < 60; i++) {
    const g = new THREE.Mesh(
      new THREE.PlaneGeometry(0.3, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x6d7a3a, roughness: 1.0, side: THREE.DoubleSide, transparent: true, opacity: 0.85 })
    );
    const sx = (i % 2 === 0 ? -1 : 1) * (1.4 + Math.random() * 6);
    g.position.set(sx, -0.75, (Math.random() - 0.5) * 18);
    g.rotation.y = Math.random() * Math.PI;
    scene.add(g);
  }

  // Stones scattered
  for (let i = 0; i < 8; i++) {
    const stone = new THREE.Mesh(
      new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x6a6a5a, roughness: 0.95 })
    );
    stone.position.set((Math.random() - 0.5) * 8, -0.9, -2 - Math.random() * 6);
    stone.scale.y = 0.5 + Math.random() * 0.3;
    stone.castShadow = true;
    scene.add(stone);
  }
  // Pollen drifting through the meadow — sells "outside in spring/summer"
  // far better than a flat green plane. Light yellow particles biased to
  // float gently UPWARD (the drift sign in createPollen is negative).
  let _snakePollen = null;
  if (window.PhobiaAtmosphere && window.PhobiaAtmosphere.createPollen) {
    _snakePollen = window.PhobiaAtmosphere.createPollen({
      count: 110, bounds: { x: 14, y: 3, z: 14 },
      origin: [0, 1.5, -3],
    });
    if (_snakePollen) scene.add(_snakePollen);
  }

  // Snake — a tube along a curve, animated to move slightly
  const snakePoints = [];
  for (let i = 0; i < 32; i++) {
    const t = i / 31;
    snakePoints.push(new THREE.Vector3(
      Math.sin(t * Math.PI * 2) * 0.3,
      0,
      t * 1.8 - 0.9
    ));
  }
  const snakeCurve = new THREE.CatmullRomCurve3(snakePoints);
  const snakeGeo = new THREE.TubeGeometry(snakeCurve, 64, 0.05 + size * 0.03, 12, false);
  // Snake skin — diamond-scale PBR maps when available (visible reptile
  // texture instead of a flat green tube).
  const snakeMat = (window.PhobiaRealism && window.PhobiaRealism.scaleMaterial)
    ? window.PhobiaRealism.scaleMaterial("#4a6028", { emissiveHex: 0x1a2010 })
    : new THREE.MeshStandardMaterial({
        color: 0x4a6028, roughness: 0.6,
        emissive: 0x1a2010, emissiveIntensity: 0.1,
      });
  const snake = new THREE.Mesh(snakeGeo, snakeMat);
  snake.castShadow = true;

  // Position based on size: small/far → big/close
  const distance = 9 - size * 8;
  snake.position.set(0, -0.95, -distance);
  snake.scale.setScalar(0.7 + size * 0.5);
  scene.add(snake);

  // Snake head (a slightly tapered cone-like at the front)
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 16, 12),
    snakeMat
  );
  head.scale.set(1.2, 0.7, 1.6);
  head.position.copy(snakePoints[snakePoints.length - 1]);
  head.position.add(snake.position);
  scene.add(head);
  // Eyes (small yellow)
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xddd000, emissive: 0x885500, emissiveIntensity: 0.5 });
  for (const sx of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 6), eyeMat);
    eye.position.set(head.position.x + sx * 0.04, head.position.y + 0.04, head.position.z + 0.05);
    scene.add(eye);
  }

  // Tongue (only at higher rungs)
  let tongue = null;
  if (size > 0.7) {
    tongue = new THREE.Mesh(
      new THREE.CylinderGeometry(0.005, 0.003, 0.08, 6),
      new THREE.MeshStandardMaterial({ color: 0xff5577 })
    );
    tongue.position.copy(head.position);
    tongue.position.z += 0.08;
    tongue.rotation.x = Math.PI / 2;
    scene.add(tongue);
  }

  camera.fov = 55;
  camera.updateProjectionMatrix();
  const snakePitch = Math.atan2(-(1.0 + 0.95), distance);

  let snakesControls = null;
  let stillness = 0;       // 0..1, builds while user holds the "Hold still" button
  const baseSnakeZ = snake.position.z;
  let stillHeld = false;

  // ----- Extend hand (real human action with a calm snake) -----
  // The user can press-and-hold to slowly extend a hand toward the snake.
  // While the hand is close to the snake's head, the snake's tongue flicks
  // faster (sniffing — this is real snake behaviour) and after a few seconds
  // a "calm meeting" trust meter fills. Releasing the button retracts the
  // hand. The user has full agency.
  let extendHeld = false;
  let extension = 0;         // 0 = retracted near camera, 1 = fully extended
  let extensionTarget = 0;
  let sniffT = 0;            // builds while the hand is near the snake's head
  let sniffMet = false;      // becomes true once sniffT reaches threshold
  // Visible procedural hand pinned to the camera. We add it as a child of
  // camera so it follows look direction; extension drives a forward offset.
  const handGroup = new THREE.Group();
  handGroup.position.set(0.10, -0.18, -0.30);
  camera.add(handGroup);
  if (!scene.children.includes(camera)) scene.add(camera);
  const sHandSkin = (window.Character && window.Character.loadCharacter())
              ? window.Character.hexToInt(window.Character.skinHex(window.Character.loadCharacter()))
              : 0xe8b794;
  const sHandMat = new THREE.MeshStandardMaterial({ color: sHandSkin, roughness: 0.78 });
  // Forearm cuff (sleeve)
  const sleeveMat = new THREE.MeshStandardMaterial({ color: 0x4a3a25, roughness: 0.95 });
  const sleeve = new THREE.Mesh(
    new THREE.CylinderGeometry(0.058, 0.062, 0.18, 14),
    sleeveMat
  );
  sleeve.rotation.x = Math.PI / 2;
  sleeve.position.set(0, 0.0, 0.04);
  handGroup.add(sleeve);
  // Forearm
  const sForearm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.045, 0.20, 14),
    sHandMat
  );
  sForearm.rotation.x = Math.PI / 2;
  sForearm.position.set(0, 0.0, -0.10);
  handGroup.add(sForearm);
  // Palm (slightly flattened sphere) — facing forward, palm-up so the snake
  // can sniff the back of the hand (real-world advice).
  const sPalm = new THREE.Mesh(new THREE.SphereGeometry(0.058, 16, 14), sHandMat);
  sPalm.scale.set(1.0, 0.55, 0.85);
  sPalm.position.set(0, -0.005, -0.22);
  handGroup.add(sPalm);
  // Four fingers, gently open
  for (let i = 0; i < 4; i++) {
    const fingerX = (-0.04 + i * 0.026);
    const finger = new THREE.Mesh(new THREE.CapsuleGeometry(0.011, 0.06, 6, 10), sHandMat);
    finger.position.set(fingerX, -0.005, -0.28);
    finger.rotation.x = -0.15;
    handGroup.add(finger);
  }
  // Thumb to the side
  const sThumb = new THREE.Mesh(new THREE.CapsuleGeometry(0.013, 0.04, 6, 10), sHandMat);
  sThumb.position.set(-0.06, 0.0, -0.24);
  sThumb.rotation.z = Math.PI / 2;
  sThumb.rotation.y = -0.4;
  handGroup.add(sThumb);

  function wireSnakesCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="snakes"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    const stillBtn = bar.querySelector('[data-cmd="still"]');
    if (stillBtn) {
      const press = (e) => { e.stopPropagation(); stillHeld = true; stillBtn.classList.add("pressed"); };
      const release = () => { stillHeld = false; stillBtn.classList.remove("pressed"); };
      stillBtn.addEventListener("pointerdown", press);
      stillBtn.addEventListener("pointerup", release);
      stillBtn.addEventListener("pointerleave", release);
      stillBtn.addEventListener("pointercancel", release);
    }
    const extendBtn = bar.querySelector('[data-cmd="extend"]');
    if (extendBtn) {
      const press = (e) => {
        e.stopPropagation();
        extendHeld = true;
        extensionTarget = 1;
        extendBtn.classList.add("pressed");
      };
      const release = () => {
        extendHeld = false;
        extensionTarget = 0;
        extendBtn.classList.remove("pressed");
      };
      extendBtn.addEventListener("pointerdown", press);
      extendBtn.addEventListener("pointerup", release);
      extendBtn.addEventListener("pointerleave", release);
      extendBtn.addEventListener("pointercancel", release);
    }
    const backBtn = bar.querySelector('[data-cmd="back-step"]');
    if (backBtn) backBtn.onclick = (e) => {
      e.stopPropagation();
      const c = snakesControls; if (!c) return;
      c.position.z = Math.min(c.opts.bounds.maxZ - 0.2, c.position.z + 1.0);
      if (window.PhobiaVoice) window.PhobiaVoice.speak("Stepped back. Notice your feet again.");
    };
    const leafBtn = bar.querySelector('[data-cmd="leaf"]');
    if (leafBtn) leafBtn.onclick = (e) => {
      e.stopPropagation();
      dropLeaf();
      if (window.PhobiaVoice) window.PhobiaVoice.speak("A leaf. The snake watches. Movement, not threat.");
    };
  }
  // Falling leaf — when one lands the snake briefly turns to track it
  let leaf = null;
  function dropLeaf() {
    if (leaf) { scene.remove(leaf); leaf.geometry.dispose(); leaf.material.dispose(); leaf = null; }
    leaf = new THREE.Mesh(
      new THREE.PlaneGeometry(0.2, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x6e8a3a, roughness: 1.0, side: THREE.DoubleSide })
    );
    // Drop in front of the player (positive z is toward player)
    const c = snakesControls;
    if (c) {
      const ahead = 1.5;
      leaf.position.set(
        c.position.x - Math.sin(c.yaw) * ahead,
        2,
        c.position.z - Math.cos(c.yaw) * ahead
      );
    } else {
      leaf.position.set(0, 2, -2);
    }
    leaf.userData = { vy: -0.5, vx: (Math.random() - 0.5) * 0.4, vz: (Math.random() - 0.5) * 0.4, spin: Math.random() * 6, settled: false };
    scene.add(leaf);
  }
  setTimeout(wireSnakesCmds, 0);

  return {
    controls: {
      mode: "walkable",
      // Spawn back along the path so the snake is something to walk TOWARD,
      // not stand on top of. The path narrows visually toward the snake so
      // the eye reads "this is the way forward" without needing markers.
      initialPos: [0, 1.0, 4.0],
      initialYaw: 0,
      initialPitch: snakePitch * 0.4,
      bounds: { minX: -3, maxX: 3, minZ: -distance + 1.0, maxZ: 5 },
      speed: 1.2,
      lookSpeed: 0.0035,
      // Snake phobia is intimate — first-person locked so the user is
      // genuinely looking at the creature, not watching themselves.
      cameraModeLocked: "fp",
    },
    hands: { sleeveColor: 0x4a3a25 },
    bloom: { strength: 0.35, threshold: 0.92 },
    surface: "grass",   // outdoor path with grass + dirt
    update(t, controls, dt) {
      if (controls) snakesControls = controls;
      const dtN = dt || 0.016;
      if (_snakePollen && _snakePollen.userData && _snakePollen.userData.update) {
        _snakePollen.userData.update(dtN, t);
      }
      // ---- Feed fear state from proximity to the snake ----
      if (controls && window.PhobiaFear) {
        const dxs = controls.position.x - snake.position.x;
        const dzs = controls.position.z - snake.position.z;
        const distS = Math.hypot(dxs, dzs);
        const closeness = Math.max(0, Math.min(1, 1 - (distS - 1.2) / 5.0));
        window.PhobiaFear.setInput("proximity", closeness * 0.80);
        const lookDownAmt = Math.max(0, Math.min(1, (-controls.pitch - 0.1) / 0.7));
        window.PhobiaFear.setInput("gaze", lookDownAmt * (closeness > 0.3 ? 0.75 : 0.3));
        const isAway = distS > 4.5;
        window.PhobiaFear.bumpAvoidance(dtN, isAway);
      }
      // Falling leaf — physics + spin until it lands; snake briefly tracks it
      if (leaf) {
        if (!leaf.userData.settled) {
          leaf.userData.vy -= 4 * dtN;
          leaf.position.x += leaf.userData.vx * dtN;
          leaf.position.y += leaf.userData.vy * dtN;
          leaf.position.z += leaf.userData.vz * dtN;
          leaf.rotation.z += leaf.userData.spin * dtN;
          leaf.rotation.x += leaf.userData.spin * 0.5 * dtN;
          if (leaf.position.y <= -0.95) {
            leaf.position.y = -0.95;
            leaf.rotation.x = -Math.PI / 2;   // lay flat on the ground
            leaf.userData.settled = true;
            // After 4 s, fade away
            setTimeout(() => {
              if (!leaf) return;
              scene.remove(leaf); leaf.geometry.dispose(); leaf.material.dispose(); leaf = null;
            }, 4000);
          }
        }
        // Snake briefly orients toward the leaf
        if (snake && leaf) {
          const dx = leaf.position.x - snake.position.x;
          const dz = leaf.position.z - snake.position.z;
          const targetYaw = Math.atan2(dx, dz);
          snake.rotation.y += (targetYaw - snake.rotation.y) * 0.04;
        }
      }
      // Stillness mechanic: when user holds "still" + isn't moving, the snake
      // gradually slithers AWAY (it's more afraid of you when you're calm).
      const moving = controls && controls.moving;
      if (stillHeld && !moving) {
        stillness = Math.min(1, stillness + dtN * 0.4);
      } else {
        stillness = Math.max(0, stillness - dtN * 0.5);
      }

      // ---- Extend hand mechanic ----
      // Slowly ease extension toward the target (slow on the way out — the
      // snake is sensitive to fast movement; quicker on the way back).
      const extKEase = extensionTarget > extension ? 2.5 : 5.0;
      extension += (extensionTarget - extension) * Math.min(1, dtN * extKEase);
      // Visually: handGroup z goes from -0.30 (close to camera) to a forward
      // reach of -0.85 (about an outstretched arm length from the eye).
      handGroup.position.z = -0.30 - extension * 0.55;
      // Tilt the palm up slightly as it extends (offering posture)
      handGroup.rotation.x = -extension * 0.25;
      // World-space distance from the extended palm to the snake's head
      const palmWorld = new THREE.Vector3();
      sPalm.getWorldPosition(palmWorld);
      const headWorldDist = palmWorld.distanceTo(head.position.clone().add(snake.position));
      // Sniff trust builds when the palm is within ~0.7 m of the snake head
      // AND the user is holding the extend button (active gesture, not by
      // accident). Decays slowly otherwise.
      const sniffing = extendHeld && extension > 0.6 && headWorldDist < 0.9 && !moving;
      if (sniffing) {
        sniffT = Math.min(1, sniffT + dtN * 0.30);
        if (sniffT >= 0.999 && !sniffMet) {
          sniffMet = true;
          if (window.PhobiaVoice) {
            window.PhobiaVoice.speak("It met your hand. You stayed still. The fear is teachable.");
          }
        }
      } else {
        sniffT = Math.max(0, sniffT - dtN * 0.10);
      }

      // Snake retreats up to 1.5 m as stillness builds, but if the user
      // is sniff-meeting the snake, the snake stops retreating (it's
      // engaged, not afraid).
      const retreat = sniffing ? 0 : stillness;
      snake.position.z = baseSnakeZ - retreat * 1.5;
      // Gentle wave motion of the snake
      snake.scale.y = (0.7 + size * 0.5) * (1 + Math.sin(t * 1.5) * 0.02);
      // Snake head tracks the user's extended hand. When the palm comes
      // close, the head turns toward it — a real predator-prey
      // interaction cue. The yaw aim is in the snake's local frame
      // (the snake itself rotates around y to face the path); we lerp
      // toward the target so the turn looks alive, not snappy.
      const palmLocal = palmWorld.clone().sub(snake.position);
      const handAimYaw = Math.atan2(palmLocal.x, palmLocal.z);
      // Body sway baseline — keeps the natural undulation when not tracking
      const bodySway = Math.sin(t * 0.6) * 0.05;
      // Track strength rises as the hand approaches sniffing distance
      const trackStrength = Math.max(0, Math.min(1, 1 - (headWorldDist - 0.3) / 1.6))
                          * (extension > 0.4 ? 1 : extension * 2);
      const targetSnakeYaw = bodySway * (1 - trackStrength) + handAimYaw * trackStrength;
      snake.rotation.y += (targetSnakeYaw - snake.rotation.y) * Math.min(1, dtN * 3.0);
      // Head pitch — at close range the head lifts a touch (curious lift)
      const headLift = trackStrength * 0.10;
      head.position.y = (snake.position.y + 0.05) + headLift;
      // Tongue flicker — much faster while sniffing the user's hand
      if (tongue) {
        const flickerSpeed = sniffing ? 18 : (8 - stillness * 4);
        tongue.position.z = head.position.z + 0.05 + Math.sin(t * flickerSpeed) * 0.03;
        tongue.scale.y = 0.5 + Math.abs(Math.sin(t * flickerSpeed)) * 0.5;
      }
    },
    dispose() {
      // Detach the hand group from the camera so it doesn't leak across mounts
      try { camera.remove(handGroup); } catch {}
    },
  };
}

// ---------- Public speaking ----------
function setupSpeaking(scene, camera, level) {
  const crowd = level.crowd; // 0..1

  scene.background = new THREE.Color(0x0c0e1a);
  scene.fog = new THREE.Fog(0x0c0e1a, 8, 50);

  // Spotlight on the speaker (us)
  const spot = new THREE.SpotLight(0xfff0d0, crowd > 0 ? 6 : 1.8, 30, Math.PI / 6, 0.3);
  spot.position.set(0, 6, 4);
  spot.target.position.set(0, 0, -2);
  spot.castShadow = true;
  scene.add(spot); scene.add(spot.target);

  scene.add(new THREE.AmbientLight(0x202030, 0.6));

  // Stage floor (wooden platform)
  const stage = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.2, 4),
    new THREE.MeshStandardMaterial({ color: 0x4a3a28, roughness: 0.85 })
  );
  stage.position.set(0, -1.1, 0);
  stage.castShadow = true;
  stage.receiveShadow = true;
  scene.add(stage);

  // Podium / lectern
  const podium = new THREE.Group();
  const podBox = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 1.0, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x3a2818, roughness: 0.7 })
  );
  podBox.position.y = -0.5;
  podium.add(podBox);
  const podTop = new THREE.Mesh(
    new THREE.BoxGeometry(0.95, 0.05, 0.65),
    new THREE.MeshStandardMaterial({ color: 0x4a3528, roughness: 0.6 })
  );
  podTop.position.y = 0.025;
  podium.add(podTop);
  podium.position.set(0, -0.4, -0.6);
  scene.add(podium);

  // Microphone on podium
  const mic = new THREE.Group();
  const micStand = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.012, 0.3, 8),
    new THREE.MeshStandardMaterial({ color: 0x202020, metalness: 0.5 })
  );
  micStand.position.y = 0.15;
  mic.add(micStand);
  const micHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 12, 8),
    new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4 })
  );
  micHead.position.y = 0.32;
  mic.add(micHead);
  mic.position.set(0, -0.05, -0.8);
  scene.add(mic);

  // ----- Glass of water on the podium (real sip gesture) -----
  // The glass is to the right of the mic. Clicking it raises it briefly toward
  // the camera (the "sip"), plays a soft sip sound, and gives the user a small
  // confidence buff. The water level drops slightly with each sip.
  const glass = new THREE.Group();
  const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xeaf2f8, transparent: true, opacity: 0.30,
    roughness: 0.05, metalness: 0.0,
    transmission: 0.85, ior: 1.4, thickness: 0.02,
  });
  const glassBody = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.038, 0.12, 24, 1, true),
    glassMat
  );
  glassBody.position.y = 0.06;
  glass.add(glassBody);
  const glassBase = new THREE.Mesh(
    new THREE.CircleGeometry(0.038, 24),
    glassMat
  );
  glassBase.rotation.x = -Math.PI / 2;
  glassBase.position.y = 0.001;
  glass.add(glassBase);
  // Water inside (level drops with sips)
  const water = new THREE.Mesh(
    new THREE.CylinderGeometry(0.040, 0.034, 0.08, 18),
    new THREE.MeshStandardMaterial({
      color: 0xa8d6e8, transparent: true, opacity: 0.7,
      roughness: 0.15, metalness: 0.4,
    })
  );
  water.position.y = 0.045;
  glass.add(water);
  // Resting position on the podium top
  glass.position.set(0.36, 0.04, -0.55);
  scene.add(glass);
  const glassBaseY = glass.position.y;
  let sipPhase = 0;       // 0 = on podium, 1 = at lips, fades back down
  let sipsTaken = 0;
  let waterLevel = 1.0;   // 0..1 — visual water remaining
  function takeSip() {
    if (sipPhase > 0.05) return;       // already sipping
    sipPhase = 1.0;
    sipsTaken++;
    waterLevel = Math.max(0.10, waterLevel - 0.18);
    if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
      try { window.PhobiaAudio.indicatorClick(); } catch {}
    }
    if (window.PhobiaVoice && sipsTaken === 1) {
      window.PhobiaVoice.speak("A sip. The room can wait.");
    }
    confidence = Math.min(1, confidence + 0.10);
  }

  // ----- Speech notes (paper on the lectern top) -----
  // A printed page with a REAL speech printed on it — readable lines the
  // user can actually deliver. The current line highlights as the user holds
  // the speak button, and advances over time so they can see their progress.
  // The script is a short, gentle "introduce yourself" speech appropriate to
  // the rung's audience size.
  const speechLines = [
    "Good evening, everyone.",
    "Thank you for being here today.",
    "I'd like to share a small idea with you.",
    "It's something I've been thinking about for a while.",
    "Sometimes the things that scare us the most",
    "are the things that change us the most.",
    "A pause is not weakness — it's pace.",
    "I'm grateful you stayed to listen.",
    "Thank you.",
  ];
  let currentLine = 0;          // index into speechLines
  let lineProgress = 0;         // 0..1 within the current line
  function drawNoteCanvas() {
    const c = noteCanvas;
    const ctx = nctx;
    ctx.fillStyle = "#fbf8f0";
    ctx.fillRect(0, 0, 256, 360);
    // Header bar
    ctx.fillStyle = "#3a4a6a";
    ctx.fillRect(20, 24, 216, 4);
    ctx.fillStyle = "#3a4a6a";
    ctx.font = "bold 14px sans-serif";
    ctx.fillText("My speech", 30, 18);
    // Render the speech lines
    ctx.font = "14px sans-serif";
    for (let i = 0; i < speechLines.length; i++) {
      const y = 56 + i * 26;
      // Highlight bar for the current line
      if (i === currentLine) {
        ctx.fillStyle = "rgba(255, 220, 100, 0.55)";
        ctx.fillRect(20, y - 14, 216, 22);
        // Progress bar within the highlight
        ctx.fillStyle = "rgba(124, 45, 18, 0.85)";
        ctx.fillRect(20, y + 8, 216 * lineProgress, 2);
      }
      // The text itself
      ctx.fillStyle = i < currentLine ? "#9a9a8a" : (i === currentLine ? "#1a1a1a" : "#3a3a3a");
      ctx.fillText(speechLines[i], 28, y);
    }
    noteTex.needsUpdate = true;
  }
  const noteCanvas = document.createElement("canvas");
  noteCanvas.width = 256; noteCanvas.height = 360;
  const nctx = noteCanvas.getContext("2d");
  const noteTex = new THREE.CanvasTexture(noteCanvas);
  noteTex.colorSpace = THREE.SRGBColorSpace;
  drawNoteCanvas();
  const notes = new THREE.Mesh(
    new THREE.PlaneGeometry(0.36, 0.50),
    new THREE.MeshStandardMaterial({ map: noteTex, roughness: 0.9 })
  );
  notes.rotation.x = -Math.PI / 2 + 0.08;     // slight forward tilt
  notes.position.set(-0.18, 0.035, -0.55);
  scene.add(notes);

  // Audience — silhouettes seated in rows. Count scales with crowd.
  // Friendly face — a single audience member front and centre, slightly more
  // detailed and a touch closer. Nods while the user holds the "speak" button.
  // Skin + fabric PBR so they read as a real, warm presence right in the
  // user's eyeline (the audience member they look at while speaking).
  const __PR_speak = window.PhobiaRealism;
  const friendly = new THREE.Group();
  const friendlyHead = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 18, 14),
    (__PR_speak && __PR_speak.skinMaterial)
      ? __PR_speak.skinMaterial("#d4a07a")
      : new THREE.MeshStandardMaterial({ color: 0xd4a07a, roughness: 0.9 })
  );
  friendlyHead.scale.set(0.95, 1.05, 0.95);
  friendlyHead.position.y = 0.7;
  friendly.add(friendlyHead);
  // Hair cap so the friendly face has a recognisable silhouette
  const friendlyHair = new THREE.Mesh(
    new THREE.SphereGeometry(0.225, 18, 14, 0, Math.PI * 2, 0, Math.PI * 0.55),
    (__PR_speak && __PR_speak.hairMaterial)
      ? __PR_speak.hairMaterial("#3a2418")
      : new THREE.MeshStandardMaterial({ color: 0x3a2418, roughness: 1.0 })
  );
  friendlyHair.scale.copy(friendlyHead.scale);
  friendlyHair.position.copy(friendlyHead.position);
  friendly.add(friendlyHair);
  const friendlyTorso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.22, 0.28, 0.6, 14),
    (__PR_speak && __PR_speak.fabricMaterial)
      ? __PR_speak.fabricMaterial("#2c9d96", "cotton")
      : new THREE.MeshStandardMaterial({ color: 0x2c9d96, roughness: 0.9 })
  );
  friendlyTorso.position.y = 0.3;
  friendly.add(friendlyTorso);
  // Tiny smile + eyes for warmth
  const smile = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.008, 8, 12, Math.PI), new THREE.MeshBasicMaterial({ color: 0x2a1810 }));
  smile.position.set(0, 0.65, 0.21);
  smile.rotation.z = Math.PI;
  friendlyHead.add(smile);
  for (const sx of [-0.07, 0.07]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.018, 10, 8), new THREE.MeshBasicMaterial({ color: 0x111 }));
    eye.position.set(sx, 0.05, 0.21);
    friendlyHead.add(eye);
  }
  friendly.position.set(0, -1, -2.2);
  friendly.castShadow = true;
  scene.add(friendly);

  // Detailed audience members — proper humanoid figures with neck + head +
  // torso + shoulders + arms. Each person gets a randomised skin tone, hair
  // colour, and clothing colour so the rows read as real distinct people
  // instead of identical silhouettes.
  const audience = new THREE.Group();
  const audienceMembers = [];     // [{ root, head, hair, mood }]
  const numRows = Math.ceil(2 + crowd * 14);
  const rowSpacing = 1.4;
  const seatSpacing = 0.85;
  const baseY = -1;
  // Skin / hair / shirt palette — varied so the crowd feels diverse
  const skinTones = [0xe8b794, 0xd4a07a, 0xb88863, 0x8a6442, 0x6a4a30, 0x5a3a22];
  const hairTones = [0x1a1410, 0x3a2418, 0x5a3a22, 0x8b6238, 0xa97442, 0xd4a86b, 0x9aa6b2];
  const shirtTones = [0x2c4a6e, 0x4a3a55, 0x6a3a3a, 0x3a5a3a, 0x4a4a55, 0x6a5a3a, 0x4a2c2a, 0x2c5a6e];

  function buildAudienceMember() {
    // If the upgraded creature builder is loaded, defer to it — gives each
    // audience member skin pores, fabric weave, varied body proportions,
    // glasses chance, and idle head sway. Falls back to the old layout
    // below if the realism scripts haven't booted yet.
    if (window.PhobiaCreatures && window.PhobiaCreatures.buildAudienceMember) {
      const root = window.PhobiaCreatures.buildAudienceMember();
      // The contract used by the rest of speaking-scene code is { root, head, hair, mood }.
      const head = root.userData && root.userData.head;
      return { root, head, hair: null, mood: 0 };
    }
    const person = new THREE.Group();
    const skinHex = skinTones[Math.floor(Math.random() * skinTones.length)];
    const hairHex = hairTones[Math.floor(Math.random() * hairTones.length)];
    const shirtHex = shirtTones[Math.floor(Math.random() * shirtTones.length)];
    const skinM  = (window.PhobiaRealism && window.PhobiaRealism.skinMaterial)
      ? window.PhobiaRealism.skinMaterial("#" + skinHex.toString(16).padStart(6, "0"))
      : new THREE.MeshStandardMaterial({ color: skinHex, roughness: 0.85 });
    const hairM  = (window.PhobiaRealism && window.PhobiaRealism.hairMaterial)
      ? window.PhobiaRealism.hairMaterial("#" + hairHex.toString(16).padStart(6, "0"))
      : new THREE.MeshStandardMaterial({ color: hairHex, roughness: 1.0 });
    const shirtM = (window.PhobiaRealism && window.PhobiaRealism.fabricMaterial)
      ? window.PhobiaRealism.fabricMaterial("#" + shirtHex.toString(16).padStart(6, "0"), "cotton")
      : new THREE.MeshStandardMaterial({ color: shirtHex, roughness: 0.95 });
    // Torso
    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.40, 6, 10), shirtM);
    torso.position.y = 0.35;
    torso.castShadow = true;
    person.add(torso);
    // Shoulders (round caps)
    for (const sx of [-1, 1]) {
      const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.10, 10, 8), shirtM);
      shoulder.position.set(sx * 0.18, 0.55, 0);
      person.add(shoulder);
    }
    // Neck
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.10, 10), skinM);
    neck.position.y = 0.66;
    person.add(neck);
    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 14, 12), skinM);
    head.scale.set(0.95, 1.05, 0.95);
    head.position.y = 0.82;
    head.castShadow = true;
    person.add(head);
    // Hair cap (short style for everyone — keeps poly count low)
    const hair = new THREE.Mesh(
      new THREE.SphereGeometry(0.135, 14, 12, 0, Math.PI * 2, 0, Math.PI * 0.55),
      hairM
    );
    hair.scale.copy(head.scale);
    hair.position.copy(head.position);
    person.add(hair);
    // Tiny eyes (so the figure reads as facing forward)
    for (const sx of [-1, 1]) {
      const eye = new THREE.Mesh(
        new THREE.SphereGeometry(0.013, 8, 6),
        new THREE.MeshBasicMaterial({ color: 0x141014 })
      );
      eye.position.set(sx * 0.04, 0.83, 0.115);
      person.add(eye);
    }
    return { root: person, head, hair, mood: 0 };
  }

  for (let row = 0; row < numRows; row++) {
    const colCount = 2 + Math.floor(crowd * 14);
    for (let col = -colCount; col <= colCount; col++) {
      if (Math.random() > Math.min(1, 0.3 + crowd * 1.0)) continue;
      const m = buildAudienceMember();
      m.root.position.set(col * seatSpacing, baseY, -3 - row * rowSpacing);
      audience.add(m.root);
      audienceMembers.push(m);
    }
  }
  scene.add(audience);

  // Back wall + curtains
  const curtain = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 12),
    new THREE.MeshStandardMaterial({ color: 0x4a1a28, roughness: 1.0 })
  );
  curtain.position.set(0, 4, 4);
  curtain.rotation.y = Math.PI;
  scene.add(curtain);

  camera.fov = 60;
  camera.updateProjectionMatrix();

  let speakingPressed = false;     // hold-to-speak state
  let pauseSilence = 0;            // 0..1 — temporary "pause" silence
  let confidence = 0.0;            // 0..1 — grows with sustained speaking + sips
  let speakingControls = null;
  // Audience attention level (0..1) — closure-scoped so it persists across
  // frames. Damped follows a target driven by speaking / pause / confidence
  // so the crowd's collective "lock onto the speaker" reads as a real,
  // physically observable shift in the room rather than a snap.
  let _audAttn = 0;
  function wireSpeakingCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="speaking"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    const speakBtn = bar.querySelector('[data-cmd="speak"]');
    if (speakBtn) {
      const press = () => {
        speakingPressed = true;
        speakBtn.classList.add("pressed");
        if (window.PhobiaVoice && Math.random() < 0.15) {
          window.PhobiaVoice.speak("Speak slowly. Pause when you need to.");
        }
      };
      const release = () => {
        speakingPressed = false;
        speakBtn.classList.remove("pressed");
      };
      speakBtn.addEventListener("pointerdown", (e) => { e.stopPropagation(); press(); });
      speakBtn.addEventListener("pointerup",   (e) => { e.stopPropagation(); release(); });
      speakBtn.addEventListener("pointerleave", release);
      speakBtn.addEventListener("pointercancel", release);
    }
    const pauseBtn = bar.querySelector('[data-cmd="pause"]');
    if (pauseBtn) {
      pauseBtn.onclick = (e) => {
        e.stopPropagation();
        pauseSilence = 1.0;
        if (window.PhobiaVoice) window.PhobiaVoice.speak("Pause. Their attention waits for you. Breathe.");
      };
    }
    const sipBtn = bar.querySelector('[data-cmd="sip"]');
    if (sipBtn) {
      sipBtn.onclick = (e) => { e.stopPropagation(); takeSip(); };
    }
    const notesBtn = bar.querySelector('[data-cmd="notes"]');
    if (notesBtn) {
      notesBtn.onclick = (e) => {
        e.stopPropagation();
        // Tilt camera down toward notes briefly
        if (speakingControls) {
          const fromP = speakingControls.pitch, toP = -0.25;
          let k = 0;
          const id = setInterval(() => {
            k += 0.06;
            if (k >= 1) { speakingControls.pitch = toP; clearInterval(id); return; }
            speakingControls.pitch = fromP + (toP - fromP) * k;
          }, 16);
        }
        if (window.PhobiaVoice) window.PhobiaVoice.speak("Your bullet points. The next line is right there.");
        confidence = Math.min(1, confidence + 0.05);
      };
    }
  }
  // Spacebar = hold to speak (so the user keeps their mouse free)
  function onSpeakKey(e) {
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    if (e.code !== "Space") return;
    e.preventDefault();
    if (e.type === "keydown") speakingPressed = true;
    else speakingPressed = false;
  }
  window.addEventListener("keydown", onSpeakKey);
  window.addEventListener("keyup", onSpeakKey);

  // Click-on-glass raycaster — sipping by clicking the actual prop is the
  // "real human action" version of the Sip Water button.
  const skRaycaster = new THREE.Raycaster();
  const skMouse = new THREE.Vector2();
  let skCanvas = null;
  let skDownX = 0, skDownY = 0, skDownT = 0, skPid = -1;
  function bindGlassClick() {
    skCanvas = document.querySelector("#stage canvas");
    if (!skCanvas) return;
    skCanvas.addEventListener("pointerdown", (e) => {
      skDownX = e.clientX; skDownY = e.clientY;
      skDownT = performance.now(); skPid = e.pointerId;
    });
    skCanvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== skPid) return;
      const dx = e.clientX - skDownX, dy = e.clientY - skDownY;
      if (Math.hypot(dx, dy) > 6 || performance.now() - skDownT > 350) return;
      const rect = skCanvas.getBoundingClientRect();
      skMouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      skMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      skRaycaster.setFromCamera(skMouse, camera);
      const hits = skRaycaster.intersectObject(glass, true);
      if (hits.length > 0) takeSip();
    });
  }
  setTimeout(bindGlassClick, 60);
  setTimeout(wireSpeakingCmds, 0);

  // Confidence HUD — small badge at the top-left of the stage
  let confHud = null;
  setTimeout(() => {
    const stageEl = document.getElementById("stage");
    if (!stageEl) return;
    let hud = stageEl.querySelector(".trust-hud");
    if (!hud) {
      hud = document.createElement("div");
      hud.className = "trust-hud";
      hud.innerHTML = `
        <div class="trust-row">
          <div class="trust-name">Confidence</div>
          <div class="trust-pct">0%</div>
        </div>
        <div class="trust-bar"><div class="trust-bar-fill"></div></div>
        <div class="trust-hint">Hold to speak (Space) · sip · glance at notes</div>
      `;
      stageEl.appendChild(hud);
    }
    confHud = hud;
  }, 80);

  return {
    controls: {
      mode: "lookOnly",
      initialPos: [0, 0.4, 0],
      initialYaw: Math.PI, // face the audience
      initialPitch: -0.05,
      lookSpeed: 0.0035,
      pitchMin: -0.3, pitchMax: 0.3,
      cameraModeLocked: "fp",        // standing at the lectern — FP only
    },
    hands: { sleeveColor: 0x2a2a30 },
    bloom: { strength: 0.6, threshold: 0.85 },
    interact(controls) {
      // Looking down at the podium → grip it
      if (controls.pitch < -0.15) return { gesture: "grab", hint: "click the glass to sip · grip the lectern" };
      return {
        gesture: "rest",
        hint: speakingPressed
          ? "speaking · keep going at your own pace"
          : "hold Space to speak · click the glass to sip · click notes for your bullets",
      };
    },
    onClick() {},
    update(t, controls, dt) {
      if (controls) speakingControls = controls;
      const d = dt || 0.016;
      // Subtle audience murmur — tiny head movements (smaller when "speaking")
      // Each member has their own head we can rotate independently of the
      // body, so the murmur reads as people looking around / nodding rather
      // than the whole body twisting.
      const settle = (speakingPressed || pauseSilence > 0.5) ? 0.2 : 1.0;
      // ---- Audience attention model ----
      // The "attention" value is how locked-in the crowd is on the speaker.
      // It rises with confident speech, spikes during a pause (pauses earn
      // attention — the room leans in to see what comes next), and decays
      // back to "natural sway" otherwise. When attention is high, every
      // head rotates toward the lectern; when low, heads sway randomly.
      // _audAttn is closure-scoped so it persists across frames.
      const targetAttn = pauseSilence > 0.4 ? 1.0
                       : speakingPressed   ? 0.55 + confidence * 0.3
                       :                      Math.max(0, confidence - 0.15);
      _audAttn += (targetAttn - _audAttn) * Math.min(1, d * 1.8);
      audienceMembers.forEach((m, i) => {
        if (!m.head) return;
        // Each member's natural-resting head sway (when attention is low)
        const sway = Math.sin(t * 0.5 + i * 0.7) * 0.10 * settle;
        // Attention-driven look-toward-speaker. Aim point is the lectern at
        // (0, 0, -0.6); each member's seat is at (root.x, baseY, root.z).
        // Yaw toward the lectern from each seat. Add a small per-person
        // jitter so heads don't all snap in perfect unison.
        const seatX = m.root.position.x;
        const seatZ = m.root.position.z;
        // Vector from seat to lectern in audience-local space (audience
        // group is at scene origin so seat positions ARE world). Audience
        // rows face the speaker who sits at z > seatZ (audience is at
        // negative z, speaker around z=0). yaw=0 means head facing -z.
        const dxS = 0 - seatX;
        const dzS = -0.6 - seatZ;        // lectern z relative to seat
        const aimYaw = Math.atan2(dxS, -dzS);    // rotation around y to face lectern
        // Per-person jitter so the lock-in isn't robotic
        const jitter = Math.sin(t * 1.3 + i * 0.41) * 0.04;
        const lockedYaw = aimYaw + jitter;
        const lockedPitch = -0.04 + Math.sin(t * 0.7 + i) * 0.02;
        // Blend natural sway → locked-on-speaker by attention
        m.head.rotation.y = sway * (1 - _audAttn) + lockedYaw * _audAttn;
        // High-confidence speakers earn nods from a chunk of the crowd
        let nodX = 0;
        if (i % 4 === 0 && confidence > 0.3) {
          nodX = Math.sin(t * 0.9 + i) * 0.10 * (confidence - 0.2);
        }
        m.head.rotation.x = nodX + lockedPitch * _audAttn;
        // Legacy audience builds had a separate hair group; the new
        // creature builder bakes hair onto the head so it rotates
        // implicitly — guard for either case.
        if (m.hair) {
          m.hair.rotation.y = m.head.rotation.y;
          m.hair.rotation.x = m.head.rotation.x;
        }
      });
      // Friendly face — nods when the user is actively speaking
      if (friendlyHead) {
        const nodAmt = speakingPressed ? 0.12 : 0.02;
        friendlyHead.rotation.x = Math.sin(t * (speakingPressed ? 2.5 : 0.6)) * nodAmt;
      }
      // Camera nervous sway, dampened when speaking, paused, or confident.
      const confDamp = 1 - confidence * 0.4;
      const sway = (speakingPressed ? 0.4 : 1.0) * (1 - pauseSilence * 0.6) * confDamp;
      camera.position.y += Math.sin(t * 1.6) * 0.012 * (0.4 + crowd) * sway;
      camera.rotation.z += Math.sin(t * 0.7) * 0.004 * crowd * sway;
      if (pauseSilence > 0) pauseSilence = Math.max(0, pauseSilence - d * 0.25);
      // ---- Speech progression ----
      // While the user holds the speak button, the current line on the page
      // fills its progress bar at a rate tied to its character count (rough
      // proxy for reading time, ~14 chars per second). When the bar fills,
      // we advance to the next line. When the script ends, voice + applause
      // cue trigger and the line resets so the user can speak again.
      if (speakingPressed && currentLine < speechLines.length) {
        const charsPerSec = 14;
        const lineDuration = Math.max(1.2, speechLines[currentLine].length / charsPerSec);
        lineProgress += d / lineDuration;
        if (lineProgress >= 1) {
          lineProgress = 0;
          currentLine++;
          if (currentLine >= speechLines.length) {
            // Speech finished — earn full confidence + a celebratory cue
            confidence = Math.min(1, confidence + 0.30);
            if (window.PhobiaVoice) {
              window.PhobiaVoice.speak("You finished it. Notice how the room is still here.");
            }
          }
        }
        drawNoteCanvas();
      }
      // Confidence grows slowly while speaking, decays slowly when not
      if (speakingPressed) {
        confidence = Math.min(1, confidence + d * 0.02);
      } else {
        confidence = Math.max(0, confidence - d * 0.005);
      }

      // ---- Sip animation ----
      // sipPhase 1.0 → 0 over ~1.6s. The glass lifts toward the camera, tips
      // slightly, then returns. Camera also tilts up subtly so it reads as
      // "I'm raising the glass to my lips" rather than "the glass is moving."
      if (sipPhase > 0) {
        sipPhase = Math.max(0, sipPhase - d * 0.65);
        // Tracking arc: glass rises from podium toward where the lips would be
        // (close to camera, slightly forward of mouth)
        const k = 1 - sipPhase;       // 0..1 over the sip
        // Bell curve so it goes up, holds at lips, comes back down
        const arc = Math.sin(k * Math.PI);
        glass.position.y = glassBaseY + arc * 0.35;
        // Move slightly toward the camera as it lifts
        glass.position.z = -0.55 + arc * 0.20;
        // Tip the glass when at the lips
        glass.rotation.x = arc * 0.6;
        if (controls && k > 0.3 && k < 0.7) {
          // Camera tips up a touch during the sip
          controls.pitch = Math.min(0.3, controls.pitch + d * 0.15);
        }
      } else if (Math.abs(glass.position.y - glassBaseY) > 0.001) {
        // Snap back any residual offset
        glass.position.y = glassBaseY;
        glass.position.z = -0.55;
        glass.rotation.x = 0;
      }
      // Water level tween
      water.scale.y = 0.1 + waterLevel * 0.9;
      water.position.y = 0.005 + (water.scale.y * 0.08) / 2;

      // Confidence HUD update
      if (confHud) {
        const pct = Math.round(confidence * 100);
        confHud.querySelector(".trust-bar-fill").style.width = pct + "%";
        confHud.querySelector(".trust-pct").textContent = pct + "%";
      }
    },
    dispose() {
      try {
        window.removeEventListener("keydown", onSpeakKey);
        window.removeEventListener("keyup", onSpeakKey);
      } catch {}
      const stageEl = document.getElementById("stage");
      if (stageEl) {
        const hud = stageEl.querySelector(".trust-hud");
        if (hud) hud.remove();
      }
    },
  };
}

// ---------- Driving (car interior + road) ----------
function setupDriving(scene, camera, level) {
  const speed   = level.speed   != null ? level.speed   : 0.5;
  const traffic = level.traffic != null ? level.traffic : 0.3;
  const isRain  = (level.title || "").toLowerCase().includes("rain");

  scene.background = new THREE.Color(isRain ? 0x35404a : 0x6a7e8c);
  scene.fog = new THREE.Fog(scene.background, 25, 220);

  const sun = new THREE.DirectionalLight(0xfff5e0, isRain ? 0.6 : 1.4);
  sun.position.set(20, 30, 10);
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x88a0c0, 0x404048, 0.55));

  // Road — long plane stretching forward
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 600),
    new THREE.MeshStandardMaterial({ color: 0x1a1d22, roughness: 0.85 })
  );
  road.rotation.x = -Math.PI / 2;
  road.position.set(0, -1, -200);
  scene.add(road);
  // Lane dashes
  for (let z = 0; z > -400; z -= 8) {
    const dash = new THREE.Mesh(
      new THREE.PlaneGeometry(0.25, 4),
      new THREE.MeshBasicMaterial({ color: 0xffe89a })
    );
    dash.rotation.x = -Math.PI / 2;
    dash.position.set(0, -0.99, z);
    scene.add(dash);
  }
  // Roadside grass
  for (const sx of [-1, 1]) {
    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 600),
      new THREE.MeshStandardMaterial({ color: 0x3a4a2a, roughness: 0.95 })
    );
    grass.rotation.x = -Math.PI / 2;
    grass.position.set(sx * 25, -1, -200);
    scene.add(grass);
  }

  // Car interior — dashboard, steering wheel, mirror
  const dashMat = new THREE.MeshStandardMaterial({ color: 0x141416, roughness: 0.8 });
  const dashboard = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.5, 0.6), dashMat);
  dashboard.position.set(0, -0.55, -0.45);
  scene.add(dashboard);

  // ----- Real instrument cluster -----
  // Two analogue dials (speedometer + fuel/RPM) painted on a CanvasTexture
  // so we can re-render the needle positions live every frame. Tachometer
  // shows engine RPM (driven by the accelerator pedal); speedometer shows
  // current speed in km/h. Indicator lamps below light up on signal /
  // brake / hazard.
  const clusterPanel = new THREE.Mesh(
    new THREE.BoxGeometry(0.96, 0.22, 0.05),
    new THREE.MeshStandardMaterial({ color: 0x0a0c10, roughness: 0.7 })
  );
  clusterPanel.position.set(0, -0.42, -0.4);
  scene.add(clusterPanel);
  // Two dial canvases — speedo (left), tach (right)
  function makeDialCanvas() {
    const c = document.createElement("canvas");
    c.width = c.height = 192;
    return c;
  }
  function paintDial(c, opts) {
    const ctx = c.getContext("2d");
    const cx = 96, cy = 96, R = 78;
    ctx.fillStyle = "#0a0c10";
    ctx.beginPath(); ctx.arc(cx, cy, R + 6, 0, Math.PI * 2); ctx.fill();
    // Outer rim
    ctx.strokeStyle = "#3a3a40"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, R + 4, 0, Math.PI * 2); ctx.stroke();
    // Tick marks (major every 10°, minor every 2°) over a 270° arc
    // Arc from -225° to +45° (sweeping clockwise from bottom-left)
    const startA = Math.PI * 1.25;     // -225° = 135° + 90° ... actually 5π/4
    const sweep = Math.PI * 1.5;       // 270°
    for (let i = 0; i <= opts.maxTicks; i++) {
      const a = startA + (i / opts.maxTicks) * sweep;
      const isMajor = i % opts.majorEvery === 0;
      const tickLen = isMajor ? 12 : 6;
      ctx.strokeStyle = isMajor ? "#e8eef6" : "#7a8090";
      ctx.lineWidth = isMajor ? 2 : 1;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (R - tickLen), cy + Math.sin(a) * (R - tickLen));
      ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
      ctx.stroke();
      // Label on major ticks
      if (isMajor) {
        ctx.fillStyle = "#e8eef6";
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const lblR = R - 26;
        const labelVal = Math.round(i * opts.maxValue / opts.maxTicks);
        ctx.fillText(String(labelVal), cx + Math.cos(a) * lblR, cy + Math.sin(a) * lblR);
      }
    }
    // Centre + label
    ctx.fillStyle = "#7cd1c5";
    ctx.font = "bold 11px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(opts.label, cx, cy + 30);
    // Needle
    const needleA = startA + Math.max(0, Math.min(1, opts.value)) * sweep;
    ctx.strokeStyle = opts.needleColor || "#ff8a3a";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(needleA) * (R - 18), cy + Math.sin(needleA) * (R - 18));
    ctx.stroke();
    // Centre cap
    ctx.fillStyle = "#3a3a40";
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
  }
  const speedoCanvas = makeDialCanvas();
  const tachCanvas   = makeDialCanvas();
  const speedoTex = new THREE.CanvasTexture(speedoCanvas);
  speedoTex.colorSpace = THREE.SRGBColorSpace;
  const tachTex = new THREE.CanvasTexture(tachCanvas);
  tachTex.colorSpace = THREE.SRGBColorSpace;
  // Initial paint
  paintDial(speedoCanvas, { value: 0, maxValue: 200, maxTicks: 10, majorEvery: 1, label: "km/h" });
  paintDial(tachCanvas,   { value: 0, maxValue: 8,   maxTicks: 8,  majorEvery: 1, label: "RPM × 1k", needleColor: "#ff5544" });
  speedoTex.needsUpdate = true;
  tachTex.needsUpdate = true;
  const speedoMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.18, 0.18),
    new THREE.MeshStandardMaterial({
      map: speedoTex, transparent: true,
      emissive: 0xffffff, emissiveMap: speedoTex, emissiveIntensity: 0.6,
    })
  );
  speedoMesh.position.set(-0.20, -0.42, -0.37);
  scene.add(speedoMesh);
  const tachMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.18, 0.18),
    new THREE.MeshStandardMaterial({
      map: tachTex, transparent: true,
      emissive: 0xffffff, emissiveMap: tachTex, emissiveIntensity: 0.6,
    })
  );
  tachMesh.position.set(0.20, -0.42, -0.37);
  scene.add(tachMesh);

  // Indicator lamps — three small emissive squares between the dials.
  // Left = left turn signal, Center = brake, Right = right turn signal.
  const lampMatLeft  = new THREE.MeshStandardMaterial({ color: 0x202024, emissive: 0x000000 });
  const lampMatBrake = new THREE.MeshStandardMaterial({ color: 0x202024, emissive: 0x000000 });
  const lampMatRight = new THREE.MeshStandardMaterial({ color: 0x202024, emissive: 0x000000 });
