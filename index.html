  // Splash ripple sources triggered by clicking the water surface
  const splashes = []; // { x, z, t0, alive }
  let waterControls = null;
  function wireWaterCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="water"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const c = waterControls;
        if (!c) return;
        if (btn.dataset.cmd === "splash") {
          // Trigger via onClick — already wired below
          if (resultObj.onClick) resultObj.onClick(c);
        } else if (btn.dataset.cmd === "lookdown") {
          const from = c.pitch, to = -0.55;
          let k = 0;
          const id = setInterval(() => {
            k += 0.06;
            if (k >= 1) { c.pitch = to; clearInterval(id); return; }
            c.pitch = from + (to - from) * k;
          }, 16);
        }
      };
    });
  }
  // We need a reference to the returned config inside wireWaterCmds, set below
  let resultObj = null;
  const splashGeo = new THREE.RingGeometry(0.05, 0.08, 32);
  const splashMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide,
  });

  // ----- Wading mechanic -----
  // The user spawns at the shore (positive z) and can walk forward into the
  // water (negative z). As they move forward the camera y *descends* along
  // an underwater slope — so the water visibly rises up their face. When
  // their eye line crosses the water surface, the underwater fog kicks in.
  // shoreZ → maxZ (positive), deepZ → minZ (negative).
  const shoreZ = 1.5;
  const deepZ = -2.5;
  // Maximum depth the camera descends to at deepZ for this rung. The user
  // can always step BACK to the shore — full agency.
  const maxDepth = fill * 2.2;       // 0.22 m at fill=0.10, 2.2 m at fill=1.0
  let lastWaterEntryZ = null;        // track when we cross from dry to wet for splash
  let wadeDepthHud = null;
  function depthLabel(d) {
    if (d <= 0.05) return "On shore";
    if (d <= 0.45) return "Toes / ankles";
    if (d <= 0.85) return "Knee-deep";
    if (d <= 1.30) return "Waist-deep";
    if (d <= 1.75) return "Chest-deep";
    return "Underwater";
  }
  setTimeout(() => {
    const stage = document.getElementById("stage");
    if (!stage) return;
    let hud = stage.querySelector(".trust-hud");
    if (!hud) {
      hud = document.createElement("div");
      hud.className = "trust-hud";
      hud.innerHTML = `
        <div class="trust-row">
          <div class="trust-name">On shore</div>
          <div class="trust-pct">0.0 m</div>
        </div>
        <div class="trust-bar"><div class="trust-bar-fill"></div></div>
        <div class="trust-hint">Walk forward to wade · pick up a pebble · click water to skip</div>
      `;
      stage.appendChild(hud);
    }
    wadeDepthHud = hud;
  }, 80);

  // ----- Pebbles on the sand (pick up + throw) -----
  // Real human action: grab a stone, throw it into the water, watch the
  // splash + ripple. Even on the lowest rungs ("toes in puddle") the user
  // can do this, which gives them an empowering reason to step closer.
  const pebbles = [];
  let heldPebble = null;
  let heldPebbleMesh = null;     // visible mesh in user's hand (camera-attached)
  function buildPebble(rxBase, ryBase, rzBase) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.05, 10, 8);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.07 + Math.random() * 0.05, 0.18, 0.30 + Math.random() * 0.18),
      roughness: 0.95, metalness: 0.0,
    });
    const p = new THREE.Mesh(geo, mat);
    p.scale.set(1, 0.55, 1.1);
    p.position.set(rxBase, ryBase, rzBase);
    p.rotation.set(Math.random(), Math.random(), Math.random());
    p.castShadow = true;
    p.userData.pickable = true;
    return p;
  }
  // Scatter 6 pebbles on the dry shore in front of the user (z > shoreZ).
  // Sandy floor is at y = -1, pebble half-height ≈ 0.04 (after y-scale 0.55).
  for (let i = 0; i < 6; i++) {
    const px = (Math.random() - 0.5) * 5.5;
    const pz = shoreZ + 0.3 + Math.random() * 1.6;   // dry sand
    const pebble = buildPebble(px, -0.96, pz);
    scene.add(pebble);
    pebbles.push(pebble);
  }

  // Build the visible held-pebble mesh once, reused per pickup.
  function showHeldPebble(sourcePebble) {
    if (heldPebbleMesh) {
      camera.remove(heldPebbleMesh);
      heldPebbleMesh = null;
    }
    // Clone the source pebble's material color so the held one matches
    const heldGeo = new THREE.SphereGeometry(0.07, 12, 10);
    const heldMat = new THREE.MeshStandardMaterial({
      color: sourcePebble.material.color.getHex(),
      roughness: 0.95,
    });
    heldPebbleMesh = new THREE.Mesh(heldGeo, heldMat);
    heldPebbleMesh.scale.set(1, 0.55, 1.1);
    // Position in front-right of camera (right hand position)
    heldPebbleMesh.position.set(0.16, -0.20, -0.32);
    camera.add(heldPebbleMesh);
    if (!scene.children.includes(camera)) scene.add(camera);
  }
  function hideHeldPebble() {
    if (heldPebbleMesh) {
      camera.remove(heldPebbleMesh);
      heldPebbleMesh.geometry.dispose();
      heldPebbleMesh.material.dispose();
      heldPebbleMesh = null;
    }
  }

  // Active flying pebble (the one the user just threw)
  let flyingPebble = null;     // { mesh, vel: Vector3 }

  // Raycaster for picking up pebbles
  const wRaycaster = new THREE.Raycaster();
  const wMouse = new THREE.Vector2();
  let wCanvas = null;
  let wDownX = 0, wDownY = 0, wDownT = 0, wPid = -1;
  function bindWaterClicks() {
    wCanvas = document.querySelector("#stage canvas");
    if (!wCanvas) return;
    wCanvas.addEventListener("pointerdown", (e) => {
      wDownX = e.clientX; wDownY = e.clientY;
      wDownT = performance.now(); wPid = e.pointerId;
    });
    wCanvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== wPid) return;
      const dx = e.clientX - wDownX, dy = e.clientY - wDownY;
      if (Math.hypot(dx, dy) > 6 || performance.now() - wDownT > 350) return;
      const rect = wCanvas.getBoundingClientRect();
      wMouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      wMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      wRaycaster.setFromCamera(wMouse, camera);
      // First check: did we click an unheld pebble?
      const pebbleHits = wRaycaster.intersectObjects(pebbles, false);
      if (pebbleHits.length > 0 && !heldPebble) {
        const target = pebbleHits[0].object;
        heldPebble = target;
        target.visible = false;
        showHeldPebble(target);
        if (window.PhobiaFX && window.PhobiaFX.firePulse) window.PhobiaFX.firePulse();
        if (window.PhobiaVoice && Math.random() < 0.4) {
          window.PhobiaVoice.speak("A small stone in your hand. Notice the weight.");
        }
        return;
      }
      // Second check: if holding a pebble + clicked anywhere on the water
      // surface, throw it. Default click already spawns a splash ring; the
      // pebble adds a real arcing throw with a heavier splash on landing.
      if (heldPebble) {
        // Compute target world position from the click ray hitting y=waterY
        const ray = wRaycaster.ray;
        if (ray.direction.y < -0.05) {
          const t2 = (waterY - ray.origin.y) / ray.direction.y;
          const tx = ray.origin.x + ray.direction.x * t2;
          const tz = ray.origin.z + ray.direction.z * t2;
          // Spawn a flying pebble at hand position
          const flyMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 12, 10),
            heldPebbleMesh.material.clone()
          );
          flyMesh.scale.set(1, 0.55, 1.1);
          const startW = new THREE.Vector3();
          heldPebbleMesh.getWorldPosition(startW);
          flyMesh.position.copy(startW);
          scene.add(flyMesh);
          // Throw velocity — gravity-driven arc to (tx, waterY, tz)
          const ddx = tx - startW.x, ddz = tz - startW.z;
          const dist = Math.hypot(ddx, ddz);
          const T = Math.max(0.5, dist * 0.20);
          const g = 9.8;
          const vy = (g * T / 2) + 1.6;
          flyingPebble = {
            mesh: flyMesh,
            vel: new THREE.Vector3(ddx / T, vy, ddz / T),
            target: { x: tx, z: tz },
          };
          // Remove the source pebble + clear held state
          scene.remove(heldPebble);
          heldPebble.geometry.dispose();
          heldPebble.material.dispose();
          const idx = pebbles.indexOf(heldPebble);
          if (idx >= 0) pebbles.splice(idx, 1);
          heldPebble = null;
          hideHeldPebble();
          if (window.PhobiaFX && window.PhobiaFX.firePulse) window.PhobiaFX.firePulse();
        }
      }
    });
  }
  setTimeout(bindWaterClicks, 60);

  resultObj = {
    controls: {
      mode: "walkable",
      // Spawn back from the shoreline so the user has to walk forward to
      // wade in — the approach itself is the exposure for water phobia.
      initialPos: [0, 0, shoreZ + 1.8],
      initialYaw: 0,
      initialPitch: -0.10,            // looking forward toward the water
      bounds: { minX: -3, maxX: 3, minZ: deepZ, maxZ: shoreZ + 2.2 },
      speed: 0.9,                     // wading is slower than walking
      lookSpeed: 0.004,
      preferredCameraMode: "tp",
    },
    hands: { skinColor: 0xd4a07a, sleeveColor: 0x4a5d8a },
    bloom: { strength: 0.3, threshold: 0.95 },
    ssao: false,                   // water surface + sky look worse with AO
    surface: "splash",
    interact(controls) {
      const z = controls ? controls.position.z : shoreZ;
      const k = Math.max(0, Math.min(1, (shoreZ - z) / (shoreZ - deepZ)));
      const depth = k * maxDepth;
      if (depth > 0.05) {
        return { gesture: "paddle", hint: `${depthLabel(depth)} · click to splash · walk back any time` };
      }
      return { gesture: "rest", hint: "walk forward to wade in · click to splash" };
    },
    onClick() {
      // Spawn a ripple in front of the camera at water level
      const ahead = 1.5;
      const yaw = (active && active.controls) ? active.controls.yaw : 0;
      const cx = (active && active.controls) ? active.controls.position.x : 0;
      const cz = (active && active.controls) ? active.controls.position.z : 0;
      const x = cx - Math.sin(yaw) * ahead + (Math.random() - 0.5) * 0.6;
      const z = cz - Math.cos(yaw) * ahead + (Math.random() - 0.5) * 0.6;
      const ring = new THREE.Mesh(splashGeo, splashMat.clone());
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(x, waterY + 0.01, z);
      scene.add(ring);
      splashes.push({ mesh: ring, t0: performance.now() / 1000 });
      if (window.PhobiaAudio && window.PhobiaAudio.splash) {
        try { window.PhobiaAudio.splash(0.9, { x, y: waterY + 0.05, z }); } catch {}
      }
      for (const f of fish) {
        const dx = f.position.x - x;
        const dz = f.position.z - z;
        if (Math.hypot(dx, dz) < 4) f.userData.scared = 1.0;
      }
    },
    update(t, controls, dt) {
      if (controls) { waterControls = controls; wireWaterCmds(); }
      waterMat.uniforms.time.value = t;
      // ---- Wading depth ----
      // Camera y descends linearly with z from shore to deepest point.
      // We override controls.position.y so the body / hands also follow.
      const z = controls ? controls.position.z : shoreZ;
      const k = Math.max(0, Math.min(1, (shoreZ - z) / (shoreZ - deepZ)));
      const depth = k * maxDepth;
      if (controls) controls.position.y = -depth;
      // First time the user actually steps into the water → splash + voice cue
      if (lastWaterEntryZ === null && depth > 0.05) {
        lastWaterEntryZ = z;
        if (window.PhobiaAudio && window.PhobiaAudio.splash) {
          try { window.PhobiaAudio.splash(0.5, { x: controls.position.x, y: waterY, z }); } catch {}
        }
        if (window.PhobiaVoice) window.PhobiaVoice.speak("First step. The water meets your skin. Notice that you can step back any time.");
      } else if (lastWaterEntryZ !== null && depth <= 0.02) {
        lastWaterEntryZ = null;
      }

      // ---- Feed fear state from water depth + walking forward ----
      // Without this, the in-zone hold timer would count wall-clock for the
      // water scene since fear stays at zero. Depth maps directly to fear:
      // ankle-deep = mild, waist+ = high.
      if (controls && window.PhobiaFear) {
        const fearProx = Math.max(0, Math.min(1, depth / 1.6));   // 0..1.6 m
        window.PhobiaFear.setInput("proximity", fearProx * 0.85);
        // Gaze toward the water (slightly down) adds to fear input
        const lookDownAmt = Math.max(0, Math.min(1, -controls.pitch / 0.6));
        window.PhobiaFear.setInput("gaze", lookDownAmt * 0.5 * fearProx);
        const isAway = depth < 0.05;
        window.PhobiaFear.bumpAvoidance(d, isAway);
      }

      // ---- Body posture by water depth ----
      // Real wading body language:
      //   ankle-deep: arms slightly out for balance, normal stance
      //   knee-deep: arms wider, slight forward lean
      //   waist-deep: arms held high (out of water), squat begins
      //   chest-deep: full crouch (water hides legs anyway)
      //   over-head: swimming pose — full forward, arms paddling (not modelled here)
      // Slow the walk cycle in deep water to read as "fighting current".
      if (active && active.body && active.body.setPosture && controls) {
        const armSpread = Math.min(1.0, depth * 0.5);              // 0..1
        const lean = Math.min(0.45, depth * 0.18);                  // mild forward lean
        const crouch = depth > 0.6 ? Math.min(0.4, (depth - 0.6) * 0.35) : 0;
        const reach = 0;                                            // no railing to grab
        active.body.setPosture({ armSpread, lean, crouch, reach });
      }
      // Update HUD
      if (wadeDepthHud) {
        wadeDepthHud.querySelector(".trust-name").textContent = depthLabel(depth);
        wadeDepthHud.querySelector(".trust-pct").textContent = depth.toFixed(2) + " m";
        wadeDepthHud.querySelector(".trust-bar-fill").style.width =
          Math.round((depth / 2.0) * 100) + "%";
      }
      // Gentle bob — stronger at deep levels (additive on top of user look).
      // Apply AFTER setting controls.position.y so bob is a small add-on.
      camera.position.y += Math.sin(t * 0.9) * 0.05 * fill;
      camera.position.x += Math.sin(t * 0.6) * 0.04 * fill;
      camera.rotation.z += Math.sin(t * 0.7) * 0.008 * fill;
      // Animate fish — swim back and forth, dart when scared
      const dtFish = dt || 0.016;
      for (const f of fish) {
        const speedMult = 1 + f.userData.scared * 4;
        f.position.x += f.userData.vx * f.userData.dir * speedMult * dtFish;
        // Wiggle a touch
        f.position.y += Math.sin(t * 4 + f.position.x * 0.3) * 0.002;
        if (f.position.x > 14) f.userData.dir = -1;
        if (f.position.x < -14) f.userData.dir = 1;
        // Mirror the geometry to face the swim direction
        f.scale.x = f.userData.dir > 0 ? 0.6 : -0.6;
        // Decay scared state
        f.userData.scared = Math.max(0, f.userData.scared - dtFish * 1.5);
      }
      // Animate splash rings — expand and fade
      for (let i = splashes.length - 1; i >= 0; i--) {
        const s = splashes[i];
        const age = t - s.t0;
        if (age > 2.0) {
          scene.remove(s.mesh);
          s.mesh.material.dispose();
          splashes.splice(i, 1);
        } else {
          const k = age / 2.0;
          s.mesh.scale.setScalar(1 + k * 12);
          s.mesh.material.opacity = 0.6 * (1 - k);
        }
      }

      if (bubbles) {
        const pos = bubbles.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          pos.array[i * 3 + 1] += 0.04;
          pos.array[i * 3] += Math.sin(t + i) * 0.005;
          if (pos.array[i * 3 + 1] > waterY + 0.5) {
            pos.array[i * 3 + 1] = waterY - 12;
          }
        }
        pos.needsUpdate = true;
      }
      for (let i = 0; i < beams.length; i++) {
        beams[i].material.opacity = 0.04 + Math.sin(t * 0.7 + i) * 0.025;
      }
      // Seaweed sway — bottom anchored, top tilts with the wave
      for (const w of seaweed) {
        w.rotation.z = Math.sin(t * 0.8 + w.userData.phase) * 0.15;
      }
      // ---- Flying pebble physics ----
      // Gravity-driven arc; on contact with water surface, spawn a bigger
      // splash ring + spatial splash sound + scare nearby fish, then sink
      // and remove after 1 s.
      if (flyingPebble) {
        const fp = flyingPebble;
        fp.vel.y -= 9.8 * dtFish;
        fp.mesh.position.x += fp.vel.x * dtFish;
        fp.mesh.position.y += fp.vel.y * dtFish;
        fp.mesh.position.z += fp.vel.z * dtFish;
        fp.mesh.rotation.x += dtFish * 8;
        fp.mesh.rotation.z += dtFish * 6;
        if (fp.mesh.position.y <= waterY + 0.02) {
          // Splash — spawn a larger ring than a normal click, plus a smaller
          // secondary ring for that "kerplunk" double-ripple look.
          const sx = fp.mesh.position.x, sz = fp.mesh.position.z;
          for (const radius of [0.10, 0.06]) {
            const ring = new THREE.Mesh(
              new THREE.RingGeometry(radius, radius * 1.4, 32),
              splashMat.clone()
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(sx, waterY + 0.012, sz);
            scene.add(ring);
            splashes.push({ mesh: ring, t0: t });
          }
          if (window.PhobiaAudio && window.PhobiaAudio.splash) {
            try { window.PhobiaAudio.splash(1.3, { x: sx, y: waterY + 0.05, z: sz }); } catch {}
          }
          // Scare nearby fish with a wider radius than a normal click
          for (const f of fish) {
            const dxf = f.position.x - sx;
            const dzf = f.position.z - sz;
            if (Math.hypot(dxf, dzf) < 6) f.userData.scared = 1.0;
          }
          // Pebble sinks below the surface, then remove
          fp.mesh.position.y = waterY - 0.05;
          setTimeout(() => {
            if (!flyingPebble || flyingPebble.mesh !== fp.mesh) return;
            scene.remove(fp.mesh);
            fp.mesh.geometry.dispose(); fp.mesh.material.dispose();
            flyingPebble = null;
          }, 1000);
          flyingPebble.landed = true;
          flyingPebble = null;
        }
      }
    },
    dispose() {
      const stage = document.getElementById("stage");
      if (stage) {
        const hud = stage.querySelector(".trust-hud");
        if (hud) hud.remove();
      }
      // Clean up held pebble + flying pebble + scattered pebbles on unmount
      if (heldPebbleMesh) {
        camera.remove(heldPebbleMesh);
        heldPebbleMesh.geometry.dispose();
        heldPebbleMesh.material.dispose();
        heldPebbleMesh = null;
      }
    },
  };
  return resultObj;
}

// ---------- Procedural dog model + state machine ----------
// Built from primitives — full control over every state (sit, walk, bark, eat).
// Default colours are a friendly golden-retriever palette.
// Build a coordinated fur PBR map set: albedo + normal + roughness, with the
// normal map encoding individual hair strands flowing in a consistent
// direction. The base colour can be overridden so warm gold, dark brown, etc.
// share the same procedural variety. Cached by base colour so repeated
// builds (e.g. each scene mount) don't re-run the canvas work.
const _furCache = new Map();
function makeFurMaps(baseColor = 0xd6a06a) {
  const cached = _furCache.get(baseColor);
  if (cached) return cached;
  const SIZE = 256;
  const albedoC = document.createElement("canvas"); albedoC.width = albedoC.height = SIZE;
  const normalC = document.createElement("canvas"); normalC.width = normalC.height = SIZE;
  const roughC  = document.createElement("canvas"); roughC.width  = roughC.height  = SIZE;
  const aCtx = albedoC.getContext("2d");
  const nCtx = normalC.getContext("2d");
  const rCtx = roughC.getContext("2d");

  // Base albedo
  const base = new THREE.Color(baseColor);
  const r0 = Math.round(base.r * 255);
  const g0 = Math.round(base.g * 255);
  const b0 = Math.round(base.b * 255);
  aCtx.fillStyle = `rgb(${r0},${g0},${b0})`;
  aCtx.fillRect(0, 0, SIZE, SIZE);
  // Roughness baseline (~0.85 so fur catches a subtle bounce light without
  // looking shiny). 0.85 → 217/255 grey.
  rCtx.fillStyle = "#d8d8d8";
  rCtx.fillRect(0, 0, SIZE, SIZE);
  // Normal map base = flat (RGB 128,128,255 = up in tangent space)
  nCtx.fillStyle = "#8080ff";
  nCtx.fillRect(0, 0, SIZE, SIZE);

  // Paint a few thousand individual hair strands. Each strand is a short
  // anti-aliased line on the albedo (slightly darker/lighter), a thin streak
  // on the normal map (encoding the hair's direction in the tangent plane),
  // and a low-rough streak on the roughness map (the hair tip catches a
  // tiny specular highlight, less rough than the bulk fur).
  const HAIR_COUNT = 2400;
  for (let i = 0; i < HAIR_COUNT; i++) {
    const x = Math.random() * SIZE;
    const y = Math.random() * SIZE;
    // All hairs point in the same general direction (slight downward sweep)
    // with a small random jitter — looks like brushed fur on the body
    const baseAng = Math.PI / 2 + (Math.random() - 0.5) * 0.4;   // mostly +y
    const len = 6 + Math.random() * 10;
    const x2 = x + Math.cos(baseAng) * len;
    const y2 = y + Math.sin(baseAng) * len;
    // ALBEDO: darker hair shaft + occasional lighter highlight
    const tone = (Math.random() - 0.5) * 0.4;        // -0.2..0.2
    const rh = Math.max(0, Math.min(255, r0 + tone * 40));
    const gh = Math.max(0, Math.min(255, g0 + tone * 35));
    const bh = Math.max(0, Math.min(255, b0 + tone * 30));
    aCtx.strokeStyle = `rgba(${rh|0},${gh|0},${bh|0},0.85)`;
    aCtx.lineWidth = 0.6 + Math.random() * 0.6;
    aCtx.lineCap = "round";
    aCtx.beginPath();
    aCtx.moveTo(x, y);
    aCtx.lineTo(x2, y2);
    aCtx.stroke();
    // NORMAL: encode the hair's tangent direction. A hair pointing
    // (cos a, sin a) creates a normal that tilts slightly in that direction.
    // We map the tangent to 0..255 in red/green channels.
    const nx = Math.cos(baseAng) * 0.35;     // -0.35..0.35
    const ny = -Math.sin(baseAng) * 0.35;    // negate for y-down canvas
    const nR = Math.round((nx * 0.5 + 0.5) * 255);
    const nG = Math.round((ny * 0.5 + 0.5) * 255);
    nCtx.strokeStyle = `rgba(${nR},${nG},255,0.55)`;
    nCtx.lineWidth = 1.0 + Math.random() * 0.8;
    nCtx.beginPath();
    nCtx.moveTo(x, y);
    nCtx.lineTo(x2, y2);
    nCtx.stroke();
    // ROUGHNESS: hair tips slightly less rough (catch a faint highlight)
    rCtx.strokeStyle = `rgba(180,180,180,0.35)`;
    rCtx.lineWidth = 0.7;
    rCtx.beginPath();
    rCtx.moveTo(x, y);
    rCtx.lineTo(x2, y2);
    rCtx.stroke();
  }

  // Subtle macro variation — patches of slightly darker/lighter fur every
  // ~30 px, like the real shading on a dog's coat
  for (let i = 0; i < 18; i++) {
    const x = Math.random() * SIZE, y = Math.random() * SIZE;
    const r = 30 + Math.random() * 40;
    const grad = aCtx.createRadialGradient(x, y, 0, x, y, r);
    const tone = (Math.random() - 0.5) * 0.18;
    const rt = Math.max(0, Math.min(255, r0 + tone * 25));
    const gt = Math.max(0, Math.min(255, g0 + tone * 22));
    const bt = Math.max(0, Math.min(255, b0 + tone * 20));
    grad.addColorStop(0, `rgba(${rt|0},${gt|0},${bt|0},0.35)`);
    grad.addColorStop(1, `rgba(${rt|0},${gt|0},${bt|0},0)`);
    aCtx.fillStyle = grad;
    aCtx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  const make = (canvas, srgb = false) => {
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 8;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace;
    return t;
  };
  const result = {
    albedo: make(albedoC, true),
    normal: make(normalC),
    roughness: make(roughC),
  };
  _furCache.set(baseColor, result);
  return result;
}

function buildDog(opts = {}) {
  const cfg = Object.assign({
    // Warmer, slightly lighter fur — reads as "golden retriever puppy" rather
    // than "guard dog". Friendlier silhouette is the single biggest factor in
    // making the user feel safe approaching the dog.
    furColor:    0xd6a06a, earColor: 0xa97442, bellyColor: 0xefd2a6,
    noseColor:   0x1a1416, tongueColor: 0xff8a9a,
  }, opts);
  const dog = new THREE.Group();
  const parts = {};
  dog.userData.parts = parts;

  // Procedurally textured fur — albedo + normal + roughness maps with real
  // hair-strand detail. This is what stops the dog from reading like a
  // smooth-painted plastic toy.
  const furMaps     = makeFurMaps(cfg.furColor);
  const earFurMaps  = makeFurMaps(cfg.earColor);
  const bellyMaps   = makeFurMaps(cfg.bellyColor);

  const fur = new THREE.MeshStandardMaterial({
    map:           furMaps.albedo,
    normalMap:     furMaps.normal,
    normalScale:   new THREE.Vector2(0.55, 0.55),
    roughnessMap:  furMaps.roughness,
    roughness:     1.0,
    metalness:     0.0,
    envMapIntensity: 0.55,
  });
  // Ears use a thinner, slightly transparent material so light bleeds through
  // the membrane (real ear tissue does this — a key "alive" signal).
  const earFur = new THREE.MeshPhysicalMaterial({
    map:           earFurMaps.albedo,
    normalMap:     earFurMaps.normal,
    normalScale:   new THREE.Vector2(0.45, 0.45),
    roughnessMap:  earFurMaps.roughness,
    roughness:     1.0,
    side:          THREE.DoubleSide,
    transmission:  0.18,
    thickness:     0.012,
    ior:           1.3,
  });
  const belly = new THREE.MeshStandardMaterial({
    map:          bellyMaps.albedo,
    normalMap:    bellyMaps.normal,
    normalScale:  new THREE.Vector2(0.40, 0.40),
    roughnessMap: bellyMaps.roughness,
    roughness:    1.0,
  });
  // Wet nose — black with high specular + clearcoat so it catches a real
  // highlight. The biggest single "alive vs robot" signal on a dog's face.
  const dark = new THREE.MeshPhysicalMaterial({
    color:         cfg.noseColor,
    roughness:     0.20,
    metalness:     0.0,
    clearcoat:     1.0,
    clearcoatRoughness: 0.05,
  });
  const tongueM = new THREE.MeshStandardMaterial({
    color: cfg.tongueColor, roughness: 0.4, metalness: 0.05,
  });
  // Eyes — wet eye shader: high clearcoat over a dark iris for that
  // "looking right at you" look.
  const eyeWhiteM = new THREE.MeshPhysicalMaterial({
    color: 0xfff4ea, roughness: 0.25, clearcoat: 0.8, clearcoatRoughness: 0.05,
  });
  const irisM = new THREE.MeshPhysicalMaterial({
    color: 0x3a2418, roughness: 0.15, metalness: 0.10,
    clearcoat: 1.0, clearcoatRoughness: 0.04,
  });

  // Body / chest — slightly chunkier and rounder so the dog reads as soft
  // and approachable rather than lean and watchful.
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.32, 28, 20), fur);
  body.scale.set(1.0, 0.92, 1.55);
  body.position.set(0, 0.42, 0);
  body.castShadow = true;
  dog.add(body); parts.body = body;
  // Light belly
  const bellyMesh = new THREE.Mesh(new THREE.SphereGeometry(0.30, 18, 14), belly);
  bellyMesh.scale.set(0.85, 0.5, 1.4);
  bellyMesh.position.set(0, 0.28, 0);
  dog.add(bellyMesh);
  // Chest blaze (lighter cream patch on the chest — friendlier read)
  const blaze = new THREE.Mesh(new THREE.SphereGeometry(0.18, 14, 10), belly);
  blaze.scale.set(0.7, 1.1, 0.8);
  blaze.position.set(0, 0.5, 0.40);
  dog.add(blaze);

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.30, 16), fur);
  neck.rotation.x = -0.45;
  neck.position.set(0, 0.57, 0.36);
  neck.castShadow = true;
  dog.add(neck);

  // Collar (small visible tag → reads as "owned, friendly dog")
  const collar = new THREE.Mesh(
    new THREE.TorusGeometry(0.18, 0.025, 10, 24),
    new THREE.MeshStandardMaterial({ color: 0xc92e2e, roughness: 0.7 })
  );
  collar.rotation.x = Math.PI / 2 - 0.45;
  collar.position.set(0, 0.55, 0.42);
  dog.add(collar); parts.collar = collar;
  const tag = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035, 0.035, 0.005, 14),
    new THREE.MeshStandardMaterial({ color: 0xd4b34a, roughness: 0.3, metalness: 0.85 })
  );
  tag.rotation.x = Math.PI / 2;
  tag.position.set(0, 0.40, 0.50);
  dog.add(tag);

  // Head group (rotates to track player or tip up to bark)
  const head = new THREE.Group();
  head.position.set(0, 0.70, 0.52);
  dog.add(head); parts.head = head;
  // Bigger, slightly rounder skull — important for "puppy" read
  const skull = new THREE.Mesh(new THREE.SphereGeometry(0.22, 28, 20), fur);
  skull.scale.set(1.0, 1.0, 1.05);
  skull.castShadow = true;
  head.add(skull);
  // Forehead patch (a touch lighter — adds character)
  const forehead = new THREE.Mesh(new THREE.SphereGeometry(0.10, 14, 10), belly);
  forehead.scale.set(0.7, 0.9, 0.5);
  forehead.position.set(0, 0.10, 0.13);
  head.add(forehead);
  // Snout — softened with rounded sphere instead of a stark box
  const snout = new THREE.Mesh(new THREE.SphereGeometry(0.10, 18, 14), fur);
  snout.scale.set(1.0, 0.85, 1.6);
  snout.position.set(0, -0.06, 0.22);
  snout.castShadow = true;
  head.add(snout);
  // Snout underside (lighter — reads as muzzle marking)
  const snoutBottom = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 10), belly);
  snoutBottom.scale.set(0.95, 0.5, 1.4);
  snoutBottom.position.set(0, -0.09, 0.22);
  head.add(snoutBottom);
  // Nose — bigger and rounder
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.055, 14, 12), dark);
  nose.scale.set(1.1, 0.95, 0.95);
  nose.position.set(0, -0.02, 0.36);
  head.add(nose);
  // Soft nose-shine (small white dot on the nose)
  const noseShine = new THREE.Mesh(
    new THREE.SphereGeometry(0.012, 8, 6),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  noseShine.position.set(0.02, 0.005, 0.41);
  head.add(noseShine);

  // Eyes — bigger, with whites + iris + pupil + highlight. The "soulful eyes"
  // are the single most powerful empathy signal a procedural dog can have.
  parts.eyes = [];
  for (const sx of [-1, 1]) {
    const eyeGroup = new THREE.Group();
    eyeGroup.position.set(sx * 0.10, 0.06, 0.15);
    head.add(eyeGroup);
    // White
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.040, 14, 12), eyeWhiteM);
    white.scale.set(1.0, 1.0, 0.6);
    white.position.set(0, 0, 0.005);
    eyeGroup.add(white);
    // Iris (dark brown)
    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.030, 14, 12), irisM);
    iris.position.set(0, 0, 0.022);
    iris.scale.set(1, 1, 0.55);
    eyeGroup.add(iris);
    // Pupil (deeper black)
    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(0.016, 12, 10),
      new THREE.MeshBasicMaterial({ color: 0x080404 })
    );
    pupil.position.set(0, 0, 0.034);
    eyeGroup.add(pupil);
    // Highlight (catchlight — the thing that makes eyes feel "alive")
    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.009, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff }));
    hl.position.set(sx * 0.008, 0.012, 0.040);
    eyeGroup.add(hl);
    // Soft brow (just above the eye — gives a friendlier expression)
    const brow = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 10, 8),
      new THREE.MeshStandardMaterial({ color: cfg.earColor, roughness: 1.0 })
    );
    brow.scale.set(1.0, 0.4, 0.6);
    brow.position.set(0, 0.038, 0.018);
    eyeGroup.add(brow);
    // Upper eyelid — a thin half-sphere we scale on Y to "close" for blinks.
    // At rest scale.y = 0.05 (near-flat strip), during a blink scale.y = 1.0
    // (covers the eye). Real dogs blink ~10 times a minute; a missing blink
    // is the strongest uncanny-valley signal.
    const eyelid = new THREE.Mesh(
      new THREE.SphereGeometry(0.042, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2),
      fur     // matches the head fur so the lid blends in
    );
    eyelid.scale.set(1.0, 0.05, 0.55);
    eyelid.position.set(0, 0.005, 0.005);
    eyeGroup.add(eyelid);
    parts.eyes.push({ group: eyeGroup, lid: eyelid });
  }

  // Floppy ears — bigger, with a subtle inner-ear colour for depth
  parts.ears = [];
  const innerEarMat = new THREE.MeshStandardMaterial({ color: 0xc99a76, roughness: 1.0, side: THREE.DoubleSide });
  for (const sx of [-1, 1]) {
    const earRoot = new THREE.Group();
    earRoot.position.set(sx * 0.18, 0.12, 0.0);
    earRoot.rotation.z = sx * 0.18;
    earRoot.rotation.x = -0.05;
    head.add(earRoot);
    // Outer ear — slightly darker, larger
    const earMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.13, 0.22), earFur);
    earMesh.position.set(0, -0.12, 0);
    earRoot.add(earMesh);
    // Inner ear — a touch in front, lighter
    const innerEar = new THREE.Mesh(new THREE.PlaneGeometry(0.085, 0.17), innerEarMat);
    innerEar.position.set(0, -0.12, 0.005);
    earRoot.add(innerEar);
    parts.ears.push(earRoot);
  }

  // Mouth — soft, smiling line (curved, not a box). Gives the dog a happy
  // resting expression instead of looking blank. Hidden by the controller
  // when the jaw opens significantly (panting / barking) so we don't have
  // a smile floating in front of an open mouth.
  const smileGeo = new THREE.TorusGeometry(0.045, 0.005, 6, 16, Math.PI * 0.7);
  const smile = new THREE.Mesh(smileGeo, dark);
  smile.rotation.z = -Math.PI / 2;
  smile.rotation.x = -0.2;
  smile.position.set(0, -0.105, 0.30);
  head.add(smile); parts.smile = smile;

  // Jaw + tongue (still drives the bark animation, but now hidden under the
  // closed smile when at rest)
  const jaw = new THREE.Group();
  jaw.position.set(0, -0.10, 0.20);
  head.add(jaw); parts.jaw = jaw;
  const jawMesh = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.04, 0.16), fur);
  jawMesh.position.set(0, -0.020, 0.04);
  jaw.add(jawMesh);
  const tongue = new THREE.Mesh(new THREE.SphereGeometry(0.045, 14, 10), tongueM);
  tongue.scale.set(0.95, 0.3, 1.5);
  tongue.position.set(0, -0.005, 0.06);
  tongue.visible = false;
  jaw.add(tongue); parts.tongue = tongue;

  // Tail
  const tail = new THREE.Group();
  tail.position.set(0, 0.42, -0.45);
  dog.add(tail); parts.tail = tail;
  const tailMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.025, 0.4, 10), fur
  );
  tailMesh.position.set(0, 0.16, -0.04);
  tailMesh.rotation.x = -0.4;
  tail.add(tailMesh);

  // 4 legs (each in its own group for animation)
  parts.legs = {};
  const legPositions = {
    frontLeft:  [-0.16, 0.30,  0.30],
    frontRight: [ 0.16, 0.30,  0.30],
    backLeft:   [-0.16, 0.30, -0.30],
    backRight:  [ 0.16, 0.30, -0.30],
  };
  for (const [name, [x, y, z]] of Object.entries(legPositions)) {
    const legRoot = new THREE.Group();
    legRoot.position.set(x, y, z);
    dog.add(legRoot);
    const upper = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.05, 0.18, 10), fur
    );
    upper.position.set(0, -0.09, 0); upper.castShadow = true;
    legRoot.add(upper);
    const lower = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.04, 0.16, 10), fur
    );
    lower.position.set(0, -0.26, 0.02); lower.castShadow = true;
    legRoot.add(lower);
    const paw = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.05, 0.13), fur);
    paw.position.set(0, -0.36, 0.05); paw.castShadow = true;
    legRoot.add(paw);
    parts.legs[name] = legRoot;
  }
  return dog;
}

// State machine for the procedural dog
class DogController {
  constructor(dog, scene, camera) {
    this.dog = dog; this.scene = scene; this.camera = camera;
    this.parts = dog.userData.parts;
    this.state = "idle"; this.prevState = "idle";
    this.tailWag = 0; this.walk = 0; this.breath = 0;
    this.barkCooldown = 0; this.eatPhase = 0;
    this.followTarget = null; this.targetYaw = dog.rotation.y;
    this.headYaw = 0; this.headPitch = 0; this.jawOpen = 0;
    this.followPlayer = false;
    this.minDistance = 0.9;     // how close the dog wants to be to the player when following
    // The dog's resting "feet on the floor" Y. Captured at construction time
    // so animations can ADD to it rather than overwriting it (which was the
    // "walking on air" bug — the dog would snap to y=0 regardless of where
    // the floor actually was).
    this.baseY = dog.position.y;
    // Footstep cadence — fired each time a paw plants
    this._lastWalkBucket = -1;
    // Pet-amount (0..1) — set externally by the scene to drive lean-into-pet
    // and the "happy contact" facial expression. Smoothed inside update().
    this.petAmount = 0;
    this._petAmountSm = 0;
    // Blink + head-shake timers. Real dogs blink ~10 times/min and do a full
    // head shake every ~30-90 s to settle their ears.
    this._blinkPhase = 0;          // 0..1, fires when crossing 1
    this._nextBlinkAt = 2 + Math.random() * 4;
    this._headShakeT = 0;          // active head-shake animation timer
    this._nextShakeAt = 30 + Math.random() * 60;
    // Yawn — long, slow jaw open with closed eyes. Fires every 60-120 s when
    // the dog is at rest. The strongest "this is a real animal" cue beyond
    // breathing.
    this._yawnT = 0;
    this._nextYawnAt = 25 + Math.random() * 40;
  }
  setState(s) {
    if (this.state === s) return;
    this.prevState = this.state;
    this.state = s;
    this.parts.tongue.visible = (s === "sit" || s === "bark" || s === "eat" || s === "happy" || s === "lay");
    // Reset the sit-timer when we leave/enter sit so auto-lay-down works
    if (s === "sit") this._sitTimer = 0;
  }
  walkTo(x, z) { this.followTarget = { x, z }; this.setState("walking"); }
  bark() { this.barkCooldown = 0.55; this.setState("bark"); }
  sit() { this.setState("sit"); }
  stand() { this.setState("idle"); }
  lay() { this.setState("lay"); }
  eat() { this.eatPhase = 1.0; this.setState("eat"); }
  setFollow(on) { this.followPlayer = on; }

  update(t, dt) {
    const p = this.parts;
    // Breathing — chest expands rhythmically on inhale, deflates on exhale.
    // Faster + bigger amplitude when the dog is alert / barking ("panting").
    const breathRate = (this.state === "bark") ? 5.2
                     : (this.state === "walking") ? 4.0
                     : 2.4;
    this.breath += dt * breathRate;
    // Petted dogs visibly relax — slower breath, slightly bigger amplitude
    // (chest "settling" into the hand). The petAmount blend below.
    const baseAmp = this.state === "bark" ? 0.05 : 0.03;
    const breathAmp = baseAmp + (this._petAmountSm || 0) * 0.015;
    p.body.scale.y = 0.92 + Math.sin(this.breath) * breathAmp;
    p.body.scale.x = 1.0 + Math.sin(this.breath) * (breathAmp * 0.6);

    // Tail wag — speed by mood, with a slight figure-8 (real dogs don't
    // wag straight side-to-side; they sweep slightly up-and-down too)
    const wagSpeed = this.state === "bark" ? 9 : this.state === "walking" ? 8 : this.state === "sit" ? 6 : 3;
    this.tailWag += dt * wagSpeed;
    p.tail.rotation.y = Math.sin(this.tailWag) * 0.55;
    p.tail.rotation.x = -0.4 + Math.sin(this.tailWag * 2) * 0.08;

    // Ears — perk up when the dog is looking right at the player (alert
    // posture), droop when sitting quietly. Real dogs ear-perk is one of
    // the strongest "this is a real dog reacting to me" signals.
    //
    // Fear-mirror: when the human's fear (PhobiaFear.suds) is high, the
    // dog reads the human as agitated and goes fully alert too. This is a
    // real cue — a dog can smell adrenaline + see your posture. The
    // therapeutic implication is visible: when YOU calm down, the dog
    // visibly calms down with you, closing the alarm loop.
    if (p.ears && p.ears.length === 2) {
      const playerHeadDx = this.camera.position.x - this.dog.position.x;
      const playerHeadDz = this.camera.position.z - this.dog.position.z;
      const playerDist = Math.hypot(playerHeadDx, playerHeadDz);
      let humanFear = 0;
      if (window.PhobiaFear && typeof window.PhobiaFear.suds === "number") {
        humanFear = Math.max(0, Math.min(1, window.PhobiaFear.suds / 100));
      }
      // Smoothed copy so the dog's ears don't twitch frame-by-frame
      this._humanFearSm = (this._humanFearSm || 0) + (humanFear - (this._humanFearSm || 0)) * Math.min(1, dt * 1.6);
      const baseAlert = this.state === "bark" ? 1.0
                      : (this.state === "walking" ? 0.5
                      : (playerDist < 2.5 ? 0.7 : 0.2));
      // Lift the alert level when the human is fearful — caps at 1.0 so a
      // fully-relaxed dog still goes pricked-up alert under high SUDS.
      const alert = Math.max(baseAlert, this._humanFearSm * 0.95);
      const earTilt = -0.05 - alert * 0.40;        // -0.05 (relaxed) to -0.45 (perked)
      for (let i = 0; i < 2; i++) {
        p.ears[i].rotation.x += (earTilt - p.ears[i].rotation.x) * 0.10;
        // Ear twitch frequency rises with alertness — a real ear-flick
        // once every ~3 s when alert, ~1 s when in alarm.
        const twitchChance = 0.003 + Math.max(0, alert - 0.6) * 0.020;
        if (alert > 0.6 && Math.random() < twitchChance) {
          p.ears[i].rotation.x -= 0.18;
        }
      }
      // Body posture — when humanFear is high, dog body braces (less
      // breathing flex, slight forward lean). Visible "freeze and watch".
      if (this._humanFearSm > 0.4 && p.body) {
        const brace = (this._humanFearSm - 0.4) / 0.6;
        // Reduce breathing amplitude (already computed above by overwriting
        // body.scale.y / scale.x — we layer a tiny pitch lean on the head)
        if (p.head) p.head.rotation.x = -brace * 0.10;
      } else if (p.head) {
        p.head.rotation.x += (0 - p.head.rotation.x) * 0.05;
      }
    }

    // Panting — when idle and close to the player, the jaw bobs at ~3 Hz
    // and the tongue sticks out. This is the biggest "alive dog" cue.
    const playerDx2 = this.camera.position.x - this.dog.position.x;
    const playerDz2 = this.camera.position.z - this.dog.position.z;
    const isCloseAndCalm = Math.hypot(playerDx2, playerDz2) < 3.0
                          && (this.state === "idle" || this.state === "sit");
    if (isCloseAndCalm) {
      p.tongue.visible = true;
      // Pant amplitude: 0.0 at far, 0.5 at 1m
      const pantAmp = 0.30 + Math.sin(t * 6.5) * 0.18;
      this.jawOpen += (pantAmp - this.jawOpen) * 0.20;
    }

    // Decide if we should follow the player
    if (this.followPlayer && this.state !== "walking" && this.state !== "eat") {
      const dx = this.camera.position.x - this.dog.position.x;
      const dz = this.camera.position.z - this.dog.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist > this.minDistance + 0.6) {
        // Walk toward a point near the player but not on top of them
        const k = (dist - this.minDistance) / dist;
        this.walkTo(this.dog.position.x + dx * k, this.dog.position.z + dz * k);
      }
    }

    // ---- Pet-amount smoothing ----
    // Smoothed copy so the lean isn't jerky when the scene sets discrete
    // pulses. While being petted the dog tilts up + forward toward the hand.
    this._petAmountSm += (this.petAmount - this._petAmountSm) * Math.min(1, dt * 5);

    // ---- Blinking ----
    // The eyelid scales on Y from 0.05 (open) to 1.0 (closed) over ~140 ms,
    // then back. Triggers at intervals of 4-8 seconds (~10/minute average).
    // Faster when alert (real dogs blink more when excited).
    this._blinkTimer = (this._blinkTimer || 0) + dt;
    let lidY = 0.05;
    if (this._blinkTimer > this._nextBlinkAt) {
      const phase = (this._blinkTimer - this._nextBlinkAt) / 0.14;
      if (phase < 1) {
        lidY = 0.05 + Math.sin(phase * Math.PI) * 0.95;
      } else {
        // Blink finished — schedule next
        this._blinkTimer = 0;
        this._nextBlinkAt = 4 + Math.random() * 4;
      }
    }
    if (p.eyes && p.eyes.length === 2) {
      for (const e of p.eyes) {
        if (e.lid) e.lid.scale.y = lidY;
      }
    }

    // ---- Periodic head shake (real dogs do this every ~30-90 s) ----
    // A short rapid yaw oscillation that doesn't disturb the head's overall
    // tracking. Only fires when calm (idle / sit, not barking / walking).
    this._shakeTimer = (this._shakeTimer || 0) + dt;
    if (this._headShakeT <= 0 && this._shakeTimer > this._nextShakeAt
        && (this.state === "idle" || this.state === "sit")) {
      this._headShakeT = 0.55;     // 0.55s shake duration
      this._shakeTimer = 0;
      this._nextShakeAt = 30 + Math.random() * 60;
    }
    let shakeYaw = 0;
    if (this._headShakeT > 0) {
      this._headShakeT = Math.max(0, this._headShakeT - dt);
      // Damped sinusoid: amplitude decays from 0.45 → 0 over 0.55 s
      const k = 1 - this._headShakeT / 0.55;
      shakeYaw = Math.sin(k * Math.PI * 6) * 0.45 * (1 - k);
    }

    // ---- Yawn (real dogs do this every ~30-90s when relaxed) ----
    // A long ~1.4 s open-mouth + tipped-head + eyes-closed cycle.
    this._yawnTimer = (this._yawnTimer || 0) + dt;
    if (this._yawnT <= 0 && this._yawnTimer > this._nextYawnAt
        && (this.state === "idle" || this.state === "sit" || this.state === "lay")
        && !isCloseAndCalm) {
      this._yawnT = 1.4;
      this._yawnTimer = 0;
      this._nextYawnAt = 30 + Math.random() * 50;
    }
    let yawnJaw = 0;
    if (this._yawnT > 0) {
      this._yawnT = Math.max(0, this._yawnT - dt);
      const k = 1 - this._yawnT / 1.4;          // 0..1 across the yawn
      // Smooth open-and-close: peaks at k=0.5
      yawnJaw = Math.sin(k * Math.PI) * 0.95;
      // Eyes squint shut during the yawn
      if (p.eyes && p.eyes.length === 2) {
        const squint = Math.sin(k * Math.PI) * 0.85;
        for (const e of p.eyes) {
          if (e.lid) e.lid.scale.y = Math.max(e.lid.scale.y, 0.05 + squint);
        }
      }
      // Show tongue during the yawn
      if (p.tongue) p.tongue.visible = true;
    }

    // Head tracking — ALWAYS track the camera, even during walk / sit / bark.
    // Real dogs keep eye contact while doing other things, and stopping the
    // head-tracking during state changes was the biggest "the dog doesn't
    // see me" tell. Bark adds a brief upward tip on top of tracking; eat
    // overrides toward the ground (dog is looking at the food). The yaw is
    // clamped to ±0.8 rad — beyond that the dog can't physically twist its
    // neck without rotating the whole body.
    {
      const dx = this.camera.position.x - this.dog.position.x;
      const dy = this.camera.position.y - (this.dog.position.y + 0.7);  // approx dog's eye height
      const dz = this.camera.position.z - this.dog.position.z;
      const horizDist = Math.hypot(dx, dz);
      let yawTarget = Math.atan2(dx, dz) - this.dog.rotation.y;
      while (yawTarget >  Math.PI) yawTarget -= Math.PI * 2;
      while (yawTarget < -Math.PI) yawTarget += Math.PI * 2;
      yawTarget = Math.max(-0.8, Math.min(0.8, yawTarget));
      // Pitch: look up if camera is above the dog, down if below. Real dogs
      // tilt their head slightly when looking up at a tall human (cute).
      let pitchTarget = -Math.atan2(dy, horizDist);
      pitchTarget = Math.max(-0.5, Math.min(0.45, pitchTarget));
      // State-specific overrides
      if (this.state === "eat") {
        yawTarget = 0;
        pitchTarget = 0.6;
      } else if (this.state === "bark") {
        // Tip slightly UP during the bark (the lunge), but keep yaw tracking
        pitchTarget = -0.4;
      }
      // ---- Lean into the pet ----
      // While being petted the dog tilts its head UP toward the hand. Real
      // dogs do this — the moment they feel the hand they push their head
      // up into it. We add ~0.18 rad of upward pitch on top of tracking.
      pitchTarget -= this._petAmountSm * 0.18;
      // Smoothing — fast enough to feel responsive but not snappy
      const yawK = 0.10, pitchK = 0.08;
      this.headYaw   += (yawTarget   - this.headYaw)   * yawK;
      this.headPitch += (pitchTarget - this.headPitch) * pitchK;
      // Subtle head tilt (z rotation) — the classic dog "I don't understand"
      // tilt that triggers when the user is doing something unusual. We
      // express it as a small periodic wobble dampened by yaw stability.
      const tilt = Math.sin(this.breath * 0.5) * 0.04;
      p.head.rotation.z = tilt;
    }
    p.head.rotation.y = this.headYaw + shakeYaw;
    p.head.rotation.x = this.headPitch;

    // Walking — translate + 4-beat gait + grounded body bob
    if (this.state === "walking" && this.followTarget) {
      const dx = this.followTarget.x - this.dog.position.x;
      const dz = this.followTarget.z - this.dog.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist > 0.3) {
        const speed = 1.6 * dt;
        this.dog.position.x += (dx / dist) * speed;
        this.dog.position.z += (dz / dist) * speed;
        this.targetYaw = Math.atan2(dx, dz);
        let dy = this.targetYaw - this.dog.rotation.y;
        while (dy >  Math.PI) dy -= Math.PI * 2;
        while (dy < -Math.PI) dy += Math.PI * 2;
        this.dog.rotation.y += dy * Math.min(1, dt * 5);
        // 4-beat lateral-sequence walk: front-left → back-right → front-right → back-left
        // Each leg gets a +π/2 phase offset so only one paw lifts at a time. This
        // makes the dog look like it's actually walking instead of pogo-bouncing.
        this.walk += dt * 7;
        const phaseFL = this.walk;
        const phaseBR = this.walk + Math.PI * 0.5;
        const phaseFR = this.walk + Math.PI * 1.0;
        const phaseBL = this.walk + Math.PI * 1.5;
        // Lift = +rotation when above zero, plant = 0 when below. We use the
        // positive half of a sine so the leg only swings forward, not backward.
        const lift = (ph) => Math.max(0, Math.sin(ph)) * 0.6;
        p.legs.frontLeft.rotation.x  = lift(phaseFL) - 0.05;
        p.legs.backRight.rotation.x  = lift(phaseBR) - 0.05;
        p.legs.frontRight.rotation.x = lift(phaseFR) - 0.05;
        p.legs.backLeft.rotation.x   = lift(phaseBL) - 0.05;
        // Subtle vertical bob (dogs sway up-and-down ~2-3 cm with each pair)
        // tied to the gait rhythm, ADDED to the base y so the feet stay grounded.
        const bob = Math.abs(Math.sin(this.walk * 2)) * 0.025;
        this.dog.position.y = this.baseY + bob;
        // Mild lateral sway (2-3 cm) — opposing pairs lift the body slightly
        // toward the other side. Reads as natural quadruped movement.
        const sway = Math.sin(this.walk) * 0.015;
        this.dog.position.x += sway * Math.cos(this.dog.rotation.y);
        this.dog.position.z -= sway * Math.sin(this.dog.rotation.y);
        // Footstep audio cadence — fire on the down-beat of every pair
        const walkBucket = Math.floor(this.walk / Math.PI);
        if (walkBucket !== this._lastWalkBucket) {
          if (this._lastWalkBucket !== -1 && window.PhobiaAudio?.footstep) {
            const dogPos = { x: this.dog.position.x, y: this.baseY + 0.05, z: this.dog.position.z };
            try { window.PhobiaAudio.footstep(0.25, "soft"); } catch {}
          }
          this._lastWalkBucket = walkBucket;
        }
      } else {
        this.followTarget = null;
        this.setState("idle");
        Object.values(p.legs).forEach(l => l.rotation.x = 0);
        this.dog.position.y = this.baseY;
      }
    }

    // Sit pose — back legs fold up + body tilts back. The dog's hips drop
    // a few cm but the FRONT paws stay grounded, so the rear lowers visibly.
    if (this.state === "sit") {
      this.dog.position.y += (this.baseY + 0.05 - this.dog.position.y) * 0.10;
      p.body.rotation.x += (-0.4 - p.body.rotation.x) * 0.10;
      p.legs.backLeft.rotation.x  += (1.1 - p.legs.backLeft.rotation.x)  * 0.10;
      p.legs.backRight.rotation.x += (1.1 - p.legs.backRight.rotation.x) * 0.10;
      p.legs.frontLeft.rotation.x  += (0 - p.legs.frontLeft.rotation.x)  * 0.10;
      p.legs.frontRight.rotation.x += (0 - p.legs.frontRight.rotation.x) * 0.10;
      // Track time spent sitting for the auto-lay-down transition below
      this._sitTimer = (this._sitTimer || 0) + dt;
    } else if (this.state === "lay") {
      // Lay pose — body drops to the floor (chest flat, hips on the ground),
      // all four legs fold flat in front. The deepest "I trust you" state.
      // Body Y drops by ~12 cm relative to the standing baseY.
      this.dog.position.y += ((this.baseY - 0.12) - this.dog.position.y) * 0.08;
      // Body tilts slightly forward (chest contact) — opposite of sit's
      // backward tilt
      p.body.rotation.x += (0.10 - p.body.rotation.x) * 0.08;
      // All four legs fold forward, lying flat
      p.legs.frontLeft.rotation.x  += (-0.4 - p.legs.frontLeft.rotation.x)  * 0.08;
      p.legs.frontRight.rotation.x += (-0.4 - p.legs.frontRight.rotation.x) * 0.08;
      p.legs.backLeft.rotation.x   += ( 0.6 - p.legs.backLeft.rotation.x)   * 0.08;
      p.legs.backRight.rotation.x  += ( 0.6 - p.legs.backRight.rotation.x)  * 0.08;
    } else if (this.state !== "walking") {
      this.dog.position.y += (this.baseY - this.dog.position.y) * 0.10;
      p.body.rotation.x += (0 - p.body.rotation.x) * 0.10;
      Object.values(p.legs).forEach(l => l.rotation.x += (0 - l.rotation.x) * 0.10);
    }

    // Bark — open jaw, snap back to previous state when done. The panting
    // logic above might already have set jawOpen to a small value; bark
    // overrides toward 1.0 so it's bigger.
    if (this.state === "bark") {
      this.barkCooldown -= dt;
      this.jawOpen += (1 - this.jawOpen) * 0.25;
      if (this.barkCooldown <= 0) this.setState(this.prevState === "sit" ? "sit" : "idle");
    } else if (!isCloseAndCalm) {
      this.jawOpen += (0 - this.jawOpen) * 0.2;
    }
    // Yawn dominates jaw if active — it's a big slow open-and-close
    if (yawnJaw > 0) {
      this.jawOpen = Math.max(this.jawOpen, yawnJaw);
    }
    p.jaw.rotation.x = this.jawOpen * 0.7;
    // Hide the smile when the jaw is open enough that we can see inside
    if (p.smile) p.smile.visible = this.jawOpen < 0.20;

    // ---- Audio: continuous panting + occasional whine ----
    // A real dog has a constant low texture: panting when calm-and-close,
    // a quiet whine every ~10-20 s when watching the user. The DogController
    // owns its own audio scheduling so the dogs scene's update loop doesn't
    // have to know about it. Spatial audio: each puff comes from the dog's
    // actual world position, so the user's HRTF positions the sound left/right
    // correctly when the dog moves around them.
    this._pantTimer = (this._pantTimer || 0) + dt;
    this._whineTimer = (this._whineTimer || (15 + Math.random() * 20));
    const dogWorldPos = {
      x: this.dog.position.x,
      y: this.dog.position.y + 0.55,
      z: this.dog.position.z,
    };
    if (window.PhobiaAudio) {
      // Pant on every breath cycle when close + calm. Skipped during bark
      // (the bark itself is the sound) and walking (panting + footsteps
      // stack too much). Slowed to ~0.9-1.0 s per pant so it doesn't feel
      // like a constant gasp track.
      if (isCloseAndCalm && this._pantTimer > 0.9 + Math.random() * 0.2
          && this.state !== "bark" && this.state !== "walking") {
        this._pantTimer = 0;
        try { window.PhobiaAudio.dogPant(0.30, dogWorldPos); } catch {}
      }
      // Whine: rare enough to feel like a deliberate communication, not a
      // soundtrack. 35-65 s between whines (was 14-32).
      this._whineTimer -= dt;
      if (this._whineTimer <= 0) {
        const playerDx = this.camera.position.x - this.dog.position.x;
        const playerDz = this.camera.position.z - this.dog.position.z;
        const dist = Math.hypot(playerDx, playerDz);
        if ((this.state === "idle" || this.state === "sit")
            && dist > 1.5 && dist < 4.5) {
          try { window.PhobiaAudio.dogWhine(0.4, dogWorldPos); } catch {}
        }
        this._whineTimer = 35 + Math.random() * 30;
      }
    }

    // Eat — head down, jaw munches; auto-transitions to sit
    if (this.state === "eat") {
      this.eatPhase -= dt * 0.5;
      this.jawOpen = 0.4 + Math.abs(Math.sin(t * 12)) * 0.4;
      p.jaw.rotation.x = this.jawOpen * 0.5;
      if (this.eatPhase <= 0) this.setState("sit");
    }
  }
}

// ---------- Dogs scene ----------
function setupDogs(scene, camera, level) {
  const size = level.size;
  const intensity = level.intensity; // calm | alert | barking

  // Brighter, warmer room — daylight through a window. The room should feel
  // safe and home-y, not threatening. A barking dog still feels scary even
  // in a sunny living room, but the lighting itself is no longer ominous.
  scene.background = new THREE.Color(0xeacba0);
  scene.fog = new THREE.Fog(0xeacba0, 16, 40);

  // Sun streaming in through a window (warm key light)
  const key = new THREE.DirectionalLight(0xfff0d0, 2.2);
  key.position.set(5, 9, 3);
  key.target.position.set(0, 0, -3);
  key.castShadow = !IS_LOW_POWER;
  if (key.castShadow) {
    key.shadow.mapSize.set(IS_LOW_POWER ? 512 : 1024, IS_LOW_POWER ? 512 : 1024);
    key.shadow.camera.left = -8;  key.shadow.camera.right = 8;
    key.shadow.camera.top = 8;    key.shadow.camera.bottom = -8;
    key.shadow.camera.far = 30;
  }
  scene.add(key); scene.add(key.target);
  // Warm room bounce
  const fill = new THREE.PointLight(0xffe4b8, 0.55, 25);
  fill.position.set(-3, 3, 1);
  scene.add(fill);
  // Cool fill from the opposite side (sky bounce through the window)
  const fillBack = new THREE.PointLight(0xa6c5e8, 0.30, 18);
  fillBack.position.set(3, 3, 4);
  scene.add(fillBack);
  // Ambient lifts shadows so the dog never disappears
  scene.add(new THREE.AmbientLight(0xfff1e0, 0.55));

  // Floor (light oak planks)
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ map: makeWoodTexture(), color: 0xcaa478, roughness: 0.85 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);

  // Soft area rug between the user and the dog — visual anchor for the
  // "friendly play space" between you and the dog.
  const rug = new THREE.Mesh(
    new THREE.PlaneGeometry(4.8, 3.4),
    new THREE.MeshStandardMaterial({ color: 0xc0807a, roughness: 0.95 })
  );
  rug.rotation.x = -Math.PI / 2;
  rug.position.set(0, -0.99, -2.2);
  rug.receiveShadow = true;
  scene.add(rug);

  // Sunbeam dust motes — drift through the warm window light. Subtle but
  // does enormous work selling the "real sun-warmed living room" mood.
  let _dogDust = null;
  if (window.PhobiaAtmosphere && window.PhobiaAtmosphere.createDustMotes) {
    _dogDust = window.PhobiaAtmosphere.createDustMotes({
      count: 130, bounds: { x: 8, y: 4, z: 10 },
      origin: [0, 1.2, -2], color: 0xffe4b8, size: 0.05, opacity: 0.40,
      drift: 0.12,
    });
    if (_dogDust) scene.add(_dogDust);
  }
  // Rug border (slightly darker)
  const rugBorder = new THREE.Mesh(
    new THREE.RingGeometry(0, 0, 64),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  // Use a thinner darker rect outline on top of the rug
  const rugOutline = new THREE.Mesh(
    new THREE.PlaneGeometry(4.8, 3.4),
    new THREE.MeshBasicMaterial({ color: 0x8a4f4a, transparent: true, opacity: 0.6, depthWrite: false })
  );
  rugOutline.rotation.x = -Math.PI / 2;
  rugOutline.position.set(0, -0.985, -2.2);
  rugOutline.scale.set(1.05, 1.05, 1);
  scene.add(rugOutline);

  // Back wall — softer cream
  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 14),
    new THREE.MeshStandardMaterial({ color: 0xe8d5b8, roughness: 0.95 })
  );
  wall.position.set(0, 4, -14);
  wall.receiveShadow = true;
  scene.add(wall);

  // Window on the back wall — emissive panes so it reads as bright daylight
  const windowFrame = new THREE.Mesh(
    new THREE.BoxGeometry(4, 3, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x4a3528, roughness: 0.6 })
  );
  windowFrame.position.set(-4, 3, -13.95);
  scene.add(windowFrame);
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 2; c++) {
      const pane = new THREE.Mesh(
        new THREE.PlaneGeometry(1.7, 1.3),
        new THREE.MeshStandardMaterial({
          color: 0xeaf0fa, emissive: 0xeaf0fa, emissiveIntensity: 0.4, roughness: 0.5,
        })
      );
      pane.position.set(-4 + (c - 0.5) * 1.85, 3 + (r - 0.5) * 1.4, -13.92);
      scene.add(pane);
    }
  }

  // ---------- Bird outside the window ----------
  // A small silhouette that perches on the windowsill, looks around, then
  // flies off — comes back every 30-60 seconds. The dog notices and tracks
  // it briefly when it appears, breaking the otherwise self-centred world.
  // Reads as "the world is alive even when you're not the centre of it",
  // which is the single biggest "real game" cue.
  const bird = new THREE.Group();
  const birdMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.95 });
  const birdBody = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 8), birdMat);
  birdBody.scale.set(1.2, 0.9, 0.9);
  bird.add(birdBody);
  const birdHead = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), birdMat);
  birdHead.position.set(0.075, 0.04, 0);
  bird.add(birdHead);
  // Tiny beak
  const beak = new THREE.Mesh(
    new THREE.ConeGeometry(0.012, 0.035, 6),
    new THREE.MeshStandardMaterial({ color: 0xffae3a, roughness: 0.7 })
  );
  beak.rotation.z = -Math.PI / 2;
  beak.position.set(0.118, 0.04, 0);
  bird.add(beak);
  bird.position.set(-4.2, 1.8, -13.85);     // perched on the windowsill
  bird.visible = false;
  bird.userData = {
    state: "absent",         // "absent" | "perching" | "flying"
    nextAppearAt: 6,         // seconds — first appearance after 6s
    perchUntil: 0,
    flyT: 0,
    flyFromX: 0, flyFromY: 0,
    flyToX: 0, flyToY: 0,
    headTurnT: 0,
  };
  scene.add(bird);

  // ---------- Sunlight beam through the window (golden hour mood) ----------
  // A subtle warm volumetric "shaft" — a stretched cone with additive
  // blending — that anchors the room in real time-of-day. Combined with
  // dust-mote particles drifting through it, this is the single biggest
  // mood cue for the dog scene. Looks much warmer / more lived-in.
  const sunbeam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 1.6, 7.0, 14, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0xffe0a0,
      transparent: true, opacity: 0.06,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
      fog: false,
    })
  );
  sunbeam.position.set(-2.0, 0.5, -8.0);
  // Tilt the beam from the window down toward the floor between you + dog
  sunbeam.rotation.z = -0.55;
  sunbeam.rotation.x = -0.15;
  scene.add(sunbeam);

  // Dust motes — small white dots drifting through the sunbeam. Each one
  // has its own slow vertical drift + subtle horizontal sway so the eye
  // reads "real airborne dust" instead of a stylised effect.
  const dustGroup = new THREE.Group();
  const dustCount = 24;
  const dustData = [];
  const dustMat = new THREE.MeshBasicMaterial({
    color: 0xfff8e0, transparent: true, opacity: 0.45, fog: false,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  for (let i = 0; i < dustCount; i++) {
    const dust = new THREE.Mesh(new THREE.SphereGeometry(0.012, 6, 4), dustMat);
    dust.position.set(
      -3.2 + Math.random() * 2.4,
      0.2 + Math.random() * 3.0,
      -6.5 - Math.random() * 3.5,
    );
    dustGroup.add(dust);
    dustData.push({
      vx: (Math.random() - 0.5) * 0.05,
      vy: -0.04 - Math.random() * 0.06,
      vz: (Math.random() - 0.5) * 0.04,
      phaseX: Math.random() * Math.PI * 2,
      phaseY: Math.random() * Math.PI * 2,
    });
  }
  scene.add(dustGroup);

  // ----- Friendly room props -----
  // Dog bed (soft round cushion in the corner)
  const dogBed = new THREE.Group();
  const bedBase = new THREE.Mesh(
    new THREE.CylinderGeometry(0.7, 0.75, 0.18, 18),
    new THREE.MeshStandardMaterial({ color: 0x5d6f8a, roughness: 0.95 })
  );
  bedBase.position.y = -0.91;
  dogBed.add(bedBase);
  const bedCushion = new THREE.Mesh(
    new THREE.CylinderGeometry(0.55, 0.55, 0.12, 18),
    new THREE.MeshStandardMaterial({ color: 0x9bb0c7, roughness: 0.95 })
  );
  bedCushion.position.y = -0.77;
  dogBed.add(bedCushion);
  dogBed.position.set(2.6, 0, -2.5);
  scene.add(dogBed);

  // Water bowl with shimmer
  const bowl = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.14, 0.10, 16),
    new THREE.MeshStandardMaterial({ color: 0x4a90b8, roughness: 0.5, metalness: 0.5 })
  );
  bowl.position.set(2.0, -0.94, -1.3);
  scene.add(bowl);
  const water = new THREE.Mesh(
    new THREE.CircleGeometry(0.16, 18),
    new THREE.MeshStandardMaterial({ color: 0x88c6e8, roughness: 0.1, metalness: 0.6, transparent: true, opacity: 0.85 })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.set(2.0, -0.89, -1.3);
  scene.add(water);

  // Treat jar on a side table — visible "where the treats come from"
  const tableTop = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.06, 0.7),
    new THREE.MeshStandardMaterial({ color: 0x8a6442, roughness: 0.7 })
  );
  tableTop.position.set(-2.6, -0.20, -2.5);
  tableTop.castShadow = true; tableTop.receiveShadow = true;
  scene.add(tableTop);
  for (const [tx, tz] of [[-2.95, -2.85], [-2.25, -2.85], [-2.95, -2.15], [-2.25, -2.15]]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 0.77, 8),
      new THREE.MeshStandardMaterial({ color: 0x5a4028, roughness: 0.8 })
    );
    leg.position.set(tx, -0.59, tz);
    scene.add(leg);
  }
  // Glass jar with biscuits inside
  const jar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.13, 0.30, 16),
    new THREE.MeshStandardMaterial({ color: 0xddeef0, roughness: 0.15, metalness: 0.5, transparent: true, opacity: 0.55 })
  );
  jar.position.set(-2.6, -0.02, -2.5);
  scene.add(jar);
  // Biscuits inside (a few small bone shapes, just spheres for simplicity)
  for (let i = 0; i < 4; i++) {
    const biscuit = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xc59060, roughness: 0.7 })
    );
    biscuit.position.set(
      -2.6 + (Math.random() - 0.5) * 0.12,
      -0.10 + i * 0.025,
      -2.5 + (Math.random() - 0.5) * 0.12
    );
    scene.add(biscuit);
  }
  // Jar lid
  const lid = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.14, 0.04, 16),
    new THREE.MeshStandardMaterial({ color: 0xc92e2e, roughness: 0.5 })
  );
  lid.position.set(-2.6, 0.15, -2.5);
  scene.add(lid);

  // Houseplant in a pot — a touch of life, far corner
  const pot = new THREE.Mesh(
    new THREE.CylinderGeometry(0.32, 0.24, 0.42, 14),
    new THREE.MeshStandardMaterial({ color: 0x9c5a3a, roughness: 0.8 })
  );
  pot.position.set(-3.6, -0.79, -2.0);
  scene.add(pot);
  for (let i = 0; i < 9; i++) {
    const leaf = new THREE.Mesh(
      new THREE.SphereGeometry(0.20 + Math.random() * 0.10, 8, 6),
      new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.30 + Math.random() * 0.05, 0.55, 0.30 + Math.random() * 0.10),
        roughness: 1.0,
      })
    );
    const a = i * (Math.PI * 2 / 9);
    leaf.position.set(-3.6 + Math.cos(a) * 0.18, -0.50 + i * 0.10, -2.0 + Math.sin(a) * 0.18);
    leaf.scale.y = 0.6;
    scene.add(leaf);
  }

  // Build the procedural dog. Distance is the dog's z-offset in the room —
  // smaller `size` rungs put the dog farther away (a calm distant dog feels
  // safer); larger `size` rungs place it closer for a more direct approach.
  // The user spawns at z=4 (room entrance), so user-to-dog gap is distance
  // + 4. With this formula the gap is 5.5 m at "head-on" and 7.4 m at
  // "cartoon dog, far away" — close enough to read the dog clearly, far
  // enough that the user feels the approach.
  const distance = 1.5 + (1 - size) * 2.5;   // 1.5 (head-on) → 3.4 (far)
  const dog = buildDog(intensity === "barking"
    ? { furColor: 0x9c6a3a, earColor: 0x6a3e1e, bellyColor: 0xc8966a }
    : {}
  );
  const dogScale = 0.85 + size * 0.45;
  dog.scale.setScalar(dogScale);
  // Floor is at y = -1. The procedural dog's lowest paw sits ~0.085 below the
  // dog's group origin (after scale). So the group origin needs to be at
  // floor + scaled paw offset. This puts the feet on the floor instead of
  // floating in mid-air.
  const pawOffset = 0.085 * dogScale;
  // Place the dog slightly to one side at first — a real dog isn't standing
  // dead-centre staring at the door waiting for you. It's near its bed,
  // doing its own thing. The user has to walk into the room to get the
  // dog's attention.
  const dogStartX = (intensity === "barking") ? 0 : (Math.random() < 0.5 ? -0.7 : 0.7);
  dog.position.set(dogStartX, -1 + pawOffset, -distance);
  // Initial rotation: not facing the player. The barking-rung dog faces you
  // (it's worked up); calmer rungs have the dog facing somewhere else
  // entirely (sniffing the rug, looking out the window) so the user has to
  // make their presence known. This is the "the dog is doing its own thing"
  // realism upgrade — the dog isn't a button that turns on when you arrive.
  dog.rotation.y = (intensity === "barking") ? Math.PI : Math.PI + (Math.random() - 0.5) * 1.6;
  dog.castShadow = true;
  scene.add(dog);

  // ---------- Goal indicator: petting circle around the dog ----------
  // A soft glowing ring on the floor under the dog. The ring tells the user
  // "step into here to earn credit". Fades out once the user is within
  // petting range. Skipped on the barking-intensity rung where the goal is
  // to hold ground from a distance (not approach).
  let dogGoalRing = null;
  if (intensity !== "barking") {
    // Normal alpha-blending so the ring reads as a soft teal halo without
    // the additive bloom that turned the floor white when looked at in TP.
    dogGoalRing = new THREE.Mesh(
      new THREE.RingGeometry(1.0, 1.6, 48),
      new THREE.MeshBasicMaterial({
        color: 0x7cd1c5,
        transparent: true,
        opacity: 0.32,
        depthWrite: false,
        side: THREE.DoubleSide,
        fog: false,
      })
    );
    dogGoalRing.rotation.x = -Math.PI / 2;
    // Floor is at y = -1
    dogGoalRing.position.set(dog.position.x, -0.985, dog.position.z);
    scene.add(dogGoalRing);
  }

  // Floating dog name above the head — pulled from the user's character
  // (or "Buddy" by default). Helps the dog feel like an individual, not a
  // generic "dog object". Made out of a CanvasTexture sprite so it always
  // faces the camera.
  const dogName = (() => {
    try { return localStorage.getItem("fobia.dogName") || "Buddy"; } catch { return "Buddy"; }
  })();
  function makeNameSprite(text) {
    const c = document.createElement("canvas");
    c.width = 512; c.height = 128;
    const ctx = c.getContext("2d");
    ctx.font = "bold 56px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    // Soft pill background
    const w = ctx.measureText(text).width + 48;
    const x = 256 - w / 2;
    const r = 40;
    ctx.fillStyle = "rgba(20, 16, 14, 0.55)";
    ctx.beginPath();
    ctx.moveTo(x + r, 32);
    ctx.lineTo(x + w - r, 32); ctx.quadraticCurveTo(x + w, 32, x + w, 32 + r);
    ctx.lineTo(x + w, 96 - r); ctx.quadraticCurveTo(x + w, 96, x + w - r, 96);
    ctx.lineTo(x + r, 96); ctx.quadraticCurveTo(x, 96, x, 96 - r);
    ctx.lineTo(x, 32 + r); ctx.quadraticCurveTo(x, 32, x + r, 32);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText(text, 256, 64);
    return new THREE.CanvasTexture(c);
  }
  const nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeNameSprite(dogName), transparent: true, depthTest: false,
  }));
  nameSprite.scale.set(0.8, 0.20, 1);
  nameSprite.position.set(0, 1.2, 0);
  dog.add(nameSprite);

  // Heart particles — visible "the dog likes that" feedback when petting,
  // treating, or fetching. Implemented as a sprite pool. Spawned by `popHeart`.
  const heartTex = (() => {
    const c = document.createElement("canvas");
    c.width = c.height = 64;
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#ff6b86";
    ctx.beginPath();
    // Heart shape via two arcs + triangle
    ctx.moveTo(32, 22);
    ctx.bezierCurveTo(32, 14, 14, 14, 14, 30);
    ctx.bezierCurveTo(14, 42, 32, 52, 32, 56);
    ctx.bezierCurveTo(32, 52, 50, 42, 50, 30);
    ctx.bezierCurveTo(50, 14, 32, 14, 32, 22);
    ctx.fill();
    return new THREE.CanvasTexture(c);
  })();
  const hearts = [];
  function popHeart() {
    const h = new THREE.Sprite(new THREE.SpriteMaterial({ map: heartTex, transparent: true, depthTest: false }));
    h.scale.set(0.20, 0.20, 1);
    // World-position over the dog's head
    const wp = new THREE.Vector3();
    dog.getWorldPosition(wp);
    h.position.set(wp.x + (Math.random() - 0.5) * 0.4, wp.y + 1.0, wp.z);
    h.userData = { life: 1.0, vx: (Math.random() - 0.5) * 0.6, vy: 0.5 + Math.random() * 0.4 };
    scene.add(h);
    hearts.push(h);
  }

  // ----- Mutable state for the dog scene -----
  // Declared early so async click / key handlers below can safely close over
  // them even though they're updated by the update loop later.
  let petPulse = 0;
  let nextSpontaneousBark = intensity === "barking" ? 1.5 : Infinity;
  let dogsControls = null;
  let storedActiveControls = null;
  // Auto-approach scheduling — initialised on first update tick once `t` is
  // known, then reset to a future time after each approach attempt.
  let autoApproachEnabled = false;
  let nextAutoApproach = 0;
  // Character-driven event flags — fire context prompts as the player
  // crosses proximity thresholds toward the dog. Once-per-rung so the user
  // isn't nagged after they've already seen the cue.
  const dogPlayerState = {
    dogNoticedYou: false,
    closeApproach: false,
    petted: false,
    walkedAway: false,
  };
  // Autonomous wandering — dog moves to a random spot in the room every
  // 12-25 s when calm and trust is at least 0.2. Different from auto-approach
  // (which targets the player) — wandering targets random nearby positions
  // so the dog reads as "having its own agenda" rather than always orbiting
  // the user.
  let nextWander = 0;
  // Sniffing — dog briefly lowers its head + walks slowly while sniffing.
  // Independent of wander; can chain after a wander or trigger spontaneously.
  let sniffActive = false;
  let sniffEndsAt = 0;

  // ----- Fetchable item -----
  // A single live "item" the dog can fetch. It can be a TREAT (small biscuit)
  // or a BALL (rubber ball with bounce). Both follow the same pickup/drop
  // logic — only their geometry / physics differ. The ball has gravity +
  // bounce so the eye reads it as a real thrown ball, not a teleported orb.
  let item = null;        // { mesh, kind: "treat"|"ball", state, vel: Vector3 }
  let fetchPhase = "idle";

  function clearItem() {
    if (!item) return;
    if (item.mesh.parent) item.mesh.parent.remove(item.mesh);
    item.mesh.geometry.dispose();
    item.mesh.material.dispose();
    item = null;
  }
  function buildBall() {
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.10, 18, 14),
      new THREE.MeshStandardMaterial({ color: 0xd84545, roughness: 0.5, metalness: 0.05 })
    );
    ball.castShadow = true;
    return ball;
  }
  function buildTreatMesh() {
    const t = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 12, 10),
      new THREE.MeshStandardMaterial({ color: 0xc59060, roughness: 0.7 })
    );
    t.castShadow = true;
    return t;
  }
  // Throw an item from the player toward (tx, tz). The throw has two phases:
  //   1. "windup" — the item is parented to the camera so it appears in the
  //      user's hand. The hand visibly arcs upward + back over ~0.4 s as the
  //      user "winds up" for the throw. This is the anticipation that turns
  //      a teleporting orb into a felt physical action.
  //   2. "flying" — the item is re-parented to the scene and follows a
  //      gravity-driven arc until it lands. Existing fetch state machine
  //      then takes over.
  function throwItem(kind, tx, tz) {
    clearItem();
    const mesh = kind === "ball" ? buildBall() : buildTreatMesh();
    // Parent to camera so the item visually rides in your hand during windup.
    // The local position is in front-right of the camera, at hand height.
    mesh.position.set(0.18, -0.16, -0.32);
    camera.add(mesh);
    if (!scene.children.includes(camera)) scene.add(camera);
    item = {
      mesh, kind,
      state: "windup",
      windupT: 0,
      windupDuration: 0.4,
      // Capture target so we can compute the throw velocity at release time
      target: { x: tx, z: tz },
      vel: new THREE.Vector3(0, 0, 0),
      bounces: 0,
    };
  }
  // Called from update each frame while item is in windup. Animates the
  // mesh's local position in an upward-back arc; on completion, re-parents
  // the mesh to the scene at the current world position and applies the
  // throw velocity computed from the captured target.
  function tickWindup(d) {
    if (!item || item.state !== "windup") return;
    item.windupT += d;
    const k = Math.min(1, item.windupT / item.windupDuration);
    // Anticipation arc: mesh moves UP (y) and slightly BACK (z) then forward
    // as the throw releases. We use a curve that goes back-up-forward.
    // 0..0.7: hand winds back/up; 0.7..1: hand snaps forward (throw).
    let lx = 0.18, ly = -0.16, lz = -0.32;
    if (k < 0.7) {
      const u = k / 0.7;       // 0..1 windup
      ly = -0.16 + u * 0.18;   // rises
      lz = -0.32 + u * 0.06;   // pulls back slightly (z increases = closer to camera)
    } else {
      const u = (k - 0.7) / 0.3;   // 0..1 release
      ly = 0.02 - u * 0.20;        // snaps down + forward
      lz = -0.26 - u * 0.10;       // and forward into release
    }
    item.mesh.position.set(lx, ly, lz);
    // Item spin during windup (small)
    item.mesh.rotation.x += d * 4;
    if (k >= 1) releaseItem();
  }
  function releaseItem() {
    if (!item || item.state !== "windup") return;
    // World position of the mesh at release moment
    const worldStart = new THREE.Vector3();
    item.mesh.getWorldPosition(worldStart);
    // Re-parent to scene
    camera.remove(item.mesh);
    item.mesh.position.copy(worldStart);
    item.mesh.rotation.set(0, 0, 0);
    scene.add(item.mesh);
    // Compute throw velocity from current world pos to target
    const tx = item.target.x, tz = item.target.z;
    const dx = tx - worldStart.x, dz = tz - worldStart.z;
    const dist = Math.hypot(dx, dz);
    const T = Math.max(0.5, dist * 0.25);
    const g = 9.8;
    const vy = (g * T / 2) + 1.4;
    const vx = dx / T, vz = dz / T;
    item.vel.set(vx, vy, vz);
    item.state = "flying";
  }

  const dogCtrl = new DogController(dog, scene, camera);
  // The "barking" intensity keeps the dog at distance — it doesn't follow.
  // For calm/alert rungs we DELAY the follow-the-player behaviour by ~6 s.
  // In those first seconds the dog is happily doing its own thing (sniffing,
  // looking around) — the user has to actually walk into the room and let
  // the dog notice them. After that grace window the dog begins its normal
  // approach behaviour.
  // Track dog scene's setTimeouts so we can clear them in dispose. Without
  // this, if the user leaves the scene in the first 6 s the timer fires
  // against a disposed dogCtrl (silent error, but a real leak).
  const dogTimers = [];
  if (intensity !== "barking") {
    dogTimers.push(setTimeout(() => {
      try { dogCtrl.setFollow(true); } catch {}
    }, 6000));
    // Kick off an immediate sniff so the dog reads as "busy with its own
    // thing" the moment the scene loads. Choose a target near the dog bed.
