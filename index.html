    this.eyes = [];
    for (const sx of [-1, 1]) {
      const eyeGroup = new THREE.Group();
      eyeGroup.position.set(sx * 0.040, 0.005, 0.103);
      this.head.add(eyeGroup);
      const sclera = new THREE.Mesh(new THREE.SphereGeometry(0.022, 14, 12), eyeWhiteMat);
      sclera.scale.set(1.0, 1.0, 0.55);
      eyeGroup.add(sclera);
      const iris = new THREE.Mesh(new THREE.SphereGeometry(0.014, 14, 12), irisMat);
      iris.position.set(0, 0, 0.012);
      iris.scale.set(1, 1, 0.6);
      eyeGroup.add(iris);
      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.0065, 10, 8), pupilMat);
      pupil.position.set(0, 0, 0.020);
      eyeGroup.add(pupil);
      const hl = new THREE.Mesh(
        new THREE.SphereGeometry(0.004, 6, 4),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      hl.position.set(sx * 0.004, 0.006, 0.024);
      eyeGroup.add(hl);
      const lid = new THREE.Mesh(
        new THREE.SphereGeometry(0.024, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2),
        lidMat
      );
      lid.scale.set(1.0, 0.05, 0.55);
      lid.position.set(0, 0.001, 0.001);
      eyeGroup.add(lid);
      // Soft eyebrow — a kindly arch
      const brow = new THREE.Mesh(
        new THREE.BoxGeometry(0.040, 0.005, 0.012),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color(o.hairColor).multiplyScalar(0.85), roughness: 1.0,
        })
      );
      brow.position.set(sx * 0.001, 0.030, 0.015);
      brow.rotation.z = sx * -0.08;
      eyeGroup.add(brow);
      this.eyes.push({ group: eyeGroup, lid });
    }

    // Nose
    const nose = new THREE.Mesh(
      new THREE.SphereGeometry(0.016, 12, 10),
      new THREE.MeshStandardMaterial({ color: o.skinColor, roughness: 0.85 })
    );
    nose.scale.set(0.9, 1.4, 1.1);
    nose.position.set(0, -0.022, 0.110);
    this.head.add(nose);

    // Mouth — neutral kind half-smile. We open/close it via scale.y to
    // animate speech (jaw drop visible as mouth widens vertically).
    this.mouth = new THREE.Mesh(
      new THREE.TorusGeometry(0.024, 0.0035, 6, 16, Math.PI * 0.85),
      new THREE.MeshBasicMaterial({ color: 0x6a3a30 })
    );
    this.mouth.rotation.z = -Math.PI / 2;
    this.mouth.rotation.x = -0.10;
    this.mouth.position.set(0, -0.057, 0.107);
    this.head.add(this.mouth);
    // Open-mouth shape (small dark oval) under the mouth — visible when speaking
    this.mouthOpen = new THREE.Mesh(
      new THREE.SphereGeometry(0.018, 10, 8),
      new THREE.MeshBasicMaterial({ color: 0x1a0808 })
    );
    this.mouthOpen.scale.set(1.0, 0.0, 0.4);
    this.mouthOpen.position.set(0, -0.060, 0.108);
    this.head.add(this.mouthOpen);

    // Floating name label above head — soft pill, fades in when player is
    // looking at her. Helps the user identify her as a guide / caregiver.
    const nameLabel = (() => {
      const c = document.createElement("canvas");
      c.width = 384; c.height = 80;
      const ctx = c.getContext("2d");
      ctx.font = "500 28px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(20,16,14,0.55)";
      ctx.beginPath(); ctx.roundRect(48, 16, 288, 48, 24); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillText("Maya · your guide", 192, 40);
      return new THREE.CanvasTexture(c);
    })();
    nameLabel.colorSpace = THREE.SRGBColorSpace;
    this.nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: nameLabel, transparent: true, depthTest: false, opacity: 0,
    }));
    this.nameSprite.scale.set(1.0, 0.21, 1);
    this.nameSprite.position.set(0, 1.85, 0);
    this.group.add(this.nameSprite);
  }

  // Tell the therapist where to look (typically the player's head world pos)
  setLookTarget(pos) {
    this.lookTarget = pos;
  }
  // Ask her to start a speaking gesture for `seconds`. If `seconds` is 0,
  // we estimate a 4-second talk. The mouth animates while speaking != 0.
  beginSpeaking(seconds) {
    this.speaking = Math.max(this.speaking, seconds || 4);
  }
  // Lines the therapist can offer when the player clicks her — brief,
  // grounding, picks contextually based on player's distance from her.
  speakOnClick(playerPos) {
    const lines = [
      "Take your time. There's no rush at all.",
      "Notice your feet on the ground. You are here.",
      "Slow breath in. Slower breath out.",
      "I'm here. You're safe with me.",
      "Whenever you're ready. Not before.",
      "You have already done something hard by being here.",
    ];
    const line = lines[Math.floor(Math.random() * lines.length)];
    if (window.PhobiaVoice) {
      try { window.PhobiaVoice.speak(line); } catch {}
    }
    // Force speaking animation immediately
    this.beginSpeaking(line.length * 0.08);
  }
  // Returns true if a raycaster hit any of this therapist's child meshes.
  // Allows the scene's onClick to detect clicks on her for guidance.
  isHitBy(raycaster) {
    const hits = raycaster.intersectObject(this.group, true);
    return hits.length > 0;
  }

  // Pick a new idle gesture. Each gesture sets target shoulder + elbow
  // angles; update() lerps the arms toward them so motion is smooth.
  _pickGesture() {
    const choices = ["rest", "handToChest", "palmOut", "clasped", "softNod"];
    // Weighted: mostly rest + clasped (ambient listening); occasional warm gestures
    const weights = [0.30, 0.20, 0.15, 0.25, 0.10];
    let r = Math.random();
    for (let i = 0; i < choices.length; i++) {
      r -= weights[i];
      if (r <= 0) return choices[i];
    }
    return "rest";
  }

  update(t, dt, playerPos) {
    const dtN = dt || 0.016;

    // Auto-look at player when they're nearby (within ~4 m of the therapist),
    // otherwise return to a neutral forward-gaze. Real therapists track you
    // with their eyes — a fixed 1000-yard stare is uncanny.
    if (playerPos) {
      const tp = this.group.position;
      const dx = playerPos.x - tp.x;
      const dz = playerPos.z - tp.z;
      const dist = Math.hypot(dx, dz);
      if (dist < 6) {
        const targetYaw = Math.atan2(dx, dz) - this.group.rotation.y;
        const dy = playerPos.y - (tp.y + 1.55);
        const targetPitch = -Math.atan2(dy, dist);
        // Clamp so the head doesn't crank impossibly
        const yawC = Math.max(-1.2, Math.min(1.2, targetYaw));
        const pitchC = Math.max(-0.4, Math.min(0.3, targetPitch));
        this.headYaw += (yawC - this.headYaw) * Math.min(1, dtN * 3);
        this.headPitch += (pitchC - this.headPitch) * Math.min(1, dtN * 2);
        // Show the name label when player is fairly close (≤ 5 m)
        if (this.nameSprite) {
          const want = (dist < 5.0) ? 0.85 : 0.0;
          this.nameSprite.material.opacity += (want - this.nameSprite.material.opacity) * 0.05;
        }
      } else {
        this.headYaw += (0 - this.headYaw) * 0.02;
        this.headPitch += (0 - this.headPitch) * 0.02;
        if (this.nameSprite) this.nameSprite.material.opacity *= 0.96;
      }
    }
    this.head.rotation.y = this.headYaw + Math.sin(t * 0.45) * 0.015;
    this.head.rotation.x = this.headPitch + Math.sin(t * 0.7) * 0.012;
    // A tiny z-tilt when speaking — like a real "yes I hear you" listening lean
    this.head.rotation.z = (this.speaking > 0 ? Math.sin(t * 0.9) * 0.025 : 0);

    // Breathing — chest scale + tiny vertical bob
    const breath = Math.sin(t * 1.3);
    if (this.chest) {
      this.chest.scale.y = 1.0 + breath * 0.045;
      this.chest.scale.x = 1.35 + breath * 0.025;
    }
    this.group.position.y = this.opts.position.y + breath * 0.005;

    // Blink — same logic as the player body
    if (this.eyes && this.eyes.length === 2) {
      this._blinkTimer -= dtN;
      if (this._blinkTimer < 0) {
        this._blinkStrength = 1.0;
        this._blinkTimer = 4 + Math.random() * 4;
      }
      this._blinkStrength = Math.max(0, this._blinkStrength - 0.10);
      const lidY = 0.05 + this._blinkStrength * 0.95;
      for (const e of this.eyes) e.lid.scale.y = lidY;
    }

    // Mouth animation while speaking — random "phoneme" puffs every 90-150ms
    if (this.speaking > 0) {
      this.speaking -= dtN;
      if (!this._lastMouthAt || (t - this._lastMouthAt) > 0.10 + Math.random() * 0.06) {
        const open = Math.random() * 0.9;
        if (this.mouthOpen) this.mouthOpen.scale.y = open;
        if (this.mouth) this.mouth.position.y = -0.057 - open * 0.012;
        this._lastMouthAt = t;
      }
      // While speaking, freeze the gesture so she looks engaged with the player
    } else {
      if (this.mouthOpen) this.mouthOpen.scale.y *= 0.8;
      if (this.mouth) this.mouth.position.y = -0.057;
      // Cycle gestures
      this.gestureT -= dtN;
      if (this.gestureT < 0 && t > this.nextGestureAt) {
        this.gestureName = this._pickGesture();
        this.nextGestureAt = t + 6 + Math.random() * 9;
        this.gestureT = 1.5 + Math.random() * 1.5;     // hold gesture this long
      }
    }

    // Apply gesture targets to arm rotations
    let leftSh = 0, leftEl = 0.10;
    let rightSh = 0, rightEl = 0.10;
    switch (this.gestureName) {
      case "handToChest":
        // Right hand to chest — warmth gesture
        rightSh = -1.05; rightEl = 1.3;
        break;
      case "palmOut":
        // Both palms slightly out — calming "you're safe" gesture
        leftSh = -0.55; leftEl = 0.85;
        rightSh = -0.55; rightEl = 0.85;
        break;
      case "clasped":
        // Hands clasped in front (the classic active-listening pose)
        leftSh = -0.45; leftEl = 1.1;
        rightSh = -0.45; rightEl = 1.1;
        break;
      case "softNod":
        // Arms relaxed; small head nod added below
        leftSh = 0; leftEl = 0.10;
        rightSh = 0; rightEl = 0.10;
        // Add a one-shot nod
        this.head.rotation.x += Math.sin(t * 4) * 0.06 * Math.max(0, this.gestureT);
        break;
      default:
        leftSh = 0; leftEl = 0.10;
        rightSh = 0; rightEl = 0.10;
    }
    if (this.arms) {
      this.arms.forEach(arm => {
        const sh = arm.side > 0 ? rightSh : leftSh;
        const el = arm.side > 0 ? rightEl : leftEl;
        arm.root.rotation.x += (sh - arm.root.rotation.x) * Math.min(1, dtN * 2.5);
        arm.elbow.rotation.x += (el - arm.elbow.rotation.x) * Math.min(1, dtN * 2.5);
        // Also a tiny outward shoulder rotation for palmOut so the palms
        // actually face the player
        if (this.gestureName === "palmOut") {
          arm.root.rotation.z += ((arm.side * 0.18) - arm.root.rotation.z) * 0.05;
        } else {
          arm.root.rotation.z += (0 - arm.root.rotation.z) * 0.05;
        }
      });
    }
  }

  dispose() {
    if (this.group.parent) this.group.parent.remove(this.group);
    this.group.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach(m => m.dispose());
      }
    });
  }
}

// ---------- First-person hands ----------
// Two procedurally built hands attached to the camera. They idle-sway while
// breathing and animate to scene-specific gestures: pet, grab, paddle, touch.
class Hands {
  constructor(scene, camera, opts = {}) {
    this.camera = camera;
    this.opts = Object.assign({ skinColor: 0xd4a07a, sleeveColor: 0x2d3a52 }, opts);
    this.group = new THREE.Group();
    this.gestureType = "rest";
    this.gestureStrength = 0;       // 0..1 — how engaged the gesture is
    this.gestureTargetStrength = 0;
    this.actionPulse = 0;           // 0..1 — momentary "action just fired"
    // Hands ride on the camera, so in third-person they'd float ~3 m behind
    // the player's body — the user sees their character PLUS a pair of
    // disembodied hands. This flag hides the entire hand group when the
    // camera mode is "tp" so it's clearly ONE character.
    this.cameraMode = "fp";

    const skin = new THREE.MeshStandardMaterial({
      color: this.opts.skinColor, roughness: 0.7, metalness: 0,
      emissive: new THREE.Color(this.opts.skinColor).multiplyScalar(0.18),
    });
    const sleeve = new THREE.MeshStandardMaterial({
      color: this.opts.sleeveColor, roughness: 0.85,
      emissive: new THREE.Color(this.opts.sleeveColor).multiplyScalar(0.12),
    });
    this.skin = skin;
    this.left  = this._buildHand(skin, sleeve, -1);
    this.right = this._buildHand(skin, sleeve,  1);
    this.group.add(this.left, this.right);

    // A soft "selfie" light attached to the camera so hands are always lit
    this.fillLight = new THREE.PointLight(0xffffff, 0.6, 1.2);
    this.fillLight.position.set(0, 0.05, 0);
    camera.add(this.fillLight);

    // Attach to the camera so hands always follow the view
    camera.add(this.group);
    if (scene && !scene.children.includes(camera)) scene.add(camera);
  }

  _buildHand(skin, sleeve, side) {
    const hand = new THREE.Group();
    // Sleeve / forearm
    const sleeveMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.07, 0.18, 16), sleeve
    );
    sleeveMesh.rotation.x = Math.PI / 2;
    sleeveMesh.position.set(0, 0, 0.09);
    hand.add(sleeveMesh);

    // Wrist (small skin-coloured ring)
    const wrist = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 16, 12), skin
    );
    wrist.position.set(0, 0, -0.02);
    wrist.scale.set(1, 0.7, 1);
    hand.add(wrist);

    // Palm
    const palm = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.025, 0.1), skin
    );
    palm.position.set(0, 0, -0.09);
    hand.add(palm);

    // Fingers (4) — each made of 2 small phalanx segments so we can curl them
    const fingers = [];
    for (let i = 0; i < 4; i++) {
      const finger = new THREE.Group();
      const x = (i - 1.5) * 0.022;
      finger.position.set(x, 0, -0.14);
      const proximal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.011, 0.01, 0.04, 10), skin
      );
      proximal.rotation.x = Math.PI / 2;
      proximal.position.set(0, 0, -0.02);
      finger.add(proximal);
      const distal = new THREE.Group();
      distal.position.set(0, 0, -0.04);
      const distalMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.009, 0.008, 0.035, 10), skin
      );
      distalMesh.rotation.x = Math.PI / 2;
      distalMesh.position.set(0, 0, -0.018);
      distal.add(distalMesh);
      finger.add(distal);
      finger.userData = { distal };
      fingers.push(finger);
      hand.add(finger);
    }

    // Thumb
    const thumb = new THREE.Group();
    thumb.position.set(side * 0.04, 0, -0.06);
    thumb.rotation.z = side * 0.6;
    const thumbProx = new THREE.Mesh(
      new THREE.CylinderGeometry(0.013, 0.011, 0.04, 10), skin
    );
    thumbProx.rotation.x = Math.PI / 2;
    thumbProx.position.set(0, 0, -0.02);
    thumb.add(thumbProx);
    hand.add(thumb);

    // Position the whole hand at the lower edge of the view
    // (camera-space coords; -Z is forward, -Y is down)
    hand.position.set(side * 0.14, -0.13, -0.32);
    hand.scale.setScalar(0.65);
    hand.userData = { side, basePos: hand.position.clone(), baseRot: hand.rotation.clone(), fingers, thumb };
    return hand;
  }

  setGesture(type) {
    if (this.gestureType !== type) {
      this.gestureType = type;
      this.gestureTargetStrength = type === "rest" ? 0 : 1;
    }
  }
  // Trigger a brief animation pulse (e.g. after a click)
  fireAction() { this.actionPulse = 1.0; }

  update(t, dt) {
    this.gestureStrength += (this.gestureTargetStrength - this.gestureStrength) * 0.12;
    this.actionPulse = Math.max(0, this.actionPulse - (dt || 0.016) * 1.4);

    const breathY = Math.sin(t * 1.2) * 0.006;

    [this.left, this.right].forEach((hand) => {
      const side = hand.userData.side;
      const base = hand.userData.basePos;
      const baseRot = hand.userData.baseRot;
      let target = base.clone();
      let targetRotX = baseRot.x, targetRotY = baseRot.y, targetRotZ = baseRot.z;
      let fingerCurl = 0;

      target.y += breathY;

      switch (this.gestureType) {
        case "grab": {
          // Hands rise and grip an imaginary bar in front
          target.x = side * 0.16;
          target.y = -0.18;
          target.z = -0.42;
          targetRotX = -0.4;
          fingerCurl = 1.4;
          break;
        }
        case "pet": {
          // Right hand reaches forward, oscillates downward (petting)
          if (side === 1) {
            const wave = Math.sin(t * 4) * 0.04;
            target.x = 0.06;
            target.y = -0.18 + wave * 0.5 - this.actionPulse * 0.05;
            target.z = -0.55 - this.actionPulse * 0.15;
            targetRotX = -1.0 + wave;
            fingerCurl = 0.4;
          } else {
            target.y = -0.32;
          }
          break;
        }
        case "paddle": {
          // Both hands swing alternately through water
          const phase = side === -1 ? 0 : Math.PI;
          const sweep = Math.sin(t * 2.2 + phase);
          target.x = side * (0.20 + sweep * 0.06);
          target.y = -0.32 + sweep * 0.08;
          target.z = -0.34 + sweep * 0.05;
          targetRotX = -0.3 + sweep * 0.4;
          targetRotZ = side * 0.2 + sweep * 0.2;
          fingerCurl = 0.3;
          break;
        }
        case "touch": {
          // Single right hand reaches out tentatively
          if (side === 1) {
            target.x = 0.08;
            target.y = -0.20;
            target.z = -0.45 - this.actionPulse * 0.1;
            targetRotX = -0.5;
          }
          fingerCurl = 0.2;
          break;
        }
        case "brush": {
          // Right hand sweeps left-to-right with a downward arc — driven
          // by the actionPulse so it's a one-shot motion fired by clicks.
          if (side === 1) {
            const k = this.actionPulse;     // 1 → 0 over the action
            const sweep = Math.sin(Math.max(0, k) * Math.PI);  // 0..1..0
            target.x = 0.04 + sweep * 0.18;
            target.y = -0.16 - sweep * 0.04;
            target.z = -0.42 - sweep * 0.08;
            targetRotZ = sweep * 0.7;
            targetRotX = -0.4 - sweep * 0.4;
          }
          fingerCurl = 0.1;
          break;
        }
      }

      // Lerp position + rotation toward (base + (target - base) * gestureStrength)
      const finalPos = base.clone().lerp(target, this.gestureStrength);
      hand.position.lerp(finalPos, 0.18);
      hand.rotation.x += (baseRot.x + (targetRotX - baseRot.x) * this.gestureStrength - hand.rotation.x) * 0.18;
      hand.rotation.y += (baseRot.y + (targetRotY - baseRot.y) * this.gestureStrength - hand.rotation.y) * 0.18;
      hand.rotation.z += (baseRot.z + (targetRotZ - baseRot.z) * this.gestureStrength - hand.rotation.z) * 0.18;

      // Curl fingers — base curl from the gesture, plus a brief universal
      // squeeze whenever actionPulse > 0 so EVERY click on an interactive
      // object produces visible grip feedback (not just clicks during pet
      // / brush / touch states). The pulse decays over ~0.7 s.
      const pulseCurl = this.actionPulse * 0.5;
      const curl = (fingerCurl * this.gestureStrength) + pulseCurl;
      for (const finger of hand.userData.fingers) {
        const distal = finger.userData.distal;
        finger.rotation.x = curl * 1.2;
        if (distal) distal.rotation.x = curl * 1.4;
      }
      // Universal pulse: hand jiggles up slightly with the squeeze so
      // even idle hands react visibly to a click.
      hand.position.y += this.actionPulse * 0.018 * (side === 1 ? 1 : 0.5);
    });
  }

  // Show / hide the FP hand meshes based on camera mode. In TP we hide
  // them entirely — the visible Body's arms take over. We also turn off the
  // selfie fill-light so it doesn't bleach the back of the character.
  setCameraMode(mode) {
    this.cameraMode = mode === "tp" ? "tp" : "fp";
    const visible = this.cameraMode === "fp";
    if (this.group) this.group.visible = visible;
    if (this.fillLight) this.fillLight.visible = visible;
  }

  dispose() {
    if (this.camera) {
      if (this.group.parent === this.camera) this.camera.remove(this.group);
      if (this.fillLight && this.fillLight.parent === this.camera) this.camera.remove(this.fillLight);
    }
    this.group.traverse((o) => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach(m => m.dispose());
      }
    });
  }
}

function unmount() {
  if (!active) return;
  // Stop both the rAF and the WebXR animation loop drivers
  cancelAnimationFrame(active.raf);
  if (active.renderer) {
    try { active.renderer.setAnimationLoop(null); } catch {}
    // End any active VR session so the headset returns to the home view
    if (active.renderer.xr && active.renderer.xr.isPresenting) {
      try { active.renderer.xr.getSession()?.end(); } catch {}
    }
  }
  window.removeEventListener("resize", active.onResize);
  // Scene-specific dispose first so it can clean up its own listeners /
  // HUD elements before the renderer is torn down.
  if (active.sceneResult && typeof active.sceneResult.dispose === "function") {
    try { active.sceneResult.dispose(); } catch {}
  }
  if (active.controls) try { active.controls.dispose(); } catch {}
  if (active.hands) try { active.hands.dispose(); } catch {}
  if (active.body) try { active.body.dispose(); } catch {}
  if (active.joystick) try { active.joystick.dispose(); } catch {}
  if (active.composer) try { active.composer.dispose(); } catch {}
  if (active.pointerListeners && active.renderer && active.renderer.domElement) {
    active.renderer.domElement.removeEventListener("pointerdown", active.pointerListeners.onPointerDownTrack);
    active.renderer.domElement.removeEventListener("pointerup",   active.pointerListeners.onPointerUpInteract);
  }
  if (active.scene) disposeObject(active.scene);
  if (active.renderer) {
    active.renderer.dispose();
    if (active.renderer.domElement && active.renderer.domElement.parentNode) {
      active.renderer.domElement.parentNode.removeChild(active.renderer.domElement);
    }
  }
  // Record this session into the Fear history before tearing down — this
  // is what powers "you held it 8 seconds longer than last time" feedback
  // on the next entry. Also speak a one-shot habituation cue if the user
  // peaked lower than last time (real progress).
  if (window.PhobiaFear) {
    try {
      const sceneKey = window.PhobiaFear.getScene();
      window.PhobiaFear.recordSession();
      // Defer the speech so it doesn't get cut off by the unmount audio teardown
      if (sceneKey && window.PhobiaNarrator) {
        setTimeout(() => {
          try { window.PhobiaNarrator.speakHabituation(sceneKey); } catch {}
        }, 600);
      }
    } catch {}
  }
  // Unsubscribe from fear updates so the previous scene's overlay doesn't
  // keep getting driven after the next scene mounts.
  if (active.fearUnsubscribe) {
    try { active.fearUnsubscribe(); } catch {}
  }
  // Remove overlay elements we added
  if (active.overlays) {
    active.overlays.forEach(el => { if (el.parentNode) el.parentNode.removeChild(el); });
  }
  // Detach any window-level listeners we added (camera toggle key, etc.)
  if (active.keyListeners) {
    active.keyListeners.forEach(({ event, fn }) => {
      try { window.removeEventListener(event, fn); } catch {}
    });
  }
  active = null;
}

const SETUPS = {
  heights: setupHeights,
  water: setupWater,
  dogs: setupDogs,
  spiders: setupSpiders,
  enclosed: setupEnclosed,
  flying: setupFlying,
  needles: setupNeedles,
  snakes: setupSnakes,
  speaking: setupSpeaking,
  driving: setupDriving,
  storms: setupStorms,
  dark: setupDark,
};

function mount(phobiaKey, container, level, levelIdx, opts = {}) {
  unmount();
  const setup = SETUPS[phobiaKey];
  if (!setup) throw new Error("Unknown phobia: " + phobiaKey);

  // Loading hint while textures/scene set up
  const loading = document.createElement("div");
  loading.className = "loading";
  loading.textContent = "Loading scene…";
  container.appendChild(loading);

  const renderer = makeRenderer(container);
  container.appendChild(renderer.domElement);

  // Vignette overlay for cinematic edge falloff
  const vignette = document.createElement("div");
  vignette.className = "vignette";
  container.appendChild(vignette);

  // 3D mode badge — hidden by default. The user doesn't need to see "3D ·
  // WebGL" while playing; it was tech-clutter that competed with the
  // achievement-toast for the same corner.
  const badge = document.createElement("div");
  badge.className = "mode-badge";
  badge.textContent = "3D · WebGL";
  badge.style.display = "none";
  container.appendChild(badge);

  // Controls hint (autohides after 5s)
  const hint = document.createElement("div");
  hint.className = "controls-hint";
  container.appendChild(hint);

  const scene = new THREE.Scene();
  // Bake-once room environment map shared across scenes. Each scene can still
  // override scene.environment with its own (e.g. a sky map) but if it doesn't,
  // every PBR surface gets a sensible reflection from this default.
  const envMap = getRoomEnvMap(renderer);
  if (envMap) scene.environment = envMap;
  const aspect = (container.clientWidth || 800) / (container.clientHeight || 360);
  // Near plane 0.02 — safe distance for the world-anchored body's chest at
  // ~0.20 m below the camera; larger near plane could clip the body when the
  // user looks straight down.
  const camera = new THREE.PerspectiveCamera(60, aspect, 0.02, 3000);

  // ---- Post-processing pipeline ----
  // 1. RenderPass    — base scene render
  // 2. SSAOPass      — contact AO darkens corners + object-floor seams
  // 3. UnrealBloom   — emissive bleed (suns, lit windows, lightning, eyes)
  // 4. SMAAPass      — clean edge anti-aliasing (sharp without flicker)
  // 5. OutputPass    — final tone-mapped sRGB output
  // SSAO and SMAA are off on low-power devices to keep the frame budget.
  const w = container.clientWidth || 800;
  const h = container.clientHeight || 360;
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  // Screen-space ambient occlusion. The single biggest "this looks like a
  // real photograph" upgrade after tone mapping — corners darken naturally
  // where two surfaces meet, grounding everything in real space. Tuned
  // strong enough to read clearly without crushing the blacks.
  let ssaoPass = null;
  if (!IS_LOW_POWER) {
    try {
      ssaoPass = new SSAOPass(scene, camera, w, h);
      ssaoPass.kernelRadius = 0.65;       // a touch larger for richer contact AO
      ssaoPass.minDistance  = 0.0006;
      ssaoPass.maxDistance  = 0.14;
      // Default output mode — combines AO with the rendered colour
      ssaoPass.output = SSAOPass.OUTPUT.Default;
      composer.addPass(ssaoPass);
    } catch (e) {
      console.warn("SSAO unavailable:", e);
    }
  }
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(w, h),
    0.45,  // strength — softer default so emissive surfaces don't blow out
           // surrounding geometry. Scenes can still override per-mount.
    0.55,  // radius — moderate halo
    0.90   // threshold — only the brightest pixels bloom; emissive bodies
           // and windows shouldn't get caught up in it.
  );
  composer.addPass(bloomPass);
  // SMAA — subpixel-morphological anti-aliasing. Cheaper than FXAA, cleaner.
  // Active on high quality only; medium uses MSAA via the renderer attribute.
  if (QUALITY === "high") {
    try {
      composer.addPass(new SMAAPass(w * renderer.getPixelRatio(), h * renderer.getPixelRatio()));
    } catch (e) {
      console.warn("SMAA unavailable:", e);
    }
  }
  composer.addPass(new OutputPass());

  let updateFn = null;
  let controls = null;
  let hands = null;
  let body = null;
  let joystick = null;
  let interactFn = null;     // optional: returns {gesture, hint, action} per frame
  let onClickFn = null;      // optional: called when user taps the scene
  let result = null;
  try {
    // Initialise the unified Fear state for this scene + rung. Scenes will
    // feed inputs (proximity, gaze) inside their own update() callbacks.
    if (window.PhobiaFear) window.PhobiaFear.setScene(phobiaKey, levelIdx);
    result = setup(scene, camera, level, levelIdx);
    updateFn = result && result.update;
    if (result && result.controls) {
      controls = new FPControls(camera, renderer.domElement, result.controls);
      // Apply the scene's preferred camera mode at scene mount UNLESS the
      // user has explicitly toggled the camera this session — in which case
      // we respect their choice. This gives the best of both worlds:
      //   1. New / casual users see their character automatically (TP) on
      //      walkable approach scenes (heights, dogs, etc.) and never have
      //      to discover the toggle to get a sensible default.
      //   2. Users who prefer first-person can toggle once and have it
      //      stick across the rest of their session.
      // Session-scoped (sessionStorage) so reopening the tab resets to TP.
      let userToggled = false;
      try { userToggled = sessionStorage.getItem("fobia.userToggledCamera") === "1"; } catch {}
      // Camera-mode locking: scenes can FORCE first-person (e.g. driving,
      // needles — looking at your own arm) or third-person, in which case
      // the toggle button is hidden and the V key is no-op. When locked,
      // the lock wins over the user's session preference.
      const lockedMode = result.controls.cameraModeLocked;     // "fp" | "tp" | undefined
      if (lockedMode === "fp" || lockedMode === "tp") {
        controls.setCameraMode(lockedMode, true);
        controls._cameraModeLocked = lockedMode;
      } else if (result.controls.preferredCameraMode && !userToggled) {
        // instant=true so tpBlend is set to 1 immediately — preserves the
        // cinematic intro position we'll seed below (without instant the
        // first frame's blend < 0.05 reset would discard the wide shot).
        controls.setCameraMode(result.controls.preferredCameraMode, true);
      }
      // Wire camera-collision targets so the TP camera won't clip through
      // walls / structures the scene declared as collidable.
      if (result.collisionObjects && controls.setCollisionScene) {
        controls.setCollisionScene(result.collisionObjects);
      }
      // Cinematic intro: start the TP smoothed position from a wider /
      // higher angle so the damped follow naturally dollies in to the
      // over-the-shoulder target over ~1 second. Tiny touch but it's the
      // signature "scene establishes itself" feel of a real game.
      if (controls.cameraMode === "tp" && window.THREE) {
        const sinY = Math.sin(controls.yaw), cosY = Math.cos(controls.yaw);
        const wideDist = controls.tpDistance * 1.8;
        const wideHeight = controls.tpHeight + 0.9;
        controls._tpSmoothPos = new THREE.Vector3(
          controls.position.x + sinY * wideDist + cosY * controls.tpShoulder * 1.5,
          controls.position.y + wideHeight,
          controls.position.z + cosY * wideDist - sinY * controls.tpShoulder * 1.5,
        );
      }
      const walkable = result.controls.mode === "walkable";
      // Phobia-specific intro hint: tells the user explicitly what to do.
      // For approach-style scenes (heights, dogs, etc.) the FIRST action is
      // to walk forward toward the source of fear. Without this hint the
      // user can stand confused at the back of the scene wondering what to do.
      // Always include a panic-stop reminder. Esc → grounding mode (5-4-3-2-1)
      // is the user's ethical exit at any moment. We bake it into every
      // approach scene's intro so users know it's there before they need it.
      const escNote = IS_TOUCH ? "" : " &nbsp;·&nbsp; <span style=\"opacity:.75\">Press <b>Esc</b> any time to ground yourself.</span>";
      const sceneIntros = {
        heights: (IS_TOUCH
          ? "You're on a rooftop. <b>Use the joystick</b> to walk toward the railing — your character will approach the edge."
          : "You're on a rooftop. <b>Press W or ↑</b> to walk toward the railing — your character will approach the edge.") + escNote,
        dogs: (IS_TOUCH
          ? "You've entered the room. The dog is doing its own thing. <b>Use the joystick</b> to walk closer when ready."
          : "You've entered the room. The dog is doing its own thing. <b>Press W or ↑</b> to walk closer when ready.") + escNote,
        spiders: (IS_TOUCH
          ? "Walk forward when you're ready to face it. <b>Use the joystick.</b>"
          : "Walk forward when you're ready to face it. <b>Press W or ↑.</b>") + escNote,
        snakes: (IS_TOUCH
          ? "You're on a path. <b>Use the joystick</b> to walk toward the snake at your own pace."
          : "You're on a path. <b>Press W or ↑</b> to walk toward the snake at your own pace.") + escNote,
        water: (IS_TOUCH
          ? "You're at the shoreline. <b>Use the joystick</b> to wade in when you're ready."
          : "You're at the shoreline. <b>Press W or ↑</b> to wade in when you're ready.") + escNote,
      };
      const intro = sceneIntros[phobiaKey];
      hint.innerHTML = intro || (IS_TOUCH
        ? (walkable
            ? "Swipe to look · use the joystick to walk · tap things to interact"
            : "Swipe in any direction to look around · tap things to interact")
        : (walkable
            ? "Drag with the mouse to look · <b>W A S D</b> or arrow keys to walk · click to interact"
            : "Drag with the mouse to look · <b>W A S D</b> / arrows to lean · click to interact"));
      // Approach-style hints get a longer reveal — 16 s — because the user
      // is doing something deliberate (walking) and might not have started
      // yet. Other scenes auto-hide after 11 s as before.
      const hintDuration = sceneIntros[phobiaKey] ? 16000 : 11000;
      setTimeout(() => { if (hint && hint.parentNode) hint.style.opacity = "0"; }, hintDuration);

      // Mobile virtual joystick (only when scene allows walking)
      if (IS_TOUCH && walkable) {
        joystick = new TouchJoystick(container, controls);
      }
    } else {
      hint.style.display = "none";
    }
    // Bloom tuning per scene
    if (result && result.bloom) {
      if (result.bloom.strength != null)  bloomPass.strength  = result.bloom.strength;
      if (result.bloom.radius != null)    bloomPass.radius    = result.bloom.radius;
      if (result.bloom.threshold != null) bloomPass.threshold = result.bloom.threshold;
    }
    // VSM shadows want a non-zero radius + a few blur samples to give a soft
    // penumbra. We apply this once per scene mount so individual setups don't
    // have to remember it.
    if (renderer.shadowMap.type === THREE.VSMShadowMap) {
      scene.traverse(o => {
        if (o.isLight && o.castShadow && o.shadow) {
          o.shadow.radius = 4;
          o.shadow.blurSamples = 16;
          // VSM is biased differently from PCF — a tiny normal bias hides
          // self-shadowing acne on detailed geometry like the spider legs.
          o.shadow.normalBias = 0.04;
        }
      });
    }
    // Per-scene environment override. Outdoor scenes can opt out of the
    // default RoomEnvironment by setting result.environment = false (e.g.
    // they have their own sky setup) or to a CubeTexture.
    if (result && result.environment === false) {
      scene.environment = null;
    } else if (result && result.environment && result.environment.isTexture) {
      scene.environment = result.environment;
    }
    // Per-scene SSAO override — some scenes (water surface, rain particles,
    // sky-only views) look worse with AO on. They can set result.ssao = false.
    if (ssaoPass && result && result.ssao === false) {
      ssaoPass.enabled = false;
    }
    // First-person hands (if scene wants them) — caller can override skin color
    if (result && result.hands) {
      const handOpts = Object.assign({}, result.hands === true ? {} : result.hands);
      if (opts.skinColor != null) handOpts.skinColor = opts.skinColor;
      hands = new Hands(scene, camera, handOpts);
    }
    // First-person body — defaults to enabled. Pass through character colours
    // (skin / shirt / hair / eyes / glasses / facial hair) so the visible body
    // and head match the user's saved character profile. The TP toggle below
    // lets users actually SEE this character.
    if (!result || result.body !== false) {
      const bodyOpts = Object.assign(
        {
          skinColor: opts.skinColor,
          shirtColor: opts.shirtColor,
          hairColor: opts.hairColor,
          hairStyle: opts.hairStyle,
          eyeColor:  opts.eyeColor,
          glasses:   opts.glasses,
          facialHair: opts.facialHair,
          surface: (result && result.surface) || "hard",
          windExposure: (result && result.windExposure) || 0,
        },
        (result && result.body) || {}
      );
      body = new Body(scene, camera, bodyOpts);
      // Sync body's head visibility AND the FP hands' visibility to the
      // controls' camera mode. In TP, body's head shows + FP hands hide
      // (so the user sees ONE clear character, not body + floating hands).
      if (controls && controls.cameraMode) {
        body.setCameraMode(controls.cameraMode);
        if (hands && hands.setCameraMode) hands.setCameraMode(controls.cameraMode);
      }
    }
    interactFn = result && result.interact;
    onClickFn = result && result.onClick;
  } catch (err) {
    container.removeChild(loading);
    throw err;
  }
  if (loading.parentNode) loading.parentNode.removeChild(loading);
  // Trigger the canvas fade-in on the next frame so the CSS transition
  // actually runs (browsers skip transitions on freshly added elements).
  requestAnimationFrame(() => {
    if (renderer && renderer.domElement) {
      renderer.domElement.classList.add("scene-ready");
    }
  });

  // Interaction-zone hint banner — shows above the canvas when something is reachable
  const reachHint = document.createElement("div");
  reachHint.className = "reach-hint";
  container.appendChild(reachHint);

  // Click → tell the scene to perform its action; also fire a hand pulse
  function onCanvasClick(e) {
    // Only treat short clicks as interactions, not drags
    if (controls && controls.dragging) return;
    if (hands) hands.fireAction();
    if (onClickFn) {
      try { onClickFn(controls, hands, scene); } catch (err) { console.warn(err); }
    }
  }
  // Use pointerup so we don't conflict with drag-look
  let downX = 0, downY = 0, downT = 0;
  function onPointerDownTrack(e) { downX = e.clientX; downY = e.clientY; downT = performance.now(); }
  function onPointerUpInteract(e) {
    const dist = Math.hypot(e.clientX - downX, e.clientY - downY);
    const dur = performance.now() - downT;
    if (dist < 5 && dur < 350) onCanvasClick(e);
  }
  renderer.domElement.addEventListener("pointerdown", onPointerDownTrack);
  renderer.domElement.addEventListener("pointerup", onPointerUpInteract);

  const t0 = performance.now();
  let lastTime = t0;
  let raf;
  function tick() {
    if (!container.isConnected || !active) return;
    const now = performance.now();
    const t = (now - t0) / 1000;
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    // Each per-frame call is wrapped so ONE faulty subsystem can't stop the
    // whole render loop. Errors are silently swallowed in production; they
    // surface in the console so devs can find them. Without this, a single
    // throw in (say) the dog audio scheduler would freeze the entire scene.
    try { if (controls) controls.update(dt); }
    catch (e) { console.warn("controls.update:", e); }
    // Tick the unified Fear state every frame so it can ramp / decay smoothly.
    // Scenes feed inputs in their own update() callbacks (proximity, gaze).
    try { if (window.PhobiaFear) window.PhobiaFear.update(dt); }
    catch (e) { console.warn("PhobiaFear.update:", e); }

    // ---- VR thumbstick locomotion + snap-turn ----
    // When in an immersive session, read the controllers' thumbstick axes:
    //   Left stick: smooth locomotion (strafe + forward), aligned to the
    //               headset's facing direction.
    //   Right stick: snap-turn 30° in the direction of a flick > 0.7.
    // Snap-turn (vs smooth-turn) is the comfort default — smooth rotation
    // is the #1 cause of VR motion sickness.
    if (renderer.xr.isPresenting) {
      const session = renderer.xr.getSession();
      if (session && session.inputSources) {
        for (const src of session.inputSources) {
          if (!src.gamepad || !src.gamepad.axes || src.gamepad.axes.length < 4) continue;
          const ax = src.gamepad.axes;
          // Trackpad axes are sometimes 0,1; thumbstick is 2,3 — both check
          const stickX = ax[2] !== undefined ? ax[2] : ax[0];
          const stickY = ax[3] !== undefined ? ax[3] : ax[1];
          if (src.handedness === "left") {
            if (Math.abs(stickX) > 0.15 || Math.abs(stickY) > 0.15) {
              // Forward = headset's horizontal facing direction
              const xrCam = renderer.xr.getCamera();
              const dir = _audVec1.set(0, 0, -1).applyQuaternion(xrCam.quaternion);
              dir.y = 0;
              if (dir.lengthSq() > 0.0001) dir.normalize();
              const right = _audVec2.set(dir.z, 0, -dir.x);
              const speed = 1.6 * dt;
              camera.position.addScaledVector(dir, -stickY * speed);
              camera.position.addScaledVector(right, stickX * speed);
              // Respect walkable scene bounds when present
              if (controls && controls.opts && controls.opts.bounds) {
                const b = controls.opts.bounds;
                camera.position.x = Math.max(b.minX, Math.min(b.maxX, camera.position.x));
                camera.position.z = Math.max(b.minZ, Math.min(b.maxZ, camera.position.z));
              }
            }
          } else if (src.handedness === "right") {
            // Snap-turn — only triggers once per flick (waits for the stick
            // to return to centre before another turn)
            if (Math.abs(stickX) > 0.7 && !active._lastSnapTurn) {
              camera.rotation.y -= Math.sign(stickX) * (Math.PI / 6);
              active._lastSnapTurn = true;
            } else if (Math.abs(stickX) < 0.3) {
              active._lastSnapTurn = false;
            }
          }
        }
      }
    }

    try { if (updateFn) updateFn(t, controls, dt); }
    catch (e) { console.warn("scene update:", e); }
    // Interaction probe: scene tells us what gesture is appropriate right now
    try {
      if (interactFn && hands) {
        const probe = interactFn(controls, hands, t, dt) || {};
        hands.setGesture(probe.gesture || "rest");
        reachHint.textContent = probe.hint || "";
        reachHint.style.opacity = probe.hint ? "1" : "0";
      }
    } catch (e) { console.warn("scene interact:", e); }
    try { if (hands) hands.update(t, dt); }
    catch (e) { console.warn("hands.update:", e); }
    try {
      if (body && controls) {
        const w = controls.getWalkState ? controls.getWalkState() : { phase: 0, amount: 0 };
        body.update(t, w.phase, w.amount, controls, hands);
      }
    } catch (e) { console.warn("body.update:", e); }
    // Update the spatial-audio listener so HRTF panning tracks the camera.
    // We sample the camera's forward + up vectors every frame so any sound
    // played via PhobiaAudio.spatial(pos) is correctly localised.
    if (window.PhobiaAudio && PhobiaAudio.updateListener) {
      const p = camera.getWorldPosition(_audVec1);
      const f = _audVec2.set(0, 0, -1).applyQuaternion(camera.quaternion);
      const u = _audVec3.set(0, 1, 0).applyQuaternion(camera.quaternion);
      try {
        PhobiaAudio.updateListener({
          position: { x: p.x, y: p.y, z: p.z },
          forward:  { x: f.x, y: f.y, z: f.z },
          up:       { x: u.x, y: u.y, z: u.z },
        });
      } catch {}
    }
    // In VR mode, the post-process composer must NOT be used — XR requires
    // the renderer to render directly into the headset's framebuffer with
    // per-eye stereo rendering. Fall back to plain renderer.render() while
    // a VR session is active. When the session ends, the composer chain
    // takes over again automatically. Wrapped in try/catch because WebGL
    // context-loss (tab backgrounded too long) can throw during render.
    try {
      if (renderer.xr.isPresenting) {
        renderer.render(scene, camera);
      } else {
        composer.render();
      }
    } catch (e) {
      console.warn("render:", e);
    }
  }

  function onResize() {
    const w = container.clientWidth, h = container.clientHeight;
    if (!w || !h) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    bloomPass.setSize(w, h);
    if (ssaoPass) ssaoPass.setSize(w, h);
  }
  window.addEventListener("resize", onResize);

  // ----- "Tips" toggle for the collapsed command bar -----
  // Character-driven scenes (heights, dogs, etc.) have their button bar
  // collapsed by default — events fire from movement / clicking the world.
  // This small toggle reveals the bar for accessibility / touch users who
  // prefer explicit controls. Lives in the bottom-right of the stage.
  let cmdToggle = null;
  setTimeout(() => {
    const cmdBarEl = document.querySelector('.scene-cmd-bar.collapsed');
    if (!cmdBarEl) return;
    cmdToggle = document.createElement("button");
    cmdToggle.className = "cmd-toggle";
    cmdToggle.textContent = "Show controls";
    cmdToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      const collapsed = cmdBarEl.classList.toggle("collapsed");
      cmdToggle.textContent = collapsed ? "Show controls" : "Hide controls";
    });
    container.appendChild(cmdToggle);
    if (active && active.overlays) active.overlays.push(cmdToggle);
  }, 50);

  // ----- Fear-driven visual overlays -----
  // These are CSS overlays whose opacity / filter properties are driven each
  // frame by the unified Fear value. As fear rises:
  //   - the radial vignette tightens (peripheral vision narrows)
  //   - canvas filter desaturates + shifts red
  //   - the heartbeat audio (already implemented) speeds up
  // Together this is "tunnel vision" — the universal cinematic shorthand
  // for panic. Drives a real psychological response.
  const fearVignette = document.createElement("div");
  fearVignette.className = "fear-vignette";
  container.appendChild(fearVignette);
  // Tiny biofeedback meter at top-left so the user can SEE their level
  // change. Optional — can be hidden via a setting later.
  const fearMeter = document.createElement("div");
  fearMeter.className = "fear-meter";
  fearMeter.innerHTML = `<div class="fear-meter-fill"></div>`;
  fearMeter.style.opacity = "0";
  container.appendChild(fearMeter);
  const fearMeterFill = fearMeter.querySelector(".fear-meter-fill");
  // Subscribe to Fear updates — drive the vignette + meter
  let fearUnsubscribe = null;
  if (window.PhobiaFear) {
    fearUnsubscribe = window.PhobiaFear.subscribe((value, ctx) => {
      const fear01 = value / 100;
      // Vignette opacity rises from 0 to 0.85 as fear climbs
      fearVignette.style.setProperty("--fv-opacity", String(0.05 + fear01 * 0.85));
      // The clear ellipse SHRINKS as fear rises — peripheral vision narrows
      fearVignette.style.setProperty("--fv-clear", `${Math.max(15, 60 - fear01 * 45)}%`);
      // Canvas-level filter: desaturate + slight red bias as fear rises
      const desat = Math.max(0, 1.0 - fear01 * 0.45);
      const sat = Math.max(0, 1.0 - fear01 * 0.20);
      const hue = -fear01 * 6;          // small shift toward red
      if (renderer && renderer.domElement) {
        renderer.domElement.style.filter =
          `saturate(${sat * 100}%) hue-rotate(${hue}deg) brightness(${1 - fear01 * 0.10})`;
      }
      // Meter
      fearMeter.style.opacity = value > 5 ? "1" : "0";
      if (fearMeterFill) fearMeterFill.style.width = `${Math.round(value)}%`;
      // Camera shake at high fear (over 80) — adds the visceral panic feel
      if (value > 80 && camera && !ctx.grounding) {
        const k = (value - 80) / 20;
        camera.position.x += (Math.random() - 0.5) * 0.015 * k;
        camera.position.y += (Math.random() - 0.5) * 0.012 * k;
        camera.rotation.z += (Math.random() - 0.5) * 0.003 * k;
      }
    });
  }

  // ----- Grounding mode (panic stop / 5-4-3-2-1) -----
  // The user can press Esc OR hold Space for 0.4 s to enter grounding mode.
  // The 5-4-3-2-1 sensory exercise is a clinical CBT technique for panic:
  // name 5 things you see, 4 you hear, 3 you can touch, 2 you smell, 1 you
  // taste. While in grounding mode: PhobiaFear drains rapidly, screen calms
  // (blue tint, desaturated background), narrator walks the user through
  // each step. This is the ETHICAL backstop — at any moment the user can
  // press Esc and a calming exit fires. Mandatory for a real exposure tool.
  const groundingOverlay = document.createElement("div");
  groundingOverlay.className = "grounding-overlay";
  container.appendChild(groundingOverlay);
  const groundingText = document.createElement("div");
  groundingText.className = "grounding-text";
  container.appendChild(groundingText);
  let groundingActive = false;
  let groundingStep = 0;
  let groundingTimer = null;
  const groundingScript = [
    { text: "Five things you can see. Look around. Name them silently.", duration: 9000 },
    { text: "Four things you can hear. Listen carefully.", duration: 8000 },
    { text: "Three things you can touch. Notice the texture.", duration: 8000 },
    { text: "Two things you can smell.", duration: 6000 },
    { text: "One thing you can taste.", duration: 5000 },
    { text: "You're here. You're safe. Take a slow breath.", duration: 4000 },
  ];
  function startGrounding() {
    if (groundingActive) return;
    groundingActive = true;
    if (window.PhobiaFear) window.PhobiaFear.setGroundingMode(true);
    groundingOverlay.classList.add("active");
    groundingStep = 0;
    function nextStep() {
      if (!groundingActive || groundingStep >= groundingScript.length) {
        endGrounding();
        return;
      }
      const s = groundingScript[groundingStep++];
      groundingText.textContent = s.text;
      groundingText.classList.add("visible");
      if (window.PhobiaVoice) {
        try { window.PhobiaVoice.speak(s.text); } catch {}
      }
      groundingTimer = setTimeout(() => {
        groundingText.classList.remove("visible");
        setTimeout(nextStep, 800);
      }, s.duration);
    }
    nextStep();
  }
  function endGrounding() {
    if (!groundingActive) return;
    groundingActive = false;
    if (groundingTimer) { clearTimeout(groundingTimer); groundingTimer = null; }
    if (window.PhobiaFear) window.PhobiaFear.setGroundingMode(false);
    groundingOverlay.classList.remove("active");
    groundingText.classList.remove("visible");
  }
  // Esc key → grounding (panic stop)
  function onGroundingKey(e) {
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    if (e.key === "Escape") {
      e.preventDefault();
      if (groundingActive) endGrounding();
      else startGrounding();
    }
  }
  window.addEventListener("keydown", onGroundingKey);

  // ----- Achievement toast queue -----
  // Slides in from the right when the player hits a milestone for the
  // first time. Persists in localStorage so a user only sees a given
  // milestone once across sessions. Scenes call
  // window.PhobiaFX.achievement(id, icon, title, message).
  const achievementContainer = document.createElement("div");
  achievementContainer.style.position = "absolute";
  achievementContainer.style.inset = "0";
  achievementContainer.style.pointerEvents = "none";
  achievementContainer.style.zIndex = "8";
  container.appendChild(achievementContainer);
  let achievementOffset = 0;
  function showAchievement(id, icon, title, message) {
    if (!id) return;
    let earned = {};
    try { earned = JSON.parse(localStorage.getItem("fobia.achievements") || "{}"); } catch {}
    if (earned[id]) return;       // already shown
    earned[id] = Date.now();
    try { localStorage.setItem("fobia.achievements", JSON.stringify(earned)); } catch {}
    const toast = document.createElement("div");
    toast.className = "achievement-toast";
    toast.style.top = (12 + achievementOffset) + "px";
    toast.innerHTML = `
      <div class="achievement-icon">${icon || "🏅"}</div>
      <div class="achievement-text">
        <strong>${title || "Milestone"}</strong>
        <span>${message || ""}</span>
      </div>
    `;
    achievementContainer.appendChild(toast);
    achievementOffset += 70;
    requestAnimationFrame(() => toast.classList.add("visible"));
    setTimeout(() => {
      toast.classList.remove("visible");
      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
        achievementOffset = Math.max(0, achievementOffset - 70);
      }, 500);
    }, 3500);
  }
  window.PhobiaFX = window.PhobiaFX || {};
  window.PhobiaFX.achievement = showAchievement;

  // ----- Contextual prompt overlay -----
  // A soft floating message that fades in when the player crosses a
  // character-driven event boundary — e.g. "You're at the edge", "The dog
  // notices you". No buttons; informational only. The active scene calls
  // window.PhobiaFX.contextPrompt(text, durationMs) to drive it.
  const ctxPrompt = document.createElement("div");
  ctxPrompt.className = "ctx-prompt";
  container.appendChild(ctxPrompt);
  let ctxPromptHideT = null;
  function showContextPrompt(text, durationMs = 4500) {
    if (ctxPromptHideT) { clearTimeout(ctxPromptHideT); ctxPromptHideT = null; }
    ctxPrompt.textContent = text;
    ctxPrompt.classList.add("visible");
    if (durationMs > 0) {
      ctxPromptHideT = setTimeout(() => {
        ctxPrompt.classList.remove("visible");
        ctxPromptHideT = null;
      }, durationMs);
    }
  }
  // Expose globally so scene update() callbacks can fire prompts
  window.PhobiaFX = window.PhobiaFX || {};
  window.PhobiaFX.contextPrompt = showContextPrompt;

  // ----- Camera-mode toggle button -----
  // Adds a small button in the corner that flips between first-person and
  // third-person view. Third-person reveals the character's full body + face
  // so the user sees themselves walking the platform / petting the dog. Press
  // V on the keyboard for the same toggle. Persists in localStorage.
  const cameraToggle = document.createElement("button");
  cameraToggle.className = "camera-toggle";
  cameraToggle.title = "Toggle first-person / third-person (V)";
  function refreshCameraLabel() {
    if (!controls) return;
    // Show CURRENT mode + a hint that it's tappable. The previous label
    // ("1st person") was the mode you'd switch TO — confusing on first
    // contact. New format is "View: 3rd ⇄" so the user instantly sees
    // both their current mode and that the chip is interactive.
    const inTP = controls.cameraMode === "tp";
    cameraToggle.innerHTML = `View: ${inTP ? "3rd" : "1st"} <span style="opacity:.7">⇄</span>`;
  }
  refreshCameraLabel();
  // Mark that the user has explicitly toggled the camera mode. Session-scoped
  // so the toggle preference sticks within this tab but doesn't override the
  // scene's default the next time they reopen the page.
  function markUserToggled() {
    try { sessionStorage.setItem("fobia.userToggledCamera", "1"); } catch {}
  }
  cameraToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!controls) return;
    if (controls._cameraModeLocked) return;
    const next = controls.toggleCameraMode();
    if (body) body.setCameraMode(next);
    if (hands && hands.setCameraMode) hands.setCameraMode(next);
    refreshCameraLabel();
    markUserToggled();
  });
  // Keyboard shortcut "V"
  function onCameraKey(e) {
    if (e.code !== "KeyV") return;
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    if (!controls) return;
    if (controls._cameraModeLocked) return;
    const next = controls.toggleCameraMode();
    if (body) body.setCameraMode(next);
    if (hands && hands.setCameraMode) hands.setCameraMode(next);
    refreshCameraLabel();
    markUserToggled();
  }
  window.addEventListener("keydown", onCameraKey);
  container.appendChild(cameraToggle);
  // Hide the camera-toggle visually whenever the scene is locked to one
  // mode. We defer the check by one frame so the controls' lock flag (set
  // in the result-handling block below) has been applied first.
  setTimeout(() => {
    if (controls && controls._cameraModeLocked) {
      cameraToggle.style.display = "none";
    }
  }, 0);

  // No NPC characters — the user's own avatar is the only character in the
  // scene. Kept the TherapistNPC class definition for future use but we
  // don't instantiate it.
  let therapist = null;

  active = {
    renderer, scene, camera, composer, onResize, raf: 0,
    overlays: [loading, vignette, badge, hint, reachHint, cameraToggle, ctxPrompt,
               fearVignette, fearMeter, groundingOverlay, groundingText,
               achievementContainer],
    controls, hands, body, joystick,
    pointerListeners: { onPointerDownTrack, onPointerUpInteract },
    sceneResult: result,
    keyListeners: [
      { event: "keydown", fn: onCameraKey },
      { event: "keydown", fn: onGroundingKey },
    ],
    fearUnsubscribe,
  };
  // Expose a global "fire a hand pulse" hook so scene-specific click
  // handlers (which bypass the renderer's onCanvasClick) can still trigger
  // visible grip feedback when the user touches an interactive object.
  window.PhobiaFX = window.PhobiaFX || {};
  window.PhobiaFX.firePulse = () => { if (hands) hands.fireAction(); };
  // Drive the animation loop via setAnimationLoop so WebXR works correctly
  // (XR sessions require this method instead of requestAnimationFrame).
  // Three.js routes the loop through requestAnimationFrame in non-XR mode
  // and through the XR compositor's frame timing in immersive mode.
  renderer.setAnimationLoop(tick);

  // ----- WebGL context-loss handler -----
  // When the browser drops the WebGL context (tab backgrounded too long,
  // GPU driver reset, low-memory pressure on mobile), the canvas would go
  // black and never recover without intervention. We pause the loop on
  // loss and re-arm it on restore — and force a one-shot resize so the
  // post-process composer rebuilds its render targets correctly.
  if (renderer.domElement && renderer.domElement.addEventListener) {
    renderer.domElement.addEventListener("webglcontextlost", (ev) => {
      ev.preventDefault();          // tells the browser we'll restore manually
      try { renderer.setAnimationLoop(null); } catch {}
      console.warn("WebGL context lost — pausing scene");
    }, false);
    renderer.domElement.addEventListener("webglcontextrestored", () => {
      console.warn("WebGL context restored — resuming scene");
      try {
        // Force a resize so the renderer + composer rebuild their targets
        if (typeof onResize === "function") onResize();
      } catch {}
      try { renderer.setAnimationLoop(tick); } catch {}
    }, false);
  }

  // ----- VR button -----
  // Only ADD the button when the device actually supports immersive-vr —
  // otherwise it shows "VR NOT SUPPORTED" which is intrusive noise for
  // users on regular desktops/phones. The async check means VR-capable
  // devices still get the button, just a moment later.
  if (navigator.xr && typeof navigator.xr.isSessionSupported === "function") {
    navigator.xr.isSessionSupported("immersive-vr").then(supported => {
      if (!supported || !active) return;
      try {
        const vrButton = VRButton.createButton(renderer);
        if (vrButton) {
          vrButton.style.position = "absolute";
          vrButton.style.bottom = "16px";
          vrButton.style.left = "50%";
          vrButton.style.transform = "translateX(-50%)";
          vrButton.style.zIndex = "9";
          container.appendChild(vrButton);
          if (active.overlays) active.overlays.push(vrButton);
        }
      } catch {}
    }).catch(() => { /* silent — no VR */ });
  }

  // ----- Suppress mouse-look while in VR -----
  // When XR is presenting, FPControls' yaw/pitch must NOT be applied — the
  // headset's pose is already driving camera orientation. We add a session
  // listener to flip a flag on the controls.
  renderer.xr.addEventListener("sessionstart", () => {
    if (controls) controls.enabled = false;
  });
  renderer.xr.addEventListener("sessionend", () => {
    if (controls) controls.enabled = true;
  });

  // ----- VR controllers (Quest Touch / Vision Pro / etc.) -----
  // Each controller is a tracked Object3D the headset positions in world
  // space. We attach a visible controller mesh + a laser pointer ray so the
  // user can physically aim at things in the scene. Trigger ("select")
  // fires a virtual click at whatever the laser is pointing at — this maps
  // controller input to the same onClick + onPointerUpInteract handlers
  // that already drive every interactive object in the app.
  const controllerModelFactory = new XRControllerModelFactory();
  const xrControllers = [];
  const xrLasers = [];
  for (let i = 0; i < 2; i++) {
    const controller = renderer.xr.getController(i);
    scene.add(controller);
    xrControllers.push(controller);
    // Visible controller model (matches actual hardware via the factory)
    const grip = renderer.xr.getControllerGrip(i);
    grip.add(controllerModelFactory.createControllerModel(grip));
    scene.add(grip);
    // Laser pointer — a thin line from the controller forward, ~2m long.
    // Fades to transparent at the tip so it doesn't dominate the view.
    const laserGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -2),
    ]);
    const laser = new THREE.Line(
      laserGeo,
      new THREE.LineBasicMaterial({ color: 0x7cd1c5, transparent: true, opacity: 0.65 })
    );
    laser.scale.z = 1;
    controller.add(laser);
    xrLasers.push(laser);
    // Reticle dot at the laser tip — small ring that grows when hovering
    // an interactive object (helps the user aim).
    const reticle = new THREE.Mesh(
      new THREE.RingGeometry(0.025, 0.035, 16),
      new THREE.MeshBasicMaterial({ color: 0x7cd1c5, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
    );
    reticle.position.z = -2;
    controller.add(reticle);

    // ----- Trigger handling -----
    // On `selectstart` we cast a ray from the controller forward and hand
    // the hit to whatever the renderer would have called for a normal
    // canvas click — the scene's onClick fn or the universal hands pulse.
    const ctrlRay = new THREE.Raycaster();
    const tempMat = new THREE.Matrix4();
    controller.addEventListener("selectstart", () => {
      // Build a ray from the controller's world position forward
      tempMat.identity().extractRotation(controller.matrixWorld);
      ctrlRay.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      ctrlRay.ray.direction.set(0, 0, -1).applyMatrix4(tempMat);
      // Universal pulse so the hand (or controller-tip) acknowledges the click
      if (hands) hands.fireAction();
      // Forward to the scene's onClick handler with controls + scene as
      // arguments, mirroring what onCanvasClick does. The scene can use
      // the renderer.xr.lastControllerRay if it wants the actual ray.
      if (onClickFn) {
        try { onClickFn(controls, hands, scene); } catch (err) { console.warn(err); }
      }
      // Stash the ray so scene-specific raycaster handlers can pick it up
      // (added a getter on PhobiaFX so scenes don't need to know about XR).
      window.PhobiaFX = window.PhobiaFX || {};
      window.PhobiaFX.lastControllerRay = {
        origin: ctrlRay.ray.origin.clone(),
        direction: ctrlRay.ray.direction.clone(),
      };
      window.PhobiaFX.lastControllerRayT = performance.now();
    });
  }
}

// ---------- Helpers ----------
function rng(seed) {
  // mulberry32 — deterministic noise so each scene looks consistent
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeWoodTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 256;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#5a3a20";
  ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = "#3a2410";
  for (let y = 0; y < 256; y += 32) ctx.fillRect(0, y, 256, 1);
  for (let i = 0; i < 220; i++) {
    ctx.fillStyle = `rgba(40, 25, 10, ${Math.random() * 0.32})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 8 + Math.random() * 22);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeTileTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 256;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#3e3e46";
  ctx.fillRect(0, 0, 256, 256);
  ctx.strokeStyle = "#1c1c22";
  ctx.lineWidth = 2;
  for (let i = 0; i <= 256; i += 64) {
    ctx.beginPath();
    ctx.moveTo(i, 0); ctx.lineTo(i, 256);
    ctx.moveTo(0, i); ctx.lineTo(256, i);
    ctx.stroke();
  }
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(20, 20, 25, ${Math.random() * 0.35})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6, 6);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeWallTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 256;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#5c5c66";
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 2400; i++) {
    const v = Math.floor(Math.random() * 30 - 15);
    ctx.fillStyle = `rgba(${100 + v}, ${100 + v}, ${110 + v}, 0.4)`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 1);
  }
  for (let i = 0; i < 6; i++) {
    const grd = ctx.createRadialGradient(
      Math.random() * 256, Math.random() * 256, 0,
      Math.random() * 256, Math.random() * 256, 30 + Math.random() * 60
    );
    grd.addColorStop(0, "rgba(40, 30, 20, 0.3)");
    grd.addColorStop(1, "rgba(40, 30, 20, 0)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, 256, 256);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeAsphaltTexture() {
  const c = document.createElement("canvas");
  c.width = c.height = 256;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#1a1d22";
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 5000; i++) {
    const v = Math.floor(Math.random() * 30);
    ctx.fillStyle = `rgba(${30 + v}, ${30 + v}, ${35 + v}, 0.45)`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 1);
  }
  // dashed center line
  ctx.fillStyle = "#d4c060";
  for (let y = 8; y < 256; y += 36) ctx.fillRect(125, y, 6, 18);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// Concrete platform texture for the rooftop / cliff surface. Mottled grey
// aggregate with weathering streaks so the user has a clear sense of "I am
// standing on a real surface" rather than a flat untextured slab.
// Builds a full PBR map set for the rooftop concrete: albedo (the visible
// color), normal (perturbs lighting per-pixel for fake bumps), roughness
// (matte vs slightly polished spots from foot wear), AO (darkens crevices).
// Returned as { albedo, normal, roughness, ao }. All four are CanvasTextures
// sharing the same canvas size + wrap mode. Generated procedurally so they
// stay in sync without a CDN dependency.
function makeConcreteMaps() {
  const SIZE = 256;
  const albedo = document.createElement("canvas"); albedo.width = albedo.height = SIZE;
  const heightC = document.createElement("canvas"); heightC.width = heightC.height = SIZE;
  const rough = document.createElement("canvas"); rough.width = rough.height = SIZE;
  const ao = document.createElement("canvas"); ao.width = ao.height = SIZE;
  const aCtx = albedo.getContext("2d");
  const hCtx = heightC.getContext("2d");
  const rCtx = rough.getContext("2d");
  const oCtx = ao.getContext("2d");

  // ----- 1. Albedo (visible colour, similar to before) -----
  aCtx.fillStyle = "#888a8e";
  aCtx.fillRect(0, 0, SIZE, SIZE);
  hCtx.fillStyle = "#808080";       // mid-grey = "no displacement"
  hCtx.fillRect(0, 0, SIZE, SIZE);
  rCtx.fillStyle = "#bcbcbc";       // base roughness ~0.74 (matte concrete)
  rCtx.fillRect(0, 0, SIZE, SIZE);
  oCtx.fillStyle = "#ffffff";       // base AO = 1 (no occlusion)
  oCtx.fillRect(0, 0, SIZE, SIZE);

  // Aggregate speckle — visible in albedo, raised dots in height, slightly
  // rougher in roughness, slight AO in the dimples
  for (let i = 0; i < 4000; i++) {
    const v = Math.floor(Math.random() * 70);
    const x = Math.random() * SIZE;
    const y = Math.random() * SIZE;
    const r = Math.random() * 1.6 + 0.4;
    aCtx.fillStyle = `rgba(${50 + v}, ${50 + v}, ${55 + v}, 0.35)`;
    aCtx.fillRect(x, y, r, r);
    // Pebbles read as slight bumps — height value above 128
    const heightVal = 128 + Math.floor(20 + Math.random() * 30);
    hCtx.fillStyle = `rgb(${heightVal},${heightVal},${heightVal})`;
    hCtx.fillRect(x, y, r, r);
    // Pebble tops are slightly less rough (worn smoother)
    if (Math.random() < 0.4) {
      rCtx.fillStyle = `rgba(150,150,150,0.55)`;
      rCtx.fillRect(x, y, r, r);
    }
  }
  // Weathering streaks — dark lines in albedo, slightly recessed in height,
  // rougher in roughness, slight AO
  for (let i = 0; i < 18; i++) {
    const y = Math.random() * SIZE;
    const h = 0.6 + Math.random() * 1.4;
    aCtx.fillStyle = `rgba(60,60,65,${0.05 + Math.random() * 0.07})`;
    aCtx.fillRect(0, y, SIZE, h);
    rCtx.fillStyle = `rgba(190,190,190,0.25)`;        // streaks more matte
    rCtx.fillRect(0, y, SIZE, h);
  }
  // Expansion joints — strong dark lines, real recess in height + heavy AO
  aCtx.fillStyle = "rgba(40,40,45,0.55)";
  aCtx.fillRect(0, 127, SIZE, 1.5);
  aCtx.fillRect(127, 0, 1.5, SIZE);
  hCtx.fillStyle = "rgb(60,60,60)";    // recessed (below 128 = below baseline)
  hCtx.fillRect(0, 127, SIZE, 2);
  hCtx.fillRect(127, 0, 2, SIZE);
  oCtx.fillStyle = "rgba(0,0,0,0.55)"; // dark AO in the joints
  oCtx.fillRect(0, 127, SIZE, 2);
  oCtx.fillRect(127, 0, 2, SIZE);

  // ----- 2. Convert height map to normal map via Sobel -----
  // Sample the heightC canvas, build a normal RGB texture in another canvas.
  const normalC = document.createElement("canvas");
  normalC.width = normalC.height = SIZE;
  const nCtx = normalC.getContext("2d");
  const heightData = hCtx.getImageData(0, 0, SIZE, SIZE).data;
  const normalImg = nCtx.createImageData(SIZE, SIZE);
  const sample = (x, y) => {
    x = (x + SIZE) % SIZE;
    y = (y + SIZE) % SIZE;
    return heightData[(y * SIZE + x) * 4] / 255;
  };
  // Strength multiplier — 1.5 gives a clearly visible but not exaggerated
  // bump effect on the platform when grazed by the sun.
  const strength = 1.5;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      // Sobel x derivative
      const dx = (sample(x + 1, y - 1) + 2 * sample(x + 1, y) + sample(x + 1, y + 1))
               - (sample(x - 1, y - 1) + 2 * sample(x - 1, y) + sample(x - 1, y + 1));
      // Sobel y derivative
      const dy = (sample(x - 1, y + 1) + 2 * sample(x, y + 1) + sample(x + 1, y + 1))
               - (sample(x - 1, y - 1) + 2 * sample(x, y - 1) + sample(x + 1, y - 1));
      // Tangent-space normal = (-dx, -dy, 1/strength) normalized, then mapped to 0..255
      const nx = -dx * strength;
      const ny = -dy * strength;
      const nz = 1.0;
      const len = Math.hypot(nx, ny, nz);
      const i = (y * SIZE + x) * 4;
      normalImg.data[i]     = Math.round((nx / len * 0.5 + 0.5) * 255);
      normalImg.data[i + 1] = Math.round((ny / len * 0.5 + 0.5) * 255);
      normalImg.data[i + 2] = Math.round((nz / len * 0.5 + 0.5) * 255);
      normalImg.data[i + 3] = 255;
    }
  }
  nCtx.putImageData(normalImg, 0, 0);

  // ----- 3. Three.js textures -----
  const make = (canvas, opts = {}) => {
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.anisotropy = 8;
    if (opts.colorSpace) t.colorSpace = opts.colorSpace;
    return t;
  };
  return {
    albedo:    make(albedo, { colorSpace: THREE.SRGBColorSpace }),
    normal:    make(normalC),
    roughness: make(rough),
    ao:        make(ao),
  };
}

// Backwards-compatible single-texture helper — anywhere that still calls
// makeConcreteTexture() gets just the albedo map.
function makeConcreteTexture() { return makeConcreteMaps().albedo; }

// Yellow / black hazard stripe along the platform edge. Drawn as a long thin
// canvas (1024×32) so it reads at any zoom — the bright edge marker tells the
// user exactly where the drop begins.
function makeEdgeStripeTexture() {
  const c = document.createElement("canvas");
  c.width = 1024; c.height = 32;
  const ctx = c.getContext("2d");
  // Diagonal yellow / black stripes
  for (let i = 0; i < 1024 + 64; i += 32) {
    ctx.fillStyle = "#ffd23d";
    ctx.beginPath();
    ctx.moveTo(i,        0);
    ctx.lineTo(i + 16,   0);
    ctx.lineTo(i - 16,  32);
    ctx.lineTo(i - 32,  32);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath();
    ctx.moveTo(i + 16,   0);
    ctx.lineTo(i + 32,   0);
    ctx.lineTo(i,       32);
    ctx.lineTo(i - 16,  32);
    ctx.closePath(); ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

// ---------- Heights ----------
function setupHeights(scene, camera, level) {
  const h = level.height;            // 0..1
  const cameraY = 1.6 + h * 120;     // standing height to skyscraper top
  const lookDown = 0.18 + h * 0.55;  // tilt down more at higher levels
  // Street level. The actual visible ground plane lives at y=0 (we move the
  // camera up rather than the ground down), so anything that sits "on the
  // street" — cars, pedestrians, landing coins — also lives at y≈0. Earlier
  // versions placed them far below the ground plane, which made them
  // invisible: the asphalt occluded them from above.
  const groundY = 0;

  // ---------- Time of day ----------
  // Each rung has a clear, distinct time so the user knows whether it's
  // morning, midday, sunset, or twilight at a glance. Times of day were
  // tuned so the lower rungs feel safe-and-bright and the highest rungs
  // feel dramatic-but-still-legible (city lights instead of pitch black).
  //   0.05 → morning           sun front-right, warm
  //   0.20 → midday             sun overhead, neutral
  //   0.45 → afternoon          sun back-right, slightly warm
  //   0.75 → golden hour        sun low, orange
  //   1.00 → twilight           sun set, deep blue with city glow
  const tod = (() => {
    if (h < 0.12) return "morning";
    if (h < 0.30) return "midday";
    if (h < 0.55) return "afternoon";
    if (h < 0.85) return "golden";
    return "twilight";
  })();
  // Sky gradient + sun direction + sun colour per time of day.
  const TOD = {
    morning:  { skyTop: [0.58, 0.60, 0.55], skyBot: [0.10, 0.55, 0.82],
                sunDir: [120, 200, 160], sunCol: 0xfff2d8, sunInt: 1.7,
                hemi: { sky: 0xa8c4ec, ground: 0x4a5060, intensity: 0.55 },
                fogCol: 0xb6cce4, fogNear: 220, fogFar: 1900,
                exposure: 1.05, label: "morning" },
    midday:   { skyTop: [0.58, 0.55, 0.50], skyBot: [0.55, 0.45, 0.92],
                sunDir: [40, 280, 30],     sunCol: 0xffffff, sunInt: 1.9,
                hemi: { sky: 0xc8dcf4, ground: 0x40464e, intensity: 0.65 },
                fogCol: 0xd0e0f0, fogNear: 260, fogFar: 2200,
                exposure: 1.10, label: "midday" },
    afternoon:{ skyTop: [0.58, 0.50, 0.46], skyBot: [0.07, 0.55, 0.78],
                sunDir: [-180, 200, -60],  sunCol: 0xffe6c0, sunInt: 1.6,
                hemi: { sky: 0xb8c8e0, ground: 0x3a3a40, intensity: 0.55 },
                fogCol: 0xc0cce0, fogNear: 220, fogFar: 1900,
                exposure: 1.00, label: "afternoon" },
    golden:   { skyTop: [0.62, 0.55, 0.34], skyBot: [0.06, 0.78, 0.62],
                sunDir: [-260, 60, -80],   sunCol: 0xffb070, sunInt: 1.4,
                hemi: { sky: 0xffb898, ground: 0x2a2228, intensity: 0.50 },
                fogCol: 0xc8a890, fogNear: 200, fogFar: 1600,
                exposure: 1.00, label: "golden hour" },
    twilight: { skyTop: [0.65, 0.60, 0.10], skyBot: [0.62, 0.45, 0.30],
                sunDir: [-280, 25, -100],  sunCol: 0x806a8e, sunInt: 0.45,
                hemi: { sky: 0x404a70, ground: 0x14141c, intensity: 0.40 },
                fogCol: 0x303550, fogNear: 180, fogFar: 1400,
                exposure: 0.90, label: "twilight" },
  };
  const cfg = TOD[tod];
  const skyTop = new THREE.Color().setHSL(...cfg.skyTop);
  const skyBot = new THREE.Color().setHSL(...cfg.skyBot);
  scene.background = skyTop.clone();

  // ---------- Atmospheric sky shader ----------
  // Three-band gradient (zenith / horizon / nadir) plus a sun-direction
  // bias that brightens the sky near the sun direction. This replaces the
  // simple two-color gradient with a real atmospheric look — the horizon
  // glows orange near the sun at golden hour, the zenith stays deep blue
  // at midday, and the falloff curve matches what you'd see looking out a
  // skyscraper window. Combined with our visible sun disc + tinted fog
  // it sells "sky" instead of "blue dome".
  const sunDirNorm = new THREE.Vector3(...cfg.sunDir).normalize();
  const sunGlowCol = new THREE.Color(cfg.sunCol);
  const horizCol   = new THREE.Color().lerpColors(skyBot, sunGlowCol,
    tod === "golden" ? 0.55 : tod === "twilight" ? 0.25 : 0.15);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:   { value: skyTop },
      horizColor: { value: horizCol },
      botColor:   { value: skyBot },
      sunDir:     { value: sunDirNorm },
      sunGlow:    { value: sunGlowCol },
      sunStrength:{ value: tod === "twilight" ? 0.10 : tod === "golden" ? 0.85 : 0.35 },
    },
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 horizColor;
      uniform vec3 botColor;
      uniform vec3 sunDir;
      uniform vec3 sunGlow;
      uniform float sunStrength;
      varying vec3 vPos;
      void main(){
        vec3 dir = normalize(vPos);
        float h = dir.y;                     // -1 (down) .. 1 (up)
        // Sky: smooth blend between three colours along altitude.
        // Zenith dominates above 0.3, horizon is the band -0.05..0.3, ground
        // colour below the horizon.
        vec3 sky;
        if (h > 0.30) {
          sky = mix(horizColor, topColor, smoothstep(0.30, 0.85, h));
        } else if (h > -0.05) {
