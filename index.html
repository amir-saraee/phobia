    dogTimers.push(setTimeout(() => {
      try {
        const targetX = 2.0 + (Math.random() - 0.5) * 0.8;
        const targetZ = -2.5 + (Math.random() - 0.5) * 0.8;
        dogCtrl.walkTo(targetX, targetZ);
        dogCtrl._initialSniff = true;
      } catch {}
    }, 400));
  }

  // Camera at human eye level
  camera.fov = 52;
  camera.updateProjectionMatrix();
  const dogPitch = Math.atan2(-(1.55 - 0.5), distance);
  const minZ = -distance + 1.0;

  // ----- Trust meter (HUD) -----
  // A small persistent overlay at the top-left of the stage showing the
  // dog's name and a trust progress bar. Trust grows from petting, treats,
  // and successful fetches. As trust rises:
  //   - the dog's tail wags faster at rest
  //   - the dog allows you closer (minDistance shrinks)
  //   - barking intensity is reduced
  // Persists per-character so the user remembers their relationship.
  const trustKey = "fobia.dogs.trust." + (window.Character?.loadCharacter()?.id || "default");
  let trust = (() => {
    try { return Math.max(0, Math.min(1, parseFloat(localStorage.getItem(trustKey) || "0"))); }
    catch { return 0; }
  })();
  function setTrust(v) {
    trust = Math.max(0, Math.min(1, v));
    try { localStorage.setItem(trustKey, String(trust)); } catch {}
    refreshTrustHud();
    // Dog comes closer as trust builds up (down from 0.9 m to 0.5 m)
    dogCtrl.minDistance = 0.9 - trust * 0.4;
  }
  function bumpTrust(delta, reason) {
    setTrust(trust + delta);
    popHeart();
    if (reason && window.PhobiaVoice) window.PhobiaVoice.speak(reason);
  }

  // Build the HUD in the parent stage if it isn't there yet
  let trustHud = null;
  function refreshTrustHud() {
    if (!trustHud) return;
    const pct = Math.round(trust * 100);
    trustHud.querySelector(".trust-bar-fill").style.width = pct + "%";
    trustHud.querySelector(".trust-pct").textContent = pct + "%";
  }
  setTimeout(() => {
    const stage = document.getElementById("stage");
    if (!stage) return;
    // Reuse existing HUD if present (e.g. after re-mount)
    let hud = stage.querySelector(".trust-hud");
    if (!hud) {
      hud = document.createElement("div");
      hud.className = "trust-hud";
      hud.innerHTML = `
        <div class="trust-row">
          <div class="trust-name">${dogName}</div>
          <div class="trust-pct">0%</div>
        </div>
        <div class="trust-bar"><div class="trust-bar-fill"></div></div>
        <div class="trust-hint">Pet · throw a ball · share a treat</div>
      `;
      stage.appendChild(hud);
    }
    trustHud = hud;
    refreshTrustHud();
  }, 50);

  // ----- Click-on-floor / click-on-dog mouse interaction -----
  // The whole point: prefer the world over buttons. The renderer hands clicks
  // to `onClick` (already wired via setupPhobiaScene), but it has no concept
  // of "click on the floor at world position X". So we ALSO add our own
  // raycaster on the renderer's canvas to read where the click landed.
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2();
  function pickWorld(clientX, clientY, dom) {
    const rect = dom.getBoundingClientRect();
    mouseVec.x = ((clientX - rect.left) / rect.width)  * 2 - 1;
    mouseVec.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const hits = raycaster.intersectObject(scene, true);
    return hits[0] || null;
  }
  // Track if the user dragged (to look around) — only treat as a click if
  // the down/up happened within 6 px and within 250 ms.
  let downX = 0, downY = 0, downT = 0, downPointerId = -1;
  let canvasDom = null;
  function bindCanvasClicks() {
    if (canvasDom) return;
    canvasDom = document.querySelector("#stage canvas");
    if (!canvasDom) return;
    canvasDom.addEventListener("pointerdown", (e) => {
      downX = e.clientX; downY = e.clientY; downT = performance.now();
      downPointerId = e.pointerId;
    });
    canvasDom.addEventListener("pointerup", (e) => {
      if (e.pointerId !== downPointerId) return;
      const dx = e.clientX - downX, dy = e.clientY - downY;
      const dt2 = performance.now() - downT;
      if (Math.hypot(dx, dy) > 6 || dt2 > 350) return;   // drag, not click
      const hit = pickWorld(e.clientX, e.clientY, canvasDom);
      if (!hit) return;
      handleWorldClick(hit, e.shiftKey || e.metaKey);
    });
  }
  setTimeout(bindCanvasClicks, 60);

  function handleWorldClick(hit, alt) {
    if (intensity === "barking") return;
    // Visible grip feedback for every interactive click
    if (window.PhobiaFX && window.PhobiaFX.firePulse) window.PhobiaFX.firePulse();
    // Did we click on the dog (or any of its parts)?
    let p = hit.object;
    let hitDog = false;
    while (p) {
      if (p === dog) { hitDog = true; break; }
      p = p.parent;
    }
    if (hitDog) {
      // Pet ↔ requires being close enough. If far, the dog comes to you.
      const cx = camera.position.x, cz = camera.position.z;
      const dx = cx - dog.position.x, dz = cz - dog.position.z;
      if (Math.hypot(dx, dz) < 1.8) {
        petPulse = 1.0;
        dogCtrl.tailWag += 8;
        bumpTrust(0.05);
      } else {
        // Call the dog over
        dogCtrl.walkTo(cx, cz + 0.6);
        if (window.PhobiaVoice) window.PhobiaVoice.speak("Come here.");
      }
      return;
    }
    // Otherwise: throw an item. Default = ball; alt-click (shift / cmd) = treat.
    const tx = hit.point.x, tz = hit.point.z;
    const kind = alt ? "treat" : "ball";
    throwItem(kind, tx, tz);
    fetchPhase = "flying";
    if (window.PhobiaVoice) {
      window.PhobiaVoice.speak(kind === "treat" ? "Treat." : "Go fetch.");
    }
  }

  // Wire up command bar buttons as a fallback. Most users will prefer to
  // click directly in the scene, but the buttons remain so touch users
  // and screen-reader users have a known affordance too.
  function wireCommandBar() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="dogs"]');
    if (!bar) return;
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const cmd = btn.dataset.cmd;
        commandDog(cmd);
      };
    });
  }
  setTimeout(wireCommandBar, 0);

  // ----- Keyboard shortcuts -----
  // Single-letter keys for the four commands (ignored when typing in inputs).
  // Lets desktop users use the mouse for the world + keyboard for commands.
  function onKey(e) {
    if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName)) return;
    const k = e.key.toLowerCase();
    if (k === "s") commandDog("sit");
    else if (k === "t") commandDog("treat");
    else if (k === "b") commandDog("ball");
    else if (k === "c") commandDog("call");
    else if (k === "l") commandDog("lay");
  }
  window.addEventListener("keydown", onKey);

  function commandDog(cmd) {
    if (intensity === "barking" && cmd !== "stand") return;
    switch (cmd) {
      case "sit":
        dogCtrl.sit();
        if (window.PhobiaVoice) window.PhobiaVoice.speak(`Sit, ${dogName}.`);
        break;
      case "stand":
        dogCtrl.stand();
        break;
      case "lay":
        // Highest "settled" pose. Speakable cue varies on trust.
        dogCtrl.lay();
        if (window.PhobiaVoice) {
          window.PhobiaVoice.speak(trust > 0.7
            ? `Settle, ${dogName}. Good dog.`
            : `Lay down, ${dogName}.`);
        }
        break;
      case "treat":
      case "ball": {
        // Tossed straight ahead a comfortable distance
        const yaw = (storedActiveControls && storedActiveControls.yaw) || 0;
        const ahead = 2.5 + (cmd === "ball" ? 0.5 : 0);
        const tx = camera.position.x - Math.sin(yaw) * ahead;
        const tz = camera.position.z - Math.cos(yaw) * ahead;
        throwItem(cmd === "treat" ? "treat" : "ball", tx, tz);
        fetchPhase = "flying";
        if (window.PhobiaVoice) {
          window.PhobiaVoice.speak(cmd === "treat" ? "Treat." : "Go fetch.");
        }
        break;
      }
      case "call":
        // Calls the dog to you by name
        dogCtrl.walkTo(camera.position.x, camera.position.z + 0.6);
        if (window.PhobiaVoice) window.PhobiaVoice.speak(`Come here, ${dogName}.`);
        break;
      case "bark":
        if (window.PhobiaAudio) window.PhobiaAudio.bark(0.85);
        setTimeout(() => dogCtrl.bark(), 250);
        break;
    }
  }

  // Initialize trust-driven tuning (state already declared at top of fn)
  dogCtrl.minDistance = 0.9 - trust * 0.4;

  return {
    controls: {
      mode: "walkable",
      // Spawn the user at the ROOM ENTRANCE, well back from the dog. The
      // first thing they see (in third-person) is their character standing
      // by the doorway with the dog already busy doing its own thing across
      // the room. They CHOOSE to approach. This is the single biggest
      // realism upgrade for the dog scene: a fear sim should let the user
      // close the distance themselves, not start them already-petting-it.
      initialPos: [0, 1.55, 4.0],
      initialYaw: 0,
      initialPitch: dogPitch * 0.5,    // gentler tilt — looking ahead, not down
      bounds: { minX: -2.5, maxX: 2.5, minZ: minZ, maxZ: 4.5 },
      speed: 1.6,
      lookSpeed: 0.0035,
      // Default to third-person so the user sees themselves enter the room
      // and approach the dog. Persists per-scene after first use.
      preferredCameraMode: "tp",
    },
    // (No NPC — the user's own character is the only character in the scene.)
    bloom: { strength: 0.35, threshold: 0.92 },
    hands: { skinColor: 0xd4a07a, sleeveColor: 0x3a3d4f },
    surface: "wood",
    interact(controls) {
      if (!controls) return null;
      const dx = controls.position.x - dog.position.x;
      const dz = controls.position.z - dog.position.z;
      const dist = Math.hypot(dx, dz);
      if (intensity === "barking") {
        // At "barking" the dog is keyed up; user shouldn't approach but
        // tell them they can step back if it's too much.
        return { gesture: "rest", hint: dist < 3.5
          ? `${dogName} is alert. Stay back. Notice the breath.`
          : "" };
      }
      // Character-driven hints: change as the player closes the distance.
      // No "click button" instructions — the player figures out the world
      // interactions by being close enough that a click on the dog or floor
      // makes sense.
      if (dist < 1.4) {
        return { gesture: "pet", hint: `${dogName} is right with you · click to pet` };
      }
      if (dist < 2.5) {
        return { gesture: "pet", hint: `walk a little closer to pet ${dogName}` };
      }
      if (dist < 4.0) {
        return { gesture: "rest", hint: `${dogName} sees you. Walk slowly closer.` };
      }
      return { gesture: "rest", hint: "" };
    },
    // The renderer calls onClick(controls) for the *generic* click handler,
    // but our richer pickWorld() is bound directly to the canvas above. Keep
    // this as a no-op so we don't double-fire pet feedback.
    onClick(controls) {},
    update(t, controls, dt) {
      if (controls) { dogsControls = controls; storedActiveControls = controls; }
      const d = dt || 0.016;
      if (_dogDust && _dogDust.userData && _dogDust.userData.update) {
        _dogDust.userData.update(d, t);
      }
      petPulse = Math.max(0, petPulse - d);
      // Drive the dog's lean-into-pet from the petPulse so the dog actually
      // reacts to contact instead of just absorbing clicks silently.
      dogCtrl.petAmount = petPulse;
      dogCtrl.update(t, d);

      // ---- Feed the unified Fear state ----
      // Proximity to the dog drives the bulk of the fear input. At the
      // "barking" intensity, we add a baseline gaze-driven input so even
      // standing still feels charged.
      if (controls && window.PhobiaFear) {
        const dx = controls.position.x - dog.position.x;
        const dz = controls.position.z - dog.position.z;
        const playerDist = Math.hypot(dx, dz);
        const closeness = Math.max(0, Math.min(1, 1 - (playerDist - 1.0) / 5.0));
        const intensityMul = intensity === "barking" ? 1.0 : intensity === "alert" ? 0.65 : 0.40;
        window.PhobiaFear.setInput("proximity", closeness * intensityMul);
        // Gaze: looking at the dog
        const dirToDog = Math.atan2(dx, dz);
        const yawDelta = Math.abs(((controls.yaw - Math.PI) - dirToDog + Math.PI * 3) % (Math.PI * 2) - Math.PI);
        const gazeAlign = Math.max(0, 1 - yawDelta / 1.0);
        window.PhobiaFear.setInput("gaze", gazeAlign * intensityMul * 0.8);
        // Avoidance: stepping back after engaging
        const isAway = playerDist > 5.5;
        window.PhobiaFear.bumpAvoidance(d, isAway && dogPlayerState.dogNoticedYou);
        // Adaptive narration tick
        if (window.PhobiaNarrator) window.PhobiaNarrator.tick("dogs", { minGap: 32 });

        // ---- Body posture: crouch + reach when close to the dog ----
        // Real people approach a dog by crouching down to be at the dog's
        // height, then extending a hand for sniffing. This gives the
        // character the same instinct: lower the body + reach when very
        // close. Also a slight bow forward when petting.
        if (active.body && active.body.setPosture) {
          // Crouch grows from 0 at 2.5m to 0.5 at 0.6m (max 50% squat)
          const crouch = Math.max(0, Math.min(0.5, (2.5 - playerDist) / 1.9));
          // Reach forward when within petting range, blends with petPulse
          // so each pet visibly extends the hand a bit further forward
          const reach = playerDist < 1.6
            ? 0.4 + petPulse * 0.5
            : (playerDist < 2.5 ? 0.2 : 0);
          // Subtle forward lean while petting (peering down at the dog)
          const lean = playerDist < 1.6 ? 0.30 + petPulse * 0.15 : 0;
          active.body.setPosture({
            crouch,
            reach,
            reachHeight: 0.25,        // hip-low — reaching DOWN to the dog
            lean,
            armSpread: 0,
          });
        }
      }

      // ---- Character-driven proximity events ----
      // As the player closes the distance to the dog, contextual prompts
      // fade in to mark the natural milestones: dog notices you, you're
      // close enough to pet, etc. These are once-per-rung so the cue isn't
      // repeated to nag.
      if (controls && intensity !== "barking") {
        const dx = controls.position.x - dog.position.x;
        const dz = controls.position.z - dog.position.z;
        const playerDist = Math.hypot(dx, dz);
        // 1. Dog notices you (within 4 m for the first time). Make the dog
        // turn its head, tail flick — the DogController already does the
        // tracking; we just give the user a cue that the dog SEES them.
        if (playerDist < 4.0 && !dogPlayerState.dogNoticedYou) {
          dogPlayerState.dogNoticedYou = true;
          if (window.PhobiaFX && window.PhobiaFX.contextPrompt) {
            window.PhobiaFX.contextPrompt(
              `${dogName} notices you. Walk slowly closer when you're ready.`,
              4000
            );
          }
          // Subtle tail flick to acknowledge — drives the visible reaction
          dogCtrl.tailWag += 4;
          // The dog quietly stops what it was doing (sniff, wander) and
          // turns to face the player. Cancels the initial autonomous walk.
          if (dogCtrl.followTarget) dogCtrl.followTarget = null;
          dogCtrl.setState("idle");
          if (window.PhobiaFX && window.PhobiaFX.achievement) {
            window.PhobiaFX.achievement(
              "dogs.firstApproach",
              "🐶",
              "First approach",
              "The dog noticed you. Both still calm."
            );
          }
        }
        // 2. Close approach (within 1.6 m for the first time)
        if (playerDist < 1.6 && !dogPlayerState.closeApproach) {
          dogPlayerState.closeApproach = true;
          if (window.PhobiaFX && window.PhobiaFX.contextPrompt) {
            window.PhobiaFX.contextPrompt(
              `Click ${dogName} to pet.`,
              4000
            );
          }
        }
        // 3. After petting (any pet pulse fired)
        if (petPulse > 0.5 && !dogPlayerState.petted) {
          dogPlayerState.petted = true;
          if (window.PhobiaFX && window.PhobiaFX.contextPrompt) {
            window.PhobiaFX.contextPrompt(
              `Good. Notice the warmth in your hand.`,
              4000
            );
          }
          if (window.PhobiaFX && window.PhobiaFX.achievement) {
            window.PhobiaFX.achievement(
              "dogs.firstPet",
              "🤝",
              "First pet",
              `You touched ${dogName}. Real progress.`
            );
          }
        }
        // 4. Walking away after engagement
        if (dogPlayerState.dogNoticedYou && playerDist > 5.0
            && !dogPlayerState.walkedAway) {
          dogPlayerState.walkedAway = true;
          if (window.PhobiaFX && window.PhobiaFX.contextPrompt) {
            window.PhobiaFX.contextPrompt(
              `Stepped back. ${dogName} is calm.`,
              3500
            );
          }
        }
      }
      // Trust-driven tail wag at rest
      if (dogCtrl.state === "idle" || dogCtrl.state === "sit" || dogCtrl.state === "lay") {
        dogCtrl.tailWag += d * trust * 4;
      }
      // Goal ring under the dog — pulses while user is far, fades when they
      // step into petting range. Tracks the dog as it wanders so it always
      // points the user at where to stand.
      if (dogGoalRing && controls) {
        dogGoalRing.position.x = dog.position.x;
        dogGoalRing.position.z = dog.position.z;
        const dx = controls.position.x - dog.position.x;
        const dz = controls.position.z - dog.position.z;
        const playerDist = Math.hypot(dx, dz);
        const inRange = playerDist < 1.6;
        const targetOp = inRange ? 0 : (0.22 + Math.sin(t * 2.2) * 0.10);
        dogGoalRing.material.opacity += (targetOp - dogGoalRing.material.opacity) * 0.08;
      }

      // ---- Bird outside the window ----
      // The bird perches and flies in cycles. The dog notices when it's
      // perching by glancing at the window. This adds a third "agent" to
      // the scene — the world has its own life beyond the player+dog dyad.
      if (bird.userData.state === "absent" && t > bird.userData.nextAppearAt) {
        bird.userData.state = "flying";
        bird.userData.flyT = 0;
        bird.userData.flyFromX = -8 - Math.random() * 4;
        bird.userData.flyFromY = 4 + Math.random() * 1.5;
        bird.userData.flyToX = -4.2;     // landing on the windowsill
        bird.userData.flyToY = 1.8;
        bird.visible = true;
      }
      if (bird.userData.state === "flying") {
        bird.userData.flyT += d * 0.45;     // ~2.2-second flight
        const k = Math.min(1, bird.userData.flyT);
        const ease = k * k * (3 - 2 * k);
        bird.position.x = bird.userData.flyFromX + (bird.userData.flyToX - bird.userData.flyFromX) * ease;
        bird.position.y = bird.userData.flyFromY + (bird.userData.flyToY - bird.userData.flyFromY) * ease;
        bird.position.z = -13.85;
        // Wing flap (subtle x-rotation oscillation)
        bird.rotation.x = Math.sin(t * 28) * 0.10 * (1 - k);
        if (k >= 1) {
          bird.userData.state = "perching";
          bird.userData.perchUntil = t + 4 + Math.random() * 6;
          bird.userData.headTurnT = t;
          bird.rotation.x = 0;
        }
      } else if (bird.userData.state === "perching") {
        // Idle head turn — looks left, then right, every 1.5s
        const turnPhase = (t - bird.userData.headTurnT) * 0.9;
        birdHead.rotation.y = Math.sin(turnPhase) * 0.6;
        // Tiny body bob — like real perched birds
        bird.position.y = 1.8 + Math.sin(t * 4) * 0.005;
        if (t > bird.userData.perchUntil) {
          // Fly away — pick a random exit
          bird.userData.state = "flying";
          bird.userData.flyT = 0;
          bird.userData.flyFromX = -4.2;
          bird.userData.flyFromY = 1.8;
          bird.userData.flyToX = -10 - Math.random() * 4;
          bird.userData.flyToY = 4 + Math.random() * 2;
          bird.userData.exit = true;
        }
      }
      if (bird.userData.state === "flying" && bird.userData.exit && bird.userData.flyT >= 1) {
        bird.visible = false;
        bird.userData.state = "absent";
        bird.userData.exit = false;
        bird.userData.nextAppearAt = t + 25 + Math.random() * 35;
      }
      // Dog notices the bird when it's perching — head pitches up briefly
      if (bird.userData.state === "perching" && Math.random() < 0.005
          && (dogCtrl.state === "idle" || dogCtrl.state === "sit")) {
        dogCtrl._birdGaze = 1.0;
      }
      if (dogCtrl._birdGaze && dogCtrl._birdGaze > 0) {
        // Bias the dog's head toward the bird position (window) for ~1 s
        dogCtrl._birdGaze -= d;
        // Override the headYaw target slightly toward the window
        const dxBird = bird.position.x - dog.position.x;
        const dzBird = bird.position.z - dog.position.z;
        const targetYaw = Math.atan2(dxBird, dzBird) - dog.rotation.y;
        dogCtrl.headYaw += (targetYaw - dogCtrl.headYaw) * 0.04;
        dogCtrl.headPitch += (-0.10 - dogCtrl.headPitch) * 0.04;
      }

      // ---- Dust motes drifting through the sunbeam ----
      // Each mote drifts down + sideways with a subtle sinusoidal sway,
      // re-spawning at the top when it falls below the floor. The motes are
      // additive-blended so they brighten when crossing the sunbeam.
      for (let i = 0; i < dustData.length; i++) {
        const dust = dustGroup.children[i];
        const data = dustData[i];
        dust.position.x += data.vx * d + Math.sin(t + data.phaseX) * 0.0012;
        dust.position.y += data.vy * d;
        dust.position.z += data.vz * d + Math.cos(t + data.phaseY) * 0.0008;
        // Reset when it drops below the floor (at y ≈ -0.95)
        if (dust.position.y < -0.85) {
          dust.position.set(
            -3.2 + Math.random() * 2.4,
            3.2 + Math.random() * 0.5,
            -6.5 - Math.random() * 3.5,
          );
        }
      }

      // ---- Dog autonomously drinks from the water bowl ----
      // Every 60-120 s the dog wanders to the bowl, lowers its head, and
      // "drinks" (jaw bobs). Then returns to its previous spot. The
      // user sees the dog living its own life — not just orbiting them.
      if (!dogCtrl._nextDrinkAt) dogCtrl._nextDrinkAt = t + 30 + Math.random() * 30;
      if (t > dogCtrl._nextDrinkAt && dogCtrl.state === "idle"
          && intensity !== "barking" && fetchPhase === "idle"
          && !dogCtrl._drinkingState) {
        dogCtrl._drinkingState = "approach";
        dogCtrl._drinkPrevState = dogCtrl.state;
        dogCtrl.walkTo(2.0, -1.3);    // bowl position
      }
      if (dogCtrl._drinkingState === "approach"
          && Math.hypot(dog.position.x - 2.0, dog.position.z - (-1.3)) < 0.4
          && dogCtrl.state === "idle") {
        dogCtrl._drinkingState = "drinking";
        dogCtrl._drinkUntil = t + 3.0;
        if (window.PhobiaAudio && window.PhobiaAudio.dogSniff) {
          // A few quiet lap sounds (sniff is close enough)
          for (let i = 0; i < 3; i++) {
            setTimeout(() => {
              try { window.PhobiaAudio.dogSniff(0.35, {
                x: 2.0, y: -0.8, z: -1.3
              }); } catch {}
            }, i * 700);
          }
        }
      }
      if (dogCtrl._drinkingState === "drinking") {
        // Force head down + small jaw bob
        dogCtrl.headPitch = 0.7 + Math.sin(t * 8) * 0.05;
        if (t > dogCtrl._drinkUntil) {
          dogCtrl._drinkingState = null;
          dogCtrl._nextDrinkAt = t + 60 + Math.random() * 60;
        }
      }
      // Auto-lay-down after the dog has been sitting for >8 seconds AND the
      // user has built enough trust (>0.7). Real dogs sit when commanded,
      // get bored, then lay down. Once auto-laid, stays laid until the user
      // calls them or commands stand.
      if (dogCtrl.state === "sit" && trust > 0.7
          && (dogCtrl._sitTimer || 0) > 8) {
        dogCtrl.lay();
        if (window.PhobiaVoice) {
          window.PhobiaVoice.speak(`Settling in. ${dogName} feels safe with you.`);
        }
      }
      // ---- Auto-approach at high trust ----
      // Once the user has built up real trust (>0.5), the dog occasionally
      // walks closer on its own — the way a friendly dog wanders over to
      // someone they like. Only triggers when the dog is idle and not
      // already engaged in a fetch / walk. This is the strongest "the dog
      // chose me" signal short of full GLTF skinned animation.
      if (!autoApproachEnabled) {
        autoApproachEnabled = true;
        nextAutoApproach = t + 12 + Math.random() * 8;   // first chance ~15-20s in
      }
      if (trust > 0.5 && intensity !== "barking"
          && dogCtrl.state === "idle"
          && fetchPhase === "idle"
          && t > nextAutoApproach) {
        const cx = camera.position.x, cz = camera.position.z;
        const dx = cx - dog.position.x, dz = cz - dog.position.z;
        const dist = Math.hypot(dx, dz);
        // Only approach if the dog is actually meaningfully far away
        if (dist > 1.6) {
          // Walk to a comfortable conversation distance, scaled by trust:
          // higher trust = the dog comes closer (down to 0.6 m at trust=1.0)
          const targetDist = 1.4 - trust * 0.8;
          const k = (dist - targetDist) / dist;
          dogCtrl.walkTo(dog.position.x + dx * k, dog.position.z + dz * k);
          if (window.PhobiaVoice && Math.random() < 0.3) {
            window.PhobiaVoice.speak(`${dogName} is coming over to you.`);
          }
        }
        nextAutoApproach = t + 18 + Math.random() * 14;   // ~18-32s between attempts
      }

      // ---- Autonomous wandering & sniffing ----
      // The dog has an "internal life" — it occasionally walks to a random
      // spot in the room as if interested in something. Sometimes that walk
      // turns into a sniff (head lowers, walk slows). This is the cumulative
      // signal that the dog is a creature, not a button-driven puppet.
      if (nextWander === 0) nextWander = t + 8 + Math.random() * 6;
      if (trust > 0.2 && intensity !== "barking"
          && dogCtrl.state === "idle"
          && fetchPhase === "idle"
          && t > nextWander) {
        // Pick a random target within the visible room (inside the walls)
        // but not RIGHT on top of the player so it doesn't conflict with the
        // approach behaviour.
        const targetX = (Math.random() - 0.5) * 4.0;
        const targetZ = -2 - Math.random() * 4;
        // 40% chance the dog sniffs at the target instead of just standing
        if (Math.random() < 0.4) {
          sniffActive = true;
          sniffEndsAt = t + 2.5 + Math.random() * 2.0;
        }
        dogCtrl.walkTo(targetX, targetZ);
        nextWander = t + 12 + Math.random() * 13;
      }
      // Drive sniff: while active, force the head pitch DOWN as if sniffing
      // the floor. The DogController normally tracks the player; we override
      // by setting headPitch directly each frame. Audio sniffs fire at
      // ~0.7 s intervals while sniffing — the rapid breathy puffs are the
      // strongest "this is a real dog with a real nose" cue.
      if (sniffActive) {
        if (t > sniffEndsAt) {
          sniffActive = false;
        } else {
          // Gentle head bob like a real dog scanning a scent trail
          dogCtrl.headPitch = 0.55 + Math.sin(t * 5) * 0.08;
          // Sniff audio every ~0.8 s
          if (!dogCtrl._lastSniffAt || t - dogCtrl._lastSniffAt > 0.8) {
            if (window.PhobiaAudio && window.PhobiaAudio.dogSniff) {
              try {
                window.PhobiaAudio.dogSniff(0.55, {
                  x: dog.position.x,
                  y: dog.position.y + 0.4,
                  z: dog.position.z,
                });
              } catch {}
            }
            dogCtrl._lastSniffAt = t;
          }
        }
      }

      // ---- Heart particles ----
      for (let i = hearts.length - 1; i >= 0; i--) {
        const h = hearts[i];
        h.userData.life -= d;
        h.position.x += h.userData.vx * d;
        h.position.y += h.userData.vy * d;
        h.material.opacity = Math.max(0, h.userData.life);
        if (h.userData.life <= 0) {
          scene.remove(h); h.material.dispose();
          hearts.splice(i, 1);
        }
      }

      // ---- Item physics + fetch state machine ----
      // Windup phase: animate the item in the user's hand toward release
      if (item && item.state === "windup") {
        tickWindup(d);
      }
      if (item && fetchPhase === "flying" && item.state === "flying") {
        const m = item.mesh;
        item.vel.y -= 9.8 * d;
        m.position.x += item.vel.x * d;
        m.position.y += item.vel.y * d;
        m.position.z += item.vel.z * d;
        // Spin while flying
        m.rotation.x += d * 6;
        m.rotation.z += d * 4;
        // Floor at y=-0.94 (top of floor at y=-1 + ball radius)
        const floorY = item.kind === "ball" ? -0.90 : -0.94;
        if (m.position.y <= floorY) {
          m.position.y = floorY;
          if (item.kind === "ball" && item.bounces < 2 && Math.abs(item.vel.y) > 1.5) {
            // Ball bounces twice with energy loss
            item.vel.y = -item.vel.y * 0.55;
            item.vel.x *= 0.7; item.vel.z *= 0.7;
            item.bounces++;
          } else {
            // Settled — start the fetch leg
            item.vel.set(0, 0, 0);
            fetchPhase = "toItem";
            dogCtrl.walkTo(m.position.x, m.position.z);
          }
        }
      }
      if (fetchPhase === "toItem" && item && item.mesh.parent === scene) {
        const dx = dog.position.x - item.mesh.position.x;
        const dz = dog.position.z - item.mesh.position.z;
        if (Math.hypot(dx, dz) < 0.5) {
          // Pick up — re-parent to jaw
          scene.remove(item.mesh);
          dog.userData.parts.jaw.add(item.mesh);
          const k = 1 / (dog.scale.x || 1);
          item.mesh.position.set(0, -0.005, (item.kind === "ball" ? 0.10 : 0.08) * k);
          item.mesh.scale.setScalar(k);
          fetchPhase = "carrying";
          setTimeout(() => {
            if (fetchPhase !== "carrying") return;
            const tx = camera.position.x;
            const tz = camera.position.z + 0.6;
            dogCtrl.walkTo(tx, tz);
            fetchPhase = "returning";
          }, 250);
        }
      }
      if (fetchPhase === "returning" && item) {
        const dx = dog.position.x - camera.position.x;
        const dz = dog.position.z - camera.position.z;
        if (Math.hypot(dx, dz) < 1.4) {
          // Drop at the player's feet
          const world = new THREE.Vector3();
          dog.userData.parts.jaw.getWorldPosition(world);
          dog.userData.parts.jaw.remove(item.mesh);
          scene.add(item.mesh);
          item.mesh.scale.setScalar(1);
          item.mesh.position.set(world.x, item.kind === "ball" ? -0.90 : -0.94, world.z + 0.2);
          fetchPhase = "dropped";
          dogCtrl.sit();
          // If it was a treat, the dog "eats" it (mesh disappears)
          if (item.kind === "treat") {
            setTimeout(() => {
              if (item) {
                scene.remove(item.mesh);
                item.mesh.geometry.dispose(); item.mesh.material.dispose();
                item = null; fetchPhase = "idle";
                dogCtrl.eat();
              }
            }, 600);
            bumpTrust(0.10, "Good. That builds the bond.");
          } else {
            // Ball stays; user can throw again
            bumpTrust(0.07, "Good fetch.");
            setTimeout(() => {
              if (item && fetchPhase === "dropped") {
                scene.remove(item.mesh);
                item.mesh.geometry.dispose(); item.mesh.material.dispose();
                item = null; fetchPhase = "idle";
              }
            }, 4000);
          }
        }
      }

      // ---- Pet pulse → trust gain (passive over time when very close) ----
      if (petPulse > 0.5 && Math.random() < 0.04) {
        // While actively petting, occasionally bump trust + spawn a heart
        bumpTrust(0.005);
      }

      // ---- Bark scheduling (mood-aware) ----
      // Trust reduces both the spontaneous bark rate and the bark loudness,
      // which is the main "the dog likes me" auditory signal.
      const trustQuiet = 1 - Math.min(0.7, trust * 0.7);
      // Bark from the dog's actual world position (HRTF panning) with a
      // directional cone matching the dog's facing direction — so a bark
      // from a dog turned away from you sounds muffled, and a bark with
      // the dog locked on you is sharp and clear.
      const dogYaw = dog.rotation.y;
      const dogPos = { x: dog.position.x, y: dog.position.y + 0.7, z: dog.position.z };
      // Default forward at yaw=0 is -z; rotation by yaw θ → (sin θ, 0, -cos θ)
      const dogForward = { x: Math.sin(dogYaw), y: 0, z: -Math.cos(dogYaw) };
      const barkOpts = { forward: dogForward, coneInnerAngle: 80, coneOuterAngle: 220, coneOuterGain: 0.30 };
      if (intensity === "barking" && t > nextSpontaneousBark) {
        dogCtrl.bark();
        if (window.PhobiaAudio) window.PhobiaAudio.bark(1.0 * trustQuiet, dogPos, barkOpts);
        // Discrete fear pulse — barks are the dog scene's "panic spikes"
        if (window.PhobiaFear) window.PhobiaFear.pulseEvent(0.6);
        nextSpontaneousBark = t + (1.5 + Math.random() * 1.5) / trustQuiet;
      }
      if (intensity === "alert" && t > nextSpontaneousBark) {
        dogCtrl.bark();
        if (window.PhobiaAudio) window.PhobiaAudio.bark(0.7 * trustQuiet, dogPos, barkOpts);
        if (window.PhobiaFear) window.PhobiaFear.pulseEvent(0.35);
        nextSpontaneousBark = t + (6 + Math.random() * 6) / trustQuiet;
      } else if (intensity === "alert" && nextSpontaneousBark === Infinity) {
        nextSpontaneousBark = t + 6;
      }
    },
    dispose() {
      // Clean up listeners + HUD when the scene unmounts
      try { window.removeEventListener("keydown", onKey); } catch {}
      const stage = document.getElementById("stage");
      if (stage) {
        const hud = stage.querySelector(".trust-hud");
        if (hud) hud.remove();
      }
      // Cancel any pending setTimeouts so they don't fire against the disposed dog
      try { dogTimers.forEach(id => clearTimeout(id)); } catch {}
      clearItem();
    },
  };
}

// ---------- Spiders ----------
function setupSpiders(scene, camera, level) {
  const size = level.size;

  scene.background = new THREE.Color(0x2a2a30);
  scene.fog = new THREE.Fog(0x2a2a30, 8, 28);

  const key = new THREE.DirectionalLight(0xd0d8e0, 1.4);
  key.position.set(3, 8, 2);
  key.target.position.set(0, 0, -3);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.left = -8;  key.shadow.camera.right = 8;
  key.shadow.camera.top = 8;    key.shadow.camera.bottom = -8;
  scene.add(key); scene.add(key.target);
  scene.add(new THREE.AmbientLight(0x404555, 0.7));

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.MeshStandardMaterial({ map: makeTileTexture(), roughness: 0.9 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1;
  floor.receiveShadow = true;
  scene.add(floor);

  const wall = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 15),
    new THREE.MeshStandardMaterial({ color: 0x3a3a40, roughness: 0.95 })
  );
  wall.position.set(0, 4, -8);
  wall.receiveShadow = true;

  // Dust motes drifting in the room — they catch the key light and read as
  // "real air", grounding the scene as a physical room instead of a void.
  // Atmosphere module is purely additive, so unmount comes for free with
  // the scene's standard cleanup (scene.traverse + dispose).
  let _dust = null;
  if (window.PhobiaAtmosphere && window.PhobiaAtmosphere.createDustMotes) {
    _dust = window.PhobiaAtmosphere.createDustMotes({
      count: 180, bounds: { x: 12, y: 4, z: 14 },
      origin: [0, 1, -3], color: 0xfff5dd, size: 0.05, opacity: 0.45,
    });
    if (_dust) scene.add(_dust);
  }
  scene.add(wall);

  // Build spider — chitin PBR materials when available so the body picks up
  // visible bristle / micro-pebble normal detail under the room light, with
  // a graceful fallback to flat MeshStandard for first-paint resilience.
  const spider = new THREE.Group();
  const black = (window.PhobiaRealism && window.PhobiaRealism.chitinMaterial)
    ? window.PhobiaRealism.chitinMaterial("#0a0a0a")
    : new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.45, metalness: 0.05 });
  const blackish = (window.PhobiaRealism && window.PhobiaRealism.chitinMaterial)
    ? window.PhobiaRealism.chitinMaterial("#14080a")
    : new THREE.MeshStandardMaterial({ color: 0x14080a, roughness: 0.5 });

  // Abdomen
  const abdomen = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 18), black);
  abdomen.scale.set(1.0, 0.8, 1.3);
  abdomen.position.z = -0.3;
  abdomen.position.y = 0.05;
  abdomen.castShadow = true;
  spider.add(abdomen);

  // Hourglass-ish marking on top
  const mark = new THREE.Mesh(
    new THREE.SphereGeometry(0.51, 24, 18, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshStandardMaterial({ color: 0x4a0808, transparent: true, opacity: 0.55 })
  );
  mark.scale.copy(abdomen.scale);
  mark.position.copy(abdomen.position);
  spider.add(mark);

  // Cephalothorax
  const ceph = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 12), blackish);
  ceph.scale.set(0.95, 0.7, 1.1);
  ceph.position.set(0, 0, 0.35);
  ceph.castShadow = true;
  spider.add(ceph);

  // 8 eyes — subtle dark eyes (no horror-red glow). The user is observing,
  // not being menaced. Eyes catch a faint highlight from the room light.
  const eyeMat = new THREE.MeshStandardMaterial({
    color: 0x222222, emissive: 0x331111, emissiveIntensity: 0.15, roughness: 0.3,
  });
  const eyePositions = [
    [-0.10, 0.16, 0.55], [0.10, 0.16, 0.55],
    [-0.18, 0.10, 0.48], [0.18, 0.10, 0.48],
    [-0.06, 0.18, 0.52], [0.06, 0.18, 0.52],
    [-0.14, 0.05, 0.52], [0.14, 0.05, 0.52],
  ];
  for (const [x, y, z] of eyePositions) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 10), eyeMat);
    eye.position.set(x, y, z);
    spider.add(eye);
  }

  // Pedipalps (small front feelers)
  for (const sx of [-1, 1]) {
    const palp = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.25, 6), black);
    palp.position.set(sx * 0.12, -0.02, 0.65);
    palp.rotation.z = sx * 0.6;
    palp.rotation.x = -0.3;
    spider.add(palp);
  }
  // Fangs
  for (const sx of [-1, 1]) {
    const fang = new THREE.Mesh(new THREE.ConeGeometry(0.022, 0.09, 6), black);
    fang.position.set(sx * 0.06, -0.06, 0.62);
    fang.rotation.x = Math.PI;
    spider.add(fang);
  }

  // 8 legs — 4 each side, two segments each, with a "knee" bend
  const legs = [];
  const legLayout = [
    { z: -0.25, spread: 0.55 },
    { z: -0.05, spread: 0.85 },
    { z:  0.15, spread: 0.85 },
    { z:  0.35, spread: 0.55 },
  ];
  for (const side of [-1, 1]) {
    for (let li = 0; li < 4; li++) {
      const cfg = legLayout[li];
      const legGroup = new THREE.Group();
      legGroup.position.set(side * 0.18, 0.02, cfg.z);

      // Femur — angles up from body
      const femur = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.025, 0.55, 8), black);
      femur.castShadow = true;
      femur.position.set(side * 0.28, 0.18, 0);
      femur.rotation.z = side * Math.PI / 4;
      legGroup.add(femur);

      // Tibia — angles down to floor
      const tibia = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.015, 0.7, 8), black);
      tibia.castShadow = true;
      tibia.position.set(side * cfg.spread, -0.15, 0);
      tibia.rotation.z = side * Math.PI / 8;
      legGroup.add(tibia);

      // Tarsus — small foot tip
      const tarsus = new THREE.Mesh(new THREE.CylinderGeometry(0.014, 0.005, 0.25, 6), black);
      tarsus.position.set(side * (cfg.spread + 0.07), -0.45, 0);
      tarsus.rotation.z = side * Math.PI / 14;
      legGroup.add(tarsus);

      spider.add(legGroup);
      legs.push({ group: legGroup, idx: li, side });
    }
  }

  // Place spider
  spider.scale.setScalar(0.55 + size * 0.7);
  const distance = 8.2 - size * 7.2;
  spider.position.set(0, -0.7, -distance);
  scene.add(spider);

  // Camera looks down at the floor
  camera.fov = 55;
  camera.updateProjectionMatrix();
  const spiderPitch = Math.atan2(-(1.0 + 0.6), distance);
  const minZ = -distance + 0.6;

  // Crawl-toward-camera state for the closest rung — short bursts of forward motion
  // that retreat slightly, mimicking how a spider actually moves.
  const baseZ = spider.position.z;
  let crawlStart = 4 + Math.random() * 3;
  let crawlPhase = 0;
  let spiderControls = null;
  let scriptedGesture = null;   // overrides the default "rest" gesture briefly
  let scriptedGestureUntil = 0;

  // ----- Glass jar (humane catch) -----
  // The user can lower a real glass jar over the spider. The spider stays
  // calm inside it (no panic-fighting). After 2 seconds, the jar lifts
  // and the spider has been "released outside" — it's gone, the user wins.
  // Clicking the floor near the spider also lowers the jar there.
  let jarMode = false;
  let jar = null;
  let jarPhase = "idle"; // idle | falling | held | lifting
  let jarLifeT = 0;
  function buildJar() {
    const g = new THREE.Group();
    const glass = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.40, 0.85, 24, 1, true),
      new THREE.MeshStandardMaterial({
        color: 0xc8e6f0, transparent: true, opacity: 0.30, side: THREE.DoubleSide,
        roughness: 0.05, metalness: 0.5,
      })
    );
    glass.position.y = 0.42;
    g.add(glass);
    const top = new THREE.Mesh(
      new THREE.CircleGeometry(0.45, 24),
      new THREE.MeshStandardMaterial({
        color: 0xc8e6f0, transparent: true, opacity: 0.30, side: THREE.DoubleSide,
        roughness: 0.05, metalness: 0.5,
      })
    );
    top.rotation.x = -Math.PI / 2;
    top.position.y = 0.85;
    g.add(top);
    return g;
  }
  function dropJarAt(x, z) {
    if (jarPhase !== "idle") return;
    if (!jar) { jar = buildJar(); scene.add(jar); }
    jar.position.set(x, 4.0, z);    // start above the floor, drops in
    jarPhase = "falling";
    jarLifeT = 0;
  }

  // ----- Click-on-spider / click-on-floor (mouse / touch) -----
  // When in "jar mode" (the user clicked the Glass jar button) the next
  // click drops the jar. Otherwise click on the spider gently nudges it
  // away (the original brush behaviour, kept as a fallback).
  const spRaycaster = new THREE.Raycaster();
  const spMouse = new THREE.Vector2();
  let spCanvasDom = null;
  function spPickWorld(clientX, clientY, dom) {
    const rect = dom.getBoundingClientRect();
    spMouse.x = ((clientX - rect.left) / rect.width)  * 2 - 1;
    spMouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    spRaycaster.setFromCamera(spMouse, camera);
    return spRaycaster.intersectObject(scene, true)[0] || null;
  }
  let spDownX = 0, spDownY = 0, spDownT = 0, spDownPid = -1;
  function bindSpiderClicks() {
    if (spCanvasDom) return;
    spCanvasDom = document.querySelector("#stage canvas");
    if (!spCanvasDom) return;
    spCanvasDom.addEventListener("pointerdown", (e) => {
      spDownX = e.clientX; spDownY = e.clientY;
      spDownT = performance.now(); spDownPid = e.pointerId;
    });
    spCanvasDom.addEventListener("pointerup", (e) => {
      if (e.pointerId !== spDownPid) return;
      const dx = e.clientX - spDownX, dy = e.clientY - spDownY;
      if (Math.hypot(dx, dy) > 6 || performance.now() - spDownT > 350) return;
      const hit = spPickWorld(e.clientX, e.clientY, spCanvasDom);
      if (!hit) return;
      // Drop the jar over wherever the user clicked (preferring the spider)
      let p = hit.object, hitSpider = false;
      while (p) { if (p === spider) { hitSpider = true; break; } p = p.parent; }
      if (jarMode || hitSpider) {
        const tx = hitSpider ? spider.position.x : hit.point.x;
        const tz = hitSpider ? spider.position.z : hit.point.z;
        dropJarAt(tx, tz);
        if (window.PhobiaVoice) window.PhobiaVoice.speak("Jar down. It's contained. Slow breath.");
        jarMode = false;
      }
    });
  }
  setTimeout(bindSpiderClicks, 60);

  function wireSpiderCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="spiders"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const c = spiderControls; if (!c && btn.dataset.cmd !== "jar") return;
        switch (btn.dataset.cmd) {
          case "closer":
            c.position.z = Math.max(c.opts.bounds.minZ + 0.2, c.position.z - 1.0);
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Closer. It is still. You are still.");
            break;
          case "back":
            c.position.z = Math.min(c.opts.bounds.maxZ - 0.2, c.position.z + 1.0);
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Stepped back. Notice the relief. Then notice it pass.");
            break;
          case "focus": {
            const dx = spider.position.x - c.position.x;
            const dz = spider.position.z - c.position.z;
            const dy = spider.position.y - c.position.y;
            const targetYaw = Math.atan2(dx, dz);
            const targetPitch = Math.atan2(dy, Math.hypot(dx, dz));
            const fromY = c.yaw, fromP = c.pitch;
            let k = 0;
            const id = setInterval(() => {
              k += 0.05;
              if (k >= 1) { c.yaw = targetYaw; c.pitch = targetPitch; clearInterval(id); return; }
              c.yaw   = fromY + (targetYaw - fromY) * k;
              c.pitch = fromP + (targetPitch - fromP) * k;
            }, 16);
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Look at it. Really look. The fear will rise. Then settle.");
            break;
          }
          case "jar":
            // Arms the next click to lower the jar (or drops it on the spider directly)
            if (jarPhase !== "idle") return;
            jarMode = true;
            // If they clicked the button while reasonably close, just drop directly
            if (c) {
              const dx = spider.position.x - c.position.x;
              const dz = spider.position.z - c.position.z;
              if (Math.hypot(dx, dz) < 4) {
                dropJarAt(spider.position.x, spider.position.z);
                jarMode = false;
                if (window.PhobiaVoice) window.PhobiaVoice.speak("Jar down. It's contained. Slow breath.");
              } else if (window.PhobiaVoice) {
                window.PhobiaVoice.speak("Click the spider to lower the jar.");
              }
            }
            break;
        }
      };
    });
  }
  setTimeout(wireSpiderCmds, 0);

  return {
    controls: {
      mode: "walkable",
      // Spawn near the doorway, well back from the spider. Approach is the
      // exposure — the user has to step toward the spider, not start on top
      // of it. First-person locked: spider phobia is an intimate fear (the
      // spider is small, close, in your space) — third-person dilutes it.
      initialPos: [0, 1.0, 4.0],
      initialYaw: 0,
      initialPitch: spiderPitch * 0.4,
      bounds: { minX: -3, maxX: 3, minZ: minZ, maxZ: 5 },
      speed: 1.4,
      lookSpeed: 0.0035,
      cameraModeLocked: "fp",
    },
    surface: "hard",   // tile floor in the spider room
    interact(controls) {
      if (scriptedGesture && performance.now() < scriptedGestureUntil) {
        return { gesture: scriptedGesture, hint: "" };
      }
      if (jarPhase !== "idle") {
        return { gesture: "rest", hint: "the spider is contained — wait for release" };
      }
      if (controls) {
        const dx = spider.position.x - controls.position.x;
        const dz = spider.position.z - controls.position.z;
        if (Math.hypot(dx, dz) < 4) {
          return {
            gesture: "rest",
            hint: jarMode ? "click the spider to lower the jar" : "click the spider to capture it under a jar",
          };
        }
      }
      return { gesture: "rest" };
    },
    // Generic click — pickWorld already handles the rich behaviour. No-op
    // here so we don't double-trigger the jar drop.
    onClick(controls) {},
    update(t, controls, dt) {
      if (controls) spiderControls = controls;
      const d = dt || 0.016;
      // ---- Feed fear state from proximity to the spider ----
      // Without this, the in-zone hold timer would count wall-clock for the
      // spider scene since fear never climbs above 25.
      if (controls && window.PhobiaFear) {
        const dxs = controls.position.x - spider.position.x;
        const dzs = controls.position.z - spider.position.z;
        const distS = Math.hypot(dxs, dzs);
        // Closeness rises from 0 at 5m to 1 at 1m
        const closeness = Math.max(0, Math.min(1, 1 - (distS - 1.0) / 4.0));
        window.PhobiaFear.setInput("proximity", closeness * 0.85);
        // Gaze: looking down toward the spider (it's small + on the floor)
        const lookDownAmt = Math.max(0, Math.min(1, (-controls.pitch - 0.1) / 0.8));
        window.PhobiaFear.setInput("gaze", lookDownAmt * (closeness > 0.3 ? 0.8 : 0.3));
        const isAway = distS > 4.0;
        window.PhobiaFear.bumpAvoidance(d, isAway);
      }
      // ---- Glass jar physics ----
      if (jar && jarPhase === "falling") {
        jarLifeT += d;
        // Ease the jar down to floor over ~0.5 s
        const k = Math.min(1, jarLifeT / 0.5);
        const yStart = 4.0, yEnd = -0.95;
        jar.position.y = yStart + (yEnd - yStart) * (1 - Math.pow(1 - k, 2));
        if (k >= 1) {
          jar.position.y = yEnd;
          jarPhase = "held";
          jarLifeT = 0;
          // Spider position freezes inside the jar
          spider.position.x = jar.position.x;
          spider.position.z = jar.position.z;
        }
      } else if (jar && jarPhase === "held") {
        jarLifeT += d;
        // Hold for 2 seconds, then "release" (lift the jar + remove the spider)
        if (jarLifeT > 2.0) {
          jarPhase = "lifting";
          jarLifeT = 0;
          if (window.PhobiaVoice) window.PhobiaVoice.speak("Released outside. You did that calmly.");
        }
      } else if (jar && jarPhase === "lifting") {
        jarLifeT += d;
        const k = Math.min(1, jarLifeT / 0.6);
        // Spider fades out as the "user takes it outside" — opacity controlled
        // via traversing materials. Implemented as a vertical lift + scale-down.
        jar.position.y = -0.95 + k * 5.0;
        spider.scale.setScalar((0.55 + size * 0.7) * (1 - k));
        if (k >= 1) {
          // Tear down jar; spider is gone for the rest of this rung
          scene.remove(jar);
          jar.traverse(o => {
            if (o.geometry) o.geometry.dispose();
            if (o.material) o.material.dispose();
          });
          jar = null;
          jarPhase = "idle";
          // Move spider far off-screen so the rest of the loop doesn't tick it
          spider.position.set(0, -50, 0);
        }
      }
      // Stronger leg twitch at close range
      const twitchAmp = 0.025 + size * 0.04;
      legs.forEach((leg, i) => {
        leg.group.rotation.y = Math.sin(t * (2.5 + size * 2) + i * 0.7) * twitchAmp;
        leg.group.rotation.x = Math.cos(t * (1.7 + size * 1.5) + i) * twitchAmp * 0.5;
      });
      spider.position.y = -0.7 + Math.sin(t * 1.3) * 0.006;
      eyeMat.emissiveIntensity = 0.12 + Math.sin(t * (1.5 + size * 2)) * 0.08;
      // Spider tracks the user's position with its body — at close range
      // the cephalothorax actively orients toward the camera so the user
      // *feels* watched. Real arachnophobia trigger.
      if (controls) {
        const dxS = controls.position.x - spider.position.x;
        const dzS = controls.position.z - spider.position.z;
        const distS = Math.hypot(dxS, dzS);
        if (distS > 0.3) {
          const targetYaw = Math.atan2(dxS, dzS);
          // Damped follow so the body turn looks natural, not snappy
          const yawDelta = (targetYaw - spider.rotation.y + Math.PI * 3) % (Math.PI * 2) - Math.PI;
          spider.rotation.y += yawDelta * Math.min(1, d * 1.2 * (size * 0.7 + 0.3));
        }
      }
      // Drift the dust motes — keeps the room feeling lived-in.
      if (_dust && _dust.userData && _dust.userData.update) {
        _dust.userData.update(d, t);
      }

      // Highest rungs: a sudden short crawl forward, then a small retreat
      if (size > 0.7) {
        if (crawlPhase === 0 && t > crawlStart) {
          crawlPhase = 0.0001;
        }
        if (crawlPhase > 0) {
          crawlPhase += 0.012;
          const k = Math.min(1, crawlPhase);
          // ease-in out forward, then tiny backstep
          const fwd = k < 0.7 ? (k / 0.7) : (1 - (k - 0.7) / 0.3 * 0.25);
          spider.position.z = baseZ + fwd * 0.4 * size;
          // Make legs pump while crawling
          legs.forEach((leg, i) => {
            leg.group.position.y = Math.sin(crawlPhase * 18 + i) * 0.08 * size;
          });
          if (crawlPhase > 1) {
            crawlPhase = 0;
            crawlStart = t + 4 + Math.random() * 5;
            legs.forEach(leg => leg.group.position.y = 0);
          }
        }
      }
    },
  };
}

// ---------- Enclosed ----------
function setupEnclosed(scene, camera, level) {
  const size = level.size; // 1.0 = spacious, 0.15 = MRI-tight

  scene.background = new THREE.Color(0x07070b);

  const roomW = 1.5 + size * 8;
  const roomD = 2.0 + size * 12;
  const roomH = 1.4 + size * 2.5;

  const main = new THREE.PointLight(0xffe0a0, 1.6, 22, 2);
  main.position.set(0, roomH / 2 - 0.2, 0);
  main.castShadow = true;
  main.shadow.mapSize.set(1024, 1024);
  scene.add(main);
  scene.add(new THREE.AmbientLight(0x202028, 0.5));

  const wallMat = new THREE.MeshStandardMaterial({ map: makeWallTexture(), color: 0x6a6a70, roughness: 0.95 });
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3f, roughness: 0.85 });
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x4a4a52, roughness: 0.9 });

  // Build room
  const room = new THREE.Group();
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -roomH / 2;
  floor.receiveShadow = true;
  room.add(floor);
  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), ceilMat);
  ceiling.rotation.x = Math.PI / 2;
  ceiling.position.y = roomH / 2;
  ceiling.receiveShadow = true;
  room.add(ceiling);
  const back = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
  back.position.z = -roomD / 2;
  back.receiveShadow = true;
  room.add(back);
  const front = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
  front.rotation.y = Math.PI;
  front.position.z = roomD / 2;
  front.receiveShadow = true;
  room.add(front);
  const left = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
  left.rotation.y = Math.PI / 2;
  left.position.x = -roomW / 2;
  left.receiveShadow = true;
  room.add(left);
  const right = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
  right.rotation.y = -Math.PI / 2;
  right.position.x = roomW / 2;
  right.receiveShadow = true;
  room.add(right);
  scene.add(room);

  // Light fixture (the bulb)
  const fixture = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.12, 0.06, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffd0, emissive: 0xffe0a0, emissiveIntensity: 1 })
  );
  fixture.position.set(0, roomH / 2 - 0.05, 0);
  scene.add(fixture);

  // Door — visible at any size (smaller rooms have a smaller door, but always
  // a door so the user can see the way out when feeling claustrophobic).
  // Pivoted at its hinge edge so it swings open/closed.
  let doorPivot = null;
  {
    doorPivot = new THREE.Group();
    // Pivot point on the LEFT edge of the door
    doorPivot.position.set(-0.4, -roomH / 2 + 0.85, -roomD / 2 + 0.03);
    const door = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 1.7, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x6a3f20, roughness: 0.7 })
    );
    // Offset the door so its left edge sits at the pivot's origin
    door.position.set(0.4, 0, 0);
    door.castShadow = true;
    doorPivot.add(door);
    const handle = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 12, 8),
      new THREE.MeshStandardMaterial({ color: 0xddc060, metalness: 0.8, roughness: 0.3 })
    );
    handle.position.set(0.7, 0, 0.04);
    doorPivot.add(handle);
    scene.add(doorPivot);
  }
  let doorTargetAngle = 0;

  // ----- Elevator-style call panel on the wall (mid-rungs only) -----
  // For the elevator + closet rungs (0.30 < size < 0.85), add a real button
  // panel beside the door. Floor buttons light up when clicked, the door
  // briefly opens after a short delay, and an indicator light shows the
  // current floor — gives the user something tangible to do while inside
  // the small room.
  let elevatorPanel = null;
  let elevatorButtons = [];
  let currentFloor = 1;
  let nextFloor = 1;
  let floorChangeT = 0;
  if (size > 0.30 && size <= 0.80) {
    elevatorPanel = new THREE.Group();
    // Backplate
    const backplate = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.55, 0.02),
      new THREE.MeshStandardMaterial({ color: 0xc8ccd2, metalness: 0.6, roughness: 0.3 })
    );
    elevatorPanel.add(backplate);
    // Floor indicator window at the top (small black rectangle with the digit)
    const indicator = new THREE.Mesh(
      new THREE.PlaneGeometry(0.12, 0.06),
      new THREE.MeshBasicMaterial({ color: 0x141416 })
    );
    indicator.position.set(0, 0.20, 0.012);
    elevatorPanel.add(indicator);
    // The digit itself (canvas texture so we can update it dynamically)
    const digitCanvas = document.createElement("canvas");
    digitCanvas.width = 64; digitCanvas.height = 32;
    const digitTex = new THREE.CanvasTexture(digitCanvas);
    digitTex.colorSpace = THREE.SRGBColorSpace;
    const digit = new THREE.Mesh(
      new THREE.PlaneGeometry(0.10, 0.05),
      new THREE.MeshBasicMaterial({ map: digitTex, transparent: true })
    );
    digit.position.set(0, 0.20, 0.013);
    elevatorPanel.add(digit);
    function paintDigit(num) {
      const ctx = digitCanvas.getContext("2d");
      ctx.fillStyle = "#141416";
      ctx.fillRect(0, 0, 64, 32);
      ctx.fillStyle = "#ff8a3a";
      ctx.font = "bold 26px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(num), 32, 17);
      digitTex.needsUpdate = true;
    }
    paintDigit(currentFloor);
    elevatorPanel.userData = { paintDigit };

    // Six floor buttons in a 2×3 grid below the indicator
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 2; col++) {
        const floor = row * 2 + col + 1;
        const btnGroup = new THREE.Group();
        const btn = new THREE.Mesh(
          new THREE.CylinderGeometry(0.025, 0.025, 0.012, 16),
          new THREE.MeshStandardMaterial({
            color: 0x2a2c30, metalness: 0.7, roughness: 0.4,
            emissive: 0x000000, emissiveIntensity: 0,
          })
        );
        btn.rotation.x = Math.PI / 2;
        btnGroup.add(btn);
        // Number label on top of the button — canvas texture
        const labelCanvas = document.createElement("canvas");
        labelCanvas.width = 32; labelCanvas.height = 32;
        const lctx = labelCanvas.getContext("2d");
        lctx.fillStyle = "#ffffff";
        lctx.font = "bold 18px sans-serif";
        lctx.textAlign = "center";
        lctx.textBaseline = "middle";
        lctx.fillText(String(floor), 16, 18);
        const labelTex = new THREE.CanvasTexture(labelCanvas);
        labelTex.colorSpace = THREE.SRGBColorSpace;
        const label = new THREE.Mesh(
          new THREE.PlaneGeometry(0.04, 0.04),
          new THREE.MeshBasicMaterial({ map: labelTex, transparent: true })
        );
        label.position.set(0, 0, 0.008);
        btnGroup.add(label);
        btnGroup.position.set(-0.038 + col * 0.076, 0.05 - row * 0.08, 0.012);
        btnGroup.userData.floor = floor;
        btnGroup.userData.btn = btn;
        elevatorPanel.add(btnGroup);
        elevatorButtons.push(btnGroup);
      }
    }
    // Position the panel on the right wall, next to the door
    elevatorPanel.position.set(roomW / 2 - 0.05, 0.0, -roomD / 2 + 0.5);
    elevatorPanel.rotation.y = -Math.PI / 2;
    scene.add(elevatorPanel);
  }

  // ---------- MRI tube (smallest rung only) ----------
  // The bottom rung is "MRI scanner" — a tube the user lies inside. Only
  // build it for the smallest size to avoid wasting geometry on bigger
  // rooms. Was previously orphan code with a mismatched brace, which
  // closed setupEnclosed prematurely and made the whole 3D scene fall
  // back to SVG. Now properly wrapped in a single if-block.
  if (size <= 0.20) {
    const tube = new THREE.Mesh(
      new THREE.CylinderGeometry(0.42, 0.42, 3.2, 32, 1, true),
      new THREE.MeshStandardMaterial({
        color: 0xeeeeee, side: THREE.DoubleSide, roughness: 0.4,
      })
    );
    tube.rotation.x = Math.PI / 2;
    tube.position.set(0, 0, -0.6);
    scene.add(tube);
    // ring detail
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.45, 0.08, 12, 32),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.4, roughness: 0.5 })
    );
    ring.rotation.y = Math.PI / 2;
    ring.position.set(0, 0, 0.95);
    scene.add(ring);
  }

  // Dust motes
  const N = 280;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * roomW * 0.95;
    positions[i * 3 + 1] = (Math.random() - 0.5) * roomH * 0.95;
    positions[i * 3 + 2] = (Math.random() - 0.5) * roomD * 0.95;
  }
  const dustGeo = new THREE.BufferGeometry();
  dustGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const dust = new THREE.Points(
    dustGeo,
    new THREE.PointsMaterial({
      color: 0xfff5b0, size: 0.018, transparent: true, opacity: 0.55,
      sizeAttenuation: true, depthWrite: false,
    })
  );
  scene.add(dust);

  camera.fov = 70 - size * 8;
  camera.updateProjectionMatrix();

  let flickerCooldown = 0;

  // Walking bounds: stay inside the room with a small buffer
  const buffer = 0.4;
  const wb = roomW / 2 - buffer;
  const db = roomD / 2 - buffer;

  let enclosedControls = null;
  let lightOn = true;
  function wireEnclosedCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="enclosed"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        switch (btn.dataset.cmd) {
          case "open":
            doorTargetAngle = -1.4;     // swings outward
            if (window.PhobiaAudio) window.PhobiaAudio.doorCreak();
            if (window.PhobiaVoice) window.PhobiaVoice.speak("The door is open. The air is moving. You are not stuck.");
            break;
          case "close":
            doorTargetAngle = 0;
            if (window.PhobiaAudio) window.PhobiaAudio.doorCreak();
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Closed. The air in here is the same air as outside.");
            break;
          case "touch":
            if (window.PhobiaVoice) window.PhobiaVoice.speak("Solid. Still. Your hand is real. The walls are real and they are not moving.");
            break;
          case "switch":
            // Toggle the main light
            lightOn = !lightOn;
            if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) window.PhobiaAudio.indicatorClick();
            if (window.PhobiaVoice) {
              window.PhobiaVoice.speak(lightOn ? "Lights on. The room is the room." : "Lights off. Listen. The walls do not move when you can't see them.");
            }
            break;
        }
      };
    });
  }
  setTimeout(wireEnclosedCmds, 0);

  // ----- Click on the door knob to open it (real human action) -----
  // The most empowering thing in a small space is reaching for the door.
  // Click directly on the door (or the brass handle) and it swings open.
  // Click again to close it.
  const eRaycaster = new THREE.Raycaster();
  const eMouse = new THREE.Vector2();
  let eCanvas = null;
  let eDownX = 0, eDownY = 0, eDownT = 0, eDownPid = -1;
  function bindDoorClick() {
    eCanvas = document.querySelector("#stage canvas");
    if (!eCanvas) return;
    eCanvas.addEventListener("pointerdown", (e) => {
      eDownX = e.clientX; eDownY = e.clientY;
      eDownT = performance.now(); eDownPid = e.pointerId;
    });
    eCanvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== eDownPid) return;
      const dx = e.clientX - eDownX, dy = e.clientY - eDownY;
      if (Math.hypot(dx, dy) > 6 || performance.now() - eDownT > 350) return;
      const rect = eCanvas.getBoundingClientRect();
      eMouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      eMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      eRaycaster.setFromCamera(eMouse, camera);
      // First: did the user click an elevator button?
      if (elevatorPanel) {
        const buttonHits = eRaycaster.intersectObjects(elevatorButtons, true);
        if (buttonHits.length > 0) {
          // Walk up the parent chain to find the btnGroup with userData.floor
          let g = buttonHits[0].object;
          while (g && g.userData.floor === undefined) g = g.parent;
          if (g && g.userData.floor) {
            const floor = g.userData.floor;
            // Light the button (orange emissive) and set the next-floor target
            g.userData.btn.material.emissive.setHex(0xff8a3a);
            g.userData.btn.material.emissiveIntensity = 1.0;
            nextFloor = floor;
            floorChangeT = 2.5;       // takes ~2.5 s to reach the floor
            if (window.PhobiaAudio && window.PhobiaAudio.indicatorClick) {
              try { window.PhobiaAudio.indicatorClick(); } catch {}
            }
            if (window.PhobiaFX && window.PhobiaFX.firePulse) window.PhobiaFX.firePulse();
            if (window.PhobiaVoice) {
              window.PhobiaVoice.speak(`Floor ${floor}. The lift is moving. Breathe through the small space.`);
            }
            return;
          }
        }
      }
      // Otherwise: door click toggle
      const hits = eRaycaster.intersectObject(doorPivot, true);
      if (hits.length === 0) return;
      // Toggle door state on click
      doorTargetAngle = (doorTargetAngle === 0) ? -1.4 : 0;
      const doorPos = doorPivot.getWorldPosition(new THREE.Vector3());
      if (window.PhobiaAudio) window.PhobiaAudio.doorCreak({ x: doorPos.x, y: doorPos.y, z: doorPos.z });
      if (window.PhobiaFX && window.PhobiaFX.firePulse) window.PhobiaFX.firePulse();
      if (window.PhobiaVoice) {
        window.PhobiaVoice.speak(doorTargetAngle === 0
          ? "Closed. The air in here is the same air as outside."
          : "The door is open. Notice the relief — and notice you can stay anyway.");
      }
    });
  }
  setTimeout(bindDoorClick, 60);

  return {
    controls: {
      mode: "walkable",
      initialPos: [0, 0, 0],
      initialYaw: 0,
      initialPitch: 0,
      bounds: { minX: -wb, maxX: wb, minZ: -db, maxZ: db },
      speed: 1.3,
      lookSpeed: 0.0035,
      // Enclosed-spaces fear is INSIDE the small box — TP would put the
      // camera outside the walls, undermining the entire point.
      cameraModeLocked: "fp",
    },
    hands: { skinColor: 0xd4a07a, sleeveColor: 0x3d3d45 },
    surface: "hard",   // closed-room tile / linoleum
    interact(controls) {
      if (!controls) return null;
      // Distance to the door (in walkable space)
      const ddx = controls.position.x - (-0.4);
      const ddz = controls.position.z - (-db + 0.03);
      const dDoor = Math.hypot(ddx, ddz);
      if (dDoor < 1.5) {
        return {
          gesture: "grab",
          hint: doorTargetAngle === 0
            ? "click the door knob to open it · you can leave any time"
            : "the door is open · click again to close",
        };
      }
      // Otherwise — wall-touch hint (existing behaviour)
      const dx = Math.min(controls.position.x - (-wb), wb - controls.position.x);
      const dz = Math.min(controls.position.z - (-db), db - controls.position.z);
      const closest = Math.min(dx, dz);
      if (closest < 0.5) {
        return { gesture: "touch", hint: "touch the wall · it is solid · you are okay" };
      }
      return { gesture: "rest" };
    },
    onClick() {},
    update(t, controls, dt) {
      if (controls) enclosedControls = controls;
      // Smoothly animate door to target angle
      if (doorPivot) {
        doorPivot.rotation.y += (doorTargetAngle - doorPivot.rotation.y) * 0.08;
      }
      // Light switch — main lamp scales with lightOn flag
      const targetMainBase = lightOn ? 1.6 : 0.05;
      // (the original update body modulates main.intensity for flicker; we just
      // clamp the floor here so the off state is much darker.)
      if (!lightOn) main.intensity = Math.min(main.intensity, 0.1);
      // Run the original update body
      // Light flicker — more unstable in tighter rooms
      if (size < 0.55) {
        if (flickerCooldown <= 0 && Math.random() < 0.005) {
          main.intensity = 0.35;
          flickerCooldown = 0.1 + Math.random() * 0.15;
        } else if (flickerCooldown > 0) {
          flickerCooldown -= 0.016;
          if (flickerCooldown <= 0) main.intensity = 1.6;
        } else {
          main.intensity = 1.6 + Math.sin(t * 25) * 0.04;
        }
      }

      const pos = dust.geometry.attributes.position;
      for (let i = 0; i < N; i++) {
        pos.array[i * 3 + 1] -= 0.0022;
        pos.array[i * 3]     += Math.sin(t * 0.7 + i) * 0.0006;
        if (pos.array[i * 3 + 1] < -roomH / 2) pos.array[i * 3 + 1] = roomH / 2;
      }
      pos.needsUpdate = true;

      // ---- Elevator floor-change tick ----
      // While floorChangeT > 0, the cabin is "moving" — add a subtle vertical
      // shake and slowly hand off to the new floor. When the timer hits 0,
      // the indicator updates + the door opens automatically.
      if (floorChangeT > 0) {
        floorChangeT = Math.max(0, floorChangeT - (dt || 0.016));
        // Cabin sway while moving
        camera.position.x += Math.sin(t * 7) * 0.004;
        camera.position.y += Math.sin(t * 9) * 0.005;
        if (floorChangeT === 0) {
          // Arrived at new floor — update the indicator + open the door
          currentFloor = nextFloor;
          if (elevatorPanel && elevatorPanel.userData.paintDigit) {
            elevatorPanel.userData.paintDigit(currentFloor);
          }
          // Reset all button emissives back to dark
          for (const b of elevatorButtons) {
            b.userData.btn.material.emissive.setHex(0x000000);
            b.userData.btn.material.emissiveIntensity = 0;
          }
          // Auto-open the door (triumphal moment) — close after 5 s
          doorTargetAngle = -1.4;
          setTimeout(() => { doorTargetAngle = 0; }, 5000);
          if (window.PhobiaAudio) {
            const doorPos = doorPivot.getWorldPosition(new THREE.Vector3());
            window.PhobiaAudio.doorCreak({ x: doorPos.x, y: doorPos.y, z: doorPos.z });
          }
          if (window.PhobiaVoice) {
            window.PhobiaVoice.speak(`Arrived at floor ${currentFloor}. The doors are opening.`);
          }
        }
      }

      // Subtle breathing camera + nervous glances at small sizes (additive)
      camera.position.y += Math.sin(t * 1.2) * 0.015;
      if (size < 0.4) {
        camera.rotation.y += Math.sin(t * 0.7) * 0.06;
      }
    },
  };
}

// ---------- Flying (airplane cabin) ----------
function setupFlying(scene, camera, level) {
  const stage = level.stage; // 0..1, ramp by rung

  scene.background = new THREE.Color(0x88a8c8);
  // Strong key light from outside the window
  const sun = new THREE.DirectionalLight(0xfff5d0, 2.0);
  sun.position.set(-8, 10, -3);
  sun.castShadow = true;
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x2a3a4a, 0.6));
  // Cabin overhead lights
  const cabinLight = new THREE.PointLight(0xffe9b0, 0.7, 8);
  cabinLight.position.set(0, 1.6, 0);
  scene.add(cabinLight);

  // Cabin interior — a curved tube with seats and a window cutout
  const cabinMat = new THREE.MeshStandardMaterial({ color: 0xd5d1c8, roughness: 0.85 });
  // Floor (carpet)
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 30),
    new THREE.MeshStandardMaterial({ color: 0x4a3a4a, roughness: 0.95 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1.2;
  floor.receiveShadow = true;
  scene.add(floor);
  // Curved ceiling
  const ceiling = new THREE.Mesh(
    new THREE.CylinderGeometry(2.2, 2.2, 30, 32, 1, true, -Math.PI / 2.2, Math.PI * 1.1),
    cabinMat
  );
  ceiling.rotation.z = Math.PI / 2;
  ceiling.position.set(0, 0.8, -10);
  ceiling.material.side = THREE.DoubleSide;
  scene.add(ceiling);
  // Window oval on the left
  const windowFrame = new THREE.Mesh(
    new THREE.RingGeometry(0.42, 0.5, 24),
    new THREE.MeshStandardMaterial({ color: 0xb0b0b8, side: THREE.DoubleSide })
  );
  windowFrame.position.set(-1.95, 0.3, -4);
  windowFrame.rotation.y = Math.PI / 2;
  scene.add(windowFrame);
  // Window glass — shows sky shader
  const skyMat = new THREE.ShaderMaterial({
    uniforms: { stage: { value: stage } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      uniform float stage; varying vec2 vUv;
      void main(){
        float h = vUv.y;
        vec3 top = mix(vec3(0.4, 0.6, 0.85), vec3(0.15, 0.3, 0.55), stage);
        vec3 bot = mix(vec3(0.85, 0.9, 0.95), vec3(0.5, 0.65, 0.85), stage);
        vec3 col = mix(bot, top, h);
        // distant clouds
        float cloud = smoothstep(0.4, 0.6, sin(vUv.x * 8.0 + 0.5) * cos(vUv.y * 6.0 + 1.0));
        col = mix(col, vec3(1.0), cloud * 0.45);
        gl_FragColor = vec4(col, 1.0);
      }`,
  });
  const windowGlass = new THREE.Mesh(new THREE.CircleGeometry(0.42, 24), skyMat);
  windowGlass.position.copy(windowFrame.position);
  windowGlass.position.x += 0.01;
  windowGlass.rotation.y = Math.PI / 2;
  scene.add(windowGlass);

  // Wing strut visible through the window — anchors the view as a real plane
  const wing = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.04, 1.2),
    new THREE.MeshStandardMaterial({ color: 0xc8c8d0, metalness: 0.7, roughness: 0.3 })
  );
  wing.position.set(-3.2, 0.0, -4.2);
  wing.rotation.z = -0.05;
  scene.add(wing);
  // Engine nacelle visible far out
  const engine = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.30, 1.1, 16),
    new THREE.MeshStandardMaterial({ color: 0xb8b8c0, metalness: 0.6, roughness: 0.35 })
  );
  engine.rotation.z = Math.PI / 2;
  engine.position.set(-4.0, -0.05, -4.2);
  scene.add(engine);

  // Seat in front of you (the back of someone else's seat) — fabric PBR
  // weave makes the airline seat read as upholstery, not a paint-block.
  const seatMat = (window.PhobiaRealism && window.PhobiaRealism.fabricMaterial)
    ? window.PhobiaRealism.fabricMaterial("#4a4055", "cotton")
    : new THREE.MeshStandardMaterial({ color: 0x4a4055, roughness: 0.85 });
  const seatBack = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.4, 0.15), seatMat);
  seatBack.position.set(0, 0.2, -1.2);
  seatBack.castShadow = true;
  scene.add(seatBack);
  // Tray table — hinged at the back so it folds down/up.
  // Pivot is at the front of the seat in front (z = -1.2). The tray
  // itself is offset forward of the pivot so it swings into the user's lap.
  const trayPivot = new THREE.Group();
  trayPivot.position.set(0, -0.30, -1.18);
  scene.add(trayPivot);
  const tray = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.04, 0.4), seatMat);
  tray.position.set(0, 0, 0.20);     // forward of the hinge
  trayPivot.add(tray);
  // Start "up" (folded against the seatback): rotate to vertical
  trayPivot.rotation.x = -Math.PI / 2;
  let trayTargetAngle = -Math.PI / 2;  // -π/2 = up, 0 = down (lap)
  // Your own seat (sides visible)
  for (const sx of [-0.55, 0.55]) {
    const armrest = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.6), seatMat);
    armrest.position.set(sx, -0.4, 0.2);
    scene.add(armrest);
  }

  // Seatbelt sign in front (lights up at higher stages)
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(0.3, 0.12),
    new THREE.MeshStandardMaterial({
      color: 0x222222, emissive: stage > 0.6 ? 0xff8a00 : 0x111111,
      emissiveIntensity: stage > 0.6 ? 1 : 0,
    })
  );
  sign.position.set(0, 0.85, -1.2);
  scene.add(sign);

  camera.fov = 60;
  camera.updateProjectionMatrix();

  let flyingControls = null;
  // Breathing state. Held while the user presses-and-holds the breath
  // button (or holds Space). The mechanic is a real 4-in / 6-out rhythm:
  // while held, the breath cycle runs and `calmTurbulence` rises during the
  // exhale phase. Sustained over multiple cycles builds a persistent calm
  // bonus so the user feels their breathing actually changing the cabin.
  let breathHeld = false;
  let breathT = 0;             // current cycle time, 0..10 (4 in + 6 out)
  let calmCycles = 0;          // completed cycles since scene mount
  let calmTurbulence = 0;      // 0..1 instantaneous damping
  let calmFloor = 0;           // 0..0.6 persistent damping that grows with cycles
  function wireFlyingCmds() {
    const bar = document.querySelector('.scene-cmd-bar[data-scene="flying"]');
    if (!bar || bar.dataset.wired === "1") return;
    bar.dataset.wired = "1";
    // Button-by-button so the breath one can be press-and-hold
    const btnBreath = bar.querySelector('[data-cmd="breath"]');
    if (btnBreath) {
      const press = (e) => {
        e.stopPropagation();
        breathHeld = true;
        btnBreath.classList.add("pressed");
        if (window.PhobiaVoice) window.PhobiaVoice.speak("Four in. Six out. Stay with the breath.");
      };
      const release = () => {
        breathHeld = false;
        btnBreath.classList.remove("pressed");
      };
      btnBreath.addEventListener("pointerdown", press);
      btnBreath.addEventListener("pointerup", release);
      btnBreath.addEventListener("pointerleave", release);
      btnBreath.addEventListener("pointercancel", release);
    }
    // The other buttons stay one-shot
    bar.querySelectorAll("[data-cmd]").forEach(btn => {
      if (btn.dataset.cmd === "breath") return;
      btn.onclick = (e) => {
        e.stopPropagation();
        const c = flyingControls; if (!c) return;
        if (btn.dataset.cmd === "window") {
          const fromY = c.yaw, toY = -1.2;
          const fromP = c.pitch, toP = -0.1;
          let k = 0;
          const id = setInterval(() => {
            k += 0.05;
            if (k >= 1) { c.yaw = toY; c.pitch = toP; clearInterval(id); return; }
            c.yaw   = fromY + (toY - fromY) * k;
            c.pitch = fromP + (toP - fromP) * k;
          }, 16);
