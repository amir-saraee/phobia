     scene UI when the bar is collapsible. */
  .stage .cmd-toggle {
    position: absolute; right: 14px; bottom: 14px; z-index: 7;
    background: rgba(10, 14, 28, .70); color: var(--text);
    border: 1px solid rgba(255,255,255,.22);
    padding: 7px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    white-space: nowrap;
    max-width: calc(100% - 28px);
    cursor: pointer; backdrop-filter: blur(8px);
    transition: background .15s ease, transform .08s ease;
  }
  .stage .cmd-toggle:hover { background: rgba(20, 28, 48, .85); }
  .stage .cmd-toggle:active { transform: translateY(1px); }
  /* Fear-driven visual overlay — radial vignette that tightens AND a colour
     shift toward red/desaturation as the unified Fear value rises. CSS
     filter on the canvas is updated per frame in JS. The vignette is the
     "tunnel vision" felt during real panic — peripheral vision narrows. */
  .stage .fear-vignette {
    position: absolute; inset: 0; z-index: 5;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0) var(--fv-clear, 60%),
      rgba(20,8,8,0.0) var(--fv-mid, 75%),
      rgba(20,4,4,0.95) 100%);
    opacity: var(--fv-opacity, 0);
    mix-blend-mode: multiply;
    transition: opacity .15s ease;
  }
  /* Grounding-mode overlay — gentle desaturated calm when the user activates
     5-4-3-2-1. Soft blue tint, full vignette pulled OUT (very wide), no
     pulsing — the opposite of fear visual language. */
  .stage .grounding-overlay {
    position: absolute; inset: 0; z-index: 6;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      rgba(40,90,140,0.0) 0%,
      rgba(40,90,140,0.10) 60%,
      rgba(20,40,80,0.30) 100%);
    opacity: 0;
    transition: opacity .8s ease;
    backdrop-filter: saturate(40%);
  }
  .stage .grounding-overlay.active { opacity: 1; }
  .stage .grounding-text {
    position: absolute; left: 50%; top: 38%; z-index: 8;
    transform: translateX(-50%);
    color: #eaf3ff; font-size: 22px; font-weight: 500;
    text-align: center; letter-spacing: .3px;
    text-shadow: 0 2px 16px rgba(0,0,0,.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s ease;
    max-width: 80%;
  }
  .stage .grounding-text.visible { opacity: 1; }
  /* Tiny pulse indicator showing fear level — small dot at top-left under
     the camera toggle. Visible to the user as biofeedback. */
  .stage .fear-meter {
    position: absolute; top: 56px; left: 12px; z-index: 6;
    width: 100px; height: 6px; border-radius: 999px;
    background: rgba(20, 24, 36, .60);
    border: 1px solid rgba(255,255,255,.15);
    pointer-events: none; overflow: hidden;
    transition: opacity .2s ease;
  }
  .stage .fear-meter-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--ok), var(--warn), var(--danger));
    transition: width .25s ease, background-position .2s ease;
  }
  /* Achievement toast — slides in from the right when the player hits a
     milestone (first time at the edge, first pet, etc.). Auto-dismisses
     after 3.5 s. Stack-friendly: multiple toasts queue vertically. */
  .stage .achievement-toast {
    position: absolute; right: 12px; top: 12px; z-index: 8;
    background: linear-gradient(135deg, rgba(28,38,64,.95), rgba(20,28,48,.95));
    color: var(--text);
    border: 1px solid rgba(165,180,252,.35);
    border-left: 3px solid var(--accent);
    padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 28px rgba(0,0,0,.45);
    transform: translateX(120%);
    transition: transform .45s cubic-bezier(.22,1.4,.4,1), opacity .35s ease;
    opacity: 0;
    max-width: 300px;
    display: flex; align-items: center; gap: 10px;
  }
  .stage .achievement-toast.visible {
    transform: translateX(0);
    opacity: 1;
  }
  .stage .achievement-toast .achievement-icon {
    font-size: 22px; line-height: 1;
    filter: drop-shadow(0 0 8px rgba(124,209,197,.4));
  }
  .stage .achievement-toast .achievement-text {
    display: flex; flex-direction: column; gap: 2px;
  }
  .stage .achievement-toast strong {
    color: var(--accent); font-size: 11px;
    text-transform: uppercase; letter-spacing: .8px;
    font-weight: 700;
  }
  /* Soft contextual prompt that fades in when the player crosses a
     character-driven event boundary (reached the edge, dog noticed you,
     etc.). No buttons — informational only. */
  .stage .ctx-prompt {
    position: absolute; left: 50%; bottom: 80px; z-index: 7;
    transform: translateX(-50%);
    background: rgba(10, 14, 28, .80); color: var(--text);
    border: 1px solid rgba(165,180,252,.40);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-pill);
    font-size: var(--text-sm); font-weight: 500; line-height: 1.35;
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow-sm);
    max-width: min(360px, 80%); text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity .35s ease, transform .35s ease;
  }
  .stage .ctx-prompt.visible {
    opacity: 1; transform: translateX(-50%) translateY(-4px);
  }
  @media (max-width: 480px) {
    .stage .ctx-prompt {
      bottom: 64px;
      font-size: var(--text-xs);
      padding: 6px var(--space-3);
      max-width: 90%;
    }
  }
  .cmd-btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 999px;
    font: inherit; font-size: 13px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .08s;
  }
  .cmd-btn:hover { border-color: var(--accent); background: rgba(124,209,197,.08); }
  .cmd-btn:active { transform: translateY(1px); }
  .cmd-btn .cmd-icon { font-size: 16px; line-height: 1; }
  @media (max-width: 600px) {
    .scene-cmd-bar, .dog-cmd-bar { padding: 10px 12px; }
    .cmd-btn { padding: 8px 12px; font-size: 12px; }
  }

  /* Touch joystick (mobile) */
  .stage .joystick {
    position: absolute; left: 18px; bottom: 18px; z-index: 8;
    width: 96px; height: 96px;
    border-radius: 50%;
    background: rgba(10, 14, 28, .35);
    border: 1.5px solid rgba(124,209,197,.35);
    backdrop-filter: blur(6px);
    touch-action: none;
    user-select: none;
  }
  .stage .joystick::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(124,209,197,.10), transparent 60%);
    pointer-events: none;
  }
  .stage .joystick-thumb {
    position: absolute; left: 50%; top: 50%;
    width: 42px; height: 42px;
    margin: -21px 0 0 -21px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 4px 14px rgba(124,209,197,.4);
    pointer-events: none;
    transition: transform .05s linear;
  }

  /* Mobile responsive tweaks */
  @media (max-width: 600px) {
    /* Tighter app padding + margin: -28px on .stage-wrap pulled the stage
       OUTSIDE the panel padding on desktop. On mobile we want the stage to
       reach edge-to-edge too, so the cmd buttons get the full screen width. */
    .app { padding: 14px 6px 100px; }
    .panel { padding: 14px; }
    .stage-wrap { margin: 0 -14px; }
    h2 { font-size: 20px; }
    .show-grid { grid-template-columns: 1fr; }
    .pillars { grid-template-columns: 1fr; }
    .step-controls {
      flex-wrap: wrap; gap: 8px;
      padding: 12px 16px;
    }
    .step-controls .timer, .step-controls .hold-label {
      width: 100%; text-align: right;
    }
    .step-controls .hold-bar { display: none; }
    .stage { height: 280px; }
    .stage .joystick { left: 12px; bottom: 12px; width: 84px; height: 84px; }
    .stage .joystick-thumb { width: 36px; height: 36px; margin: -18px 0 0 -18px; }
    .stage .reach-hint { font-size: 12px; padding: 6px 12px; max-width: 80%; }
    .stage .captions { font-size: 13px; max-width: 86%; padding: 6px 12px; bottom: 8px; }
    .phobia-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .char-badge-name { display: none; }
    .nav-actions { gap: 4px; }
    .audio-btn, .home-btn { padding: 6px 10px; font-size: 12px; }
    .hero { padding: 26px 18px 22px; }
    .hero h1.huge { font-size: 26px; }
    .hero .lead { font-size: 14px; }
    .hero .floaters { display: none; }
    .journey { grid-template-columns: 1fr; }
    button { min-height: 44px; }  /* Apple's recommended touch target */
  }

  /* Closed captions for voice guidance */
  .stage .captions {
    position: absolute; left: 50%; bottom: 56px; z-index: 7;
    transform: translateX(-50%);
    background: rgba(0,0,0,.65);
    color: #fff; padding: 8px 14px; border-radius: 6px;
    font-size: 14px; line-height: 1.4;
    max-width: 70%; text-align: center;
    backdrop-filter: blur(4px);
    opacity: 0; transition: opacity .35s ease;
    pointer-events: none;
    border-left: 3px solid var(--accent);
  }
  .stage .captions.show { opacity: 1; }

  /* Heights scene */
  .scene-heights .ground { transition: transform 1.2s ease; }

  /* Water scene */
  .scene-water .water-fill {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(125,211,252,.35), rgba(56,189,248,.7));
    transition: height 1.2s ease;
  }
  .scene-water .ripple {
    position: absolute; border: 2px solid rgba(255,255,255,.4);
    border-radius: 50%; animation: ripple 3s linear infinite;
  }
  @keyframes ripple {
    0% { transform: scale(.4); opacity: .8; }
    100% { transform: scale(2); opacity: 0; }
  }

  /* Approach scene (dogs / spiders) */
  .scene-approach .creature {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transition: transform 1.2s ease, opacity .6s ease;
  }
  .blink { animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    96% { transform: scaleY(.1); }
  }

  /* Enclosed scene */
  .scene-enclosed { display: flex; align-items: center; justify-content: center; }
  .scene-enclosed .room {
    position: relative; width: 80%; height: 80%;
    border: 4px solid #475569; border-radius: 8px;
    background: repeating-linear-gradient(45deg, #1e293b, #1e293b 14px, #172033 14px, #172033 28px);
    transition: width 1.2s ease, height 1.2s ease;
  }
  .scene-enclosed .room::before {
    content: ""; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 30px rgba(124,209,197,.5);
  }

  .step-controls {
    display: flex; gap: 10px; padding: 16px 24px;
    border-top: 1px solid var(--border);
    align-items: center;
    /* Wrap so the Pause + Continue + timer + hold-bar all stay visible on
       narrow screens. Without wrap the timer (margin-left: auto) was pushing
       the right side off-screen on mobile. */
    flex-wrap: wrap;
  }
  .step-controls > * { flex-shrink: 0; }
  .step-controls .hold-bar { flex-shrink: 1; min-width: 0; }
  .step-controls .timer {
    margin-left: auto; color: var(--muted); font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 600px) {
    /* Stage caption / step-controls inset matches the panel inner padding
       so action buttons (Pause, Continue, etc.) line up with the rest of
       the panel content without clipping. */
    .stage { height: clamp(280px, 50vh, 480px); }
    .stage-caption, .step-controls { padding-left: 14px; padding-right: 14px; }
    .app { padding: 16px 14px 64px; }
    .stage-wrap { margin: 0 -14px; }
    /* Camera toggle + fear meter — bring them in from the corner so they
       don't get clipped by the rounded panel edges on phones. */
    .stage .camera-toggle {
      top: 8px; left: 8px;
      padding: 6px 12px; font-size: 12px;
    }
    .stage .fear-meter { top: 44px; left: 8px; width: 80px; }
    .stage .cmd-toggle { right: 8px; bottom: 8px; }
    .stage .ctx-prompt { font-size: 12px; padding: 8px 12px; max-width: 90%; }
  }
  /* Tablet / mid-width refinement */
  @media (min-width: 601px) and (max-width: 900px) {
    .app { padding: 18px 18px 72px; }
    .stage-wrap { margin: 0 -22px; }
  }
  /* Make sure the canvas always fills its container exactly. CSS pixel
     ratio mismatches were occasionally pushing it 1-2 px past the panel
     edge on some devices, clipping the camera toggle. */
  .stage canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
</style>

<body>
<div class="app" id="app"></div>

<script>
"use strict";

// ---------- Global error boundary ----------
// Anything that escapes a try/catch elsewhere lands here. We log it to the
// console (so a developer can find it during testing) but DON'T propagate
// to the user — exposure scenes already self-recover via the per-frame
// guards in tick(). Without this boundary, a single uncaught throw would
// trigger Chrome's "this page is unresponsive" dialog after a few seconds.
window.addEventListener("error", (e) => {
  // Filter out the "ResizeObserver loop limit exceeded" warning that fires
  // benignly when the stage canvas resizes — it's not a real bug.
  if (e && e.message && /ResizeObserver/i.test(e.message)) return;
  try { console.warn("[Mira] uncaught error:", e.message, e.error || ""); } catch {}
});
window.addEventListener("unhandledrejection", (e) => {
  try { console.warn("[Mira] unhandled promise:", e.reason); } catch {}
});

// ---------- Procedural audio engine (Web Audio API) ----------
// Builds wind, water, breathing, barks, skittering, MRI clanks, heartbeat, etc.
// All generated on the fly — no external sound files needed.
const PhobiaAudio = (() => {
  let ctx = null, master = null, muted = false;
  try {
    muted = localStorage.getItem("fobia.muted") === "1";
  } catch {}

  function ensureCtx() {
    if (ctx) return ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = muted ? 0 : 0.7;
      master.connect(ctx.destination);
    } catch { ctx = null; }
    return ctx;
  }

  // Browsers require a user gesture before audio plays. Call this in click handlers.
  // iOS Safari can return AudioContext in "interrupted" state after a phone
  // call or screen lock — we treat both as "suspended" and try to resume.
  function unlock() {
    const c = ensureCtx();
    if (!c) return;
    try {
      if (c.state === "suspended" || c.state === "interrupted") {
        c.resume().catch(() => {});
      }
    } catch {}
  }

  function setMuted(m) {
    muted = !!m;
    try { localStorage.setItem("fobia.muted", muted ? "1" : "0"); } catch {}
    try {
      if (master && ctx) {
        master.gain.linearRampToValueAtTime(muted ? 0 : 0.7, ctx.currentTime + 0.2);
      }
    } catch {}
  }
  const isMuted = () => muted;

  function noiseBuffer(seconds = 2) {
    const c = ensureCtx(); if (!c) return null;
    const buf = c.createBuffer(1, c.sampleRate * seconds, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  // ---- Spatial audio ----
  // PhobiaAudio.spatial(pos) returns an AudioNode connected to master that
  // applies HRTF panning + distance attenuation. The caller wires their
  // sound's final output to the returned node instead of `master`. If pos
  // is omitted (no spatialization desired) we just return `master`.
  function spatial(pos, opts = {}) {
    const c = ensureCtx(); if (!c || !pos) return master;
    const panner = c.createPanner();
    panner.panningModel = "HRTF";
    panner.distanceModel = "inverse";
    panner.refDistance = opts.refDistance != null ? opts.refDistance : 1.5;
    panner.maxDistance = opts.maxDistance != null ? opts.maxDistance : 80;
    panner.rolloffFactor = opts.rolloffFactor != null ? opts.rolloffFactor : 1.6;
    // Older API form (positionX/Y/Z is on AudioParam in newer browsers,
    // but setPosition() works everywhere).
    if (panner.positionX) {
      panner.positionX.value = pos.x;
      panner.positionY.value = pos.y;
      panner.positionZ.value = pos.z;
    } else if (panner.setPosition) {
      panner.setPosition(pos.x, pos.y, pos.z);
    }
    // Directional cone — when `forward` is provided the sound is louder in
    // front of the source and muffled behind. Used for bark direction (real
    // dogs sound louder when facing you).
    if (opts.forward) {
      panner.coneInnerAngle  = opts.coneInnerAngle  != null ? opts.coneInnerAngle  : 90;
      panner.coneOuterAngle  = opts.coneOuterAngle  != null ? opts.coneOuterAngle  : 240;
      panner.coneOuterGain   = opts.coneOuterGain   != null ? opts.coneOuterGain   : 0.35;
      const f = opts.forward;
      if (panner.orientationX) {
        panner.orientationX.value = f.x;
        panner.orientationY.value = f.y;
        panner.orientationZ.value = f.z;
      } else if (panner.setOrientation) {
        panner.setOrientation(f.x, f.y, f.z);
      }
    }
    panner.connect(master);
    return panner;
  }

  // Update the AudioListener so HRTF panning tracks the camera. The caller
  // passes plain {position, forward, up} vectors as objects with x/y/z so we
  // don't depend on Three.js types here in the classic-script audio module.
  function updateListener({ position, forward, up }) {
    const c = ensureCtx(); if (!c) return;
    const L = c.listener;
    if (!position || !forward || !up) return;
    if (L.positionX) {
      L.positionX.value = position.x; L.positionY.value = position.y; L.positionZ.value = position.z;
      L.forwardX.value  = forward.x;  L.forwardY.value  = forward.y;  L.forwardZ.value  = forward.z;
      L.upX.value       = up.x;       L.upY.value       = up.y;       L.upZ.value       = up.z;
    } else if (L.setPosition) {
      L.setPosition(position.x, position.y, position.z);
      L.setOrientation(forward.x, forward.y, forward.z, up.x, up.y, up.z);
    }
  }

  // ---- Looped textures (wind, water, underwater, room tone) ----
  function startLoop({ baseFreq, q = 0.7, gain: gainTarget = 0.3, lfoRate = 0.3, lfoDepth = 100, type = "lowpass" }) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    const buf = noiseBuffer(3);
    const src = c.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = c.createBiquadFilter();
    filt.type = type; filt.frequency.value = baseFreq; filt.Q.value = q;
    const gain = c.createGain();
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(gainTarget, c.currentTime + 1.2);
    const lfo = c.createOscillator();
    const lfoGain = c.createGain();
    lfo.frequency.value = lfoRate; lfoGain.gain.value = lfoDepth;
    lfo.connect(lfoGain).connect(filt.frequency);
    src.connect(filt).connect(gain).connect(master);
    src.start(); lfo.start();
    return {
      stop() {
        if (!c) return;
        gain.gain.cancelScheduledValues(c.currentTime);
        gain.gain.setTargetAtTime(0, c.currentTime, 0.4);
        setTimeout(() => { try { src.stop(); lfo.stop(); } catch {} }, 1500);
      },
    };
  }

  function startWind(intensity = 0.6) {
    return startLoop({
      baseFreq: 220 + intensity * 700, q: 0.9,
      gain: 0.18 + intensity * 0.22, lfoRate: 0.28, lfoDepth: 250 * intensity,
    });
  }
  function startWaterLap(intensity = 0.5) {
    return startLoop({
      baseFreq: 600 + intensity * 1200, q: 0.6,
      gain: 0.18 + intensity * 0.18, lfoRate: 0.55, lfoDepth: 350 * intensity,
    });
  }
  function startUnderwater() {
    return startLoop({
      baseFreq: 220, q: 1.2, gain: 0.45, lfoRate: 0.18, lfoDepth: 60,
    });
  }
  function startRoomTone(intensity = 0.4) {
    return startLoop({
      baseFreq: 90 + intensity * 60, q: 1.2,
      gain: 0.12 + intensity * 0.15, lfoRate: 0.1, lfoDepth: 30,
    });
  }

  // ---- Discrete events (bark, clang, click, breath) ----
  // The optional `pos` argument routes the sound through a PannerNode so it
  // appears to come from that world location. `opts.forward` adds a
  // directional cone so the bark sounds louder when the dog faces you and
  // muffled when it's looking away — real-world acoustic cone behaviour.
  function bark(intensity = 1.0, pos = null, opts = {}) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, Object.assign({
      refDistance: 1.5, maxDistance: 30, rolloffFactor: 1.6,
    }, opts));
    const now = c.currentTime;
    // ---- Layered bark synthesis for a more realistic dog voice ----
    // 1. Low growl: sawtooth dropping from 180→60 Hz with throaty body
    // 2. Mid yip:   square wave with formant frequencies of canine vocal tract
    // 3. Noise puff: a bright "wuff" with bandpass for breathy attack
    // 4. Sub thump: sine pulse for body/chest impact
    // Each layer envelopes independently, summed at the panner output.

    // 1. Growl body (low + sawtooth → sounds like vocal-fold vibration)
    const osc1 = c.createOscillator();
    osc1.type = "sawtooth";
    const startF = 180 + Math.random() * 40;
    osc1.frequency.setValueAtTime(startF, now);
    osc1.frequency.exponentialRampToValueAtTime(60, now + 0.20);
    const lp1 = c.createBiquadFilter();
    lp1.type = "lowpass"; lp1.frequency.value = 1100; lp1.Q.value = 0.9;
    const g1 = c.createGain();
    g1.gain.setValueAtTime(0, now);
    g1.gain.linearRampToValueAtTime(0.50 * intensity, now + 0.015);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.30);
    osc1.connect(lp1).connect(g1).connect(out);
    osc1.start(now); osc1.stop(now + 0.34);

    // 2. Mid yip — formant-tuned square wave, gives the bark its "voice"
    const osc2 = c.createOscillator();
    osc2.type = "square";
    osc2.frequency.setValueAtTime(450 + Math.random() * 80, now);
    osc2.frequency.exponentialRampToValueAtTime(280, now + 0.16);
    const bp = c.createBiquadFilter();
    bp.type = "bandpass"; bp.frequency.value = 900; bp.Q.value = 2.5;
    const g2 = c.createGain();
    g2.gain.setValueAtTime(0, now + 0.005);
    g2.gain.linearRampToValueAtTime(0.18 * intensity, now + 0.025);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
    osc2.connect(bp).connect(g2).connect(out);
    osc2.start(now); osc2.stop(now + 0.22);

    // 3. Noise puff — the breathy "wuff" attack
    const buf = noiseBuffer(0.3);
    if (buf) {
      const src = c.createBufferSource(); src.buffer = buf;
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.32 * intensity, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      const nbp = c.createBiquadFilter(); nbp.type = "bandpass";
      nbp.frequency.value = 1200; nbp.Q.value = 1.4;
      src.connect(nbp).connect(ng).connect(out);
      src.start(now); src.stop(now + 0.16);
    }

    // 4. Sub thump — chest impact sine, makes the bark feel embodied
    const sub = c.createOscillator();
    sub.type = "sine";
    sub.frequency.setValueAtTime(70, now);
    sub.frequency.exponentialRampToValueAtTime(40, now + 0.14);
    const sg = c.createGain();
    sg.gain.setValueAtTime(0.25 * intensity, now);
    sg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    sub.connect(sg).connect(out);
    sub.start(now); sub.stop(now + 0.20);
  }

  function startBarking(rate = 1.4) {
    let alive = true;
    function loop() {
      if (!alive) return;
      const burst = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < burst; i++) setTimeout(() => alive && bark(0.9 + Math.random() * 0.2), i * 220);
      setTimeout(loop, 1400 / rate + Math.random() * 1200);
    }
    setTimeout(loop, 600);
    return { stop() { alive = false; } };
  }

  function startSkittering() {
    const c = ensureCtx(); if (!c) return { stop() {} };
    let alive = true;
    function tick() {
      if (!alive) return;
      const now = c.currentTime;
      const reps = 3 + Math.floor(Math.random() * 5);
      for (let i = 0; i < reps; i++) {
        const osc = c.createOscillator();
        osc.type = "square";
        osc.frequency.value = 1500 + Math.random() * 2200;
        const g = c.createGain();
        g.gain.setValueAtTime(0.05, now + i * 0.025);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.025 + 0.03);
        osc.connect(g).connect(master);
        osc.start(now + i * 0.025); osc.stop(now + i * 0.025 + 0.04);
      }
      setTimeout(tick, 1400 + Math.random() * 2600);
    }
    tick();
    return { stop() { alive = false; } };
  }

  function startMRI() {
    const c = ensureCtx(); if (!c) return { stop() {} };
    let alive = true;
    function clank() {
      if (!alive) return;
      const now = c.currentTime;
      const reps = 10 + Math.floor(Math.random() * 14);
      const period = 0.07 + Math.random() * 0.05;
      const baseFreq = 70 + Math.random() * 90;
      for (let i = 0; i < reps; i++) {
        const t = now + i * period;
        const osc = c.createOscillator();
        osc.type = "square";
        osc.frequency.value = baseFreq + (i % 2 === 0 ? 0 : 30);
        const g = c.createGain();
        g.gain.setValueAtTime(0.28, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.connect(g).connect(master);
        osc.start(t); osc.stop(t + 0.06);
      }
      setTimeout(clank, 2000 + Math.random() * 3500);
    }
    setTimeout(clank, 1500);
    return { stop() { alive = false; } };
  }

  function startBreathing(rate = 0.22) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    let alive = true;
    function breath(inhale = true) {
      if (!alive) return;
      const dur = 1.4;
      const buf = noiseBuffer(dur);
      const src = c.createBufferSource(); src.buffer = buf;
      const lp = c.createBiquadFilter();
      lp.type = "lowpass"; lp.frequency.value = inhale ? 700 : 380;
      const g = c.createGain();
      const now = c.currentTime;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.13, now + dur * 0.4);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(lp).connect(g).connect(master);
      src.start(now); src.stop(now + dur);
      setTimeout(() => breath(!inhale), (1 / rate) * 1000);
    }
    breath(true);
    return { stop() { alive = false; } };
  }

  function startHeartbeat(bpm = 72) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    let alive = true;
    function pump() {
      if (!alive) return;
      const now = c.currentTime;
      const beat = (t, freq, peak, dur) => {
        const osc = c.createOscillator();
        osc.type = "sine"; osc.frequency.value = freq;
        const g = c.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(peak, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g).connect(master);
        osc.start(t); osc.stop(t + dur + 0.05);
      };
      beat(now, 60, 0.34, 0.16);
      beat(now + 0.18, 50, 0.22, 0.12);
      setTimeout(pump, 60000 / bpm);
    }
    pump();
    return { stop() { alive = false; }, setBpm(b) { bpm = b; } };
  }

  function startCityHum() {
    return startLoop({ baseFreq: 130, q: 1.0, gain: 0.13, lfoRate: 0.05, lfoDepth: 20 });
  }

  // Calm ambient pad — 3 sine voices, low-pass + slow LFO. Used as a background
  // music bed on home/ladder pages. Off by default; toggleable in settings.
  function startAmbientPad() {
    const c = ensureCtx(); if (!c) return { stop() {} };
    const freqs = [110, 164.81, 220]; // A2, E3, A3 — a quiet open fifth + octave
    const oscs = freqs.map(f => {
      const o = c.createOscillator();
      o.type = "sine";
      o.frequency.value = f;
      // Slight detune + per-voice tremolo for movement
      const det = c.createOscillator();
      det.frequency.value = 0.07 + Math.random() * 0.05;
      const detGain = c.createGain();
      detGain.gain.value = 1.5;
      det.connect(detGain).connect(o.frequency);
      det.start();
      return { osc: o, det };
    });
    const lp = c.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 700;
    lp.Q.value = 0.7;
    const gain = c.createGain();
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(0.045, c.currentTime + 4); // very gentle
    // Slow filter LFO
    const lfo = c.createOscillator();
    const lfoGain = c.createGain();
    lfo.frequency.value = 0.04;
    lfoGain.gain.value = 200;
    lfo.connect(lfoGain).connect(lp.frequency);
    oscs.forEach(p => p.osc.connect(lp));
    lp.connect(gain).connect(master);
    oscs.forEach(p => p.osc.start());
    lfo.start();
    return {
      stop() {
        gain.gain.cancelScheduledValues(c.currentTime);
        gain.gain.setTargetAtTime(0, c.currentTime, 1.2);
        setTimeout(() => {
          try {
            oscs.forEach(p => { p.osc.stop(); p.det.stop(); });
            lfo.stop();
          } catch {}
        }, 4500);
      },
      setGain(target) {
        try {
          const v = Math.max(0, Math.min(0.2, Number(target) || 0));
          gain.gain.cancelScheduledValues(c.currentTime);
          gain.gain.setTargetAtTime(v, c.currentTime, 0.8);
        } catch {}
      },
    };
  }

  // Engine drone for the airplane scene — layered sub + body + harmonic
  function startEngineDrone(intensity = 0.5, pos = null) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    // Engine pods sit far enough from the cabin that the listener still
    // catches a strong drone, but distance attenuation works.
    const out = spatial(pos, { refDistance: 4, maxDistance: 60, rolloffFactor: 0.6 });
    const buf = noiseBuffer(3);
    const src = c.createBufferSource();
    src.buffer = buf; src.loop = true;
    const lp = c.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 320; lp.Q.value = 0.9;
    const hp = c.createBiquadFilter();
    hp.type = "highpass"; hp.frequency.value = 60;
    const gain = c.createGain();
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(0.18 + intensity * 0.18, c.currentTime + 1.5);
    src.connect(hp).connect(lp).connect(gain).connect(out);
    src.start();
    // Sub bass tone for the deep drone
    const osc = c.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 75;
    const oscGain = c.createGain();
    oscGain.gain.value = 0;
    oscGain.gain.linearRampToValueAtTime(0.05 + intensity * 0.04, c.currentTime + 1.5);
    osc.connect(oscGain).connect(out);
    osc.start();
    return {
      stop() {
        gain.gain.setTargetAtTime(0, c.currentTime, 0.5);
        oscGain.gain.setTargetAtTime(0, c.currentTime, 0.5);
        setTimeout(() => { try { src.stop(); osc.stop(); } catch {} }, 1500);
      },
    };
  }

  // Single splash — used when user paddles the water
  function splash(intensity = 1.0, pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 1, maxDistance: 30, rolloffFactor: 1.2 });
    const now = c.currentTime;
    const buf = noiseBuffer(0.5);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter();
    bp.type = "bandpass"; bp.frequency.value = 1500; bp.Q.value = 0.9;
    const g = c.createGain();
    g.gain.setValueAtTime(0.35 * intensity, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.connect(bp).connect(g).connect(out);
    src.start(now); src.stop(now + 0.45);
  }

  // Hiss — for the snake scene
  function startHiss(rate = 0.4) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    let alive = true;
    function puff() {
      if (!alive) return;
      const now = c.currentTime;
      const dur = 0.6 + Math.random() * 0.4;
      const buf = noiseBuffer(dur);
      const src = c.createBufferSource(); src.buffer = buf;
      const hp = c.createBiquadFilter();
      hp.type = "highpass"; hp.frequency.value = 4000; hp.Q.value = 0.8;
      const g = c.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.06 + Math.random() * 0.04, now + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(hp).connect(g).connect(master);
      src.start(now); src.stop(now + dur);
      setTimeout(puff, (1 / rate) * 1000 + Math.random() * 1500);
    }
    setTimeout(puff, 1500);
    return { stop() { alive = false; } };
  }

  // Audience murmur — sustained crowd-mumble bed
  function startAudienceMurmur(crowd = 0.5) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    const buf = noiseBuffer(4);
    const src = c.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = c.createBiquadFilter();
    lp.type = "bandpass"; lp.frequency.value = 600; lp.Q.value = 1.5;
    const g = c.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.06 + crowd * 0.10, c.currentTime + 1.5);
    src.connect(lp).connect(g).connect(master);
    src.start();
    // Periodic cough or throat clear
    let alive = true;
    function cough() {
      if (!alive || crowd < 0.2) return;
      const now = c.currentTime;
      const osc = c.createOscillator();
      osc.type = "sawtooth"; osc.frequency.value = 220 + Math.random() * 80;
      const cg = c.createGain();
      cg.gain.setValueAtTime(0, now);
      cg.gain.linearRampToValueAtTime(0.06, now + 0.02);
      cg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      const lpf = c.createBiquadFilter();
      lpf.type = "lowpass"; lpf.frequency.value = 1200;
      osc.connect(lpf).connect(cg).connect(master);
      osc.start(now); osc.stop(now + 0.2);
      setTimeout(cough, 9000 + Math.random() * 18000);
    }
    setTimeout(cough, 6000 + Math.random() * 8000);
    return {
      stop() {
        alive = false;
        g.gain.setTargetAtTime(0, c.currentTime, 0.5);
        setTimeout(() => { try { src.stop(); } catch {} }, 1500);
      },
    };
  }

  // Thunder — single low rolling rumble, optionally with a sharp crack at the
  // front. When `pos` is provided, the sound is HRTF-panned from that world
  // location (so a bolt off to the left actually rumbles from your left).
  function thunder(intensity = 0.6, withCrack = true, pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 8, maxDistance: 200, rolloffFactor: 0.6 });
    const now = c.currentTime;
    // Sharp crack at the front — very brief, high noise
    if (withCrack) {
      const crack = noiseBuffer(0.18);
      const src = c.createBufferSource(); src.buffer = crack;
      const hp = c.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 800;
      const g = c.createGain();
      g.gain.setValueAtTime(0.55 * intensity, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      src.connect(hp).connect(g).connect(out);
      src.start(now); src.stop(now + 0.2);
    }
    // Long rumble — low-pass noise that decays over ~3 seconds
    const dur = 2.5 + intensity * 2.5;
    const rumbleBuf = noiseBuffer(dur);
    const rsrc = c.createBufferSource(); rsrc.buffer = rumbleBuf;
    const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 200; lp.Q.value = 0.6;
    const rg = c.createGain();
    rg.gain.setValueAtTime(0, now + 0.05);
    rg.gain.linearRampToValueAtTime(0.45 * intensity, now + 0.25);
    rg.gain.exponentialRampToValueAtTime(0.001, now + dur);
    rsrc.connect(lp).connect(rg).connect(out);
    rsrc.start(now + 0.05); rsrc.stop(now + dur + 0.1);
  }

  // Rain — looped white noise with low-pass to feel like real rain
  function startRain(intensity = 0.6) {
    return startLoop({
      baseFreq: 4000 - intensity * 1500, q: 0.4,
      gain: 0.16 + intensity * 0.20, lfoRate: 0.12, lfoDepth: 600 * intensity,
      type: "lowpass",
    });
  }

  // Engine + tyre noise (driving)
  function startDrivingDrone(speed = 0.5) {
    const c = ensureCtx(); if (!c) return { stop() {} };
    // Engine sub
    const osc = c.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 80 + speed * 60;
    const oscG = c.createGain();
    oscG.gain.value = 0;
    oscG.gain.linearRampToValueAtTime(0.05 + speed * 0.05, c.currentTime + 1);
    osc.connect(oscG).connect(master);
    osc.start();
    // Tyre noise
    const buf = noiseBuffer(3);
    const src = c.createBufferSource();
    src.buffer = buf; src.loop = true;
    const lp = c.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 600 + speed * 800;
    const tg = c.createGain();
    tg.gain.value = 0;
    tg.gain.linearRampToValueAtTime(0.10 + speed * 0.20, c.currentTime + 1);
    src.connect(lp).connect(tg).connect(master);
    src.start();
    return {
      stop() {
        oscG.gain.setTargetAtTime(0, c.currentTime, 0.5);
        tg.gain.setTargetAtTime(0, c.currentTime, 0.5);
        setTimeout(() => { try { osc.stop(); src.stop(); } catch {} }, 1500);
      },
    };
  }

  // Indicator click (subtle tick)
  function indicatorClick(pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 0.5, maxDistance: 6 });
    const now = c.currentTime;
    const osc = c.createOscillator();
    osc.type = "square"; osc.frequency.value = 1500;
    const g = c.createGain();
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.connect(g).connect(out);
    osc.start(now); osc.stop(now + 0.05);
  }

  // Single footstep — short low thump that varies by surface.
  // surface: "hard" (concrete / tile) · "wood" · "soft" (carpet / dirt) · "grass" · "splash" (shallow water)
  function footstep(softness = 0.35, surface = "hard") {
    const c = ensureCtx(); if (!c) return;
    const now = c.currentTime;
    const dur = surface === "splash" ? 0.20 : 0.13;
    const buf = noiseBuffer(dur);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    // Surface profiles
    let cutoff, q, type = "lowpass", gain = 0.18;
    switch (surface) {
      case "wood":
        cutoff = 180 + Math.random() * 70;  q = 1.2; gain = 0.20; break;
      case "soft":
        cutoff = 130 + Math.random() * 40;  q = 0.6; gain = 0.12; break;
      case "grass":
        cutoff = 280 + Math.random() * 120; q = 0.5; gain = 0.10;
        // Grass uses high-pass for the rustling component
        type = "bandpass"; break;
      case "splash":
        cutoff = 900 + Math.random() * 700; q = 0.4; gain = 0.16;
        type = "bandpass"; break;
      case "hard":
      default:
        cutoff = 220 + Math.random() * 90; q = 0.7; gain = 0.18; break;
    }
    filter.type = type; filter.frequency.value = cutoff; filter.Q.value = q;
    const g = c.createGain();
    g.gain.setValueAtTime(gain * softness, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(filter).connect(g).connect(master);
    src.start(now); src.stop(now + dur + 0.02);
  }

  // ---- Dog vocalisations (whine / soft pant / sniff) ----
  // These are subtle "alive dog" noises that complement bark(). A real dog
  // is rarely silent — there's always quiet panting + the occasional whine.
  // Add these to the dogs scene's update loop so the dog has constant
  // texture, not just barks-or-silence.

  // Soft whine — short rising-then-falling pure-tone, like a small dog
  // making a "hmm" while it watches you. Higher pitch + slight wobble.
  function dogWhine(intensity = 0.6, pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 1.2, maxDistance: 18 });
    const now = c.currentTime;
    const dur = 0.55 + Math.random() * 0.20;
    const osc = c.createOscillator();
    osc.type = "sine";
    const startF = 380 + Math.random() * 80;
    const peakF  = 720 + Math.random() * 140;
    osc.frequency.setValueAtTime(startF, now);
    osc.frequency.linearRampToValueAtTime(peakF, now + dur * 0.45);
    osc.frequency.exponentialRampToValueAtTime(startF * 0.9, now + dur);
    // Slight vibrato so it sounds organic, not a synth tone
    const vib = c.createOscillator();
    const vibG = c.createGain();
    vib.frequency.value = 6.5; vibG.gain.value = 18;
    vib.connect(vibG).connect(osc.frequency);
    const g = c.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18 * intensity, now + 0.08);
    g.gain.linearRampToValueAtTime(0.14 * intensity, now + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(g).connect(out);
    osc.start(now); vib.start(now);
    osc.stop(now + dur + 0.05); vib.stop(now + dur + 0.05);
  }

  // Soft pant — a single "haa-puh" breath. Used as an event the dog scene
  // fires at ~2 Hz when calm. Two-stage: noisy in (longer, breathy) and
  // a quick voiced "puh" out.
  function dogPant(intensity = 0.5, pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 1.0, maxDistance: 8 });
    const now = c.currentTime;
    // Inhale — band-passed noise, soft envelope
    {
      const dur = 0.18;
      const buf = noiseBuffer(dur);
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = "bandpass"; bp.frequency.value = 800; bp.Q.value = 0.9;
      const g = c.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.10 * intensity, now + dur * 0.45);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(bp).connect(g).connect(out);
      src.start(now); src.stop(now + dur + 0.02);
    }
    // Exhale — a tiny voiced ping under the noise puff
    {
      const dur = 0.14;
      const t0 = now + 0.16;
      const buf = noiseBuffer(dur);
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = "bandpass"; bp.frequency.value = 1100; bp.Q.value = 1.4;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.12 * intensity, t0 + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      src.connect(bp).connect(g).connect(out);
      src.start(t0); src.stop(t0 + dur + 0.02);
    }
  }

  // Sniff — rapid short breathy puffs, 4-6 in a burst. Used when the dog is
  // sniffing the floor / a treat / the air.
  function dogSniff(intensity = 0.5, pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 0.8, maxDistance: 8 });
    const N = 4 + Math.floor(Math.random() * 3);
    for (let i = 0; i < N; i++) {
      const t0 = c.currentTime + i * (0.10 + Math.random() * 0.04);
      const dur = 0.07;
      const buf = noiseBuffer(dur);
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 1400 + Math.random() * 400;
      bp.Q.value = 1.6;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.08 * intensity, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      src.connect(bp).connect(g).connect(out);
      src.start(t0); src.stop(t0 + dur + 0.01);
    }
  }

  // ---- Wind howl (gust) ----
  // A single low-frequency-modulated noise sweep that layers on top of the
  // continuous wind. Heights uses this as the user nears the railing or
  // tilts their pitch downward — the visceral "the wind is real" cue.
  function windHowl(intensity = 0.6) {
    const c = ensureCtx(); if (!c) return;
    const now = c.currentTime;
    const dur = 1.4 + Math.random() * 0.8;
    const buf = noiseBuffer(dur);
    const src = c.createBufferSource(); src.buffer = buf;
    const bp = c.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(180, now);
    bp.frequency.linearRampToValueAtTime(900 + intensity * 500, now + dur * 0.5);
    bp.frequency.exponentialRampToValueAtTime(220, now + dur);
    bp.Q.value = 1.4;
    const g = c.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.16 + intensity * 0.20, now + dur * 0.35);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(bp).connect(g).connect(master);
    src.start(now); src.stop(now + dur + 0.02);
  }

  // ---- Adjustable heartbeat ----
  // Returns a handle similar to startHeartbeat but with a `setIntensity(i)`
  // method that ramps the gain in real time. Heights uses this to make the
  // heartbeat audibly louder when the user is close to the edge / looking
  // straight down — a felt physiological response, not a constant track.
  function startVertigoHeartbeat(initialBpm = 78) {
    const c = ensureCtx(); if (!c) return { stop() {}, setIntensity() {}, setBpm() {} };
    let alive = true;
    let bpm = initialBpm;
    const dynGain = c.createGain();
    dynGain.gain.value = 0.0;
    dynGain.connect(master);
    function pump() {
      if (!alive) return;
      const now = c.currentTime;
      const beat = (t, freq, peak, dur) => {
        const osc = c.createOscillator();
        osc.type = "sine"; osc.frequency.value = freq;
        const g = c.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(peak, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g).connect(dynGain);
        osc.start(t); osc.stop(t + dur + 0.05);
      };
      beat(now, 56, 0.45, 0.18);
      beat(now + 0.18, 46, 0.30, 0.14);
      setTimeout(pump, 60000 / bpm);
    }
    pump();
    return {
      stop() {
        alive = false;
        try { dynGain.gain.setTargetAtTime(0, c.currentTime, 0.4); } catch {}
      },
      setIntensity(i) {
        const v = Math.max(0, Math.min(1, i || 0));
        try { dynGain.gain.setTargetAtTime(v * 0.95, c.currentTime, 0.18); } catch {}
      },
      setBpm(b) { bpm = Math.max(40, Math.min(160, b || 78)); },
    };
  }

  // Door creak — used at the start of the enclosed scene's tighter rungs
  function doorCreak(pos = null) {
    const c = ensureCtx(); if (!c) return;
    const out = spatial(pos, { refDistance: 1, maxDistance: 12 });
    const now = c.currentTime;
    const dur = 0.6;
    const osc = c.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    const lp = c.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 600;
    osc.connect(lp).connect(g).connect(out);
    osc.start(now); osc.stop(now + dur + 0.1);
  }

  return {
    unlock, setMuted, isMuted,
    startWind, startWaterLap, startUnderwater, startRoomTone, startCityHum,
    startBarking, startSkittering, startMRI, startBreathing, startHeartbeat,
    startVertigoHeartbeat,
    startEngineDrone, startHiss, startAudienceMurmur, startAmbientPad,
    startRain, startDrivingDrone,
    bark, splash, doorCreak, thunder, indicatorClick, footstep,
    // Dog vocalisations
    dogWhine, dogPant, dogSniff,
    // Wind events
    windHowl,
    // Spatial audio
    spatial, updateListener,
  };
})();

// =============================================================================
// ---------- Unified Fear State Machine ----------
// =============================================================================
//
// A single 0–100 "fear" value that EVERY other system reads from. Inputs:
//   - proximity to source (per-scene-defined function)
//   - gaze (looking at the source for a sustained beat)
//   - exposure duration (slowly climbs while in the fear zone)
//   - sudden events (a bark, a spider lunge)
// Behaviour:
//   - Rises with input, falls slowly when player is in safety / using grounding
//   - Drives visual effects (vignette, desat, FOV), audio (heartbeat tempo + LP
//     muffle), camera sway, breathing audio rate, narration selection.
//   - Records the session's peak + duration so habituation can be reported back
//     to the user across sessions ("You held it 8 s longer than last time.")
// Why it matters:
//   - Real exposure therapy works on a habituation curve, not a binary pass/fail.
//   - A unified value lets all the "this looks like a real person panicking"
//     effects (vignette, audio, body sway) move together — instead of each
//     scene having its own ad-hoc panic cues.
//
const PhobiaFear = (() => {
  let value = 0;                  // 0..100
  let listeners = [];
  let peak = 0;                   // peak this rung
  let timeInZone = 0;             // seconds spent above 30
  let sessionStart = 0;
  let groundingMode = false;      // 5-4-3-2-1 exercise active
  let inputs = { proximity: 0, gaze: 0, event: 0, duration: 0 };
  let scene = "";                 // current phobia key
  let levelIdx = 0;
  let lastNarrationAt = 0;        // throttle adaptive cues
  let avoidanceTimer = 0;         // seconds player has spent in the safe zone after engaging

  function setScene(s, idx) {
    scene = s;
    levelIdx = idx || 0;
    value = 0;
    peak = 0;
    timeInZone = 0;
    sessionStart = performance.now() / 1000;
    inputs = { proximity: 0, gaze: 0, event: 0, duration: 0 };
    groundingMode = false;
    avoidanceTimer = 0;
    lastNarrationAt = 0;
    notify();
  }
  function setInput(name, v) {
    if (groundingMode) return;     // grounding pauses fear input
    inputs[name] = Math.max(0, Math.min(1, v));
  }
  // Discrete events (a bark, a spider lunge). Pulse adds a quick spike that
  // decays back to the proximity-driven baseline.
  let eventPulse = 0;
  function pulseEvent(strength = 0.4) {
    eventPulse = Math.max(eventPulse, strength);
  }
  function setGroundingMode(on) {
    groundingMode = !!on;
    notify();
  }
  function update(dt) {
    if (!sessionStart) sessionStart = performance.now() / 1000;
    if (groundingMode) {
      // Grounding rapidly drains fear back to baseline — this is the user's
      // panic stop. They can recover.
      value = Math.max(0, value - dt * 18);
      eventPulse = Math.max(0, eventPulse - dt * 2);
      notify();
      return;
    }
    // Target = weighted sum of inputs, in 0..100 space.
    // Proximity is the biggest contributor — being close to the fear is the
    // fundamental trigger. Gaze + duration both build slowly. Event pulses
    // add a brief spike on top.
    eventPulse = Math.max(0, eventPulse - dt * 0.6);
    const target = Math.min(100,
      inputs.proximity * 55
      + inputs.gaze * 25
      + inputs.duration * 20
      + eventPulse * 30
    );
    // Asymmetric tracking: fear RISES quickly when target > value (panic
    // climbs fast) and FALLS slowly when target < value (anxiety lingers).
    // This is psychologically accurate — it's much easier to startle than
    // to recover.
    const rate = (target > value) ? 4.0 : 1.6;
    value += (target - value) * Math.min(1, dt * rate);
    if (value < 0) value = 0;
    if (value > 100) value = 100;
    peak = Math.max(peak, value);
    if (value > 30) timeInZone += dt;
    notify();
  }
  function get() { return value; }
  function getPeak() { return peak; }
  function getTimeInZone() { return timeInZone; }
  function isGrounding() { return groundingMode; }
  function getInputs() { return Object.assign({}, inputs); }
  function getScene() { return scene; }

  // Subscribe to fear-value changes — used by the post-process pipeline,
  // audio bus, and HUD.
  function subscribe(fn) { listeners.push(fn); return () => { listeners = listeners.filter(x => x !== fn); }; }
  function notify() {
    for (const fn of listeners) {
      try { fn(value, { peak, timeInZone, grounding: groundingMode, inputs }); } catch {}
    }
  }

  // Avoidance detection — the player has retreated to safety after engaging.
  // The scene calls bumpAvoidance(dt, isAvoiding) per frame; if the user
  // stays away for >12 s after engaging, we flag adaptive narration.
  function bumpAvoidance(dt, isAvoiding) {
    if (isAvoiding) avoidanceTimer += dt;
    else avoidanceTimer = 0;
  }
  function getAvoidanceTime() { return avoidanceTimer; }

  // Narration throttle so we don't speak over ourselves.
  function canNarrate(minGap = 6) {
    const now = performance.now() / 1000;
    if (now - lastNarrationAt < minGap) return false;
    return true;
  }
  function markNarrated() { lastNarrationAt = performance.now() / 1000; }

  // Habituation: read the previous best from localStorage, return delta strings.
  function recordSession() {
    if (!scene) return null;
    const key = `fobia.fear.${scene}.${levelIdx}.history`;
    let history = [];
    try { history = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}
    const session = {
      peak: Math.round(peak),
      duration: Math.round((performance.now() / 1000) - sessionStart),
      timeInZone: Math.round(timeInZone),
      ts: Date.now(),
    };
    history.push(session);
    // Keep last 10 sessions
    if (history.length > 10) history = history.slice(-10);
    try { localStorage.setItem(key, JSON.stringify(history)); } catch {}
    return session;
  }
  function getHabituationDelta() {
    if (!scene) return null;
    const key = `fobia.fear.${scene}.${levelIdx}.history`;
    let history = [];
    try { history = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}
    if (history.length < 1) return null;
    const last = history[history.length - 1];
    return {
      lastPeak: last.peak,
      lastTimeInZone: last.timeInZone,
      lastDuration: last.duration,
      sessionsLogged: history.length,
    };
  }

  return {
    setScene, update, get, getPeak, getTimeInZone, getInputs, getScene,
    setInput, pulseEvent, setGroundingMode, isGrounding,
    subscribe,
    bumpAvoidance, getAvoidanceTime,
    canNarrate, markNarrated,
    recordSession, getHabituationDelta,
  };
})();
window.PhobiaFear = PhobiaFear;

//   - calm (fear < 25): exploration, gentle invitations

//   - habituation (peak < last peak): celebrate progress
//

  };
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // The engine's main entrypoint — called per frame from the scene's update.
  // Reads PhobiaFear state and decides whether (and what) to say.
  function tick(scenePhobia, opts = {}) {
    if (!window.PhobiaVoice) return;
    if (!PhobiaFear.canNarrate(opts.minGap || 8)) return;
    const fear = PhobiaFear.get();
    const peak = PhobiaFear.getPeak();
    const inputs = PhobiaFear.getInputs();
    const sceneLines = lines[scenePhobia] || lines.heights;
    let bucket = null;
    // Priority order: panic > habituation > close > looking down > walking > arrival
    if (fear > 70) bucket = sceneLines.panic;
    else if (PhobiaFear.getAvoidanceTime() > 14) bucket = sceneLines.avoidance;
    else if (fear > 40 && inputs.gaze > 0.5) bucket = sceneLines.lookingDown || sceneLines.close;
    else if (fear > 30) bucket = sceneLines.close;
    else if (inputs.proximity > 0.2) bucket = sceneLines.walking;
    else bucket = sceneLines.arrival;
    if (!bucket || bucket.length === 0) return;
    const line = pick(bucket);
    try {
      window.PhobiaVoice.speak(line);
      PhobiaFear.markNarrated();
    } catch {}
  }

  // Habituation feedback — call ONCE at end of session.
  function speakHabituation(scenePhobia) {
    if (!window.PhobiaVoice) return;
    const delta = PhobiaFear.getHabituationDelta();
    if (!delta || delta.sessionsLogged < 2) return;
    const peakNow = PhobiaFear.getPeak();
    const sceneLines = lines[scenePhobia] || lines.heights;
    if (peakNow < delta.lastPeak - 5) {
      const line = pick(sceneLines.habituation);
      try { window.PhobiaVoice.speak(line); } catch {}
      return true;
    }
    return false;
  }
  return { tick, speakHabituation };

// ---------- Voice guidance (Web Speech Synthesis) ----------
// A calm therapist-style narrator that delivers grounding cues during exposure.
// MUTED BY DEFAULT — voice quality varies wildly by browser/OS and many users
// prefer the silence. The user can toggle voice on via the in-stage 🗣️ pill
// or in Settings. Captions still fire when voice is muted, so the prompts are
// readable on screen even with no audio. Once the user explicitly toggles it
// (either way), their preference persists in localStorage.
const PhobiaVoice = (() => {
  const synth = typeof window !== "undefined" && window.speechSynthesis;
  let voice = null;
  let muted = true;     // default: silent
  let voiceRate = 0.85;
  try {
    // Honour saved preference (either "1" muted or "0" unmuted). If the key
    // isn't set yet (new user), default to muted via the line above.
    const stored = localStorage.getItem("fobia.voiceMuted");
    if (stored === "0") muted = false;
    else if (stored === "1") muted = true;
  } catch {}

  function pickVoice() {
    if (!synth) return;
    const voices = synth.getVoices();
    if (!voices.length) return;
    // Prefer calm female English voices known to ship with major browsers.
    const preferOrder = [
      "Samantha", "Karen", "Moira", "Tessa", "Allison",
      "Google UK English Female", "Google US English",
      "Microsoft Aria", "Microsoft Zira", "Microsoft Jenny",
    ];
    for (const name of preferOrder) {
      const v = voices.find(v => v.name && v.name.includes(name));
      if (v) { voice = v; return; }
    }
    voice = voices.find(v => /en/i.test(v.lang) && /female/i.test(v.name)) ||
            voices.find(v => /en/i.test(v.lang)) ||
            voices.find(v => v.default) ||
            voices[0];
  }
  if (synth) {
    pickVoice();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pickVoice;
  }

  function speak(text, opts = {}) {
    // Always emit caption event for closed captions, even when muted
    try {
      window.dispatchEvent(new CustomEvent("voice-line", {
        detail: { text, durationMs: Math.max(2200, text.length * 70) }
      }));
    } catch {}
    if (muted || !synth || !text) return;
    // Cancel any in-flight speech so back-to-back lines don't queue up and
    // talk over each other. Some browsers (older Firefox, certain Edge
    // versions) throw on cancel when the queue is empty — wrap defensively.
    try { synth.cancel(); } catch {}
    try {
      const u = new SpeechSynthesisUtterance(text);
      if (voice) u.voice = voice;
      // Calm therapist tone — slightly slower than default (0.85), slightly
      // lower pitch (0.92) for warmth, gentle volume so it doesn't compete
      // with environmental audio. Clamp values to spec-safe ranges so a
      // bad opt doesn't make the browser refuse to speak.
      u.rate = Math.max(0.1, Math.min(10, opts.rate || voiceRate));
      u.pitch = Math.max(0, Math.min(2, opts.pitch != null ? opts.pitch : 0.92));
      u.volume = Math.max(0, Math.min(1, opts.volume == null ? 0.85 : opts.volume));
      synth.speak(u);
    } catch (e) {
      // Some Safari versions throw on .speak() if the page is hidden.
      // Silent fallback — captions already fired above.
    }
  }
  function stop() { if (synth) try { synth.cancel(); } catch {} }
  function setMuted(m) {
    muted = !!m;
    try { localStorage.setItem("fobia.voiceMuted", muted ? "1" : "0"); } catch {}
    if (muted) stop();
  }
  function setRate(r) { voiceRate = r; }

  return { speak, stop, setMuted, isMuted: () => muted, setRate, hasVoice: () => !!synth };
})();

// ---------- State ----------
const STATE_KEY = "fobia.state.v1";
let state = loadState();
// Make state per-character: each character has its own progress + log. The
// global state.progress / state.log fields are kept as references to the
// active character's data so existing code continues to work.
function activateCharacterState() {
  if (!state.byCharacter) state.byCharacter = {};
  const ch = window.Character && window.Character.loadCharacter();
  const id = ch?.id || "default";
  if (!state.byCharacter[id]) {
    // Migrate any legacy global progress/log into this character on first access
    state.byCharacter[id] = {
      progress: state.progress && Object.keys(state.progress).length ? state.progress : {},
      log: state.log && state.log.length ? state.log : [],
    };
  }
  state.progress = state.byCharacter[id].progress;
  state.log      = state.byCharacter[id].log;
}
// Refresh state when the user switches/creates/deletes a character
window.addEventListener("character-changed", () => { activateCharacterState(); });
// Non-persisted prediction (cleared on submit-rate). Drives the post-rung
// "you expected X, you felt Y" comparison that powers prediction-error learning.
let pendingPrediction = null;
// Active background pad handle, if music is enabled.
let ambientPad = null;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY)) || {};
    return Object.assign({ progress: {}, log: [], courage: 0 }, s);
  } catch { return { progress: {}, log: [], courage: 0 }; }
}
// saveState swallows storage errors (Safari Private Mode rejects writes
// past a tiny quota — without the catch, the whole render thread can throw
// when persisting after a session).
function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch {}
}

function getProgress(phobiaKey) {
  return state.progress[phobiaKey] || { highestCompleted: -1 };
}
// ---------- Courage Points ----------
// A simple gamification XP value: each rung completion grants points scaled
// by difficulty (10 + 5 × levelIdx), with a 2× bonus the FIRST time the
// user clears a particular rung. Total displays in the header so the user
// has a tangible "I'm growing" number.
function awardCourage(points, reason) {
  if (!Number.isFinite(points) || points <= 0) return;
  state.courage = (state.courage || 0) + Math.round(points);
  saveState();
  // Re-render the header courage badge if visible
  try {
    const badge = document.getElementById("courageBadge");
    if (badge) {
      badge.textContent = `⚡ ${state.courage}`;
      badge.classList.add("pop");
      setTimeout(() => badge.classList.remove("pop"), 600);
    }
  } catch {}
  if (reason && window.PhobiaFX && window.PhobiaFX.contextPrompt) {
    // Light, non-intrusive notification — only when the courage gain is
    // big enough to celebrate.
    if (points >= 20) {
      try { window.PhobiaFX.contextPrompt(`+${Math.round(points)} courage · ${reason}`, 2800); } catch {}
    }
  }
}
function getCourage() { return state.courage || 0; }

function markCompleted(phobiaKey, levelIdx, suds, predicted) {
  const p = getProgress(phobiaKey);
  const wasNew = levelIdx > p.highestCompleted;
  p.highestCompleted = Math.max(p.highestCompleted, levelIdx);
  state.progress[phobiaKey] = p;
  state.log.push({ phobia: phobiaKey, level: levelIdx, suds, predicted, ts: Date.now() });
  saveState();
  // ---- Courage Points award ----
  // Base 10 + 5 per difficulty rung. 2× bonus for first-time clears.
  const basePoints = 10 + 5 * levelIdx;
  const isFirstTime = wasNew;
  const points = isFirstTime ? basePoints * 2 : basePoints;
  awardCourage(points, isFirstTime ? "first time" : "well done");
  // Check for newly-unlocked milestones (after the log push so they see this entry)
  checkMilestones();
  // Award an achievement toast for first-time completions
  if (wasNew) {
    const phobia = PHOBIAS[phobiaKey];
    const isLast = levelIdx === phobia.levels.length - 1;
    if (isLast) {
      showAchievement("Ladder complete", `You walked all 5 rungs of ${phobia.label}.`, "🪜");
    } else if (levelIdx === 0) {
      showAchievement("First rung climbed", `You started ${phobia.label}.`, "🌱");
    } else if (levelIdx === Math.floor(phobia.levels.length / 2)) {
      showAchievement("Halfway there", `Rung ${levelIdx + 1} on ${phobia.label}.`, "🚩");
    }
  }
  // Award a brave-face if anxiety was high but you stayed
  if (suds >= 7) showAchievement("Held the line", `Anxiety ${suds}/10 and you stayed.`, "🫁");
}

// ---------- Progress milestones ----------
// Auto-detected achievements that unlock as the user makes progress. Each one
// fires once. Stored in state.byCharacter[id].milestones so they're per-character.
const MILESTONES = [
  { id: "first_session",  title: "First session",      icon: "🌱",
    desc: "You started. That is the hardest rung of all.",
    check: () => state.log.length >= 1 },

    desc: "Felt 4 or less on rung 4 or 5 — habituation working.",

  { id: "first_journal",  title: "Reflective journaler", icon: "📓",
    desc: "Wrote a journal note on a session.",
    check: () => state.log.some(l => l.note) },
  { id: "ladder_complete",title: "Ladder conquered",     icon: "🪜",
    desc: "Climbed every rung of a phobia.",
    check: () => Object.entries(PHOBIAS).some(([k, p]) =>

  { id: "custom_ladder",  title: "Architect",            icon: "🛠",

    desc: "A 7-day session streak.",
    check: () => computeStreak() >= 7 },
  { id: "good_predictor", title: "Steady predictor",     icon: "🎯",
    desc: "Average over-prediction below 1 — you read your body well.",
    check: () => {
      const preds = state.log.filter(l => l.predicted != null);
      if (preds.length < 5) return false;
      const avgGap = preds.reduce((s, l) => s + Math.abs(l.predicted - l.suds), 0) / preds.length;
      return avgGap < 1;
    } },
];
function unlockedMilestones() {
  const cs = state.byCharacter || {};
  const id = (window.Character && window.Character.activeCharacterId()) || "default";
  cs[id] = cs[id] || { progress: {}, log: [] };
  if (!Array.isArray(cs[id].milestones)) cs[id].milestones = [];
  return cs[id].milestones;
}
function setUnlockedMilestones(arr) {
  const cs = state.byCharacter || {};
  const id = (window.Character && window.Character.activeCharacterId()) || "default";
  cs[id].milestones = arr;
}
function checkMilestones() {
  const already = unlockedMilestones();
  const newlyUnlocked = [];
  for (const m of MILESTONES) {
    if (already.includes(m.id)) continue;
    try {
      if (m.check()) {
        already.push(m.id);
        newlyUnlocked.push(m);
      }
    } catch {}
  }
  if (newlyUnlocked.length) {
    setUnlockedMilestones(already);
    saveState();
    // Show toasts for each
    newlyUnlocked.forEach((m, i) => setTimeout(() =>
      showAchievement(m.title, m.desc, m.icon), i * 1500));
  }
}

// Modal dialog for setting / editing a per-phobia goal
function openGoalEditor(phobiaKey) {
  const p = PHOBIAS[phobiaKey]; if (!p) return;
  const existing = getGoal(phobiaKey) || { targetRung: Math.min(p.levels.length - 1, 2), perWeek: 3 };
  const overlay = document.createElement("div");
  overlay.className = "goal-modal-overlay";
  overlay.innerHTML = `
    <div class="goal-modal">
      <h3>Set a goal — ${p.label}</h3>
      <p class="small">Goals are private to you. We'll show progress on the ladder page.</p>
      <label>Target rung
        <select id="goalRung">
          ${p.levels.map((lv, i) => `<option value="${i}" ${i === existing.targetRung ? "selected" : ""}>Rung ${i+1} — ${escapeHtml(lv.title)}</option>`).join("")}
        </select>
      </label>
      <label>Sessions per week
        <select id="goalPerWeek">
          ${[1,2,3,4,5,6,7].map(n => `<option value="${n}" ${n === existing.perWeek ? "selected" : ""}>${n}</option>`).join("")}
        </select>
      </label>
      <div class="actions">
        ${getGoal(phobiaKey) ? `<button class="btn-warn" id="goalDelete">Remove goal</button>` : ""}
        <button class="btn-ghost" id="goalCancel">Cancel</button>
        <button class="btn-primary" id="goalSave">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  function close() { overlay.remove(); }
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  overlay.querySelector("#goalCancel").onclick = close;
  overlay.querySelector("#goalSave").onclick = () => {
    setGoal(phobiaKey, {
      targetRung: parseInt(overlay.querySelector("#goalRung").value, 10),
      perWeek: parseInt(overlay.querySelector("#goalPerWeek").value, 10),
    });
    close();
    go("ladder", { phobia: phobiaKey });
  };
  const del = overlay.querySelector("#goalDelete");
  if (del) del.onclick = () => {
    setGoal(phobiaKey, null);
    close();
    go("ladder", { phobia: phobiaKey });
  };
}

// ---------- Per-phobia goals ----------
// Stored as state.goals[phobiaKey] = { targetRung: 0..4, perWeek: 1..7 }
function getGoals() {
  if (!state.goals) state.goals = {};
  return state.goals;
}
function getGoal(phobiaKey) { return getGoals()[phobiaKey] || null; }
function setGoal(phobiaKey, goal) {
  state.goals = state.goals || {};
  if (goal == null) delete state.goals[phobiaKey];
  else state.goals[phobiaKey] = goal;
  saveState();
}
function thisWeekSessions(phobiaKey) {
  const now = new Date();
  const sevenDaysAgo = now.getTime() - 7 * 86400000;
  return state.log.filter(l => l.phobia === phobiaKey && l.ts >= sevenDaysAgo).length;
}
